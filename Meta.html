    (function initMetaTierToggle() {
      document.addEventListener("click", (e) => {
        const btn = e.target && e.target.closest ? e.target.closest("[data-meta-tier-toggle]") : null;
        if (!btn) return;
        const label = btn.getAttribute("data-meta-tier-toggle");
        const section = btn.closest(".meta-ai-tier-section");
        if (!section) return;
        const isOpen = section.classList.toggle("open");
        btn.setAttribute("aria-expanded", isOpen ? "true" : "false");
        if (isOpen) metaAiTierExpanded.add(label);
        else metaAiTierExpanded.delete(label);
      });
    })();

    function buildMetaAiTierSectionsHtml(rows, buildSectionFn) {
      return META_AI_TIER_SLICES.map(({ label, tier }) => {
        const tierRows = filterMetaRowsByTier(rows, tier);
        return buildMetaTierSectionWrap(label, buildSectionFn(tierRows, label));
      }).join("");
    }

    function formatMetaInt(val) {
      return Math.round(val || 0).toLocaleString();
    }

    function formatMetaMoney(val) {
      return (val || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatMetaPct(val) {
      if (!val) return "0%";
      return `${val.toFixed(2)}%`;
    }

    function filterMetaRowsForKpi(rows, dateFrom, dateTo) {
      if (!dateFrom && !dateTo) return rows;
      return rows.filter((row) => {
        const d = normalizeDate(row[DATE_COL]);
        if (!d) return false;
        if (dateFrom && d < dateFrom) return false;
        if (dateTo && d > dateTo) return false;
        return true;
      });
    }

    function aggregateMetaKpi(rows) {
      let impressions = 0;
      let clicks = 0;
      let spend = 0;

      rows.forEach((row) => {
        impressions += parseNum(row[META_KPI_COL.IMPRESSIONS]);
        clicks += parseNum(row[META_KPI_COL.CLICKS]);
        spend += parseNum(row[META_KPI_COL.SPEND]);
      });

      return {
        cpm: impressions ? (spend / impressions) * 1000 : 0,
        impr: impressions,
        clicks,
        ctr: impressions ? (clicks / impressions) * 100 : 0,
        cpc: clicks ? spend / clicks : 0,
        cost: spend
      };
    }

    function formatMetaKpiDisplay(raw) {
      const blank = "";
      return {
        cpm: `$${formatMetaMoney(raw.cpm)}`,
        impr: formatMetaInt(raw.impr),
        clicks: formatMetaInt(raw.clicks),
        ctr: formatMetaPct(raw.ctr),
        cpc: `$${formatMetaMoney(raw.cpc)}`,
        cost: `$${formatMetaMoney(raw.cost)}`,
        cvs: blank,
        cvr: blank,
        cvsValues: blank,
        roas: blank,
        acos: blank,
        tacos: blank,
        cpa: blank,
        aov: blank
      };
    }

    function refreshMetaKpiSummary() {
      if (!window.KpiSummary) return;
      if (!state.rows?.length) {
        window.KpiSummary.clearValues();
        return;
      }

      window.KpiSummary.syncSourceFiles({
        sourceFile: state.sourceFile
      });

      const { start, end } = window.KpiSummary.getDateRange();
      const filtered = filterMetaRowsForKpi(state.rows, start, end);
      const metrics = aggregateMetaKpi(filtered);
      window.KpiSummary.setValues(formatMetaKpiDisplay(metrics));
    }

    function getMetaDateRangeLabel(rows) {
      const dates = rows
        .map((row) => normalizeDate(row[DATE_COL]))
        .filter(Boolean)
        .sort();
      if (!dates.length) return "전체 기간";
      const first = dates[0];
      const last = dates[dates.length - 1];
      return first === last ? first : `${first} ~ ${last}`;
    }

    function aggregateMetaByColumn(rows, column) {
      const map = new Map();
      rows.forEach((row) => {
        const name = String(row[column] ?? "").trim();
        if (!name) return;
        if (!map.has(name)) {
          map.set(name, { name, impressions: 0, clicks: 0, spend: 0 });
        }
        const item = map.get(name);
        item.impressions += parseNum(row[IMP_COL]);
        item.clicks += parseNum(row[CLICKS_COL]);
        item.spend += parseNum(row[SPEND_COL]);
      });
      return [...map.values()].map((item) => ({
        ...item,
        ctr: item.impressions ? (item.clicks / item.impressions) * 100 : 0,
        cpc: item.clicks ? item.spend / item.clicks : 0
      }));
    }

    function isMetaEntityEligible(item) {
      return item.spend >= 3 || item.impressions >= 300;
    }

    function scoreMetaEntityPerformance(item) {
      if (!isMetaEntityEligible(item)) return null;
      if (item.clicks < 1 && item.spend < 5) return null;
      const ctrNorm = Math.min(item.ctr / 2, 1.5);
      const cpcNorm = item.cpc > 0 ? Math.min(0.5 / item.cpc, 2) : 0;
      const volumeNorm = Math.min(item.clicks / 50, 1);
      return ctrNorm * 0.45 + cpcNorm * 0.35 + volumeNorm * 0.2;
    }

    function scoreMetaEntityUnderperformance(item) {
      if (!isMetaEntityEligible(item)) return null;
      let score = 0;
      if (!item.clicks && item.spend >= 5) score += 5;
      if (item.ctr < 0.8) score += 2;
      else if (item.ctr < 1.2) score += 1;
      if (item.cpc > 1) score += 2;
      else if (item.cpc > 0.6) score += 1;
      score += Math.min(item.spend / 30, 3);
      if (!item.clicks) score += item.spend / 10;
      return score;
    }

    function computeMetaCtrTrend(rows) {
      const byDate = new Map();
      rows.forEach((row) => {
        const date = normalizeDate(row[DATE_COL]);
        if (!date) return;
        if (!byDate.has(date)) {
          byDate.set(date, { impressions: 0, clicks: 0, spend: 0 });
        }
        const bucket = byDate.get(date);
        bucket.impressions += parseNum(row[IMP_COL]);
        bucket.clicks += parseNum(row[CLICKS_COL]);
        bucket.spend += parseNum(row[SPEND_COL]);
      });
      const dates = [...byDate.keys()].sort();
      if (dates.length < 4) {
        return { label: "데이터 부족", first: 0, last: 0 };
      }
      const ctrForDates = (list) => {
        let imp = 0;
        let clicks = 0;
        list.forEach((date) => {
          imp += byDate.get(date).impressions;
          clicks += byDate.get(date).clicks;
        });
        return imp ? (clicks / imp) * 100 : 0;
      };
      const mid = Math.floor(dates.length / 2);
      const first = ctrForDates(dates.slice(0, mid));
      const last = ctrForDates(dates.slice(mid));
      let label = "유지";
      if (last > first * 1.08) label = "상승";
      else if (last < first * 0.92) label = "하락";
      return { label, first, last, dayCount: dates.length };
    }

    function assessMetaAdFatigue(rows, ctrTrend) {
      const adSets = aggregateMetaByColumn(rows, AD_SET_COL)
        .filter((item) => item.spend >= 10 && item.impressions >= 1000)
        .sort((a, b) => b.spend - a.spend)
        .slice(0, 8);

      let declining = 0;
      adSets.forEach((adSet) => {
        const setRows = rows.filter((row) => String(row[AD_SET_COL] ?? "").trim() === adSet.name);
        const trend = computeMetaCtrTrend(setRows);
        if (trend.label === "하락" && trend.first > 0 && trend.last < trend.first * 0.9) {
          declining += 1;
        }
      });

      const portfolioDecline = ctrTrend.label === "하락"
        && ctrTrend.first > 0
        && ctrTrend.last < ctrTrend.first * 0.9;

      if (portfolioDecline && declining >= 2) {
        return {
          level: "높음",
          detail: `전체 CTR ${formatMetaPct(ctrTrend.first)} → ${formatMetaPct(ctrTrend.last)} 하락, 주요 광고 세트 ${declining}개에서 CTR 둔화가 감지됩니다.`
        };
      }
      if (portfolioDecline || declining >= 1) {
        return {
          level: "보통",
          detail: portfolioDecline
            ? `전체 CTR이 ${formatMetaPct(ctrTrend.first)} → ${formatMetaPct(ctrTrend.last)}로 하락해 소재·타겟 피로 가능성을 점검할 시점입니다.`
            : `주요 광고 세트 ${declining}개에서 CTR 하락이 보여 소재 교체·빈도 관리를 검토하세요.`
        };
      }
      if (ctrTrend.label === "상승") {
        return {
          level: "낮음",
          detail: `CTR 추세가 ${formatMetaPct(ctrTrend.first)} → ${formatMetaPct(ctrTrend.last)}로 개선 중이며, 현 단계에서 피로도 신호는 크지 않습니다.`
        };
      }
      return {
        level: "낮음",
        detail: "기간 내 CTR 추세가 안정적이어서 광고 피로도 가능성은 낮은 편입니다."
      };
    }

    function metaSummaryTagClass(level) {
      const good = ["양호", "우수", "효율적", "효율 양호", "상승", "낮음"];
      const warn = ["보통", "보통 수준", "유지", "저조", "보통"];
      if (good.includes(level)) return "good";
      if (warn.includes(level)) return "warn";
      return "bad";
    }

    function metaSummaryTagHtml(level) {
      if (!level) return "";
      const cls = metaSummaryTagClass(level);
      return `<span class="ai-summary-tag${cls ? ` ${cls}` : ""}">${escapeHtml(level)}</span>`;
    }

    function getMetaCtrLevel(ctr) {
      if (ctr >= 5) return "우수";
      if (ctr >= 3) return "양호";
      if (ctr >= 1) return "보통";
      return "나쁨";
    }

    function getMetaCpcLevel(cpc) {
      if (cpc <= 0.4) return "우수";
      if (cpc <= 0.9) return "양호";
      if (cpc <= 1.5) return "보통";
      return "나쁨";
    }

    function buildMetaHighlightHtml(label, name, detail, note) {
      return [
        `<div class="ai-summary-campaign">`,
        `<div class="ai-summary-campaign-head"><strong>${escapeHtml(label)}</strong><span class="ai-summary-campaign-name">${escapeHtml(name)}</span></div>`,
        `<div class="ai-summary-campaign-detail">${detail}</div>`,
        `<div class="ai-summary-campaign-note">${escapeHtml(note)}</div>`,
        `</div>`
      ].join("");
    }

    function buildMetaMetricRowHtml(label, valueHtml) {
      return [
        `<div class="ai-summary-metric">`,
        `<div class="ai-summary-metric-label">${escapeHtml(label)}</div>`,
        `<div class="ai-summary-metric-value">${valueHtml}</div>`,
        `</div>`
      ].join("");
    }

    function getMetaOverallStatusText(overallCtr, overallCpc, ctrTrendLabel, fatigueLevel) {
      if (fatigueLevel === "높음" && ctrTrendLabel === "하락") {
        return "CTR 하락과 피로도 신호가 겹쳐 소재·타겟·빈도 전반 재점검이 필요합니다.";
      }
      if (overallCtr >= 1.5 && overallCpc <= 0.5) {
        return "클릭 효율과 비용 효율이 모두 양호한 Traffic 운영 상태입니다.";
      }
      if (overallCtr < 0.8 || overallCpc > 1) {
        return "CTR·CPC 모두 개선 여지가 있어 크리에이티브·타겟·입찰 점검이 필요합니다.";
      }
      if (ctrTrendLabel === "하락") {
        return "CTR 하락 추세로 소재·오디언스 최적화를 검토할 시점입니다.";
      }
      if (ctrTrendLabel === "상승") {
        return "CTR 개선 추세로 현 구조를 유지·확대할 수 있는 운영 상태입니다.";
      }
      return "전반적으로 안정적인 Traffic 광고 운영 상태입니다.";
    }

    function buildMetaAiCard1SectionHtml(rows, tierLabel) {
      const activeRows = rows.filter((row) => parseNum(row[IMP_COL]) > 0 || parseNum(row[SPEND_COL]) > 0);
      if (!activeRows.length) {
        return `<p class="meta-ai-tier-empty">${escapeHtml(tierLabel)} 구간에 노출·지출 데이터가 없습니다.</p>`;
      }

      const rangeLabel = getMetaDateRangeLabel(activeRows);
      const totalImp = activeRows.reduce((sum, row) => sum + parseNum(row[IMP_COL]), 0);
      const totalClicks = activeRows.reduce((sum, row) => sum + parseNum(row[CLICKS_COL]), 0);
      const totalSpend = activeRows.reduce((sum, row) => sum + parseNum(row[SPEND_COL]), 0);
      const overallCtr = totalImp ? (totalClicks / totalImp) * 100 : 0;
      const overallCpc = totalClicks ? totalSpend / totalClicks : 0;

      const campaigns = aggregateMetaByColumn(activeRows, CAMPAIGN_COL);
      const adSets = aggregateMetaByColumn(activeRows, AD_SET_COL);

      const bestCampaign = [...campaigns]
        .map((item) => ({ item, score: scoreMetaEntityPerformance(item) }))
        .filter((entry) => entry.score != null)
        .sort((a, b) => b.score - a.score || b.item.clicks - a.item.clicks)[0]?.item
        || [...campaigns].filter((item) => item.clicks > 0).sort((a, b) => b.ctr - a.ctr || a.cpc - b.cpc)[0]
        || null;

      const worstCampaign = [...campaigns]
        .map((item) => ({ item, score: scoreMetaEntityUnderperformance(item) }))
        .filter((entry) => entry.score != null)
        .sort((a, b) => b.score - a.score || b.item.spend - a.item.spend)[0]?.item
        || null;

      const bestAdSet = [...adSets]
        .map((item) => ({ item, score: scoreMetaEntityPerformance(item) }))
        .filter((entry) => entry.score != null)
        .sort((a, b) => b.score - a.score || b.item.clicks - a.item.clicks)[0]?.item
        || [...adSets].filter((item) => item.clicks > 0).sort((a, b) => b.ctr - a.ctr || a.cpc - b.cpc)[0]
        || null;

      const ctrTrend = computeMetaCtrTrend(activeRows);
      const fatigue = assessMetaAdFatigue(activeRows, ctrTrend);
      const ctrTrendTag = ctrTrend.label === "상승" ? "good" : ctrTrend.label === "하락" ? "bad" : "warn";

      const ctrLevel = getMetaCtrLevel(overallCtr);
      const cpcLevel = getMetaCpcLevel(overallCpc);

      const zeroClickSpend = activeRows.reduce((sum, row) => {
        const spend = parseNum(row[SPEND_COL]);
        const clicks = parseNum(row[CLICKS_COL]);
        return sum + (clicks === 0 ? spend : 0);
      }, 0);
      const zeroClickShare = totalSpend ? zeroClickSpend / totalSpend : 0;
      const clicksPerDollar = totalSpend ? totalClicks / totalSpend : 0;
      const budgetLevel = clicksPerDollar >= 3 && zeroClickShare < 0.15
        ? "효율적"
        : clicksPerDollar >= 1.5 && zeroClickShare < 0.3
          ? "보통"
          : "개선 필요";

      const operationStatus = getMetaOverallStatusText(overallCtr, overallCpc, ctrTrend.label, fatigue.level);

      const highlightParts = [
        '<div class="ai-summary-block">',
        '<div class="ai-summary-block-title-row"><span class="ai-summary-block-title">캠페인·광고 세트 하이라이트</span><span class="meta-score-info" tabindex="0" data-meta-tip="highlight">평가 기준 &#9432;</span></div>'
      ];
      if (bestCampaign) {
        highlightParts.push(buildMetaHighlightHtml(
          "가장 성과가 좋은 캠페인",
          getCampaignShortName(bestCampaign.name),
          `CTR ${formatMetaPct(bestCampaign.ctr)} · CPC $${formatMetaMoney(bestCampaign.cpc)} · 클릭 ${formatMetaInt(bestCampaign.clicks)} · 지출 $${formatMetaMoney(bestCampaign.spend)}`,
          `${tierLabel} 구간에서 CTR·CPC·클릭 볼륨 기준 Traffic 효율이 가장 우수한 캠페인입니다.`
        ));
      }
      if (worstCampaign && (!bestCampaign || worstCampaign.name !== bestCampaign.name)) {
        highlightParts.push(buildMetaHighlightHtml(
          "가장 성과가 낮은 캠페인",
          getCampaignShortName(worstCampaign.name),
          `CTR ${formatMetaPct(worstCampaign.ctr)} · CPC $${formatMetaMoney(worstCampaign.cpc)} · 클릭 ${formatMetaInt(worstCampaign.clicks)} · 지출 $${formatMetaMoney(worstCampaign.spend)}`,
          worstCampaign.clicks === 0
            ? "클릭 없이 지출이 발생해 예산 재배분·타겟·소재 점검 우선 대상입니다."
            : "CTR·CPC 대비 효율이 낮아 최적화·예산 축소 검토 대상입니다."
        ));
      }
      if (bestAdSet) {
        const adSetLabel = formatAdSetStatsLabel(getAdSetBaseName(bestAdSet.name), "");
        highlightParts.push(buildMetaHighlightHtml(
          "가장 효율적인 광고 세트",
          adSetLabel || bestAdSet.name,
          `CTR ${formatMetaPct(bestAdSet.ctr)} · CPC $${formatMetaMoney(bestAdSet.cpc)} · 노출 ${formatMetaInt(bestAdSet.impressions)} · 지출 $${formatMetaMoney(bestAdSet.spend)}`,
          `${tierLabel} Meta Traffic 기준 클릭·비용 효율이 가장 우수한 광고 세트입니다.`
        ));
      }
      if (!bestCampaign && !worstCampaign && !bestAdSet) {
        highlightParts.push(`<p class="meta-ai-tier-empty">${escapeHtml(tierLabel)} 구간에서 하이라이트할 캠페인·광고 세트가 없습니다.</p>`);
      }
      highlightParts.push("</div>");

      const metricParts = [
        '<div class="ai-summary-block">',
        '<div class="ai-summary-block-title-row"><span class="ai-summary-block-title">운영 지표 요약</span><span class="meta-score-info" tabindex="0" data-meta-tip="ctrcpc">평가 기준 &#9432;</span></div>',
        '<div class="ai-summary-metrics">'
      ];
      metricParts.push(buildMetaMetricRowHtml(
        "CTR 수준",
        `${rangeLabel} 기준 CTR <strong>${formatMetaPct(overallCtr)}</strong>${metaSummaryTagHtml(ctrLevel)} · 노출 ${formatMetaInt(totalImp)} · 클릭 ${formatMetaInt(totalClicks)}`
      ));
      metricParts.push(buildMetaMetricRowHtml(
        "CPC 수준",
        `평균 CPC <strong>$${formatMetaMoney(overallCpc)}</strong>${metaSummaryTagHtml(cpcLevel)}`
      ));
      metricParts.push("</div></div>");

      return highlightParts.join("") + metricParts.join("");
    }

    function buildMetaAiCard1Html(rows) {
      if (!rows.length) {
        return "<p>분석할 Meta 데이터가 없습니다.</p>";
      }

      const summary = buildMetaAiTierSectionsHtml(rows, buildMetaAiCard1SectionHtml);
      const adset = [
        `<div class="meta-ai-merge-divider"></div>`,
        `<div class="meta-ai-merge-subtitle">광고 세트 분석</div>`,
        buildMetaAiCampaignSelectHtml("meta-ai-card-1-adset-campaign"),
        buildMetaAiCard4ContentHtml(rows)
      ].join("");
      return summary + adset;
    }

    function renderMetaAiCard1() {
      const card1 = document.getElementById("meta-ai-card-1-body");
      if (!card1) return;
      try {
        card1.innerHTML = buildMetaAiCard1Html(state.rows);
        bindMetaAiCampaignSelect("meta-ai-card-1-adset-campaign", renderMetaAiCard1);
      } catch (err) {
        card1.textContent = "요약 생성 중 오류가 발생했습니다.";
      }
    }

    function ensureMetaAiCampaignSelected() {
      const options = getCampaignOptions();
      if (!options.length) {
        metaAiState.campaign = "";
        return;
      }
      const current = metaAiState.campaign || "";
      if (!current || !options.some((o) => o.toLowerCase() === current)) {
        metaAiState.campaign = options[0].toLowerCase();
      }
    }

    function filterMetaRowsByCampaign(rows, campaignShort) {
      if (!campaignShort) return [];
      return rows.filter((row) =>
        getCampaignShortName(row[CAMPAIGN_COL]).toLowerCase() === campaignShort
      );
    }

    function aggregateMetaAds(rows) {
      return aggregateMetaByColumn(rows, AD_NAME_COL).map((item) => ({
        ...item,
        displayName: getAdCreativeDisplayName(item.name)
      }));
    }

    function getMetaAdBenchmarks(ads) {
      const active = ads.filter((item) => item.spend >= 3 || item.impressions >= 300);
      const pool = active.length ? active : ads;
      const totalImp = pool.reduce((sum, item) => sum + item.impressions, 0);
      const totalClicks = pool.reduce((sum, item) => sum + item.clicks, 0);
      const totalSpend = pool.reduce((sum, item) => sum + item.spend, 0);
      const avgCtr = totalImp ? (totalClicks / totalImp) * 100 : 0;
      const avgCpc = totalClicks ? totalSpend / totalClicks : 0;
      const avgSpend = pool.length ? totalSpend / pool.length : 0;
      return { avgCtr, avgCpc, avgSpend, totalSpend };
    }

    function clampMetaScore(value) {
      return Math.max(0, Math.min(100, Math.round(value)));
    }

    function computeMetaAdPerformanceScore(ad, benchmarks) {
      const { avgCtr, avgCpc } = benchmarks;
      let score = 50;

      if (ad.impressions < 50 && ad.spend < 2) {
        return clampMetaScore(35);
      }

      if (avgCtr > 0) {
        const ctrRatio = ad.ctr / avgCtr;
        score += Math.min(Math.max((ctrRatio - 1) * 28, -22), 28);
      } else if (ad.ctr >= 1.5) {
        score += 12;
      }

      if (ad.clicks > 0 && avgCpc > 0) {
        const cpcRatio = avgCpc / ad.cpc;
        score += Math.min(Math.max((cpcRatio - 1) * 22, -18), 22);
      } else if (!ad.clicks && ad.spend >= 5) {
        score -= 28;
      }

      score += Math.min(ad.clicks / 15, 12);
      if (ad.impressions >= 1000 && ad.ctr >= avgCtr * 1.1) score += 5;
      if (ad.spend >= benchmarks.avgSpend * 1.5 && ad.ctr < avgCtr * 0.7) score -= 10;

      return clampMetaScore(score);
    }

    function getMetaAdScoreClass(score) {
      if (score >= 70) return "high";
      if (score >= 45) return "mid";
      return "low";
    }

    function buildMetaAdStrengths(ad, benchmarks) {
      const strengths = [];
      const { avgCtr, avgCpc } = benchmarks;

      if (ad.clicks >= 5) {
        strengths.push(`링크 클릭 ${formatMetaInt(ad.clicks)}건으로 반응 볼륨이 확보됨`);
      }
      if (avgCtr > 0 && ad.ctr >= avgCtr * 1.1) {
        strengths.push(`CTR ${formatMetaPct(ad.ctr)}로 캠페인 평균(${formatMetaPct(avgCtr)}) 대비 우수`);
      } else if (ad.ctr >= 1.5) {
        strengths.push(`CTR ${formatMetaPct(ad.ctr)}로 클릭 반응이 양호`);
      }
      if (ad.clicks > 0 && avgCpc > 0 && ad.cpc <= avgCpc * 0.9) {
        strengths.push(`CPC $${formatMetaMoney(ad.cpc)}로 평균($${formatMetaMoney(avgCpc)}) 대비 효율적`);
      }
      if (ad.impressions >= 1000 && ad.ctr >= 1) {
        strengths.push(`노출 ${formatMetaInt(ad.impressions)} 대비 안정적인 클릭 반응`);
      }
      if (!strengths.length) {
        strengths.push("충분한 판단 데이터가 쌓이면 강점을 구체화할 수 있습니다");
      }
      return strengths;
    }

    function buildMetaAdWeaknesses(ad, benchmarks) {
      const weaknesses = [];
      const { avgCtr, avgCpc } = benchmarks;

      if (!ad.clicks && ad.spend >= 3) {
        weaknesses.push(`지출 $${formatMetaMoney(ad.spend)} 대비 링크 클릭 0건`);
      }
      if (avgCtr > 0 && ad.ctr < avgCtr * 0.75) {
        weaknesses.push(`CTR ${formatMetaPct(ad.ctr)}로 캠페인 평균(${formatMetaPct(avgCtr)}) 대비 낮음`);
      } else if (ad.impressions >= 200 && ad.ctr < 0.8) {
        weaknesses.push(`CTR ${formatMetaPct(ad.ctr)}로 클릭 유도력이 부족`);
      }
      if (ad.clicks > 0 && avgCpc > 0 && ad.cpc >= avgCpc * 1.2) {
        weaknesses.push(`CPC $${formatMetaMoney(ad.cpc)}로 평균($${formatMetaMoney(avgCpc)}) 대비 높음`);
      }
      if (ad.impressions < 100 && ad.spend < 3) {
        weaknesses.push("노출·지출 데이터가 적어 성과 판단 신뢰도가 낮음");
      }
      if (!weaknesses.length) {
        weaknesses.push("뚜렷한 약점 신호는 없으나 지속 모니터링이 필요합니다");
      }
      return weaknesses;
    }

    function resolveMetaAdRecommendedAction(ad, score, benchmarks) {
      const { avgCtr, avgCpc } = benchmarks;

      if (!ad.clicks && ad.spend >= 15) {
        return META_RECOMMENDED_ACTIONS.pause;
      }
      if (!ad.clicks && ad.spend >= 8) {
        return META_RECOMMENDED_ACTIONS.reduceBudget;
      }
      if (score >= 78 && ad.clicks >= 8 && ad.ctr >= avgCtr) {
        return META_RECOMMENDED_ACTIONS.increaseBudget;
      }
      if (score >= 72 && ad.ctr >= avgCtr * 1.15 && ad.clicks >= 5) {
        return META_RECOMMENDED_ACTIONS.duplicateCampaign;
      }
      if (score >= 65 && ad.clicks >= 3 && ad.impressions < 800) {
        return META_RECOMMENDED_ACTIONS.expandAudience;
      }
      if (score >= 55 && score < 70 && ad.impressions >= 300 && ad.ctr < avgCtr * 0.85) {
        return META_RECOMMENDED_ACTIONS.testNewCreative;
      }
      if (ad.impressions >= 200 && ad.ctr < Math.min(avgCtr * 0.8, 1)) {
        return META_RECOMMENDED_ACTIONS.refreshCreative;
      }
      if (score < 45 && ad.spend >= benchmarks.avgSpend && ad.clicks <= 2) {
        return META_RECOMMENDED_ACTIONS.reduceBudget;
      }
      if (score < 35 && !ad.clicks) {
        return META_RECOMMENDED_ACTIONS.pause;
      }
      if (score >= 60) {
        return META_RECOMMENDED_ACTIONS.monitor;
      }
      if (ad.clicks > 0 && ad.cpc > avgCpc * 1.15) {
        return META_RECOMMENDED_ACTIONS.reduceBudget;
      }
      return META_RECOMMENDED_ACTIONS.monitor;
    }

    function evaluateMetaAd(ad, benchmarks) {
      const score = computeMetaAdPerformanceScore(ad, benchmarks);
      return {
        ...ad,
        score,
        strengths: buildMetaAdStrengths(ad, benchmarks),
        weaknesses: buildMetaAdWeaknesses(ad, benchmarks),
        action: resolveMetaAdRecommendedAction(ad, score, benchmarks)
      };
    }

    function buildMetaAdEvalItemHtml(evalItem) {
      const scoreClass = getMetaAdScoreClass(evalItem.score);
      return [
        `<div class="meta-ad-eval-item">`,
        `<div class="meta-ad-eval-head">`,
        `<div class="meta-ad-eval-name" title="${escapeAttr(evalItem.name)}">${escapeHtml(evalItem.displayName || evalItem.name)}</div>`,
        `<div class="meta-ad-eval-score ${scoreClass}">`,
        `<span class="meta-ad-eval-score-label">Performance Score</span>`,
        `${evalItem.score}`,
        `</div>`,
        `</div>`,
        `<div class="meta-ad-eval-metrics">노출 ${formatMetaInt(evalItem.impressions)} · 클릭 ${formatMetaInt(evalItem.clicks)} · CTR ${formatMetaPct(evalItem.ctr)} · CPC $${formatMetaMoney(evalItem.cpc)} · 지출 $${formatMetaMoney(evalItem.spend)}</div>`,
        `<div class="meta-ad-eval-row"><span class="meta-ad-eval-row-label">강점</span>${escapeHtml(evalItem.strengths.join(" · "))}</div>`,
        `<div class="meta-ad-eval-row"><span class="meta-ad-eval-row-label">약점</span>${escapeHtml(evalItem.weaknesses.join(" · "))}</div>`,
        `<div class="meta-ad-eval-row"><span class="meta-ad-eval-row-label">추천</span><span class="meta-ad-eval-action">${escapeHtml(evalItem.action)}</span></div>`,
        `</div>`
      ].join("");
    }

    function buildMetaAdFromRows(rows, displayName) {
      if (!rows.length) return null;
      const impressions = rows.reduce((sum, row) => sum + parseNum(row[IMP_COL]), 0);
      const clicks = rows.reduce((sum, row) => sum + parseNum(row[CLICKS_COL]), 0);
      const spend = rows.reduce((sum, row) => sum + parseNum(row[SPEND_COL]), 0);
      const name = String(rows[0][AD_NAME_COL] ?? displayName).trim() || displayName;
      return {
        name,
        displayName,
        impressions,
        clicks,
        spend,
        ctr: impressions ? (clicks / impressions) * 100 : 0,
        cpc: clicks ? spend / clicks : 0
      };
    }

    function buildMetaAiCreativeGroups(activeRows) {
      const groupMap = new Map();

      activeRows.forEach((row) => {
        const adName = String(row[AD_NAME_COL] ?? "").trim();
        if (!adName) return;

        const tier = getAdTierFromRow(row);
        let key;
        let mode;
        let displayName;

        if (tier) {
          const creativeKey = getAdCreativeFilterKey(adName) || adName.toLowerCase();
          key = `tiered::${creativeKey}`;
          mode = "tiered";
          displayName = getAdCreativeDisplayName(adName);
        } else {
          key = `plain::${adName.toLowerCase()}`;
          mode = "plain";
          displayName = getAdCreativeDisplayName(adName);
        }

        if (!groupMap.has(key)) {
          groupMap.set(key, {
            key,
            displayName,
            mode,
            tier1Rows: [],
            tier2Rows: [],
            noTierRows: []
          });
        }

        const group = groupMap.get(key);
        if (tier === "Tier 2") {
          group.tier2Rows.push(row);
        } else if (tier === "Tier 1") {
          group.tier1Rows.push(row);
        } else {
          group.noTierRows.push(row);
        }
      });

      return [...groupMap.values()];
    }

    function buildMetaAdEvalTierBlockHtml(evalItem, tierLabel) {
      if (!evalItem) {
        return `<div class="meta-ad-eval-tier-block empty">${escapeHtml(tierLabel)} · 해당 구간 데이터 없음</div>`;
      }
      const scoreClass = getMetaAdScoreClass(evalItem.score);
      return [
        `<div class="meta-ad-eval-tier-block">`,
        `<div class="meta-ad-eval-tier-head">`,
        `<span class="meta-ad-eval-tier-label">${escapeHtml(tierLabel)}</span>`,
        `<div class="meta-ad-eval-score ${scoreClass}">`,
        `<span class="meta-ad-eval-score-label">Score</span>`,
        `${evalItem.score}`,
        `</div>`,
        `</div>`,
        `<div class="meta-ad-eval-metrics">노출 ${formatMetaInt(evalItem.impressions)} · 클릭 ${formatMetaInt(evalItem.clicks)} · CTR ${formatMetaPct(evalItem.ctr)} · CPC $${formatMetaMoney(evalItem.cpc)} · 지출 $${formatMetaMoney(evalItem.spend)}</div>`,
        `<div class="meta-ad-eval-row"><span class="meta-ad-eval-row-label">강점</span>${escapeHtml(evalItem.strengths.join(" · "))}</div>`,
        `<div class="meta-ad-eval-row"><span class="meta-ad-eval-row-label">약점</span>${escapeHtml(evalItem.weaknesses.join(" · "))}</div>`,
        `<div class="meta-ad-eval-row"><span class="meta-ad-eval-row-label">추천</span><span class="meta-ad-eval-action">${escapeHtml(evalItem.action)}</span></div>`,
        `</div>`
      ].join("");
    }

    function buildMetaAdTierCompareNote(tier1Eval, tier2Eval) {
      if (!tier1Eval || !tier2Eval) return "";
      const parts = [];
      if (tier1Eval.ctr !== tier2Eval.ctr) {
        const better = tier1Eval.ctr >= tier2Eval.ctr ? "Tier 1" : "Tier 2";
        parts.push(`${better} CTR ${formatMetaPct(Math.max(tier1Eval.ctr, tier2Eval.ctr))}로 더 높음`);
      }
      if (tier1Eval.cpc > 0 && tier2Eval.cpc > 0 && Math.abs(tier1Eval.cpc - tier2Eval.cpc) / Math.max(tier1Eval.cpc, tier2Eval.cpc) >= 0.08) {
        const better = tier1Eval.cpc <= tier2Eval.cpc ? "Tier 1" : "Tier 2";
        parts.push(`${better} CPC $${formatMetaMoney(Math.min(tier1Eval.cpc, tier2Eval.cpc))}로 더 효율적`);
      }
      if (tier1Eval.score !== tier2Eval.score) {
        const better = tier1Eval.score >= tier2Eval.score ? "Tier 1" : "Tier 2";
        parts.push(`${better} Performance Score ${Math.max(tier1Eval.score, tier2Eval.score)}점으로 우수`);
      }
      if (!parts.length) {
        return `<div class="meta-ad-eval-tier-compare">Tier 1·Tier 2 성과가 유사합니다. 동일 소재를 두 세그먼트에 균형 있게 운영 중입니다.</div>`;
      }
      return `<div class="meta-ad-eval-tier-compare">Tier 비교 · ${escapeHtml(parts.join(" · "))}</div>`;
    }

    function buildMetaAdEvalGroupedItemHtml(group) {
      if (group.noTierEval && !group.tier1Eval && !group.tier2Eval) {
        return buildMetaAdEvalItemHtml(group.noTierEval);
      }

      if (group.tier1Eval && group.tier2Eval) {
        const compareNote = buildMetaAdTierCompareNote(group.tier1Eval, group.tier2Eval);
        return [
          `<div class="meta-ad-eval-item">`,
          `<div class="meta-ad-eval-head">`,
          `<div class="meta-ad-eval-name">${escapeHtml(group.displayName)}</div>`,
          `</div>`,
          `<div class="meta-ad-eval-tier-grid">`,
          buildMetaAdEvalTierBlockHtml(group.tier1Eval, "Tier 1"),
          buildMetaAdEvalTierBlockHtml(group.tier2Eval, "Tier 2"),
          `</div>`,
          compareNote,
          `</div>`
        ].join("");
      }

      const singleEval = group.tier1Eval || group.tier2Eval;
      const singleLabel = group.tier1Eval ? "Tier 1" : "Tier 2";
      return [
        `<div class="meta-ad-eval-item">`,
        `<div class="meta-ad-eval-head">`,
        `<div class="meta-ad-eval-name">${escapeHtml(group.displayName)}</div>`,
        `</div>`,
        buildMetaAdEvalTierBlockHtml(singleEval, singleLabel),
        `</div>`
      ].join("");
    }

    function buildMetaAiCard2ContentHtml(rows) {
      ensureMetaAiCampaignSelected();
      const campaignShort = metaAiState.campaign;
      if (!campaignShort) {
        return `<p class="meta-ai-tier-empty">선택 가능한 캠페인이 없습니다.</p>`;
      }

      const campaignRows = filterMetaRowsByCampaign(rows, campaignShort);
      const activeRows = campaignRows.filter((row) => parseNum(row[IMP_COL]) > 0 || parseNum(row[SPEND_COL]) > 0);

      if (!activeRows.length) {
        return `<p class="meta-ai-tier-empty">선택한 캠페인에 평가할 광고 데이터가 없습니다.</p>`;
      }

      const groups = buildMetaAiCreativeGroups(activeRows);
      if (!groups.length) {
        return `<p class="meta-ai-tier-empty">광고 이름이 있는 데이터가 없습니다.</p>`;
      }

      const tier1BenchmarkAds = aggregateMetaAds(activeRows.filter((row) => getAdTierFromRow(row) === "Tier 1"));
      const tier2BenchmarkAds = aggregateMetaAds(activeRows.filter((row) => getAdTierFromRow(row) === "Tier 2"));
      const noTierBenchmarkAds = aggregateMetaAds(activeRows.filter((row) => !getAdTierFromRow(row)));
      const tier1Benchmarks = getMetaAdBenchmarks(tier1BenchmarkAds.length ? tier1BenchmarkAds : aggregateMetaAds(activeRows));
      const tier2Benchmarks = getMetaAdBenchmarks(tier2BenchmarkAds.length ? tier2BenchmarkAds : aggregateMetaAds(activeRows));
      const noTierBenchmarks = getMetaAdBenchmarks(noTierBenchmarkAds.length ? noTierBenchmarkAds : aggregateMetaAds(activeRows));

      const evaluations = groups
        .map((group) => {
          const tier1Ad = buildMetaAdFromRows(group.tier1Rows, group.displayName);
          const tier2Ad = buildMetaAdFromRows(group.tier2Rows, group.displayName);
          const noTierAd = buildMetaAdFromRows(group.noTierRows, group.displayName);
          const tier1Eval = tier1Ad ? evaluateMetaAd(tier1Ad, tier1Benchmarks) : null;
          const tier2Eval = tier2Ad ? evaluateMetaAd(tier2Ad, tier2Benchmarks) : null;
          const noTierEval = noTierAd ? evaluateMetaAd(noTierAd, noTierBenchmarks) : null;
          const bestScore = Math.max(tier1Eval?.score ?? 0, tier2Eval?.score ?? 0, noTierEval?.score ?? 0);
          return { ...group, tier1Eval, tier2Eval, noTierEval, bestScore };
        })
        .filter((group) => group.tier1Eval || group.tier2Eval || group.noTierEval)
        .sort((a, b) => b.bestScore - a.bestScore || (b.tier1Eval?.clicks ?? 0) + (b.tier2Eval?.clicks ?? 0) + (b.noTierEval?.clicks ?? 0) - (a.tier1Eval?.clicks ?? 0) - (a.tier2Eval?.clicks ?? 0) - (a.noTierEval?.clicks ?? 0));

      const campaignLabel = getCampaignOptions().find((o) => o.toLowerCase() === campaignShort) || campaignShort;
      const bothTierCount = evaluations.filter((group) => group.tier1Eval && group.tier2Eval).length;
      const noTierCount = evaluations.filter((group) => group.noTierEval && !group.tier1Eval && !group.tier2Eval).length;

      return [
        `<div class="meta-score-bar"><span class="meta-score-info" tabindex="0" data-meta-tip="score">Score 평가 기준 &#9432;</span></div>`,
        `<p class="meta-ad-eval-metrics" style="margin:0 0 10px;">캠페인 <strong>${escapeHtml(campaignLabel)}</strong> · 광고 ${evaluations.length}개 · Tier 1·2 비교 ${bothTierCount}개 · Tier 미지정 ${noTierCount}개</p>`,
        `<div class="meta-ad-eval-list">`,
        evaluations.map(buildMetaAdEvalGroupedItemHtml).join(""),
        `</div>`
      ].join("");
    }

    function getMetaScoreCriteriaTipHtml() {
      return [
        '<div class="tip-title">Score 평가 기준</div>',
        '<div class="tip-grade"><span class="lvl">우수</span><span>70점 이상</span></div>',
        '<div class="tip-grade"><span class="lvl">보통</span><span>45 ~ 69점</span></div>',

        '<div class="tip-factor">CPC: 평균보다 저렴할수록 가점(최대 +22), 클릭 없이 지출만 크면 감점</div>',

    function getMetaCtrCpcCriteriaTipHtml() {

        '<div class="tip-title">평가 기준</div>',

      ].join("");

    function getMetaHighlightCriteriaTipHtml() {
      return [
        '<div class="tip-title">하이라이트 선정 기준</div>',
        '<div class="tip-sub">성과가 좋은 캠페인 · 효율적인 광고 세트</div>',
        '<div class="tip-factor">CTR·CPC·클릭 볼륨을 종합한 성과 점수가 가장 높은 항목 (CTR 45% · CPC 35% · 클릭 볼륨 20%)</div>',
        '<div class="tip-factor">노출·지출이 매우 적은 항목(클릭 1회 미만 &amp; 지출 $5 미만)은 제외</div>',
        '<div class="tip-sub">성과가 낮은 캠페인</div>',
        '<div class="tip-factor">비효율 점수가 가장 높은 캠페인 (무클릭 지출 $5↑, 저CTR, 고CPC, 큰 지출일수록 가점)</div>'
      ].join("");
    }

    function getMetaTipContent(type) {
      if (type === "ctrcpc") return getMetaCtrCpcCriteriaTipHtml();
      if (type === "highlight") return getMetaHighlightCriteriaTipHtml();
      return getMetaScoreCriteriaTipHtml();
    }

    (function initMetaScoreTooltip() {
      let tip = null;
      const getTip = () => {
        if (!tip) {
          tip = document.createElement("div");
          tip.className = "meta-score-tip";
          document.body.appendChild(tip);
        }
        return tip;
      };
      const show = (badge) => {
        const el = getTip();
        el.innerHTML = getMetaTipContent(badge.getAttribute("data-meta-tip"));
        el.style.visibility = "hidden";
        el.classList.add("visible");
        const rect = badge.getBoundingClientRect();
        const tipRect = el.getBoundingClientRect();
        let left = rect.right - tipRect.width;
        if (left < 8) left = 8;
        if (left + tipRect.width > window.innerWidth - 8) left = window.innerWidth - tipRect.width - 8;
        let top = rect.bottom + 8;
        if (top + tipRect.height > window.innerHeight - 8) {
          top = rect.top - tipRect.height - 8;
        }
        if (top < 8) top = 8;
        el.style.left = `${left}px`;
        el.style.top = `${top}px`;
        el.style.visibility = "";
      };
      const hide = () => {
        if (tip) tip.classList.remove("visible");
      };
      const closest = (node) => (node && node.closest ? node.closest("[data-meta-tip]") : null);
      document.addEventListener("mouseover", (e) => {
        const badge = closest(e.target);
        if (badge) show(badge);
      });
      document.addEventListener("mouseout", (e) => {
        const badge = closest(e.target);
        if (badge && !badge.contains(e.relatedTarget)) hide();
      });
      document.addEventListener("focusin", (e) => {
        const badge = closest(e.target);
        if (badge) show(badge);
      });
      document.addEventListener("focusout", (e) => {
        if (closest(e.target)) hide();
      });
      window.addEventListener("scroll", hide, true);
      window.addEventListener("resize", hide);
    })();

    function scoreAudienceTierMetrics(metrics) {
      const ctr = metrics.impressions ? (metrics.clicks / metrics.impressions) * 100 : 0;
      const cpc = metrics.clicks ? metrics.spend / metrics.clicks : 0;
      let score = 40;
      score += Math.min(ctr * 12, 28);
      if (cpc > 0) score += Math.min((0.45 / cpc) * 18, 22);
      score += Math.min(metrics.clicks / 25, 15);
      if (!metrics.clicks && metrics.spend >= 5) score -= 20;
      return Math.max(0, Math.min(100, Math.round(score)));
    }

    function buildAudienceTierStats(rows) {
      const buckets = {
        "Tier 1": { impressions: 0, clicks: 0, spend: 0, adSets: new Set() },
        "Tier 2": { impressions: 0, clicks: 0, spend: 0, adSets: new Set() }
      };

      rows.forEach((row) => {
        const adSetName = String(row[AD_SET_COL] ?? "").trim();
        if (!adSetName) return;
        const tier = getAdSetTierFromName(adSetName) || "Tier 1";
        if (!buckets[tier]) return;
        buckets[tier].adSets.add(adSetName);
        buckets[tier].impressions += parseNum(row[IMP_COL]);
        buckets[tier].clicks += parseNum(row[CLICKS_COL]);
        buckets[tier].spend += parseNum(row[SPEND_COL]);
      });

      return ["Tier 1", "Tier 2"].map((tier) => {
        const bucket = buckets[tier];
        const avgCtr = bucket.impressions ? (bucket.clicks / bucket.impressions) * 100 : 0;
        const avgCpc = bucket.clicks ? bucket.spend / bucket.clicks : 0;
        const score = scoreAudienceTierMetrics(bucket);
        return {
          tier,
          avgCtr,
          avgCpc,
          spend: bucket.spend,
          clicks: bucket.clicks,
          impressions: bucket.impressions,
          adSetCount: bucket.adSets.size,
          score
        };
      });
    }

    function assignAudienceTierPerformanceLabels(stats) {
      const withData = stats.filter((item) => item.impressions > 0 || item.spend > 0);
      if (!withData.length) {
        return stats.map((item) => ({ ...item, performance: "데이터 부족", badgeClass: "monitor" }));
      }
      const bestScore = Math.max(...withData.map((item) => item.score));
      return stats.map((item) => {
        if (!item.impressions && !item.spend) {
          return { ...item, performance: "데이터 부족", badgeClass: "monitor" };
        }
        if (item.score === bestScore && item.score >= 55) {
          return { ...item, performance: "우수", badgeClass: "win" };
        }
        if (item.score >= bestScore * 0.82) {
          return { ...item, performance: "보통", badgeClass: "fatigue" };
        }
        return { ...item, performance: "개선 필요", badgeClass: "replace" };
      });
    }

    function buildAdSetTierRecommendations(stats) {
      const ranked = [...stats]
        .filter((item) => item.impressions > 0 || item.spend > 0)
        .sort((a, b) => b.score - a.score || b.clicks - a.clicks);

      if (!ranked.length) {
        return ["분석 가능한 광고 세트 Tier 데이터가 없습니다."];
      }

      const best = ranked[0];
      const weaker = ranked[ranked.length - 1];
      const lines = [];

      lines.push(
        `가장 효율적인 Tier: ${best.tier} — 평균 CTR ${formatMetaPct(best.avgCtr)}, 평균 CPC $${formatMetaMoney(best.avgCpc)}, 지출 $${formatMetaMoney(best.spend)} (광고 세트 ${best.adSetCount}개)`
      );

      if (ranked.length >= 2 && best.tier !== weaker.tier) {
        if (weaker.spend >= best.spend * 0.25 && weaker.performance !== "우수") {
          lines.push(
            `예산 배분: ${best.tier} 비중을 확대하고, ${weaker.tier}(지출 $${formatMetaMoney(weaker.spend)})는 예산 축소·입찰 조정을 검토하세요.`
          );
        } else {
          lines.push(
            `예산 배분: ${best.tier} 중심으로 예산을 점진 확대하고 ${weaker.tier}는 소규모 테스트 예산으로 유지하세요.`
          );
        }
        lines.push(
          `Audience 확장: ${best.tier} 타겟(광고 세트 ${best.adSetCount}개)의 반응이 우수하므로 유사 관심사·Lookalike·리타겟 확장을 검토하세요.`
        );
        if (weaker.performance === "개선 필요") {
          lines.push(
            `${weaker.tier}는 CTR ${formatMetaPct(weaker.avgCtr)}·CPC $${formatMetaMoney(weaker.avgCpc)}로 상대적으로 비효율적이므로 타겟·소재·입찰 재점검이 필요합니다.`
          );
        }
      } else {
        lines.push(`예산 배분: ${best.tier} 데이터가 우세하므로 해당 Tier 중심으로 예산을 유지·확대하세요.`);
        lines.push(`Audience 확장: ${best.tier} 오디언스를 기준으로 유사 타겟 세그먼트 확장을 검토하세요.`);
      }

      return lines;
    }

      ensureMetaAiCampaignSelected();

    function shiftCalendarMonth(delta) {
      if (!state.dateCalendarMonth) return;
      const [y, m] = state.dateCalendarMonth.split('-').map(Number);
      const d = new Date(y, m - 1 + delta, 1);
      state.dateCalendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      renderDateRangeCalendar();
    }

    function getDayRangeClass(dateStr, filterState, calendarState) {
      const from = filterState.dateFrom;
      const to = filterState.dateTo;
      let cls = 'date-day available';
      if (from && to && dateStr >= from && dateStr <= to) {
        cls += ' in-range';
        if (dateStr === from) cls += ' range-start';
        if (dateStr === to) cls += ' range-end';
      } else if (calendarState.datePickStart && from && !to && dateStr === from) {
        cls += ' range-start range-end';
      }
      return cls;
    }

    function buildCalendarDaysHtml(calendarState, filterState) {
      const [year, month] = calendarState.dateCalendarMonth.split('-').map(Number);
      const firstDay = new Date(year, month - 1, 1).getDay();
      const daysInMonth = new Date(year, month, 0).getDate();
      let daysHtml = '';
      for (let i = 0; i < firstDay; i++) {
        daysHtml += '<span class="date-day empty"></span>';
      }
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const cls = getDayRangeClass(dateStr, filterState, calendarState);
        daysHtml += `<button type="button" class="${cls}" data-date="${dateStr}">${day}</button>`;
      }
      return daysHtml;
    }

      if (adNameFilter) {

      if (rawState.global) {
        rows = rows.filter(row =>
          state.columns.some(col => String(row[col] ?? '').toLowerCase().includes(rawState.global))
        );
      }

      if (rawState.sort.key) {
        const { key, dir } = rawState.sort;
        const factor = dir === 'asc' ? 1 : -1;
        rows.sort((a, b) => {
          const av = a[key] ?? '';
          const bv = b[key] ?? '';
          if (NUMERIC_COLUMNS.has(key)) {
            return (parseFloat(av) - parseFloat(bv)) * factor;
          }
          if (key === DATE_COL) {
            return normalizeDate(av).localeCompare(normalizeDate(bv)) * factor;
          }
          return String(av).localeCompare(String(bv), 'ko') * factor;
        });

    function buildCreativeTableData() {
      ensureCreativeNameSelected();
      const creativeFilter = creativeState.filters[CREATIVE_FILTER_KEY];
      if (!creativeFilter) return [];

      const includeAllCreatives = creativeFilter === ALL_FILTER_VALUE;
      const rows = getCreativeSourceRows().filter(row =>
        includeAllCreatives || getAdCreativeFilterKey(row[AD_NAME_COL]) === creativeFilter
      );

      const channelMap = new Map();
      for (const row of rows) {
        const date = normalizeDate(row[DATE_COL]);
        if (!date) continue;

        const channel = getAdChannelFromRow(row);
        const tier = getAdTierFromRow(row) || 'Tier 1';
        const key = `${date}|${channel}`;

        if (!channelMap.has(key)) {
          channelMap.set(key, {
            date,
            channel,
            tier1: null,
            tier2: null
          });
        }

        const entry = channelMap.get(key);
        const bucket = tier === 'Tier 2' ? 'tier2' : 'tier1';
        if (!entry[bucket]) {
          entry[bucket] = createTierMetrics();
        }
        accumulateRowToTierMetrics(entry[bucket], row);
      }

      const dateMap = new Map();
      for (const entry of channelMap.values()) {
        if (!dateMap.has(entry.date)) dateMap.set(entry.date, []);
        dateMap.get(entry.date).push({
          channel: entry.channel,
          tier1: entry.tier1,
          tier2: entry.tier2
        });
      }

      return [...dateMap.entries()].map(([date, channels]) => ({
        date,
        channels: channels.sort((a, b) =>
          (CREATIVE_CHANNEL_ORDER[a.channel] ?? 9) - (CREATIVE_CHANNEL_ORDER[b.channel] ?? 9)
        )
      }));
    }

          ${renderSortTh('지출 (USD)', 't2_spend', sort)}
          ${renderSortTh('CTR', 't2_ctr', sort)}
          ${renderSortTh('CPC', 't2_cpc', sort)}
        </tr>`;
      bindSortableThead(creativeThead, creativeState.sort, () => {
        creativeState.page = 1;
        applyCreativeFiltersAndRender();
      });
    }

    function renderCreativeTableBody() {
      const start = (creativeState.page - 1) * creativeState.pageSize;
      const pageRows = creativeState.filtered.slice(start, start + creativeState.pageSize);

      if (pageRows.length === 0) {
        const message = creativeState.filters[CREATIVE_FILTER_KEY]
          ? '표시할 데이터가 없습니다.'
          : '광고 이름을 선택하세요.';
        creativeTbody.innerHTML = `<tr><td colspan="${CREATIVE_TABLE_COLS}" class="meta-status">${message}</td></tr>`;
        return;
      }

      creativeTbody.innerHTML = pageRows.map(row => {
        const channelRows = row.channels;
        return channelRows.map((ch, index) => `
          <tr>
            ${index === 0 ? `<td rowspan="${channelRows.length}">${escapeHtml(row.date)}</td>` : ''}
            <td class="platform">${escapeHtml(ch.channel)}</td>
            ${renderTierCells(ch.tier1)}
            ${renderTierCells(ch.tier2)}
          </tr>`).join('');
      }).join('');
    }

    function renderCreativeTableFoot() {
      if (!creativeTfoot) return;
      const rows = creativeState.filtered;
      if (!rows || !rows.length) {
        creativeTfoot.innerHTML = '';
        return;
      }
      const total1 = createTierMetrics();
      const total2 = createTierMetrics();
      rows.forEach(row => {
        (row.channels || []).forEach(ch => {
          mergeTierMetrics(total1, ch.tier1);
          mergeTierMetrics(total2, ch.tier2);
        });
      });
      creativeTfoot.innerHTML = `
        <tr class="creative-total-row">
          <td colspan="2">TOTAL</td>
          ${renderTierCells(total1)}
          ${renderTierCells(total2)}
        </tr>`;
    }

    const CREATIVE_CHART_METRICS = [
      { key: 'impressions', label: '노출', fmt: (v) => (v ? formatStatNum(v, false) : '0') },
      { key: 'clicks', label: '링크 클릭', fmt: (v) => (v ? formatStatNum(v, false) : '0') },
      { key: 'spend', label: '지출', fmt: (v) => '$' + (v ? formatStatNum(v, true) : '0.00') },
      { key: 'ctr', label: 'CTR', fmt: (v) => (v ? formatStatNum(v, false) + '%' : '-') },
      { key: 'cpc', label: 'CPC', fmt: (v) => (v ? '$' + formatStatNum(v, true) : '-') }
    ];

    const CREATIVE_TIER_COLORS = { t1: '#0071e3', t2: '#ff9500' };
    const CREATIVE_SPARK = { W: 100, H: 60, padX: 3, padY: 6 };
    const creativeChartState = { series: [] };

    function tierMetricValues(t) {
      return {
        impressions: t.impressions,
        clicks: t.clicks,
        spend: t.spend,
        ctr: getTierCtr(t),
        cpc: getTierCpc(t)
      };
    }

    function aggregateCreativeChartSeries(items) {
      const byDate = new Map();
      (items || []).forEach((item) => {
        if (!item.date) return;
        if (!byDate.has(item.date)) {
          byDate.set(item.date, { date: item.date, t1: createTierMetrics(), t2: createTierMetrics() });
        }
        const bucket = byDate.get(item.date);
        (item.channels || []).forEach((ch) => {
          mergeTierMetrics(bucket.t1, ch.tier1);
          mergeTierMetrics(bucket.t2, ch.tier2);
        });
      });
      return [...byDate.values()]
        .sort((a, b) => a.date.localeCompare(b.date))
        .map((b) => ({ date: b.date, t1: tierMetricValues(b.t1), t2: tierMetricValues(b.t2) }));
    }

    function buildCreativeChartSvg(vals1, vals2) {
      const { W, H, padX, padY } = CREATIVE_SPARK;
      const n = vals1.length;
      const all = vals1.concat(vals2);
      const max = Math.max(...all, 0);
      const min = Math.min(...all, 0);
      const range = max - min || 1;
      const innerW = W - padX * 2;
      const innerH = H - padY * 2;
      const xAt = (i) => (n <= 1 ? W / 2 : padX + (i / (n - 1)) * innerW);
      const yAt = (v) => padY + innerH - ((v - min) / range) * innerH;

      const buildLine = (vals, color, dotClass) => {
        if (n === 1) {
          return `<circle cx="${xAt(0).toFixed(1)}" cy="${yAt(vals[0]).toFixed(1)}" r="2.5" fill="${color}"></circle>` +
            `<circle class="cc-dot ${dotClass}" cx="0" cy="0" r="2.6" fill="#fff" stroke="${color}" stroke-width="1.5" vector-effect="non-scaling-stroke" opacity="0"></circle>`;
        }
        const pts = vals.map((v, i) => `${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`);
        return `<path d="M${pts.join(' L')}" fill="none" stroke="${color}" stroke-width="1.5" ` +
          `stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"></path>` +
          `<circle class="cc-dot ${dotClass}" cx="0" cy="0" r="2.6" fill="#fff" stroke="${color}" stroke-width="1.5" vector-effect="non-scaling-stroke" opacity="0"></circle>`;
      };

      return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">` +
        buildLine(vals1, CREATIVE_TIER_COLORS.t1, 'cc-dot-t1') +
        buildLine(vals2, CREATIVE_TIER_COLORS.t2, 'cc-dot-t2') +
        `<line class="cc-marker-line" x1="0" y1="${padY}" x2="0" y2="${H - padY}" ` +
        `stroke="#86868b" stroke-width="1" stroke-dasharray="2 2" vector-effect="non-scaling-stroke" opacity="0"></line>` +
        `</svg>`;
    }

    function renderCreativeCharts() {
      const container = document.getElementById('creative-charts');
      if (!container) return;

      const series = aggregateCreativeChartSeries(creativeState.filtered || []);
      creativeChartState.series = series;
      if (!series.length) {
        container.innerHTML = `<p class="creative-charts-empty">필터 조건에 해당하는 데이터가 없어 그래프를 표시할 수 없습니다.</p>`;
        return;
      }

      const legend =
        `<div class="creative-charts-legend">` +
        `<span><i style="background:${CREATIVE_TIER_COLORS.t1}"></i>Tier 1</span>` +
        `<span><i style="background:${CREATIVE_TIER_COLORS.t2}"></i>Tier 2</span>` +
        `</div>`;

      const cards = CREATIVE_CHART_METRICS.map((metric) => {
        const v1 = series.map((r) => Number(r.t1[metric.key] || 0));
        const v2 = series.map((r) => Number(r.t2[metric.key] || 0));
        return [
          `<div class="creative-chart" data-metric-key="${metric.key}">`,
          `<div class="creative-chart-head"><span class="creative-chart-title">${escapeHtml(metric.label)}</span></div>`,
          buildCreativeChartSvg(v1, v2),
          window.PerformanceChartAxis.buildAxisDatesHtml(series, "creative-chart-dates", escapeHtml),
          `</div>`
        ].join('');
      }).join('');

      container.innerHTML = legend + `<div class="creative-charts-row">${cards}</div>`;
    }

    (function initCreativeChartHover() {
      let tip = null;
      const getTip = () => {
        if (!tip) {
          tip = document.createElement('div');
          tip.className = 'creative-chart-tip';
          document.body.appendChild(tip);
        }
        return tip;
      };
      const clearMarkers = () => {
        const container = document.getElementById('creative-charts');
        if (!container) return;
        container.querySelectorAll('.cc-marker-line, .cc-dot').forEach((el) => el.setAttribute('opacity', '0'));
      };
      const hide = () => {
        if (tip) tip.classList.remove('visible');
        clearMarkers();
      };
      const metricByKey = (key) => CREATIVE_CHART_METRICS.find((m) => m.key === key);

      document.addEventListener('mousemove', (e) => {
        const chart = e.target.closest ? e.target.closest('.creative-chart') : null;
        if (!chart) { hide(); return; }
        const series = creativeChartState.series;
        if (!series || !series.length) { hide(); return; }
        const svg = chart.querySelector('svg');
        const metric = metricByKey(chart.getAttribute('data-metric-key'));
        if (!svg || !metric) { hide(); return; }

        const rect = svg.getBoundingClientRect();
        if (!rect.width) { hide(); return; }
        let ratio = (e.clientX - rect.left) / rect.width;
        ratio = Math.max(0, Math.min(1, ratio));
        const n = series.length;
        const index = n <= 1 ? 0 : Math.round(ratio * (n - 1));
        const row = series[index];
        if (!row) { hide(); return; }

        const v1 = series.map((r) => Number(r.t1[metric.key] || 0));
        const v2 = series.map((r) => Number(r.t2[metric.key] || 0));
        const all = v1.concat(v2);
        const max = Math.max(...all, 0);
        const min = Math.min(...all, 0);
        const range = max - min || 1;
        const innerW = CREATIVE_SPARK.W - CREATIVE_SPARK.padX * 2;
        const innerH = CREATIVE_SPARK.H - CREATIVE_SPARK.padY * 2;
        const mx = n <= 1 ? CREATIVE_SPARK.W / 2 : CREATIVE_SPARK.padX + (index / (n - 1)) * innerW;
        const my1 = CREATIVE_SPARK.padY + innerH - ((v1[index] - min) / range) * innerH;
        const my2 = CREATIVE_SPARK.padY + innerH - ((v2[index] - min) / range) * innerH;

        clearMarkers();
        const line = svg.querySelector('.cc-marker-line');
        if (line) {
          line.setAttribute('x1', mx.toFixed(1));
          line.setAttribute('x2', mx.toFixed(1));
          line.setAttribute('opacity', '0.5');
        }
        const dot1 = svg.querySelector('.cc-dot-t1');
        const dot2 = svg.querySelector('.cc-dot-t2');
        if (dot1) {
          dot1.setAttribute('cx', mx.toFixed(1));
          dot1.setAttribute('cy', my1.toFixed(1));
          dot1.setAttribute('opacity', '1');
        }
        if (dot2) {
          dot2.setAttribute('cx', mx.toFixed(1));
          dot2.setAttribute('cy', my2.toFixed(1));
          dot2.setAttribute('opacity', '1');
        }

        const el = getTip();
        el.innerHTML =
          `<div class="tip-date">${escapeHtml(row.date)}</div>` +
          `<div><span class="tip-dot" style="background:${CREATIVE_TIER_COLORS.t1}"></span>Tier 1 <strong>${escapeHtml(metric.fmt(v1[index]))}</strong></div>` +
          `<div><span class="tip-dot" style="background:${CREATIVE_TIER_COLORS.t2}"></span>Tier 2 <strong>${escapeHtml(metric.fmt(v2[index]))}</strong></div>`;
        el.classList.add('visible');
        const tipRect = el.getBoundingClientRect();
        let left = e.clientX + 14;
        if (left + tipRect.width > window.innerWidth - 8) left = e.clientX - tipRect.width - 14;
        if (left < 8) left = 8;
        let top = e.clientY - tipRect.height - 12;
        if (top < 8) top = e.clientY + 16;
        el.style.left = `${left}px`;
        el.style.top = `${top}px`;
      });

      window.addEventListener('scroll', hide, true);
    })();

    function updateCreativePagination() {
      const total = creativeState.filtered.length;
      const totalPages = Math.max(1, Math.ceil(total / creativeState.pageSize));
      if (creativeState.page > totalPages) creativeState.page = totalPages;
      creativeRowCount.textContent = `필터 결과 ${total.toLocaleString()}행`;
      creativePageInfo.textContent = `${creativeState.page} / ${totalPages} 페이지`;
    }

    function formatCell(col, val) {
      if (val === '' || val == null) return '';
      if (NUMERIC_COLUMNS.has(col)) {
        const num = parseNum(val);
        if (!num && !String(val).trim()) return '';
        if (col === SPEND_COL || col === CPC_COL) {
          return num.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        return Number.isInteger(num) ? num.toLocaleString() : num.toLocaleString(undefined, { maximumFractionDigits: 2 });
      }
      return String(val);
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escapeAttr(str) {
      return escapeHtml(str).replace(/'/g, '&#39;');
    }
  </script>
  <script src="shared/date-range-picker.js"></script>
  <script src="shared/kpi-calc-basis.js"></script>
  <script src="shared/kpi-summary.js"></script>
  <script>
    mountKpiSummary("kpi-summary-root", "meta", { hideTypeColumn: true });
    if (window.KpiSummary) {
      window.KpiSummary.onDateChange = () => refreshMetaKpiSummary();
    }
    window.loadMetaData = loadMetaData;
    if (window.PerformanceDataLoader) {
      window.PerformanceDataLoader.onDataUpdated(loadMetaData);
    }
    loadMetaData();
  </script>
</body>
