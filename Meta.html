<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta · GTM1_퍼포먼스</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      padding: 48px 24px;
    }

    .container {
      max-width: 1800px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 40px;
      text-align: center;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
    }

    .page-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 1.65rem;
      font-weight: 900;
      line-height: 1;
      color: #1d1d1f;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid #e0e0e0;
      transition: background 0.2s;
    }

    .back-link:hover {
      background: #f5f5f7;
    }

    .page-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0;
      text-align: left;
    }

    .meta-page-content {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .meta-accordion {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
    }

    .meta-accordion-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      background: #fff;
      border: none;
      font-size: 1.125rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      color: #1d1d1f;
      transition: background 0.2s;
    }

    .meta-accordion-header:hover {
      background: #fafafa;
    }

    .meta-accordion.open .meta-accordion-header {
      border-bottom: 1px solid #e8e8ed;
    }

    .meta-accordion-header .chevron {
      font-size: 0.85rem;
      color: #86868b;
      transition: transform 0.2s;
    }

    .meta-accordion.open .meta-accordion-header .chevron {
      transform: rotate(180deg);
    }

    .meta-accordion-body {
      display: none;
      padding: 20px;
    }

    .meta-accordion.open .meta-accordion-body {
      display: block;
    }

    .meta-subsection {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 20px;
    }

    .meta-subsection-title {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #1d1d1f;
    }

    .meta-subsection-placeholder {
      padding: 32px 16px;
      text-align: center;
      color: #86868b;
      font-size: 0.875rem;
    }

    .meta-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .meta-info {
      font-size: 0.875rem;
      color: #6e6e73;
    }

    .meta-info strong {
      color: #1d1d1f;
    }

    .meta-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .meta-search {
      padding: 8px 12px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 0.875rem;
      min-width: 220px;
    }

    .meta-search:focus {
      outline: none;
      border-color: #1877f2;
      box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.15);
    }

    .btn {
      padding: 8px 14px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      background: #fff;
      font-size: 0.875rem;
      cursor: pointer;
    }

    .btn:hover {
      background: #f5f5f7;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
      padding: 16px;
      background: #f9f9fb;
      border-radius: 10px;
    }

    .filter-item label {
      display: block;
      font-size: 0.75rem;
      color: #6e6e73;
      margin-bottom: 4px;
    }

    .filter-item input,
    .filter-item select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      font-size: 0.8125rem;
    }

    .filter-item-date {
      position: relative;
    }

    .date-range-wrap {
      position: relative;
    }

    .date-range-trigger {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      background: #fff;
      font-size: 0.8125rem;
      color: #1d1d1f;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .date-range-wrap:hover .date-range-trigger,
    .date-range-wrap:focus-within .date-range-trigger {
      border-color: #1877f2;
    }

    .date-range-popover {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 30;
      width: 220px;
      padding: 8px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
    }

    .date-range-wrap:hover .date-range-popover,
    .date-range-wrap:focus-within .date-range-popover {
      display: block;
    }

    .date-range-hint {
      font-size: 0.6875rem;
      color: #86868b;
      margin-bottom: 6px;
      text-align: center;
    }

    .date-range-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .date-range-nav button {
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      color: #1d1d1f;
      font-size: 0.75rem;
    }

    .date-range-nav button:hover {
      background: #f0f0f0;
    }

    .date-range-nav button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .date-range-month {
      font-size: 0.75rem;
      font-weight: 600;
    }

    .date-range-weekdays,
    .date-range-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
    }

    .date-range-weekdays span {
      text-align: center;
      font-size: 0.625rem;
      color: #86868b;
      padding: 2px 0;
    }

    .date-day {
      height: 22px;
      border: none;
      background: transparent;
      border-radius: 4px;
      font-size: 0.6875rem;
      color: #c7c7cc;
      cursor: default;
      padding: 0;
      line-height: 22px;
    }

    .date-day.available {
      color: #1d1d1f;
      cursor: pointer;
    }

    .date-day.available:hover {
      background: #eef4ff;
    }

    .date-day.in-range {
      background: #e7f3ff;
      color: #1d1d1f;
      border-radius: 0;
    }

    .date-day.range-start,
    .date-day.range-end {
      background: #1877f2;
      color: #fff;
    }

    .date-day.range-start {
      border-radius: 4px 0 0 4px;
    }

    .date-day.range-end {
      border-radius: 0 4px 4px 0;
    }

    .date-day.range-start.range-end {
      border-radius: 4px;
    }

    .date-day.empty {
      visibility: hidden;
    }

    .date-range-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
    }

    .date-range-actions .btn-clear {
      font-size: 0.6875rem;
      padding: 3px 8px;
      color: #1877f2;
      border-color: transparent;
      background: transparent;
    }

    .date-range-actions .btn-clear:hover {
      background: #eef4ff;
    }

    .table-wrap {
      overflow: auto;
      max-height: 560px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f5f5f7;
      z-index: 1;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 2px solid #e0e0e0;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    thead th:hover {
      background: #ebebef;
    }

    thead th .sort-icon {
      margin-left: 4px;
      color: #86868b;
      font-size: 0.7rem;
    }

    tbody td {
      padding: 8px 12px;
      border-bottom: 1px solid #f0f0f0;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: #fafafa;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    #creative-tfoot td {
      position: sticky;
      bottom: 0;
      z-index: 2;
      background: #f5f5f7;
      color: #1d1d1f;
      font-weight: 700;
      padding: 10px 12px;
      white-space: nowrap;
      border-top: 1px solid #e0e0e0;
    }

    .creative-charts {
      margin-top: 16px;
    }

    .creative-charts:empty {
      display: none;
    }

    .creative-charts-legend {
      display: flex;
      justify-content: flex-end;
      gap: 14px;
      font-size: 0.75rem;
      color: #6e6e73;
      margin-bottom: 8px;
    }

    .creative-charts-legend span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .creative-charts-legend i {
      width: 10px;
      height: 3px;
      border-radius: 2px;
      display: inline-block;
    }

    .creative-charts-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .creative-chart {
      min-width: 0;
      border: 1px solid #e8e8ed;
      border-radius: 8px;
      padding: 8px 9px 6px;
      background: #fff;
    }

    .creative-chart-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 4px;
    }

    .creative-chart-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #6e6e73;
      white-space: nowrap;
    }

    .creative-chart svg {
      display: block;
      width: 100%;
      height: 60px;
      margin-top: 5px;
      overflow: visible;
      cursor: crosshair;
    }

    .creative-chart-dates {
      display: flex;
      justify-content: space-between;
      gap: 4px;
      font-size: 0.5625rem;
      color: #a1a1a6;
      margin-top: 3px;
    }

    .creative-charts-empty {
      font-size: 0.8125rem;
      color: #86868b;
      padding: 8px 0;
    }

    .creative-chart-tip {
      position: fixed;
      z-index: 1000;
      padding: 6px 9px;
      background: #1d1d1f;
      color: #fff;
      border-radius: 6px;
      font-size: 0.6875rem;
      line-height: 1.6;
      white-space: nowrap;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.1s ease;
      pointer-events: none;
    }

    .creative-chart-tip.visible {
      opacity: 1;
      visibility: visible;
    }

    .creative-chart-tip .tip-date {
      color: #c7c7cc;
      margin-bottom: 2px;
    }

    .creative-chart-tip .tip-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: baseline;
    }

    @media (max-width: 1100px) {
      .creative-charts-row {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 640px) {
      .creative-charts-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .meta-status {
      padding: 24px;
      text-align: center;
      color: #6e6e73;
    }

    .meta-status.error {
      color: #d70015;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 0.875rem;
      color: #6e6e73;
    }

    .pagination-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .pagination-controls select {
      padding: 6px 8px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
    }

    .stats-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 2px solid #e0e0e0;
    }

    .stats-title {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #1d1d1f;
    }

    .stats-title span {
      color: #1877f2;
    }

    .stats-title .stats-sub {
      color: #6e6e73;
      font-weight: 500;
      font-size: 0.9375rem;
    }

    .stats-table thead {
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .stats-table thead th {
      position: static;
      top: auto;
      background: #f5f5f7;
      z-index: auto;
      cursor: default;
      text-align: center;
      border-bottom: none;
    }

    .stats-table thead th[data-sort-key] {
      cursor: pointer;
      user-select: none;
    }

    .stats-table thead th[data-sort-key]:hover {
      background: #ebebef;
    }

    .stats-table thead tr:first-child th:not([rowspan]) {
      box-shadow: inset 0 -1px 0 #d2d2d7;
    }

    .stats-table thead tr:nth-child(2) th,
    .stats-table thead tr:first-child th[rowspan] {
      top: auto;
      z-index: auto;
      box-shadow: inset 0 -2px 0 #e0e0e0;
    }

    .stats-table thead th[rowspan] {
      z-index: auto;
      vertical-align: middle;
    }

    .stats-table thead th.group-start {
      border-left: 2px solid #d2d2d7;
    }

    .stats-table tbody td.group-start {
      border-left: 2px solid #e8e8ed;
    }

    .stats-table tbody td.product-group {
      font-weight: 600;
      background: #fafafa;
      vertical-align: middle;
    }

    .stats-table tbody td.platform {
      color: #6e6e73;
      font-weight: 500;
    }

    .stats-table tbody tr.subtotal td {
      background: #f5f5f7;
      font-weight: 600;
    }

    .phrase-card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .phrase-card {
      background: #f9f9fb;
      border: 1px solid #e8e8ed;
      border-radius: 10px;
      padding: 0;
      height: 468px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .phrase-card-header {
      min-height: 88px;
      height: 88px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      padding: 16px 20px;
      border-bottom: 1px solid #e8e8ed;
    }

    .phrase-card-scroll {
      flex: 1;
      min-height: 0;
      max-height: 380px;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 20px 20px;
    }

    .phrase-card-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .phrase-card-scroll::-webkit-scrollbar-thumb {
      background: #c7c7cc;
      border-radius: 3px;
    }

    .phrase-card-num {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #86868b;
      text-transform: uppercase;
    }

    .phrase-card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #1d1d1f;
      line-height: 1.35;
      margin: 0;
    }

    .phrase-card-body {
      font-size: 0.875rem;
      color: #424245;
      line-height: 1.65;
    }

    .phrase-md p {
      margin: 0 0 0.75em;
    }

    .phrase-md p:last-child {
      margin-bottom: 0;
    }

    @media (max-width: 960px) {
      .phrase-card-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .phrase-card-grid {
        grid-template-columns: 1fr;
      }

      .phrase-card {
        height: auto;
        max-height: 420px;
      }

      .ai-summary-metric {
        grid-template-columns: 1fr;
        gap: 4px;
      }
    }

    .ai-summary-block {
      background: #fff;
      border: 1px solid #e8e8ed;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .ai-summary-block:last-child {
      margin-bottom: 0;
    }

    .ai-summary-block-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #86868b;
      margin-bottom: 10px;
    }

    .ai-summary-block-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .ai-summary-block-title-row .ai-summary-block-title {
      margin-bottom: 0;
    }

    .ai-summary-campaign {
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f2;
    }

    .ai-summary-campaign:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .ai-summary-campaign:first-of-type {
      padding-top: 0;
    }

    .ai-summary-campaign-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .ai-summary-campaign-head strong {
      color: #1d1d1f;
      font-size: 0.8125rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .ai-summary-campaign-name {
      font-weight: 600;
      color: #1877f2;
      font-size: 0.875rem;
      word-break: break-word;
    }

    .ai-summary-campaign-detail {
      font-size: 0.8125rem;
      color: #6e6e73;
      margin-bottom: 4px;
    }

    .ai-summary-campaign-note {
      font-size: 0.8125rem;
      color: #424245;
      line-height: 1.55;
    }

    .ai-summary-metrics {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .ai-summary-metric {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 10px;
      align-items: start;
      padding: 8px 0;
      border-bottom: 1px solid #f5f5f7;
    }

    .ai-summary-metric:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .ai-summary-metric-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: #1d1d1f;
      line-height: 1.45;
    }

    .ai-summary-metric-value {
      font-size: 0.8125rem;
      color: #424245;
      line-height: 1.55;
    }

    .ai-summary-tag {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      background: #f5f5f7;
      color: #424245;
      margin-left: 4px;
      vertical-align: middle;
    }

    .ai-summary-tag.good {
      background: #e7f3ff;
      color: #1877f2;
    }

    .ai-summary-tag.warn {
      background: #fff8e1;
      color: #f57f17;
    }

    .ai-summary-tag.bad {
      background: #ffebee;
      color: #c62828;
    }

    .meta-ai-tier-section {
      margin-bottom: 16px;
    }

    .meta-ai-tier-section:last-child {
      margin-bottom: 0;
    }

    .meta-ai-tier-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 700;
      color: #1d1d1f;
      padding: 8px 12px;
      margin: 0;
      background: #eef4ff;
      border: 0;
      border-left: 3px solid #1877f2;
      border-radius: 0 6px 6px 0;
      cursor: pointer;
      text-align: left;
    }

    .meta-ai-tier-title:hover {
      background: #e3edff;
    }

    .meta-ai-tier-chevron {
      flex-shrink: 0;
      font-size: 0.7rem;
      color: #1877f2;
      transition: transform 0.2s ease;
    }

    .meta-ai-tier-section.open .meta-ai-tier-chevron {
      transform: rotate(180deg);
    }

    .meta-ai-tier-body {
      display: none;
      margin-top: 10px;
    }

    .meta-ai-tier-section.open .meta-ai-tier-body {
      display: block;
    }

    .meta-ai-merge-divider {
      height: 1px;
      background: #e2e2e6;
      margin: 18px 0 16px;
    }

    .meta-ai-merge-subtitle {
      font-size: 0.9375rem;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 12px;
    }

    .meta-ai-tier-empty {
      margin: 0;
      padding: 12px 14px;
      font-size: 0.8125rem;
      color: #86868b;
      background: #fff;

  <script>
    const NUMERIC_COLUMNS = new Set();
    let CAMPAIGN_COL = '캠페인 이름';
    const ALL_FILTER_VALUE = '__all__';
    let DATE_COL = '일';
    const DATE_FILTER_LABEL = '날짜';
    let AD_SET_COL = '광고 세트 이름';
    let AD_NAME_COL = '광고 이름';
    let IMP_COL = '노출';
    let CLICKS_COL = '링크 클릭';
    let SPEND_COL = '지출 금액 (USD)';
    let CTR_COL = 'CTR(링크 클릭률)';
    let CPC_COL = 'CPC(링크 클릭당 비용)';

    const META_KPI_COL = {
      IMPRESSIONS: IMP_COL,
      CLICKS: CLICKS_COL,
      SPEND: SPEND_COL
    };

    function refreshMetaNumericColumns() {
      NUMERIC_COLUMNS.clear();
      [IMP_COL, CLICKS_COL, SPEND_COL, CTR_COL, CPC_COL].forEach((col) => NUMERIC_COLUMNS.add(col));
    }

    function bindMetaColumnsFromPayload(columns) {
      const resolver = window.PerformanceColumnResolver;
      if (!resolver || !columns?.length) return;

      const resolved = resolver.resolveMetaColumns(columns);
      CAMPAIGN_COL = resolved.CAMPAIGN || CAMPAIGN_COL;
      DATE_COL = resolved.DATE || DATE_COL;
      AD_SET_COL = resolved.AD_SET || AD_SET_COL;
      AD_NAME_COL = resolved.AD_NAME || AD_NAME_COL;
      IMP_COL = resolved.IMPRESSIONS || IMP_COL;
      CLICKS_COL = resolved.CLICKS || CLICKS_COL;
      SPEND_COL = resolved.SPEND || SPEND_COL;
      CTR_COL = resolved.CTR || CTR_COL;
      CPC_COL = resolved.CPC || CPC_COL;

      META_KPI_COL.IMPRESSIONS = IMP_COL;
      META_KPI_COL.CLICKS = CLICKS_COL;
      META_KPI_COL.SPEND = SPEND_COL;
      refreshMetaNumericColumns();
    }

    refreshMetaNumericColumns();
    const CREATIVE_FILTER_KEY = 'creativeName';
    const STATS_TABLE_COLS = 12;
    const CREATIVE_TABLE_COLS = 12;
    const CREATIVE_CHANNEL_ORDER = { IG: 0, FB: 1, '-': 2, '기타': 3 };
    const CAMPAIGN_PREFIX = '[US]Amazon_Meta_Traffic_';

    const CREATIVE_LEGACY_FORMATS = ['숏폼', '슬라이드', '영상', '이미지'];
    const CREATIVE_LEGACY_CONTEXTS = ['상시', 'BSS', '테스트'];
    const CREATIVE_LEGACY_PRODUCTS = ['당근패드', 'Rice', 'Carrot', 'Peach'];

    function normalizeAdNameForParsing(adName) {
      return String(adName ?? '').trim().replace(/\s*-\s*사본\s*$/i, '');
    }

    function extractLegacyMetaCreative(name) {
      let s = name.replace(/^\[US\]Amazon_Meta_Traffic_/, '');
      s = s.replace(/^(?:Broad|Retarget)_/, '');
      s = s.replace(/^2026_\d+월_/, '');
      for (const ctx of CREATIVE_LEGACY_CONTEXTS) {
        if (s.startsWith(`${ctx}_`)) {
          s = s.slice(ctx.length + 1);
          break;
        }
      }
      for (const product of CREATIVE_LEGACY_PRODUCTS) {
        if (s.startsWith(`${product}_`)) {
          s = s.slice(product.length + 1);
          break;
        }
      }
      for (const format of CREATIVE_LEGACY_FORMATS) {
        if (s.startsWith(`${format}_`)) {
          s = s.slice(format.length + 1);
          break;
        }
      }
      return s.trim();
    }

    function extractJuneProductFallback(name) {
      const match = name.match(/^([A-Za-z]+)_\d{4}_\d+월(?:\s+Tier\s*\d+|_Tier\s*\d+)?(?:_(?:FB|IG))?$/i);
      return match ? match[1] : '';
    }

    function getAdCreativeShortName(adName) {
      const name = normalizeAdNameForParsing(adName);
      if (!name) return '';

      const channelContent = name.match(/_(?:FB|IG)_(.+)$/i);
      if (channelContent && channelContent[1]) return channelContent[1].trim();

      const kolMatch = name.match(/^KOL_\d{4}_\d+월(?:\s+Tier\s*\d+|_Tier\s*\d+?)_(.+)$/i);
      if (kolMatch && kolMatch[1]) return kolMatch[1].trim();

      if (name.startsWith('[US]Amazon_Meta_Traffic_')) {
        const legacy = extractLegacyMetaCreative(name);
        if (legacy) return legacy;
      }

      if (/_?(?:FB|IG)$/i.test(name)) {
        const fallback = extractJuneProductFallback(name);
        if (fallback) return fallback;
      }

      return name;
    }

    const CREATIVE_CANONICAL_GROUPS = [
      ['당근슬라이스', '3D배너+슬라이스'],
      ['3D배너+케이키', '#2cakey.julia', '#2cakey.miri'],
      ['3D배너+코리아#1', '#4korea1.miri', '#4korea1.drpalvasha'],
      ['Acne_B&A', 'B&A+acne', 'Acne_Review'],
      ['Flaky_B&A', 'B&A+flaky'],
      ['Redness_B&A', 'B&A+redness'],
    ];
    const CREATIVE_CANONICAL_KEY = new Map();
    const CREATIVE_CANONICAL_LABEL = new Map();
    for (const group of CREATIVE_CANONICAL_GROUPS) {
      const canonical = group[0].toLowerCase();
      CREATIVE_CANONICAL_LABEL.set(canonical, group[0]);
      for (const name of group) {
        CREATIVE_CANONICAL_KEY.set(name.toLowerCase(), canonical);
      }
    }

    function getAdCreativeFilterKey(adName) {
      const short = getAdCreativeShortName(adName).toLowerCase();
      return CREATIVE_CANONICAL_KEY.get(short) || short;
    }

    function getAdCreativeDisplayName(adName) {
      const key = getAdCreativeFilterKey(adName);
      return CREATIVE_CANONICAL_LABEL.get(key) || getAdCreativeShortName(adName);
    }

    function getAdChannelFromName(name) {
      const text = String(name ?? '');
      if (/_FB(?:_|$)/i.test(text)) return 'FB';
      if (/_IG(?:_|$)/i.test(text)) return 'IG';
      return '기타';
    }

    function getAdChannelFromRow(row) {
      const fromAd = getAdChannelFromName(row[AD_NAME_COL]);
      if (fromAd !== '기타') return fromAd;
      const fromSet = getAdChannelFromName(row[AD_SET_COL]);
      if (fromSet !== '기타') return fromSet;
      return '-';
    }

    function getAdTierFromName(name) {
      const match = String(name ?? '').match(/Tier\s*(\d+)/i);
      return match ? `Tier ${match[1]}` : null;
    }

    function getAdTierFromRow(row) {
      return getAdTierFromName(row[AD_NAME_COL]) || getAdTierFromName(row[AD_SET_COL]);
    }

    function getCampaignShortName(fullName) {
      const name = String(fullName ?? '');
      if (name.startsWith(CAMPAIGN_PREFIX)) {
        return name.slice(CAMPAIGN_PREFIX.length);
      }
      return name;
    }

    function getCampaignOptions() {
      return [...new Set(state.rows.map(r => getCampaignShortName(r[CAMPAIGN_COL])).filter(v => v !== ''))]
        .sort((a, b) => String(a).localeCompare(String(b), 'ko'));
    }

    function getRowsByCampaign(campaignShort) {
      if (!campaignShort) return [];
      return state.rows.filter(row =>
        getCampaignShortName(row[CAMPAIGN_COL]).toLowerCase() === campaignShort
      );
    }

    function normalizeDate(val) {
      const s = String(val ?? '').trim();
      if (!s) return '';
      const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
      return m ? `${m[1]}-${m[2]}-${m[3]}` : '';
    }

    function filterByDateRange(rows, filterState = state.filters) {
      const from = filterState.dateFrom || '';
      const to = filterState.dateTo || '';
      if (!from && !to) return rows;
      return rows.filter(row => {
        const d = normalizeDate(row[DATE_COL]);
        if (!d) return false;
        if (from && d < from) return false;
        if (to && d > to) return false;
        return true;
      });
    }

    function getDateRangeLabel(filterState = state.filters) {
      const from = filterState.dateFrom || '';
      const to = filterState.dateTo || '';
      if (!from && !to) return '전체 기간';
      if (from && to) return from === to ? from : `${from} ~ ${to}`;
      if (from) return `${from} ~`;
      return `~ ${to}`;
    }


    function getDateBoundsForCampaign(campaignShort) {
      const rows = (campaignShort && campaignShort !== ALL_FILTER_VALUE) ? getRowsByCampaign(campaignShort) : state.rows;
      const dates = rows
        .map(r => normalizeDate(r[DATE_COL]))
        .filter(Boolean)
        .sort();
      if (!dates.length) return { min: '', max: '' };
      return { min: dates[0], max: dates[dates.length - 1] };
    }

    function ensureCampaignSelected() {
      const options = getCampaignOptions();
      if (!options.length) return;
      const current = state.filters[CAMPAIGN_COL];
      if (current === ALL_FILTER_VALUE) return;
      if (!current || !options.some(o => o.toLowerCase() === current)) {
        state.filters[CAMPAIGN_COL] = options[0].toLowerCase();
      }
    }

    function parseNum(val) {
      const n = parseFloat(String(val ?? '').replace(/,/g, '').replace(/[%$]/g, ''));
      return Number.isNaN(n) ? 0 : n;
    }

    function createTierMetrics() {
      return {
        impressions: 0,
        clicks: 0,
        spend: 0,
        ctrSum: 0,
        ctrCount: 0,
        cpcSum: 0,
        cpcCount: 0
      };
    }

    function trackTierAverage(bucket, sumKey, countKey, rawVal) {
      const s = String(rawVal ?? '').trim();
      if (!s) return;
      bucket[sumKey] += parseNum(s);
      bucket[countKey] += 1;
    }

    function accumulateRowToTierMetrics(bucket, row) {
      bucket.impressions += parseNum(row[IMP_COL]);
      bucket.clicks += parseNum(row[CLICKS_COL]);
      bucket.spend += parseNum(row[SPEND_COL]);
      trackTierAverage(bucket, 'ctrSum', 'ctrCount', row[CTR_COL]);
      trackTierAverage(bucket, 'cpcSum', 'cpcCount', row[CPC_COL]);
    }

    function mergeTierMetrics(target, source) {
      if (!source) return;
      target.impressions += source.impressions;
      target.clicks += source.clicks;
      target.spend += source.spend;
      target.ctrSum += source.ctrSum;
      target.ctrCount += source.ctrCount;
      target.cpcSum += source.cpcSum;
      target.cpcCount += source.cpcCount;
    }

    function getTierCtr(tierData) {
      if (!tierData || !tierData.ctrCount) return 0;
      return tierData.ctrSum / tierData.ctrCount;
    }

    function getTierCpc(tierData) {
      if (!tierData || !tierData.cpcCount) return 0;
      return tierData.cpcSum / tierData.cpcCount;
    }

    const META_PLATFORM_ORDER = { IG: 0, FB: 1, '기타': 2 };

    function getTierMetric(tierData, field) {
      if (!tierData) return 0;
      if (field === 'ctr') return getTierCtr(tierData);
      if (field === 'cpc') return getTierCpc(tierData);
      return tierData[field] ?? 0;
    }

    function getSortIcon(sort, key) {
      if (sort.key !== key) return '↕';
      return sort.dir === 'asc' ? '▲' : '▼';
    }

    function toggleSortState(sort, key) {
      if (sort.key === key) {
        sort.dir = sort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        sort.key = key;
        sort.dir = 'asc';
      }
    }

    function compareSortValues(a, b, type, dir) {
      const factor = dir === 'asc' ? 1 : -1;
      if (type === 'num') return (a - b) * factor;
      if (type === 'date') return String(a).localeCompare(String(b)) * factor;
      return String(a).localeCompare(String(b), 'ko') * factor;
    }

    function sortRows(rows, sort, getValue, getType, defaultCompare) {
      const copy = [...rows];
      if (!sort.key) {
        if (defaultCompare) copy.sort(defaultCompare);
        return copy;
      }
      const { key, dir } = sort;
      const type = getType(key);
      return copy.sort((a, b) => compareSortValues(getValue(a, key), getValue(b, key), type, dir));
    }

    function bindSortableThead(thead, sort, onSort) {
      if (!thead || thead.dataset.sortBound === '1') return;
      thead.dataset.sortBound = '1';
      thead.addEventListener('click', (e) => {
        const th = e.target.closest('th[data-sort-key]');
        if (!th) return;
        toggleSortState(sort, th.dataset.sortKey);
        onSort();
      });
    }

    function renderSortTh(label, sortKey, sort, attrs = '') {
      const icon = getSortIcon(sort, sortKey);
      return `<th data-sort-key="${escapeAttr(sortKey)}"${attrs}>${escapeHtml(label)} <span class="sort-icon">${icon}</span></th>`;
    }

    function getMetaStatsSortValue(row, key) {
      if (key === 'productGroup') return row.productGroup;
      if (key === 'platform') return META_PLATFORM_ORDER[row.platform] ?? 9;
      const tier = key.startsWith('t1_') ? row.tier1 : row.tier2;
      return getTierMetric(tier, key.replace(/^t[12]_/, ''));
    }

    function getMetaStatsSortType(key) {
      if (key === 'productGroup') return 'str';
      if (key === 'platform') return 'num';
      return 'num';
    }

    function defaultMetaStatsSort(a, b) {
      const pg = a.productGroup.localeCompare(b.productGroup, 'ko');
      if (pg !== 0) return pg;
      return (META_PLATFORM_ORDER[a.platform] ?? 9) - (META_PLATFORM_ORDER[b.platform] ?? 9);
    }

    function getCreativeDateSortValue(row, key) {
      if (key === 'date') return row.date;
      const tier = key.startsWith('t1_') ? 'tier1' : 'tier2';
      const field = key.replace(/^t[12]_/, '');
      return row.channels.reduce((sum, ch) => sum + getTierMetric(ch[tier], field), 0);
    }

    function getCreativeDateSortType(key) {
      return key === 'date' ? 'date' : 'num';
    }

    function defaultCreativeDateSort(a, b) {
      const byDate = a.date.localeCompare(b.date);
      if (byDate !== 0) return byDate;
      return (CREATIVE_CHANNEL_ORDER[a.channels[0]?.channel] ?? 9) -
        (CREATIVE_CHANNEL_ORDER[b.channels[0]?.channel] ?? 9);
    }

    function getCreativeStatsSortValue(row, key) {
      if (key === 'creative') return row.creative;
      if (key === 'channel') return CREATIVE_CHANNEL_ORDER[row.channel] ?? 9;
      const tier = key.startsWith('t1_') ? row.tier1 : row.tier2;
      return getTierMetric(tier, key.replace(/^t[12]_/, ''));
    }

    function getCreativeStatsSortType(key) {
      if (key === 'creative' || key === 'channel') return key === 'channel' ? 'num' : 'str';
      return 'num';
    }

    function defaultCreativeStatsSort(a, b) {
      const byCreative = a.creative.localeCompare(b.creative, 'ko');
      if (byCreative !== 0) return byCreative;
      return (CREATIVE_CHANNEL_ORDER[a.channel] ?? 9) - (CREATIVE_CHANNEL_ORDER[b.channel] ?? 9);
    }

    function renderTierStatsHead(sort) {
      return `
        <tr>
          ${renderSortTh('광고 세트', 'productGroup', sort, ' rowspan="2"')}
          ${renderSortTh('채널', 'platform', sort, ' rowspan="2"')}
          <th colspan="5" class="group-start">Tier 1</th>
          <th colspan="5" class="group-start">Tier 2</th>
        </tr>
        <tr>
          ${renderSortTh('노출', 't1_impressions', sort, ' class="group-start"')}
          ${renderSortTh('링크 클릭', 't1_clicks', sort)}
          ${renderSortTh('지출 (USD)', 't1_spend', sort)}
          ${renderSortTh('CTR', 't1_ctr', sort)}
          ${renderSortTh('CPC', 't1_cpc', sort)}
          ${renderSortTh('노출', 't2_impressions', sort, ' class="group-start"')}
          ${renderSortTh('링크 클릭', 't2_clicks', sort)}
          ${renderSortTh('지출 (USD)', 't2_spend', sort)}
          ${renderSortTh('CTR', 't2_ctr', sort)}
          ${renderSortTh('CPC', 't2_cpc', sort)}
        </tr>`;
    }

    function renderCreativeTierStatsHead(sort) {
      return `
        <tr>
          ${renderSortTh('광고 이름', 'creative', sort, ' rowspan="2"')}
          ${renderSortTh('채널', 'channel', sort, ' rowspan="2"')}
          <th colspan="5" class="group-start">Tier 1</th>
          <th colspan="5" class="group-start">Tier 2</th>
        </tr>
        <tr>
          ${renderSortTh('노출', 't1_impressions', sort, ' class="group-start"')}
          ${renderSortTh('링크 클릭', 't1_clicks', sort)}
          ${renderSortTh('지출 (USD)', 't1_spend', sort)}
          ${renderSortTh('CTR', 't1_ctr', sort)}
          ${renderSortTh('CPC', 't1_cpc', sort)}
          ${renderSortTh('노출', 't2_impressions', sort, ' class="group-start"')}
          ${renderSortTh('링크 클릭', 't2_clicks', sort)}
          ${renderSortTh('지출 (USD)', 't2_spend', sort)}
          ${renderSortTh('CTR', 't2_ctr', sort)}
          ${renderSortTh('CPC', 't2_cpc', sort)}
        </tr>`;
    }

    function getStatsSourceRows() {
      const campaignShort = state.filters[CAMPAIGN_COL];
      if (!campaignShort) return [];
      if (campaignShort === ALL_FILTER_VALUE) return filterByDateRange(state.rows);
      return filterByDateRange(getRowsByCampaign(campaignShort));
    }

    function getAdSetTierFromName(adSetName) {
      const match = String(adSetName ?? '').match(/Tier\s*(\d+)/i);
      return match ? `Tier ${match[1]}` : null;
    }

    function getAdSetPlatformFromName(adSetName) {
      const text = String(adSetName ?? '');
      if (/_IG(?:_|$)/i.test(text)) return 'IG';
      if (/_FB(?:_|$)/i.test(text)) return 'FB';
      return '기타';
    }

    function getAdSetBaseName(adSetName) {
      let base = String(adSetName ?? '').trim();
      if (!base) return '';

      base = base.replace(/_?Tier\s*\d+/gi, '');
      base = base.replace(/_(?:FB|IG)$/i, '');
      return base.replace(/_+/g, '_').replace(/^_|_$/g, '');
    }

    function formatAdSetStatsLabel(baseName, campaignShort) {
      let label = baseName.replace(/^\[US\]Amazon_Meta_Traffic_/, '');
      if (!campaignShort) return label;

      const idx = label.indexOf(campaignShort);
      if (idx === -1) return label;

      const prefix = label.slice(0, idx).replace(/_+$/, '');
      const suffix = label.slice(idx + campaignShort.length).replace(/^_+/, '');
      if (prefix && suffix) return `${prefix}_${suffix}`;
      if (prefix) return prefix;
      if (suffix) return suffix;
      return label;
    }

    function parseAdSetForStats(adSetName, campaignShort) {
      const name = String(adSetName ?? '').trim();
      if (!name) return null;

      const baseName = getAdSetBaseName(name);
      if (!baseName) return null;

      return {
        groupKey: `${baseName}|${getAdSetPlatformFromName(name)}`,
        displayName: formatAdSetStatsLabel(baseName, campaignShort),
        platform: getAdSetPlatformFromName(name),
        tier: getAdSetTierFromName(name)
      };
    }

    function buildStatsData() {
      const rawCampaign = state.filters[CAMPAIGN_COL];
      const campaignShort = rawCampaign === ALL_FILTER_VALUE ? '' : rawCampaign;
      const rows = getStatsSourceRows();
      const bucket = new Map();

      for (const row of rows) {
        const parsed = parseAdSetForStats(row[AD_SET_COL], campaignShort);
        if (!parsed) continue;

        const tier = parsed.tier || 'Tier 1';
        const key = `${parsed.groupKey}|${tier}`;
        if (!bucket.has(key)) {
          bucket.set(key, {
            groupKey: parsed.groupKey,
            displayName: parsed.displayName,
            platform: parsed.platform,
            tier,
            ...createTierMetrics()
          });
        }
        accumulateRowToTierMetrics(bucket.get(key), row);
      }

      const tableMap = new Map();
      for (const item of bucket.values()) {
        if (!tableMap.has(item.groupKey)) {
          tableMap.set(item.groupKey, {
            productGroup: item.displayName,
            platform: item.platform,
            tier1: null,
            tier2: null
          });
        }
        const entry = tableMap.get(item.groupKey);
        if (item.tier === 'Tier 1') {
          if (!entry.tier1) entry.tier1 = createTierMetrics();
          mergeTierMetrics(entry.tier1, item);
        }
        if (item.tier === 'Tier 2') {
          if (!entry.tier2) entry.tier2 = createTierMetrics();
          mergeTierMetrics(entry.tier2, item);
        }
      }

      return [...tableMap.values()];
    }

    function formatStatNum(val, isMoney) {
      if (!val) return '-';
      if (isMoney) {
        return val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      return Number.isInteger(val) ? val.toLocaleString() : val.toLocaleString(undefined, { maximumFractionDigits: 2 });
    }

    function computeConsecutiveRowspans(rows, keyFn) {
      const spans = new Array(rows.length).fill(0);
      let i = 0;
      while (i < rows.length) {
        const key = keyFn(rows[i]);
        let span = 1;
        while (i + span < rows.length && keyFn(rows[i + span]) === key) span++;
        spans[i] = span;
        i += span;
      }
      return spans;
    }

    function renderTierCells(tierData) {
      if (!tierData) {
        return '<td class="num group-start">-</td><td class="num">-</td><td class="num">-</td><td class="num">-</td><td class="num">-</td>';
      }
      const ctr = getTierCtr(tierData);
      const cpc = getTierCpc(tierData);
      return `<td class="num group-start">${formatStatNum(tierData.impressions, false)}</td>` +
        `<td class="num">${formatStatNum(tierData.clicks, false)}</td>` +
        `<td class="num">${formatStatNum(tierData.spend, true)}</td>` +
        `<td class="num">${ctr ? formatStatNum(ctr, false) : '-'}</td>` +
        `<td class="num">${cpc ? formatStatNum(cpc, true) : '-'}</td>`;
    }

    function renderMetaStatsHead() {
      const thead = document.getElementById('meta-stats-thead');
      if (!thead) return;
      thead.innerHTML = renderTierStatsHead(state.statsSort);
      bindSortableThead(thead, state.statsSort, applyFiltersAndRender);
    }

    function renderStatsTable() {
      const campaignShort = state.filters[CAMPAIGN_COL];
      if (!campaignShort) {
        metaStatsTbody.innerHTML = `<tr><td colspan="${STATS_TABLE_COLS}" class="meta-status">캠페인을 선택해 주세요.</td></tr>`;
        return;
      }

      renderMetaStatsHead();

      const statsRows = sortRows(
        buildStatsData(),
        state.statsSort,
        getMetaStatsSortValue,
        getMetaStatsSortType,
        defaultMetaStatsSort
      );
      if (!statsRows.length) {
        metaStatsTbody.innerHTML = `<tr><td colspan="${STATS_TABLE_COLS}" class="meta-status">통계를 생성할 수 있는 광고 세트가 없습니다.</td></tr>`;
        return;
      }

      const groupSpans = computeConsecutiveRowspans(statsRows, r => r.productGroup);
      let html = '';

      for (let i = 0; i < statsRows.length; i++) {
        const row = statsRows[i];
        html += '<tr>';
        if (groupSpans[i] > 0) {
          html += `<td class="product-group" rowspan="${groupSpans[i]}">${escapeHtml(row.productGroup)}</td>`;
        }
        html += `<td class="platform">${escapeHtml(row.platform)}</td>`;
        html += renderTierCells(row.tier1);
        html += renderTierCells(row.tier2);
        html += '</tr>';
      }

      metaStatsTbody.innerHTML = html;
    }

    function buildCreativeStatsData() {
      const rows = getCreativeSourceRows();
      const bucket = new Map();

      for (const row of rows) {
        const creativeKey = getAdCreativeFilterKey(row[AD_NAME_COL]);
        if (!creativeKey) continue;

        const creative = getAdCreativeDisplayName(row[AD_NAME_COL]);
        const channel = getAdChannelFromRow(row);
        const tier = getAdTierFromRow(row) || 'Tier 1';
        const key = `${creativeKey}|${channel}|${tier}`;

        if (!bucket.has(key)) {
          bucket.set(key, {
            creativeKey,
            creative,
            channel,
            tier,
            ...createTierMetrics()
          });
        }

        accumulateRowToTierMetrics(bucket.get(key), row);
      }

      const tableMap = new Map();
      for (const item of bucket.values()) {
        const rowKey = `${item.creativeKey}|${item.channel}`;
        if (!tableMap.has(rowKey)) {
          tableMap.set(rowKey, {
            creativeKey: item.creativeKey,
            creative: item.creative,
            channel: item.channel,
            tier1: null,
            tier2: null
          });
        }

        const entry = tableMap.get(rowKey);
        if (item.tier === 'Tier 1') {
          if (!entry.tier1) entry.tier1 = createTierMetrics();
          mergeTierMetrics(entry.tier1, item);
        }
        if (item.tier === 'Tier 2') {
          if (!entry.tier2) entry.tier2 = createTierMetrics();
          mergeTierMetrics(entry.tier2, item);
        }
      }

      return [...tableMap.values()];
    }

    function renderCreativeStatsHead() {
      const thead = document.getElementById('creative-stats-thead');
      if (!thead) return;
      thead.innerHTML = renderCreativeTierStatsHead(creativeState.statsSort);
      bindSortableThead(thead, creativeState.statsSort, renderCreativeStatsTable);
    }

    function renderCreativeStatsTable() {
      const campaignShort = creativeState.filters[CAMPAIGN_COL];
      if (!campaignShort) {
        creativeStatsCampaignLabel.textContent = '-';
        creativeStatsDateLabel.textContent = '';
        creativeStatsTbody.innerHTML = `<tr><td colspan="${STATS_TABLE_COLS}" class="meta-status">캠페인을 선택해 주세요.</td></tr>`;
        return;
      }

      const campaignLabel = campaignShort === ALL_FILTER_VALUE
        ? '전체'
        : (getCampaignOptions().find(o => o.toLowerCase() === campaignShort) || campaignShort);
      creativeStatsCampaignLabel.textContent = campaignLabel;
      creativeStatsDateLabel.textContent = ` · ${getDateRangeLabel(creativeState.filters)}`;

      renderCreativeStatsHead();

      const statsRows = sortRows(
        buildCreativeStatsData(),
        creativeState.statsSort,
        getCreativeStatsSortValue,
        getCreativeStatsSortType,
        defaultCreativeStatsSort
      );
      if (!statsRows.length) {
        creativeStatsTbody.innerHTML = `<tr><td colspan="${STATS_TABLE_COLS}" class="meta-status">통계를 생성할 수 있는 광고 소재가 없습니다.</td></tr>`;
        return;
      }

      const creativeSpans = computeConsecutiveRowspans(statsRows, r => r.creativeKey);
      let html = '';

      for (let i = 0; i < statsRows.length; i++) {
        const row = statsRows[i];
        html += '<tr>';
        if (creativeSpans[i] > 0) {
          html += `<td class="product-group" rowspan="${creativeSpans[i]}">${escapeHtml(row.creative)}</td>`;
        }
        html += `<td class="platform">${escapeHtml(row.channel)}</td>`;
        html += renderTierCells(row.tier1);
        html += renderTierCells(row.tier2);
        html += '</tr>';
      }

      creativeStatsTbody.innerHTML = html;
    }

    const state = {
      columns: [],
      rows: [],
      filters: {},
      sourceFile: '',
      dateCalendarMonth: '',
      datePickStart: null,
      statsSort: { key: null, dir: 'asc' }
    };

    const creativeState = {
      filters: {},
      filtered: [],
      page: 1,
      pageSize: 100,
      dateCalendarMonth: '',
      datePickStart: null,
      sort: { key: null, dir: 'asc' },

    function filterMetaRowsByTier(rows, tier) {

    const metaAiTierExpanded = new Set();

    function buildMetaTierSectionWrap(label, innerHtml) {
