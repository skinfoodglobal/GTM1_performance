        return acc;
      }, { clicks: 0, impressions: 0, cost: 0 });
      const ctr = totals.impressions ? (totals.clicks / totals.impressions) * 100 : 0;
      const cpc = totals.clicks ? totals.cost / totals.clicks : 0;

      const clicksIdx = cols.indexOf(DEMAND_GEN_COL.CLICKS);
      const labelColCount = clicksIdx >= 0 ? clicksIdx : Math.max(cols.length - 5, 1);

      const cells = [`<td colspan="${labelColCount}">TOTAL</td>`];
      for (let i = labelColCount; i < cols.length; i++) {
        const col = cols[i];
        if (col === DEMAND_GEN_COL.CLICKS) {
          cells.push(`<td class="num">${formatInt(totals.clicks)}</td>`);
        } else if (col === DEMAND_GEN_COL.IMPRESSIONS) {
          cells.push(`<td class="num">${formatInt(totals.impressions)}</td>`);
        } else if (col === DEMAND_GEN_COL.CURRENCY) {
          cells.push("<td></td>");
        } else if (col === DEMAND_GEN_COL.COST) {
          cells.push(`<td class="num">${formatDecimal(totals.cost)}</td>`);
        } else if (col === DEMAND_GEN_COL.CTR) {
          cells.push(`<td class="num">${formatPercent(ctr)}</td>`);
        } else if (col === DEMAND_GEN_COL.CPC) {
          cells.push(`<td class="num">${formatDecimal(cpc)}</td>`);
        } else {
          cells.push("<td></td>");
        }
      }
      return `<tr>${cells.join("")}</tr>`;

    function aggregateKeywordChartSeries(rows) {
      const map = new Map();
      (rows || []).forEach((row) => {
        const date = normalizeDate(row[COL.DATE]);
        if (!date) return;
        if (!map.has(date)) map.set(date, createMetricBucket({ date }));
        accumulateRowMetrics(map.get(date), row);
      });
      return [...map.values()]
        .sort((a, b) => String(a.date).localeCompare(String(b.date)))
        .map((bucket) => {
          const avg = getMetricAverages(bucket);
          return {
            date: bucket.date,
            clicks: bucket.clicks,
            impressions: bucket.impressions,
            cost: bucket.cost,
            ctr: avg.ctr,
            cpc: avg.cpc
          };
        });
    }

    function aggregateDemandGenChartSeries(rows) {
      const map = new Map();
      (rows || []).forEach((row) => {
        const date = normalizeDate(getDemandGenValue(row, "DATE"));
        if (!date) return;
        if (!map.has(date)) map.set(date, createMetricBucket({ date }));
        accumulateDemandGenRowMetrics(map.get(date), row);
      });
      return [...map.values()]
        .sort((a, b) => String(a.date).localeCompare(String(b.date)))
        .map((bucket) => {
          const avg = getMetricAverages(bucket);
          return {
            date: bucket.date,
            clicks: bucket.clicks,
            impressions: bucket.impressions,
            cost: bucket.cost,
            ctr: avg.ctr,
            cpc: avg.cpc
          };
        });
    }

    function buildKeywordChartSvg(values, color) {
      const { W, H, padX, padY } = KEYWORD_SPARK;
      const n = values.length;
      const max = Math.max(...values, 0);
      const min = Math.min(...values, 0);
      const range = max - min || 1;
      const innerW = W - padX * 2;
      const innerH = H - padY * 2;
      const xAt = (i) => (n <= 1 ? W / 2 : padX + (i / (n - 1)) * innerW);
      const yAt = (v) => padY + innerH - ((v - min) / range) * innerH;

      if (n === 1) {
        return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">` +
          `<circle cx="${xAt(0).toFixed(1)}" cy="${yAt(values[0]).toFixed(1)}" r="2.5" fill="${color}"></circle>` +
          `<line class="kc-marker-line" x1="0" y1="${padY}" x2="0" y2="${H - padY}" stroke="${color}" stroke-width="1" stroke-dasharray="2 2" vector-effect="non-scaling-stroke" opacity="0"></line>` +
          `<circle class="kc-marker-dot" cx="0" cy="0" r="2.6" fill="#fff" stroke="${color}" stroke-width="1.5" vector-effect="non-scaling-stroke" opacity="0"></circle>` +
          `</svg>`;
      }

      const pts = values.map((v, i) => `${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`);
      const linePath = `M${pts.join(" L")}`;
      const areaPath =
        `M${xAt(0).toFixed(1)},${(H - padY).toFixed(1)} ` +
        `L${pts.join(" L")} ` +
        `L${xAt(n - 1).toFixed(1)},${(H - padY).toFixed(1)} Z`;
      const lastX = xAt(n - 1).toFixed(1);
      const lastY = yAt(values[n - 1]).toFixed(1);

      return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">` +
        `<path d="${areaPath}" fill="${color}" fill-opacity="0.10" stroke="none"></path>` +
        `<path d="${linePath}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"></path>` +
        `<circle cx="${lastX}" cy="${lastY}" r="2" fill="${color}" vector-effect="non-scaling-stroke"></circle>` +
        `<line class="kc-marker-line" x1="0" y1="${padY}" x2="0" y2="${H - padY}" stroke="${color}" stroke-width="1" stroke-dasharray="2 2" vector-effect="non-scaling-stroke" opacity="0"></line>` +
        `<circle class="kc-marker-dot" cx="0" cy="0" r="2.6" fill="#fff" stroke="${color}" stroke-width="1.5" vector-effect="non-scaling-stroke" opacity="0"></circle>` +
        `</svg>`;
    }

    function renderMetricCharts(containerId, rows, aggregateFn, chartState) {
      const container = document.getElementById(containerId);
      if (!container) return;

      const series = aggregateFn(rows);
      chartState.series = series;
      if (!series.length) {
        container.innerHTML = `<p class="keyword-charts-empty">필터 조건에 해당하는 데이터가 없어 그래프를 표시할 수 없습니다.</p>`;
        return;
      }

      const cards = KEYWORD_CHART_METRICS.map((metric) => {
        const values = series.map((r) => Number(r[metric.key] || 0));
        const latest = values[values.length - 1];
        return [
          `<div class="keyword-chart" data-metric-key="${metric.key}">`,
          `<div class="keyword-chart-head"><span class="keyword-chart-title">${escapeHtml(metric.label)}</span>`,
          `<span class="keyword-chart-value" style="color:${metric.color}">${escapeHtml(metric.fmt(latest))}</span></div>`,
          buildKeywordChartSvg(values, metric.color),
          window.PerformanceChartAxis.buildAxisDatesHtml(series, "keyword-chart-dates", escapeHtml),
          `</div>`
        ].join("");
      }).join("");

      container.innerHTML = `<div class="keyword-charts-row">${cards}</div>`;
    }

    function renderKeywordCharts(rows) {
      renderMetricCharts("keyword-charts", rows, aggregateKeywordChartSeries, keywordChartState);
    }

    function renderDemandGenCharts(rows) {
      renderMetricCharts("demandgen-charts", rows, aggregateDemandGenChartSeries, demandGenChartState);
    }

    (function initKeywordChartHover() {
      let tip = null;
      const getTip = () => {
        if (!tip) {
          tip = document.createElement("div");
          tip.className = "keyword-chart-tip";
          document.body.appendChild(tip);
        }
        return tip;
      };
      const clearMarkers = () => {
        ["keyword-charts", "demandgen-charts"].forEach((id) => {
          const container = document.getElementById(id);
          if (!container) return;
          container.querySelectorAll(".kc-marker-line, .kc-marker-dot").forEach((el) => el.setAttribute("opacity", "0"));
        });
      };
      const hide = () => {
        if (tip) tip.classList.remove("visible");
        clearMarkers();
      };
      const metricByKey = (key) => KEYWORD_CHART_METRICS.find((m) => m.key === key);
      const chartStateByContainerId = {
        "keyword-charts": keywordChartState,
        "demandgen-charts": demandGenChartState
      };

      document.addEventListener("mousemove", (e) => {
        const chart = e.target.closest ? e.target.closest(".keyword-chart") : null;
        if (!chart) { hide(); return; }
        const containerEl = chart.closest(".keyword-charts");
        const series = chartStateByContainerId[containerEl?.id]?.series;
        if (!series || !series.length) { hide(); return; }
        const svg = chart.querySelector("svg");
        const metric = metricByKey(chart.getAttribute("data-metric-key"));
        if (!svg || !metric) { hide(); return; }

        const rect = svg.getBoundingClientRect();
        if (!rect.width) { hide(); return; }
        let ratio = (e.clientX - rect.left) / rect.width;
        ratio = Math.max(0, Math.min(1, ratio));
        const n = series.length;
        const index = n <= 1 ? 0 : Math.round(ratio * (n - 1));
        const row = series[index];
        if (!row) { hide(); return; }

        const values = series.map((r) => Number(r[metric.key] || 0));
        const max = Math.max(...values, 0);
        const min = Math.min(...values, 0);
        const range = max - min || 1;
        const innerW = KEYWORD_SPARK.W - KEYWORD_SPARK.padX * 2;
        const innerH = KEYWORD_SPARK.H - KEYWORD_SPARK.padY * 2;
        const mx = n <= 1 ? KEYWORD_SPARK.W / 2 : KEYWORD_SPARK.padX + (index / (n - 1)) * innerW;
        const my = KEYWORD_SPARK.padY + innerH - ((values[index] - min) / range) * innerH;

        clearMarkers();
        const line = svg.querySelector(".kc-marker-line");
        const dot = svg.querySelector(".kc-marker-dot");
        if (line) {
          line.setAttribute("x1", mx.toFixed(1));
          line.setAttribute("x2", mx.toFixed(1));
          line.setAttribute("opacity", "0.6");
        }
        if (dot) {
          dot.setAttribute("cx", mx.toFixed(1));
          dot.setAttribute("cy", my.toFixed(1));
          dot.setAttribute("opacity", "1");
        }

        const el = getTip();
        el.innerHTML =
          `<div class="tip-date">${escapeHtml(row.date)}</div>` +
          `<div><span class="tip-dot" style="background:${metric.color}"></span>` +
          `${escapeHtml(metric.label)} <strong>${escapeHtml(metric.fmt(values[index]))}</strong></div>`;
        el.classList.add("visible");
        const tipRect = el.getBoundingClientRect();
        let left = e.clientX + 14;
        if (left + tipRect.width > window.innerWidth - 8) left = e.clientX - tipRect.width - 14;
        if (left < 8) left = 8;
        let top = e.clientY - tipRect.height - 12;
        if (top < 8) top = e.clientY + 16;
        el.style.left = `${left}px`;
        el.style.top = `${top}px`;
      });

      window.addEventListener("scroll", hide, true);
    })();

    function getDemandGenSortValue(row, key) {
      if (key === DEMAND_GEN_COL.DATE) return normalizeDate(getDemandGenValue(row, "DATE"));
      if (DEMAND_GEN_NUMERIC_KEYS.has(key)) return parseNum(row[key]);
      return row[key] ?? "";
    }

    function renderDemandGenFilters() {
      const adGroupOptions = buildSelectOptions(
        getDemandGenAdGroupOptions(),
        demandGenState.filters[FILTER_AD_GROUP],
        true
      );
      demandGenFilters.innerHTML = `
        <div class="filter-item">
          <label>광고그룹</label>
          <select data-col="${FILTER_AD_GROUP}">${adGroupOptions}</select>
        </div>
        <div class="filter-item filter-item-date">
          <label>날짜</label>
          <div class="date-range-wrap">
            <div class="date-range-trigger" id="demandgen-date-trigger" tabindex="0">${escapeHtml(getDateRangeLabel(demandGenState.filters, demandGenState))}</div>
            <div class="date-range-popover">
              <div class="date-range-hint" id="demandgen-date-hint"></div>
              <div id="demandgen-date-calendar"></div>
            </div>
          </div>
        </div>`;

      renderDateRangeCalendar(demandGenState, demandGenState.filters, "demandgen-date", applyDemandGenFiltersAndRender);
      bindDateRangeWrap("demandgen-date");

      demandGenFilters.querySelectorAll("select[data-col]").forEach((el) => {
        el.addEventListener("change", () => {
          demandGenState.filters[el.dataset.col] = el.value.trim();
          applyDemandGenFiltersAndRender();
        });
      });
    }

    function resetDemandGenFilters() {
      demandGenState.filters = {};
      demandGenState.sort = { key: null, dir: "asc" };
      demandGenState.global = "";
      demandGenState.dateCalendarMonth = "";
      demandGenState.datePickStart = null;
      document.getElementById("demandgen-global-search").value = "";
      renderDemandGenFilters();
      applyDemandGenFiltersAndRender();
    }

    function applyDemandGenFiltersAndRender() {
      if (demandGenState.datePickStart) {
        demandGenTbody.innerHTML = `<tr><td colspan="${getDemandGenDisplayColCount()}" class="meta-status">종료일을 선택해 주세요.</td></tr>`;
        if (demandGenTfoot) demandGenTfoot.innerHTML = "";
        demandGenState.filtered = [];
        renderDemandGenCharts([]);
        return;
      }

      let rows = getDemandGenSourceRows();
      if (demandGenState.global) {
        const cols = baseState.demandGen.columns.length
          ? baseState.demandGen.columns
          : Object.values(DEMAND_GEN_COL);
        rows = rows.filter((row) =>
          cols.some((col) => String(row[col] ?? "").toLowerCase().includes(demandGenState.global))
        );
      }

      const cols = getDemandGenDisplayColumns();
      if (demandGenState.sort.key) {
        const tableColumns = cols.map((col) => ({
          key: col,
          label: col,
          type: col === DEMAND_GEN_COL.DATE ? "date" : (DEMAND_GEN_NUMERIC_KEYS.has(col) ? "number" : "string")
        }));
        rows = sortByState(rows, demandGenState.sort, tableColumns, getDemandGenSortValue);
      } else {
        rows = [...rows].sort((a, b) => {
          const byDate = normalizeDate(getDemandGenValue(b, "DATE")).localeCompare(normalizeDate(getDemandGenValue(a, "DATE")));
          if (byDate !== 0) return byDate;
          return String(getDemandGenValue(a, "AD_GROUP") || "").localeCompare(String(getDemandGenValue(b, "AD_GROUP") || ""), "ko");
        });
      }

      demandGenState.filtered = rows;
      renderDemandGenTableHead();
      renderDemandGenTableBody();
      renderDemandGenCharts(rows);
    }

    function renderDemandGenTableHead() {
      const cols = getDemandGenDisplayColumns();
      const tableColumns = cols.map((col) => ({
        key: col,
        label: col,
        type: col === DEMAND_GEN_COL.DATE ? "date" : (DEMAND_GEN_NUMERIC_KEYS.has(col) ? "number" : "string")
      }));
      renderTheadRow(demandGenThead, tableColumns, demandGenState.sort);
      bindSortableThead(demandGenThead, demandGenState.sort, applyDemandGenFiltersAndRender);
    }

    function renderDemandGenTableBody() {
      const cols = getDemandGenDisplayColumns();
      const colCount = cols.length || 1;
      const rows = demandGenState.filtered;
      if (!rows.length) {
        demandGenTbody.innerHTML = `<tr><td colspan="${colCount}" class="meta-status">표시할 데이터가 없습니다.</td></tr>`;
        if (demandGenTfoot) demandGenTfoot.innerHTML = "";
        return;
      }

      if (demandGenTfoot) demandGenTfoot.innerHTML = buildDemandGenTotalRowHtml(rows, cols);

      demandGenTbody.innerHTML = rows.map((row) => {
        return `<tr>${cols.map((col) => {
          const value = row[col] ?? "";
          return `<td title="${escapeAttr(String(value))}">${escapeHtml(String(value))}</td>`;
        }).join("")}</tr>`;
      }).join("");
    }

    function renderRawFilters() {
      const dataset = getRawDataset();
      let filterHtml = `
        <div class="filter-item">
          <label>데이터 유형</label>
          <select data-col="${FILTER_RAW_DATASET}">${buildRawDatasetOptions(dataset)}</select>
        </div>`;

      if (dataset === RAW_DATASET_KEYWORD || dataset === RAW_DATASET_ALL) {
        const keywordOptions = buildSelectOptions(getKeywordOptions(), rawState.filters[FILTER_KEYWORD], true);
        filterHtml += `
          <div class="filter-item">
            <label>검색어</label>
            <select data-col="${FILTER_KEYWORD}">${keywordOptions}</select>
          </div>`;
      }

      if (dataset === RAW_DATASET_DEMANDGEN || dataset === RAW_DATASET_ALL) {
        const adGroupOptions = buildSelectOptions(getDemandGenAdGroupOptions(), rawState.filters[FILTER_AD_GROUP], true);
        filterHtml += `
          <div class="filter-item">
            <label>광고그룹</label>
            <select data-col="${FILTER_AD_GROUP}">${adGroupOptions}</select>
          </div>`;
      }

      filterHtml += `
        <div class="filter-item filter-item-date">
          <label>날짜</label>
          <div class="date-range-wrap">
            <div class="date-range-trigger" id="raw-date-trigger" tabindex="0">${escapeHtml(getDateRangeLabel(rawState.filters, rawState))}</div>
            <div class="date-range-popover">
              <div class="date-range-hint" id="raw-date-hint"></div>
              <div id="raw-date-calendar"></div>
            </div>
          </div>
        </div>`;

      rawFilters.innerHTML = filterHtml;

      renderDateRangeCalendar(rawState, rawState.filters, "raw-date", applyRawFiltersAndRender);
      bindDateRangeWrap("raw-date");

      rawFilters.querySelectorAll("select[data-col]").forEach((el) => {
        el.addEventListener("change", () => {
          const key = el.dataset.col;
          rawState.filters[key] = el.value.trim();
          if (key === FILTER_RAW_DATASET) {
            renderRawFilters();
          }
          applyRawFiltersAndRender();
        });
      });
    }

    function resetRawFilters() {
      rawState.filters = {};
      rawState.filters[FILTER_RAW_DATASET] = RAW_DATASET_ALL;
      rawState.sort = { key: null, dir: "asc" };
      rawState.global = "";
      rawState.dateCalendarMonth = "";
      rawState.datePickStart = null;
      document.getElementById("raw-global-search").value = "";
      renderRawFilters();
      applyRawFiltersAndRender();
    }

    function applyRawFiltersAndRender() {
      if (rawState.datePickStart) {
        rawTbody.innerHTML = `<tr><td colspan="${getRawColCount()}" class="meta-status">종료일을 선택해 주세요.</td></tr>`;
        rawState.filtered = [];
        return;
      }

      let rows = getRawSourceRows();
      if (rawState.global) {
        const cols = getRawDisplayColumns();
        rows = rows.filter((row) =>
          cols.some((col) => String(getRawCellValue(row, col) ?? "").toLowerCase().includes(rawState.global))
        );
      }

      const cols = getRawDisplayColumns();
      if (rawState.sort.key) {
        const rawColumns = cols.map((col) => ({
          key: col,
          label: col,
          type: getRawColumnType(col)
        }));
        rows = sortByState(rows, rawState.sort, rawColumns, getRawSortValue);
      }

      rawState.filtered = rows;
      renderRawTableHead();
      renderRawTableBody();
    }

    function renderRawTableHead() {
      const cols = getRawDisplayColumns();
      const rawColumns = cols.map((col) => ({
        key: col,
        label: col,
        type: getRawColumnType(col)
      }));
      renderTheadRow(rawThead, rawColumns, rawState.sort);
      bindSortableThead(rawThead, rawState.sort, applyRawFiltersAndRender);
    }

    function renderRawTableBody() {
      const cols = getRawDisplayColumns();
      const colCount = cols.length || 1;
      const rows = rawState.filtered;
      if (!rows.length) {
        rawTbody.innerHTML = `<tr><td colspan="${colCount}" class="meta-status">표시할 데이터가 없습니다.</td></tr>`;
        return;
      }

      rawTbody.innerHTML = rows.map((row) => {
        return `<tr>${cols.map((col) => {
          const value = getRawCellValue(row, col);
          return `<td title="${escapeAttr(String(value))}">${escapeHtml(String(value))}</td>`;
        }).join("")}</tr>`;
      }).join("");
    }
  </script>
  <script src="shared/date-range-picker.js"></script>
  <script src="shared/kpi-calc-basis.js"></script>
  <script src="shared/kpi-summary.js"></script>
  <script>
    mountKpiSummary("kpi-summary-root", "google", { hideTypeColumn: true });
    if (window.KpiSummary) {
      window.KpiSummary.onDateChange = () => refreshGoogleKpiSummary();
    }
    window.loadGoogleData = loadGoogleData;
    if (window.PerformanceDataLoader) {
      window.PerformanceDataLoader.onDataUpdated(loadGoogleData);
    }
    loadGoogleData();
  </script>
</body>
