<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google · GTM1_퍼포먼스</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      padding: 48px 24px;
    }

    .container {
      max-width: 1800px;
      margin: 0 auto;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
    }

    .page-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 1.65rem;
      font-weight: 900;
      line-height: 1;
      color: #1d1d1f;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid #e0e0e0;
      transition: background 0.2s;
    }

    .back-link:hover {
      background: #f5f5f7;
    }

    .page-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0;
      text-align: left;
    }

    .meta-page-content {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .meta-accordion {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
    }

    .meta-accordion-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      background: #fff;
      border: none;
      font-size: 1.125rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      color: #1d1d1f;
      transition: background 0.2s;
    }

    .meta-accordion-header:hover {
      background: #fafafa;
    }

    .meta-accordion.open .meta-accordion-header {
      border-bottom: 1px solid #e8e8ed;
    }

    .meta-accordion-header .chevron {
      font-size: 0.85rem;
      color: #86868b;
      transition: transform 0.2s;
    }

    .meta-accordion.open .meta-accordion-header .chevron {
      transform: rotate(180deg);
    }

    .meta-accordion.open {
      overflow: visible;
    }

    .meta-accordion-body {
      display: none;
      padding: 20px;
      overflow: visible;
    }

    .meta-accordion.open .meta-accordion-body {
      display: block;
      overflow: visible;
    }

    .meta-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .meta-info {
      font-size: 0.875rem;
      color: #6e6e73;
    }

    .meta-info strong {
      color: #1d1d1f;
    }

    .meta-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .meta-search {
      padding: 8px 12px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 0.875rem;
      min-width: 220px;
    }

    .meta-search:focus {
      outline: none;
      border-color: #1877f2;
      box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.15);
    }

    .btn {
      padding: 8px 14px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      background: #fff;
      font-size: 0.875rem;
      cursor: pointer;
    }

    .btn:hover {
      background: #f5f5f7;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
      padding: 16px;
      background: #f9f9fb;
      border-radius: 10px;
      position: relative;
      z-index: 20;
      overflow: visible;
    }

    .filter-item label {
      display: block;
      font-size: 0.75rem;
      color: #6e6e73;
      margin-bottom: 4px;
    }

    .filter-item input,
    .filter-item select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      font-size: 0.8125rem;
    }

    .filter-item input[type="search"] {
      min-width: 0;
    }

    .filter-item-date {
      position: relative;
      z-index: 1;
    }

    .filter-item-date:hover,
    .filter-item-date:focus-within {
      z-index: 200;
    }

    .date-range-wrap {
      position: relative;
    }

    .date-range-trigger {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      background: #fff;
      font-size: 0.8125rem;
      color: #1d1d1f;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .date-range-wrap:hover .date-range-popover,
    .date-range-wrap:focus-within .date-range-popover,
    .date-range-wrap.open .date-range-popover {
      display: block;
    }

    .date-range-wrap.open .date-range-trigger,
    .date-range-wrap:hover .date-range-trigger,
    .date-range-wrap:focus-within .date-range-trigger {
      border-color: #1877f2;
    }

    .date-range-popover {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 200;
      width: 220px;
      padding: 8px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
    }

    .date-range-wrap::before {
      content: "";
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      height: 6px;
    }

    .date-range-wrap.open::before,
    .date-range-wrap:hover::before,
    .date-range-wrap:focus-within::before {
      display: block;
    }

    .date-range-hint {
      font-size: 0.6875rem;
      color: #86868b;
      margin-bottom: 6px;
      text-align: center;
    }

    .date-range-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .date-range-nav button {
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      color: #1d1d1f;
      font-size: 0.75rem;
    }

    .date-range-nav button:hover {
      background: #f0f0f0;
    }

    .date-range-month {
      font-size: 0.75rem;
      font-weight: 600;
    }

    .date-range-weekdays,
    .date-range-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
    }

    .date-range-weekdays span {
      text-align: center;
      font-size: 0.625rem;
      color: #86868b;
      padding: 2px 0;
    }

    .date-day {
      height: 22px;
      border: none;
      background: transparent;
      border-radius: 4px;
      font-size: 0.6875rem;
      color: #1d1d1f;
      cursor: pointer;
      padding: 0;
      line-height: 22px;
    }

    .date-day:hover {
      background: #eef4ff;
    }

    .date-day.in-range {
      background: #e7f3ff;
      color: #1d1d1f;
      border-radius: 0;
    }

    .date-day.range-start,
    .date-day.range-end {
      background: #1877f2;
      color: #fff;
    }

    .date-day.range-start {
      border-radius: 4px 0 0 4px;
    }

    .date-day.range-end {
      border-radius: 0 4px 4px 0;
    }

    .date-day.range-start.range-end {
      border-radius: 4px;
    }

    .date-day.empty {
      visibility: hidden;
      cursor: default;
    }

    .date-range-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
    }

    .date-range-actions .btn-clear {
      font-size: 0.6875rem;
      padding: 3px 8px;
      color: #1877f2;
      border-color: transparent;
      background: transparent;
    }

    .date-range-actions .btn-clear:hover {
      background: #eef4ff;
    }

    .table-wrap {
      overflow: auto;
      max-height: 560px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      position: relative;
      z-index: 1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f5f5f7;
      z-index: 1;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 2px solid #e0e0e0;
      white-space: nowrap;
      user-select: none;
    }

    thead th[data-sort-key] {
      cursor: pointer;
    }

    thead th[data-sort-key]:hover {
      background: #ebebef;
    }

    thead th .sort-icon {
      margin-left: 4px;
      color: #86868b;
      font-size: 0.7rem;
    }

    tbody td {
      padding: 8px 12px;
      border-bottom: 1px solid #f0f0f0;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: #fafafa;
    }

    #period-stats-tfoot td,
    #keyword-tfoot td,
    #demandgen-tfoot td {
      position: sticky;
      bottom: 0;
      z-index: 2;
      padding: 8px 12px;
      background: #f5f5f7;
      color: #1d1d1f;
      font-weight: 700;
      white-space: nowrap;
      border-top: 1px solid #d2d2d7;
    }

    #period-stats-tfoot td.num,
    #keyword-tfoot td.num,
    #demandgen-tfoot td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .meta-status {
      padding: 24px;
      text-align: center;
      color: #6e6e73;
    }

    .meta-status.error {
      color: #d70015;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 0.875rem;
      color: #6e6e73;
    }

    .pagination-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .pagination-controls select {
      padding: 6px 8px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
    }

    .keyword-charts {
      margin-top: 16px;
    }

    .keyword-charts:empty {
      display: none;
    }

    .keyword-charts-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .keyword-chart {
      min-width: 0;
      border: 1px solid #e8e8ed;
      border-radius: 8px;
      padding: 8px 9px 6px;
      background: #fff;
    }

    .keyword-chart-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 4px;
    }

    .keyword-chart-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #6e6e73;
      white-space: nowrap;
    }

    .keyword-chart-value {
      font-size: 0.6875rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .keyword-chart svg {
      display: block;
      width: 100%;
      height: 60px;
      margin-top: 5px;
      overflow: visible;
      cursor: crosshair;
    }

    .keyword-chart-dates {
      display: flex;
      justify-content: space-between;
      gap: 4px;
      font-size: 0.5625rem;
      color: #a1a1a6;
      margin-top: 3px;
    }

    .keyword-charts-empty {
      font-size: 0.8125rem;
      color: #86868b;
      padding: 8px 0;
    }

    .keyword-chart-tip {
      position: fixed;
      z-index: 1000;
      padding: 5px 8px;
      background: #1d1d1f;
      color: #fff;
      border-radius: 6px;
      font-size: 0.6875rem;
      line-height: 1.55;
      white-space: nowrap;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.1s ease;
      pointer-events: none;
    }

    .keyword-chart-tip.visible {
      opacity: 1;
      visibility: visible;
    }

    .keyword-chart-tip .tip-date {
      color: #c7c7cc;
      margin-bottom: 1px;
    }

    .keyword-chart-tip .tip-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 3px;
      vertical-align: baseline;
    }

    @media (max-width: 1100px) {
      .keyword-charts-row {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 640px) {
      .keyword-charts-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .keyword-filter-bar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 16px;
      padding: 16px;
      background: #f9f9fb;
      border-radius: 10px;
      position: relative;
      z-index: 20;
      overflow: visible;
    }

    .keyword-filter-main {
      flex: 1;
      margin-bottom: 0;
      padding: 0;
      background: transparent;
    }

    .keyword-filter-search {
      flex: 0 0 260px;
      min-width: 220px;
    }

    @media (max-width: 860px) {
      .keyword-filter-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .keyword-filter-search {
        flex: 1 1 auto;
        min-width: 0;
      }
    }

    .stats-section {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 2px solid #e8e8ed;
    }

    .stats-section-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1d1d1f;
    }

    .stats-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .stats-section-header .stats-section-title {
      margin-bottom: 0;
    }

    .stats-section-header .meta-search {
      flex: 0 0 260px;
      min-width: 220px;
    }

    @media (max-width: 640px) {
      .stats-section-header .meta-search {
        flex: 1 1 auto;
        min-width: 0;
        width: 100%;
      }
    }

    .phrase-card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .phrase-card {
      background: #f9f9fb;
      border: 1px solid #e8e8ed;
      border-radius: 10px;
      padding: 0;
      height: 468px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .phrase-card-header {
      min-height: 88px;
      height: 88px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      padding: 16px 20px;
      border-bottom: 1px solid #e8e8ed;
    }

    .phrase-card-scroll {
      flex: 1;
      min-height: 0;
      max-height: 380px;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 20px 20px;
    }

    .phrase-card-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .phrase-card-scroll::-webkit-scrollbar-thumb {
      background: #c7c7cc;
      border-radius: 3px;
    }

    .phrase-card-num {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #86868b;
      text-transform: uppercase;
    }

    .phrase-card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #1d1d1f;
      line-height: 1.35;
      margin: 0;
    }

    .phrase-card-body {
      font-size: 0.875rem;
      color: #424245;
      line-height: 1.65;
    }

    .phrase-md .grec-head {
      font-size: 0.9375rem;
      font-weight: 700;
      color: #1d1d1f;
      margin: 0 0 12px;
    }

    .phrase-md .grec-list {
      list-style: none;
      counter-reset: grec;
      margin: 0;
      padding: 0;
    }

    .phrase-md .grec-item {
      counter-increment: grec;
      position: relative;
      background: #fff;
      border: 1px solid #e8e8ed;
      border-radius: 8px;
      padding: 12px 14px 12px 50px;
      margin-bottom: 8px;
    }

    .phrase-md .grec-item:last-child {
      margin-bottom: 0;
    }

    .phrase-md .grec-item::before {
      content: counter(grec);
      position: absolute;
      left: 12px;
      top: 12px;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      background: #f0f0f2;
      color: #6e6e73;
      font-size: 0.75rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .phrase-md .grec-keyword {
      margin-bottom: 8px;
    }

    .phrase-md .grec-keyword code {
      font-size: 0.875rem;
      font-weight: 700;
      color: #1d1d1f;
      background: #f5f5f7;
      padding: 2px 7px;
      border-radius: 5px;
      word-break: break-word;
    }

    .phrase-md .grec-block {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      font-size: 0.8125rem;
    }

    .phrase-md .grec-key {
      flex-shrink: 0;
      width: 34px;
      font-weight: 700;
      color: #86868b;
    }

    .phrase-md .grec-reason {
      flex: 1;
      min-width: 0;
      color: #424245;
    }

    .phrase-md .grec-reason-line {
      line-height: 1.5;
    }

    .phrase-md .grec-effect {
      color: #0071e3;
      font-weight: 600;
      margin-top: 2px;
    }

    .phrase-md .grec-use {
      color: #424245;
      font-weight: 600;
    }

    .phrase-md .grec-item.has-del {
      padding-right: 40px;
    }

    .phrase-md .grec-del {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 22px;
      height: 22px;
      padding: 0;
      border: none;
      border-radius: 6px;
      background: #f5f5f7;
      color: #86868b;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .phrase-md .grec-del:hover {
      background: #ffe5e5;
      color: #d70015;
    }

    .phrase-md .grec-restorebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #f5f5f7;
      border: 1px solid #e8e8ed;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 12px;
      font-size: 0.8125rem;
      color: #6e6e73;
    }

    .phrase-md .grec-restorebar-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .phrase-md .grec-restore {
      border: 1px solid #d2d2d7;
      background: #fff;
      color: #0071e3;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
    }

    .phrase-md .grec-restore:hover {
      background: #f0f7ff;
    }

    .phrase-md .grec-restore-close {
      width: 22px;
      height: 22px;
      padding: 0;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #86868b;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .phrase-md .grec-restore-close:hover {
      background: #e8e8ed;
      color: #1d1d1f;
    }

    .phrase-md .phrase-empty {
      color: #86868b;
    }

    .phrase-md .md-section {
      background: #fff;
      border: 1px solid #e8e8ed;
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .phrase-md .md-section:last-child {
      margin-bottom: 0;
    }

    .phrase-md .md-section-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      margin: 0;
      padding: 11px 14px;
      background: none;
      border: 0;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
    }

    .phrase-md .md-section-toggle:hover {
      background: #f5f5f7;
    }

    .phrase-md .md-section-title {
      font-size: 0.9375rem;
      font-weight: 600;
      color: #1d1d1f;
      line-height: 1.4;
    }

    .phrase-md .md-section-chevron {
      flex-shrink: 0;
      font-size: 0.7rem;
      color: #86868b;
      transition: transform 0.2s ease;
    }

    .phrase-md .md-section.open .md-section-chevron {
      transform: rotate(180deg);
    }

    .phrase-md .md-section-body {
      display: none;
      padding: 10px 14px 12px;
      margin-top: 2px;
      border-top: 1px solid #f0f0f2;
    }

    .phrase-md .md-section.open .md-section-body {
      display: block;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function escapeAttr(str) {
      return escapeHtml(str).replace(/'/g, "&#39;");
    }

    function parseNum(val) {
      const cleaned = String(val ?? "")
        .replace(/[$,%]/g, "")
        .replace(/,/g, "")
        .trim();
      if (!cleaned) return 0;
      const n = Number(cleaned);
      return Number.isNaN(n) ? 0 : n;
    }

    function normalizeDate(val) {
      const s = String(val ?? "").trim();
      if (!s) return "";
      const ymd = s.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})$/);
      if (ymd) return `${ymd[1]}-${String(ymd[2]).padStart(2, "0")}-${String(ymd[3]).padStart(2, "0")}`;
      const mdy = s.match(/^(\d{1,2})[-/.](\d{1,2})[-/.](\d{4})$/);
      if (mdy) return `${mdy[3]}-${String(mdy[1]).padStart(2, "0")}-${String(mdy[2]).padStart(2, "0")}`;
      return "";
    }

    function formatInt(n) {
      return Math.round(Number(n || 0)).toLocaleString();
    }

    function formatDecimal(n) {
      return Number(n || 0).toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatPercent(n) {
      return `${formatDecimal(n)}%`;
    }

    function buildSelectOptions(values, selectedValue, includeAll) {
      const selected = (selectedValue || "").toLowerCase();
      const all = includeAll ? '<option value="">전체</option>' : "";
      const items = values.map((v) => {
        const s = String(v);
        const isSelected = s.toLowerCase() === selected ? " selected" : "";
        return `<option value="${escapeAttr(s)}"${isSelected}>${escapeHtml(s)}</option>`;
      }).join("");
      return all + items;
    }

    function getDateRangeLabel(filterState, calendarState) {
      const from = filterState[DATE_FILTER_FROM] || "";
      const to = filterState[DATE_FILTER_TO] || "";
      if (calendarState?.datePickStart && from && !to) return `${from} ~ (종료일 선택)`;
      if (!from && !to) return "전체 기간";
      if (from && to) return from === to ? from : `${from} ~ ${to}`;
      if (from) return `${from} ~`;
      return `~ ${to}`;
    }

    function ensureCalendarMonth(calendarState) {
      if (calendarState.dateCalendarMonth) return;
      const dates = baseState.rows
        .map((row) => normalizeDate(row[COL.DATE]))
        .filter(Boolean)
        .sort();
      if (dates.length) {
        calendarState.dateCalendarMonth = dates[0].slice(0, 7);
        return;
      }
      const now = new Date();
      calendarState.dateCalendarMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
    }

    function getDayRangeClass(dateStr, filterState, calendarState) {
      const from = filterState[DATE_FILTER_FROM];
      const to = filterState[DATE_FILTER_TO];
      let cls = "date-day";
      if (from && to && dateStr >= from && dateStr <= to) {
        cls += " in-range";
        if (dateStr === from) cls += " range-start";
        if (dateStr === to) cls += " range-end";
      } else if (calendarState.datePickStart && from && !to && dateStr === from) {
        cls += " range-start range-end";
      }
      return cls;
    }

    function bindDateRangeWrap(prefix) {
      const trigger = document.getElementById(`${prefix}-trigger`);
      const wrap = trigger?.closest(".date-range-wrap");
      if (!trigger || !wrap || wrap.dataset.dateBound === "1") return;
      wrap.dataset.dateBound = "1";
      trigger.addEventListener("click", (e) => {
        e.stopPropagation();
        wrap.classList.add("open");
      });
    }

    function renderDateRangeCalendar(calendarState, filterState, prefix, onChange) {
      const wrap = document.getElementById(`${prefix}-calendar`);
      if (!wrap) return;

      const dateWrap = document.getElementById(`${prefix}-trigger`)?.closest(".date-range-wrap");
      if (calendarState.datePickStart && dateWrap) dateWrap.classList.add("open");

      const trigger = document.getElementById(`${prefix}-trigger`);
      if (trigger) trigger.textContent = getDateRangeLabel(filterState, calendarState);

      const hint = document.getElementById(`${prefix}-hint`);
      if (hint) {
        hint.textContent = calendarState.datePickStart ? "종료일을 선택하세요" : "시작일 → 종료일 순으로 선택";
      }

      ensureCalendarMonth(calendarState);
      if (!calendarState.dateCalendarMonth) return;

      const [year, month] = calendarState.dateCalendarMonth.split("-").map(Number);
      const firstDay = new Date(year, month - 1, 1).getDay();
      const daysInMonth = new Date(year, month, 0).getDate();
      const weekdays = ["일", "월", "화", "수", "목", "금", "토"];

      let daysHtml = "";
      for (let i = 0; i < firstDay; i++) daysHtml += '<span class="date-day empty"></span>';
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        const cls = getDayRangeClass(dateStr, filterState, calendarState);
        daysHtml += `<button type="button" class="${cls}" data-date="${dateStr}">${day}</button>`;
      }

      wrap.innerHTML = `
        <div class="date-range-nav">
          <button type="button" id="${prefix}-prev">◀</button>
          <span class="date-range-month">${year}년 ${month}월</span>
          <button type="button" id="${prefix}-next">▶</button>
        </div>
        <div class="date-range-weekdays">${weekdays.map((w) => `<span>${w}</span>`).join("")}</div>
        <div class="date-range-days">${daysHtml}</div>
        <div class="date-range-actions">
          <button type="button" class="btn btn-clear" id="${prefix}-clear">전체 기간</button>
        </div>`;

      document.getElementById(`${prefix}-prev`)?.addEventListener("click", (e) => {
        e.stopPropagation();
        const [y, m] = calendarState.dateCalendarMonth.split("-").map(Number);
        const d = new Date(y, m - 2, 1);
        calendarState.dateCalendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
        renderDateRangeCalendar(calendarState, filterState, prefix, onChange);
      });

      document.getElementById(`${prefix}-next`)?.addEventListener("click", (e) => {
        e.stopPropagation();
        const [y, m] = calendarState.dateCalendarMonth.split("-").map(Number);
        const d = new Date(y, m, 1);
        calendarState.dateCalendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
        renderDateRangeCalendar(calendarState, filterState, prefix, onChange);
      });

      document.getElementById(`${prefix}-clear`)?.addEventListener("click", (e) => {
        e.stopPropagation();
        filterState[DATE_FILTER_FROM] = "";
        filterState[DATE_FILTER_TO] = "";
        calendarState.datePickStart = null;
        if (dateWrap) dateWrap.classList.remove("open");
        renderDateRangeCalendar(calendarState, filterState, prefix, onChange);
        onChange();
      });

      wrap.querySelectorAll("button[data-date]").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const dateStr = btn.dataset.date;
          let completed = false;
          if (calendarState.datePickStart) {
            const start = calendarState.datePickStart;
            if (dateStr < start) {
              filterState[DATE_FILTER_FROM] = dateStr;
              filterState[DATE_FILTER_TO] = start;
            } else {
              filterState[DATE_FILTER_FROM] = start;
              filterState[DATE_FILTER_TO] = dateStr;
            }
            calendarState.datePickStart = null;
            completed = true;
            if (dateWrap) dateWrap.classList.remove("open");
          } else {
            calendarState.datePickStart = dateStr;
            filterState[DATE_FILTER_FROM] = dateStr;
            filterState[DATE_FILTER_TO] = "";
            if (dateWrap) dateWrap.classList.add("open");
          }
          renderDateRangeCalendar(calendarState, filterState, prefix, onChange);
          if (completed) onChange();
        });
      });
    }

    function filterByDateRange(rows, filterState, calendarState) {
      if (calendarState?.datePickStart) return rows;
      const from = filterState[DATE_FILTER_FROM] || "";
      const to = filterState[DATE_FILTER_TO] || "";
      if (!from && !to) return rows;
      return rows.filter((row) => {
        const d = normalizeDate(row[COL.DATE]);
        if (!d) return false;
        if (from && d < from) return false;
        if (to && d > to) return false;
        return true;
      });
    }

    function filterDemandGenByDateRange(rows, filterState, calendarState) {
      if (calendarState?.datePickStart) return rows;
      const from = filterState[DATE_FILTER_FROM] || "";
      const to = filterState[DATE_FILTER_TO] || "";
      if (!from && !to) return rows;
      return rows.filter((row) => {
        const d = normalizeDate(getDemandGenValue(row, "DATE"));
        if (!d) return false;
        if (from && d < from) return false;
        if (to && d > to) return false;
        return true;
      });
    }

    function normalizeKeywordText(keyword) {
      return String(keyword ?? "").toLowerCase().trim().replace(/\s+/g, " ");
    }

    function titleCaseToken(token) {
      if (!token) return "";
      return token.charAt(0).toUpperCase() + token.slice(1);
    }

    function formatKeywordGroupLabel(groupKey) {
      if (KEYWORD_COARSE_GROUP_LABELS[groupKey]) {
        return KEYWORD_COARSE_GROUP_LABELS[groupKey];
      }
      if (groupKey.startsWith("brand · ")) {
        const brand = groupKey.slice("brand · ".length);
        return brand.split(" ").map(titleCaseToken).join(" ");
      }
      if (groupKey.startsWith("category · ")) {
        const category = groupKey.slice("category · ".length);
        return `${category.split(" ").map(titleCaseToken).join(" ")} (일반)`;
      }
      return groupKey
        .split(" · ")
        .map((part) => part.split(" ").map(titleCaseToken).join(" "))
        .join(" · ");
    }

    function getKeywordGroupKey(keyword) {
      const normalized = normalizeKeywordText(keyword);
      if (!normalized) return "etc";

      if (isSkinfoodKeyword(normalized)) {
        return "skinfood";
      }

      const brand = detectBrandInKeyword(normalized);
      if (brand) {
        return `brand · ${brand}`;
      }

      for (const [phrase, category] of KEYWORD_COARSE_CATEGORY_RULES) {
        if (normalized.includes(phrase)) {
          return `category · ${category}`;
        }
      }

      return "etc";
    }

    function detectBrandInKeyword(normalized) {
      const sortedAliases = [...KEYWORD_BRAND_ALIASES].sort((a, b) => b[0].length - a[0].length);
      for (const [alias, brand] of sortedAliases) {
        if (normalized.includes(alias)) return brand;
      }

      const tokens = normalized.split(/\s+/).filter(Boolean);
      for (const token of tokens) {
        if (KNOWN_BRAND_TOKENS.has(token)) return token;
      }
      return "";
    }

    function buildKeywordGroups(keywords) {
      const map = new Map();

      keywords.forEach((keyword) => {
        const groupKey = getKeywordGroupKey(keyword);
        const id = groupKey.toLowerCase();
        if (!map.has(id)) {
          map.set(id, {
            id,
            label: formatKeywordGroupLabel(groupKey),
            keywords: new Set()
          });
        }
        map.get(id).keywords.add(keyword);
      });

      return [...map.values()].sort((a, b) => {
        const diff = b.keywords.size - a.keywords.size;
        return diff || a.label.localeCompare(b.label, "ko");
      });
    }

    function getKeywordGroupById(groupId) {
      return baseState.keywordGroups.find((group) => group.id === groupId) || null;
    }

    function getFilteredKeywordGroups() {
      const query = keywordState.groupSearch.trim().toLowerCase();
      if (!query) return baseState.keywordGroups;

      return baseState.keywordGroups.filter((group) => {
        if (group.label.toLowerCase().includes(query) || group.id.includes(query)) return true;
        return [...group.keywords].some((keyword) => keyword.toLowerCase().includes(query));
      });
    }

    function getKeywordOptions() {
      return [...new Set(baseState.rows.map((row) => String(row[COL.KEYWORD] || "").trim()).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "ko"));
    }

    function getPeriodSourceRows() {
      return filterByDateRange(baseState.rows, periodState.filters, periodState);
    }

    function getPeriodDemandGenRows() {
      return filterDemandGenByDateRange(baseState.demandGen.rows, periodState.filters, periodState);
    }

    function getKeywordSourceRows() {
      let rows = [...baseState.rows];
      const groupId = keywordState.filters[FILTER_KEYWORD_GROUP] || "";
      const group = getKeywordGroupById(groupId);
      if (group) {
        const keywordSet = new Set([...group.keywords].map((keyword) => keyword.toLowerCase()));
        rows = rows.filter((row) => keywordSet.has(String(row[COL.KEYWORD] || "").trim().toLowerCase()));
      }
      return filterByDateRange(rows, keywordState.filters, keywordState);
    }

    function getRawSourceRows() {
      const dataset = getRawDataset();
      let rows = [];

      if (dataset === RAW_DATASET_KEYWORD || dataset === RAW_DATASET_ALL) {
        let kwRows = [...baseState.rows];
        const keyword = rawState.filters[FILTER_KEYWORD] || "";
        if (keyword) {
          kwRows = kwRows.filter((row) => String(row[COL.KEYWORD] || "").toLowerCase() === keyword.toLowerCase());
        }
        rows = rows.concat(tagRawRows(filterByDateRange(kwRows, rawState.filters, rawState), RAW_DATASET_KEYWORD));
      }

      if (dataset === RAW_DATASET_DEMANDGEN || dataset === RAW_DATASET_ALL) {
        let dgRows = [...baseState.demandGen.rows];
        const adGroup = rawState.filters[FILTER_AD_GROUP] || "";
        if (adGroup) {
          dgRows = dgRows.filter((row) =>
            String(getDemandGenValue(row, "AD_GROUP") || "").toLowerCase() === adGroup.toLowerCase()
          );
        }
        rows = rows.concat(tagRawRows(filterDemandGenByDateRange(dgRows, rawState.filters, rawState), RAW_DATASET_DEMANDGEN));
      }

      return rows;
    }

    function getDemandGenAdGroupOptions() {
      return [...new Set(
        baseState.demandGen.rows
          .map((row) => String(getDemandGenValue(row, "AD_GROUP") || "").trim())
          .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b, "ko"));
    }

    function getDemandGenSourceRows() {
      let rows = [...baseState.demandGen.rows];
      const adGroup = demandGenState.filters[FILTER_AD_GROUP] || "";
      if (adGroup) {
        rows = rows.filter((row) =>
          String(getDemandGenValue(row, "AD_GROUP") || "").toLowerCase() === adGroup.toLowerCase()
        );
      }
      return filterDemandGenByDateRange(rows, demandGenState.filters, demandGenState);
    }

    async function loadGoogleData() {

          `파일: <strong>${escapeHtml(baseState.demandGen.sourceFile || "-")}</strong>`,
          `범위: <strong>${escapeHtml(baseState.demandGen.reportRange || "-")}</strong>`,
          `전체 <strong>${baseState.demandGen.rows.length.toLocaleString()}</strong>행`
        ].join(" · ");
      }
      refreshGoogleKpiSummary();
    }

    function ensureKeywordGroupSelected() {
      const groups = getFilteredKeywordGroups();
      if (!groups.length) {
        keywordState.filters[FILTER_KEYWORD_GROUP] = "";
        return;
      }

      const current = keywordState.filters[FILTER_KEYWORD_GROUP] || "";
      if (current === KEYWORD_GROUP_ALL) return;
      if (!current || !groups.some((group) => group.id === current)) {
        keywordState.filters[FILTER_KEYWORD_GROUP] = groups[0].id;
      }
    }

    function buildKeywordGroupOptions(groups, selectedId) {
      if (!groups.length) {
        return '<option value="">검색어 분류 없음</option>';
      }

      const allSelected = selectedId === KEYWORD_GROUP_ALL ? " selected" : "";
      const allOption = `<option value="${KEYWORD_GROUP_ALL}"${allSelected}>전체</option>`;

      const rest = groups.map((group) => {
        const count = group.keywords.size;
        const selected = group.id === selectedId ? " selected" : "";
        const label = `${group.label} (${count})`;
        return `<option value="${escapeAttr(group.id)}"${selected}>${escapeHtml(label)}</option>`;
      }).join("");

      return allOption + rest;
    }

    function renderPeriodFilters() {
      periodFilters.innerHTML = `
        <div class="filter-item filter-item-date">

          <div class="date-range-wrap">

            <div class="date-range-popover">

    function trackMetricAverage(bucket, sumKey, countKey, rawVal) {
      const s = String(rawVal ?? "").trim();
      if (!s) return;
      bucket[sumKey] += parseNum(s);
      bucket[countKey] += 1;
    }

    function createMetricBucket(extra = {}) {
      return {
        clicks: 0,
        impressions: 0,
        cost: 0,
        ctrSum: 0,
        ctrCount: 0,
        cpcSum: 0,
        cpcCount: 0,
        ...extra
      };
    }

    function accumulateRowMetrics(bucket, row) {
      bucket.clicks += parseNum(row[COL.CLICKS]);
      bucket.impressions += parseNum(row[COL.IMPRESSIONS]);
      bucket.cost += parseNum(row[COL.COST]);
      trackMetricAverage(bucket, "ctrSum", "ctrCount", row[COL.CTR]);
      trackMetricAverage(bucket, "cpcSum", "cpcCount", row[COL.CPC]);
    }

    function accumulateDemandGenRowMetrics(bucket, row) {
      bucket.clicks += parseNum(getDemandGenValue(row, "CLICKS"));
      bucket.impressions += parseNum(getDemandGenValue(row, "IMPRESSIONS"));
      bucket.cost += parseNum(getDemandGenValue(row, "COST"));
      trackMetricAverage(bucket, "ctrSum", "ctrCount", getDemandGenValue(row, "CTR"));
      trackMetricAverage(bucket, "cpcSum", "cpcCount", getDemandGenValue(row, "CPC"));
    }

    function buildDemandGenMatchTypeBucket(rows) {
      const bucket = createMetricBucket({
        matchType: DEMAND_GEN_MATCH_TYPE_LABEL,
        isDemandGen: true
      });
      rows.forEach((row) => accumulateDemandGenRowMetrics(bucket, row));
      return bucket;
    }

    function getMetricAverages(item) {
      return {
        ctr: item.ctrCount ? item.ctrSum / item.ctrCount : 0,
        cpc: item.cpcCount ? item.cpcSum / item.cpcCount : 0
      };
    }

    const PHRASE_COMPETITOR_TOKENS = new Set([
      "medicube", "weleda", "anua", "abib", "innisfree", "biodance", "mediheal", "goodal",
      "mixsoon", "cosrx", "laneige", "torriden", "numbuzin", "skin1004", "romand", "peripera",
      "tirtir", "haruharu", "isntree", "beplain", "purito", "klairs", "neogen", "etude", "missha",
      "sulwhasoo", "hanyul", "the face shop", "face shop"
    ]);

    function parseCtrVal(raw, clicks, imp) {
      const s = String(raw ?? "").trim();
      if (!s && imp > 0) return clicks / imp;
      const v = parseNum(s);
      if (s.includes("%") || v > 1) return v / 100;
      return v;
    }

    function aggregateKeywordItems(rows) {
      const map = new Map();
      for (const row of rows) {
        const keyword = String(row[COL.KEYWORD] ?? "").trim();
        if (!keyword) continue;
        const key = keyword.toLowerCase();
        if (!map.has(key)) {
          map.set(key, createMetricBucket({ keyword, keywordLower: key }));
        }
        const item = map.get(key);
        const clicks = parseNum(row[COL.CLICKS]);
        const imp = parseNum(row[COL.IMPRESSIONS]);
        item.clicks += clicks;
        item.impressions += imp;
        item.cost += parseNum(row[COL.COST]);
        const ctr = parseCtrVal(row[COL.CTR], clicks, imp);
        const cpc = parseNum(row[COL.CPC]);
        if (ctr || row[COL.CTR]) {
          item.ctrSum += ctr;
          item.ctrCount += 1;
        }
        if (cpc) {
          item.cpcSum += cpc;
          item.cpcCount += 1;
        }
      }
      return [...map.values()].map((item) => {
        const avg = getMetricAverages(item);
        const ctr = item.ctrCount ? avg.ctr : (item.impressions ? item.clicks / item.impressions : 0);
        const cpc = item.cpcCount ? avg.cpc : (item.clicks ? item.cost / item.clicks : 0);
        return { ...item, ctr, cpc };
      });
    }

    function isSkinfoodKeyword(keywordLower) {
      return /\bskinfood\b/.test(keywordLower) || /\bskin food\b/.test(keywordLower);
    }

    function isCompetitorKeyword(keywordLower) {
      if (isSkinfoodKeyword(keywordLower)) return false;
      for (const token of PHRASE_COMPETITOR_TOKENS) {
        if (keywordLower.includes(token)) return true;
      }
      return false;
    }

    function isCategoryKeyword(keywordLower) {
      return /toner pad|cleansing pad|exfoliating pad|korean skincare|rice cream|sunscreen|dark spot|concealer|carrot pad|glycolic|salicylic/.test(keywordLower);
    }

    function formatPct(rate) {
      return `${(rate * 100).toFixed(1)}%`;
    }

    function formatUsd(amount) {
      return `$${Number(amount || 0).toFixed(2)}`;
    }

    const GOOGLE_KPI_COL = {
      IMPRESSIONS: "노출수",
      CLICKS: "클릭수",
      COST: "비용"
    };

    function getGoogleKpiValue(row, fieldKey) {
      const col = COL[fieldKey] || GOOGLE_KPI_COL[fieldKey];
      if (!col) return "";
      if (Object.prototype.hasOwnProperty.call(row, col)) return row[col];
      const target = String(col).trim().toLowerCase();
      for (const key of Object.keys(row)) {
        if (String(key).trim().toLowerCase() === target) return row[key];
      }
      return "";
    }

    function filterGoogleRowsForKpi(rows, dateFrom, dateTo) {
      if (!dateFrom && !dateTo) return rows;
      return rows.filter((row) => {
        const d = normalizeDate(row[COL.DATE]);
        if (!d) return false;
        if (dateFrom && d < dateFrom) return false;
        if (dateTo && d > dateTo) return false;
        return true;
      });
    }

    function filterDemandGenRowsForKpi(rows, dateFrom, dateTo) {
      if (!dateFrom && !dateTo) return rows;
      return rows.filter((row) => {
        const d = normalizeDate(getDemandGenValue(row, "DATE"));
        if (!d) return false;
        if (dateFrom && d < dateFrom) return false;
        if (dateTo && d > dateTo) return false;
        return true;
      });
    }

    function aggregateGoogleKpi(rows) {
      let impressions = 0;
      let clicks = 0;
      let cost = 0;

      rows.forEach((row) => {
        impressions += parseNum(getGoogleKpiValue(row, "IMPRESSIONS"));
        clicks += parseNum(getGoogleKpiValue(row, "CLICKS"));
        cost += parseNum(getGoogleKpiValue(row, "COST"));
      });

      return {
        cpm: impressions ? (cost / impressions) * 1000 : 0,
        impr: impressions,
        clicks,
        ctr: impressions ? clicks / impressions : 0,
        cpc: clicks ? cost / clicks : 0,
        cost
      };
    }

    function aggregateDemandGenKpi(rows) {
      let impressions = 0;
      let clicks = 0;
      let cost = 0;

      rows.forEach((row) => {
        impressions += parseNum(getDemandGenValue(row, "IMPRESSIONS"));
        clicks += parseNum(getDemandGenValue(row, "CLICKS"));
        cost += parseNum(getDemandGenValue(row, "COST"));
      });

      return {
        cpm: impressions ? (cost / impressions) * 1000 : 0,
        impr: impressions,
        clicks,
        ctr: impressions ? clicks / impressions : 0,
        cpc: clicks ? cost / clicks : 0,
        cost
      };
    }

    function mergeGoogleKpiMetrics(keywordMetrics, demandGenMetrics) {
      const impr = (keywordMetrics.impr || 0) + (demandGenMetrics.impr || 0);
      const clicks = (keywordMetrics.clicks || 0) + (demandGenMetrics.clicks || 0);
      const cost = (keywordMetrics.cost || 0) + (demandGenMetrics.cost || 0);
      return {
        cpm: impr ? (cost / impr) * 1000 : 0,
        impr,
        clicks,
        ctr: impr ? clicks / impr : 0,
        cpc: clicks ? cost / clicks : 0,
        cost
      };
    }

    function formatGoogleKpiDisplay(raw) {
      const blank = "";
      return {
        cpm: formatUsd(raw.cpm),
        impr: formatInt(raw.impr),
        clicks: formatInt(raw.clicks),
        ctr: formatPct(raw.ctr),
        cpc: formatUsd(raw.cpc),
        cost: formatUsd(raw.cost),
        cvs: blank,
        cvr: blank,
        cvsValues: blank,
        roas: blank,
        acos: blank,
        tacos: blank,
        cpa: blank,
        aov: blank
      };
    }

    function refreshGoogleKpiSummary() {
      if (!window.KpiSummary) return;
      const hasKeywordRows = Boolean(baseState.rows?.length);
      const hasDemandGenRows = Boolean(baseState.demandGen?.rows?.length);
      if (!hasKeywordRows && !hasDemandGenRows) {
        window.KpiSummary.clearValues();
        return;
      }

      window.KpiSummary.syncSourceFiles({
        sourceFile: baseState.sourceFile,
        sourceFiles: baseState.sourceFiles,
        reportRange: baseState.reportRange
      });

      const { start, end } = window.KpiSummary.getDateRange();
      const keywordFiltered = filterGoogleRowsForKpi(baseState.rows || [], start, end);
      const demandGenFiltered = filterDemandGenRowsForKpi(baseState.demandGen?.rows || [], start, end);
      const metrics = mergeGoogleKpiMetrics(
        aggregateGoogleKpi(keywordFiltered),
        aggregateDemandGenKpi(demandGenFiltered)
      );
      window.KpiSummary.setValues(formatGoogleKpiDisplay(metrics));
    }

    function mdKw(keyword) {
      return `**${String(keyword ?? "").replace(/\*\*/g, "")}**`;
    }

    function kwCell(keyword) {
      return `**${String(keyword ?? "").replace(/\*\*/g, "").replace(/\|/g, "/")}**`;
    }

    function mdInline(text) {
      return escapeHtml(String(text ?? ""))
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/`([^`]+)`/g, "<code>$1</code>");
    }

    function renderMarkdown(source) {
      const lines = String(source ?? "").replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let listType = "";
      let tableRows = [];
      let sectionOpen = false;

      function closeSection() {
        if (sectionOpen) {
          html.push("</div></section>");
          sectionOpen = false;
        }
      }

      function openSection(titleHtml) {
        html.push('<section class="md-section">');
        html.push(`<button type="button" class="md-section-toggle" aria-expanded="false"><span class="md-section-title">${titleHtml}</span><span class="md-section-chevron">▼</span></button>`);
        html.push('<div class="md-section-body">');
        sectionOpen = true;
      }

      function closeList() {
        if (listType) {
          html.push(listType === "ul" ? "</ul>" : "</ol>");
          listType = "";
        }
      }

      function flushTable() {
        if (!tableRows.length) return;
        const [header, ...bodyRows] = tableRows;
        html.push("<table><thead><tr>");
        header.forEach((cell) => html.push(`<th>${mdInline(cell.trim())}</th>`));
        html.push("</tr></thead><tbody>");
        bodyRows.forEach((row) => {
          html.push("<tr>");
          row.forEach((cell) => html.push(`<td>${mdInline(cell.trim())}</td>`));
          html.push("</tr>");
        });
        html.push("</tbody></table>");
        tableRows = [];
      }

      for (const rawLine of lines) {
        const line = rawLine.trimEnd();
        const trimmed = line.trim();

        if (!trimmed) {
          closeList();
          flushTable();
          continue;
        }

        if (/^\|.+\|$/.test(trimmed)) {
          closeList();
          if (/^\|[\s\-:|]+\|$/.test(trimmed)) continue;
          const cells = trimmed.slice(1, -1).split("|").map((cell) => cell.trim());
          tableRows.push(cells);
          continue;
        }

        flushTable();

        if (trimmed.startsWith("### ")) {
          closeList();
          html.push(`<h3>${mdInline(trimmed.slice(4))}</h3>`);
          continue;
        }
        if (trimmed.startsWith("## ")) {
          closeList();
          closeSection();
          openSection(mdInline(trimmed.slice(3)));
          continue;
        }
        if (trimmed.startsWith("# ")) {
          closeList();
          closeSection();
          openSection(mdInline(trimmed.slice(2)));
          continue;
        }
        if (trimmed.startsWith("> ")) {
          closeList();
          html.push(`<blockquote><p>${mdInline(trimmed.slice(2))}</p></blockquote>`);
          continue;
        }
        if (trimmed === "---" || trimmed === "***") {
          closeList();
          closeSection();
          continue;
        }
        if (/^[-*]\s+/.test(trimmed)) {
          if (listType !== "ul") {
            closeList();
            html.push("<ul>");
            listType = "ul";
          }
          html.push(`<li>${mdInline(trimmed.replace(/^[-*]\s+/, ""))}</li>`);
          continue;
        }
        if (/^\d+\.\s+/.test(trimmed)) {
          if (listType !== "ol") {
            closeList();
            html.push("<ol>");
            listType = "ol";
          }
          html.push(`<li>${mdInline(trimmed.replace(/^\d+\.\s+/, ""))}</li>`);
          continue;
        }

        closeList();
        html.push(`<p>${mdInline(trimmed)}</p>`);
      }

      closeList();
      flushTable();
      closeSection();
      return html.join("");
    }

    function setPhraseCardContent(el, result) {

    function buildPhraseCard1Report(rows) {

      const highCtr = items
        .filter((i) => i.impressions >= 50)
        .sort((a, b) => b.ctr - a.ctr || b.clicks - a.clicks)

        .filter((i) => i.impressions >= 80)
        .sort((a, b) => a.ctr - b.ctr || b.impressions - a.impressions)
        .slice(0, 4);

      const highCpc = items
        .filter((i) => i.clicks >= 3)
        .sort((a, b) => b.cpc - a.cpc || b.clicks - a.clicks)
        .slice(0, 4);

        .filter((i) => i.impressions >= 80 && i.ctr < 0.08)

        .slice(0, 3);

      const highClickIneff = items
        .filter((i) => i.clicks >= 10 && (i.cpc >= 0.65 || i.ctr < 0.1))
        .sort((a, b) => b.cost - a.cost || a.ctr - b.ctr)
        .slice(0, 3);

      const watchList = items
        .sort((a, b) => b.impressions - a.impressions || b.clicks - a.clicks)
        .slice(0, 3);

      const brandItems = items.filter((i) => isSkinfoodKeyword(i.keywordLower));
      const compItems = items.filter((i) => isCompetitorKeyword(i.keywordLower));
      const catItems = items.filter((i) => isCategoryKeyword(i.keywordLower) && !isSkinfoodKeyword(i.keywordLower));
      const brandImp = brandItems.reduce((s, i) => s + i.impressions, 0);
      const compImp = compItems.reduce((s, i) => s + i.impressions, 0);
      const catImp = catItems.reduce((s, i) => s + i.impressions, 0);
      const brandShare = totalImp ? brandImp / totalImp : 0;

      const rangeLabel = baseState.reportRange || "전체 기간";
      const lines = [
        "## 개요",
        `${rangeLabel} RAW 기준 검색어 **${items.length.toLocaleString()}개** · 노출 **${formatInt(totalImp)}** · 클릭 **${formatInt(totalClicks)}**(CTR ${formatPct(overallCtr)}) · 지출 **${formatUsd(totalCost)}**`,
        ""
      ];

      // 개요 하이라이트 문장 (1~2줄)
      if (highCtr.length) {
        const best = highCtr[0];
        lines.push(
          `전체 노출의 약 **${formatPct(brandShare)}**가 Skinfood 브랜드·제품 검색어에 집중되어 있으며, 그중 ${mdKw(best.keyword)}가 CTR ${formatPct(best.ctr)}(노출 ${formatInt(best.impressions)}·클릭 ${formatInt(best.clicks)})로 가장 반응이 좋습니다.`
        );
      }
      const weakSample = (lowCtr[0] || highImpLowClick[0]);
      if (weakSample) {
        lines.push(
          `반면 ${mdKw(weakSample.keyword)}(노출 ${formatInt(weakSample.impressions)}·CTR ${formatPct(weakSample.ctr)}) 등 경쟁·일반 카테고리 검색어는 노출 대비 클릭 전환이 약해 입찰·문구·네거티브 키워드 점검이 필요합니다.`
        );
      }

      const kwTableHeader = ["| 검색어 | 노출 | CTR | CPC |", "| --- | --- | --- | --- |"];
      const kwTableRow = (i) => `| ${kwCell(i.keyword)} | ${formatInt(i.impressions)} | ${formatPct(i.ctr)} | ${formatUsd(i.cpc)} |`;

      // CTR 분석
      lines.push("", "## CTR 분석");
      if (highCtr.length) {
        lines.push("**상위 (브랜드·SKU 중심)**", ...kwTableHeader);
        highCtr.forEach((i) => lines.push(kwTableRow(i)));
      }
      if (lowCtr.length) {
        lines.push("", "**하위 (경쟁·일반 카테고리)**", ...kwTableHeader);
        lowCtr.forEach((i) => lines.push(kwTableRow(i)));
      }
      if (!highCtr.length && !lowCtr.length) {
        lines.push("- CTR을 판단할 노출 데이터가 부족합니다.");
      }

      // CPC 분석
      lines.push("", "## CPC 분석");
      if (highCpc.length) {
        lines.push("**상위 (입찰 경쟁 발생)**", ...kwTableHeader);
        highCpc.forEach((i) => lines.push(kwTableRow(i)));
      } else {
        lines.push("- CPC를 판단할 클릭 데이터가 부족합니다.");

      // 효율 점검
      if (highImpLowClick.length || highClickIneff.length) {
        lines.push("", "## 효율 점검");
        if (highImpLowClick.length) {

          highImpLowClick.forEach((i) => lines.push(kwTableRow(i)));
        }

          highClickIneff.forEach((i) => lines.push(kwTableRow(i)));

      }

      lines.push(

        `4. **경쟁 브랜드 교차 검색** — medicube · weleda 등 (약 ${formatPct(totalImp ? compImp / totalImp : 0)})`,
        "",
        "> 브랜드·SKU는 유지·확장, 경쟁·일반어는 입찰·광고 문구·네거티브 키워드 분리 검토가 필요합니다."
      );

      return { markdown: lines.join("\n") };
    }

    function inferSkinfoodProduct(keywordLower) {
      for (const [phrase] of SKINFOOD_PRODUCT_LINES) {
        if (keywordLower.includes(phrase)) return phrase;
      }
      return "";
    }

    function keywordTokenSet(keywordLower) {
      return new Set(String(keywordLower ?? "").split(/\s+/).filter(Boolean));
    }

    function countSimilarKeywords(keywordLower, items) {
      const tokens = keywordTokenSet(keywordLower);
      if (!tokens.size) return 0;
      return items.filter((item) => {
        if (item.keywordLower === keywordLower) return false;
        const other = keywordTokenSet(item.keywordLower);
        let overlap = 0;
        for (const token of tokens) {
          if (other.has(token)) overlap += 1;
        }
        const brandLinked = (tokens.has("skinfood") || tokens.has("skin")) &&
          (other.has("skinfood") || other.has("skin") || other.has("food"));
        return overlap >= 2 || (overlap >= 1 && brandLinked);
      }).length;
    }

    function inferSearchIntentLabel(keywordLower) {
      if (/\b(amazon|buy|shop|price|coupon|order)\b/.test(keywordLower)) return "Transactional";
      if (isSkinfoodKeyword(keywordLower)) {
        return inferSkinfoodProduct(keywordLower) ? "Brand + Product" : "Brand / Navigation";
      }
      if (isCategoryKeyword(keywordLower)) return "Category / Comparison";
      if (isCompetitorKeyword(keywordLower)) return "Competitor overlap";
      return "General discovery";
    }

    const PHRASE_NEGATIVE_INTENT_PATTERNS = [
      { regex: /\b(diy|do it yourself)\b/i, label: "DIY 검색 패턴" },
      { regex: /\b(recipe|recipes)\b/i, label: "Recipe 검색 패턴" },
      { regex: /\b(cheap|cheapest|affordable|budget|low cost)\b/i, label: "Cheap 검색 패턴" },
      { regex: /\b(free|giveaway|free sample)\b/i, label: "Free 검색 패턴" },
      { regex: /\b(job|jobs|hiring|career|salary|resume|internship|employment)\b/i, label: "Job/Salary 검색 패턴" },
      { regex: /\b(how to|what is|what are|meaning|definition|wiki|wikipedia|tutorial|homemade|ingredients)\b/i, label: "정보 탐색 의도" },
      { regex: /\b(near me|store hours|headquarters|ceo|stock price|investor|complaint|lawsuit|scam|side effects)\b/i, label: "구매 외 정보 탐색" }
    ];

    function detectNegativeIntentPatterns(keywordLower) {
      return PHRASE_NEGATIVE_INTENT_PATTERNS.filter((entry) => entry.regex.test(keywordLower));
    }

    function isVeryLowCtrItem(item) {
      if (item.impressions >= 30 && item.ctr < 0.03) return true;
      if (item.impressions >= 15 && item.ctr < 0.02 && item.cost > 0) return true;
      if (item.impressions >= 50 && item.ctr < 0.05) return true;
      return false;
    }

    function isCostBurnItem(item) {
      if (item.cost <= 0) return false;
      if (item.clicks === 0 && item.impressions >= 5) return true;
      if (item.cost >= 0.5 && item.ctr < 0.05) return true;
      if (item.cpc >= 1 && item.ctr < 0.08) return true;
      return false;
    }

    function isNonPurchaseIntentKeyword(keywordLower) {
      if (detectNegativeIntentPatterns(keywordLower).length) return true;
      if (isCompetitorKeyword(keywordLower) && !isSkinfoodKeyword(keywordLower)) return true;
      if (/\bweleda\b/.test(keywordLower) && /\bskin food\b/.test(keywordLower)) return true;
      if (/\b(medicube|anua|abib|innisfree|cosrx|laneige)\b/.test(keywordLower) && !isSkinfoodKeyword(keywordLower)) {
        return true;
      }
      return false;
    }

    const GoogleExclusionStore = (function () {
      const KEY = "google:excludedKeywords";
      let memory = null;
      const load = () => {
        if (memory) return memory;
        try { memory = JSON.parse(localStorage.getItem(KEY)) || {}; }
        catch (e) { memory = {}; }
        return memory;
      };
      const persist = () => {
        try { localStorage.setItem(KEY, JSON.stringify(memory)); }
        catch (e) { /* file:// 등에서 저장이 막혀도 현재 세션에서는 유지 */ }
      };
      return {
        has(keyword) { return Boolean(load()[String(keyword ?? "").toLowerCase()]); },
        add(keyword) {
          const k = String(keyword ?? "").toLowerCase();
          if (!k) return;
          const all = load();
          all[k] = true;
          persist();
        },
        clear() { memory = {}; persist(); },
        hasAny() { return Object.keys(load()).length > 0; }
      };
    })();

    let exclusionRestoreDismissed = false;

    function buildPhraseCard4Exclusions(rows) {
      const items = aggregateKeywordItems(rows);
      if (!items.length) {
        return { html: '<p class="phrase-empty">분석할 검색어 데이터가 없습니다.</p>' };
      }

      const candidates = [];

      for (const item of items) {
        const patterns = detectNegativeIntentPatterns(item.keywordLower);
        const lowCtr = isVeryLowCtrItem(item);
        const costBurn = isCostBurnItem(item);
        const nonPurchase = isNonPurchaseIntentKeyword(item.keywordLower);

        if (isSkinfoodKeyword(item.keywordLower) && item.ctr >= 0.08 && !patterns.length) continue;
        if (!patterns.length && !lowCtr && !costBurn && !nonPurchase) continue;

        const reasonLines = [];
        let score = 0;

        if (patterns.length) {
          reasonLines.push(patterns.map((p) => p.label).join(", "));
          score += patterns.length * 45;
        }
        if (lowCtr) {
          reasonLines.push(`CTR ${formatPct(item.ctr)}로 매우 낮음 (노출 ${formatInt(item.impressions)})`);
          score += 35;
        }
        if (costBurn) {
          reasonLines.push(`비용 ${formatUsd(item.cost)}·클릭 ${formatInt(item.clicks)}으로 비용만 소진`);
          score += item.cost * 15 + (item.clicks === 0 ? 20 : 0);
        }
        if (nonPurchase) {
          if (isCompetitorKeyword(item.keywordLower) && !isSkinfoodKeyword(item.keywordLower)) {
            reasonLines.push("경쟁 브랜드 검색으로 구매 의도 불일치");
            score += 28;
          } else if (!patterns.length) {
            reasonLines.push("제품 구매와 맞지 않는 검색 의도");
            score += 18;
          }
        }

        const uniqueLines = [...new Set(reasonLines)];
        if (!uniqueLines.length) continue;
        if (score < 15 && !patterns.length) continue;

        candidates.push({
          keyword: item.keyword,
          reasonLines: uniqueLines,
          savings: item.cost,
          score
        });
      }

      const baseRanked = candidates
        .sort((a, b) => b.score - a.score || b.savings - a.savings || a.keyword.localeCompare(b.keyword))
        .slice(0, 25);
      const ranked = baseRanked.filter((c) => !GoogleExclusionStore.has(c.keyword));

      const restoreBar = (GoogleExclusionStore.hasAny() && !exclusionRestoreDismissed)
        ? '<div class="grec-restorebar"><span>직접 삭제한 제외 추천이 있습니다.</span><div class="grec-restorebar-actions"><button type="button" class="grec-restore" data-grec-restore="1">기본값 복원</button><button type="button" class="grec-restore-close" data-grec-restore-close="1" aria-label="알림 닫기" title="알림 닫기">&times;</button></div></div>'
        : "";

      if (!ranked.length) {
        return { html: restoreBar + '<p class="phrase-empty">제외 추천 대상 검색어가 없습니다.</p>' };
      }

      const totalSavings = ranked.reduce((sum, item) => sum + item.savings, 0);
      const html = [
        restoreBar,
        `<div class="grec-head">${ranked.length}건 · 예상 절감 ${formatUsd(totalSavings)}</div>`,
        '<ol class="grec-list">'
      ];
      ranked.forEach((item) => {
        const reasonHtml = item.reasonLines.map((l) => `<div class="grec-reason-line">${escapeHtml(l)}</div>`).join("");
        const effectHtml = `<div class="grec-reason-line grec-effect">기대효과: 예상 절감 ${escapeHtml(formatUsd(item.savings))}</div>`;
        html.push(
          '<li class="grec-item has-del">',
          `<button type="button" class="grec-del" data-grec-dismiss="${escapeAttr(item.keyword)}" aria-label="삭제" title="삭제">&times;</button>`,
          `<div class="grec-keyword"><code>${escapeHtml(item.keyword)}</code></div>`,
          '<div class="grec-block"><span class="grec-key">이유</span>',
          `<div class="grec-reason">${reasonHtml}${effectHtml}</div>`,
          '</div>',
          '</li>'
        );
      });
      html.push('</ol>');

      return { html: html.join("") };
    }

    function refreshPhraseCard3() {
      const el = document.getElementById("phrase-card-3-body");
      if (!el) return;
      if (!baseState.rows.length) {
        setPhraseCardContent(el, { markdown: "데이터를 불러온 후 표시됩니다." });
        return;
      }
      try {
        setPhraseCardContent(el, buildPhraseCard4Exclusions(baseState.rows));
      } catch (error) {
        setPhraseCardContent(el, { markdown: "제외 추천 생성 중 오류가 발생했습니다." });
        console.error(error);
      }
    }

    (function initPhraseExclusionActions() {
      document.addEventListener("click", (e) => {
        const target = e.target;
        if (!target || !target.closest) return;
        const delBtn = target.closest("[data-grec-dismiss]");
        if (delBtn) {
          GoogleExclusionStore.add(delBtn.getAttribute("data-grec-dismiss"));
          exclusionRestoreDismissed = false;
          refreshPhraseCard3();
          return;
        }
        const restoreCloseBtn = target.closest("[data-grec-restore-close]");
        if (restoreCloseBtn) {
          exclusionRestoreDismissed = true;
          refreshPhraseCard3();
          return;
        }
        const restoreBtn = target.closest("[data-grec-restore]");
        if (restoreBtn) {
          GoogleExclusionStore.clear();
          exclusionRestoreDismissed = false;
          refreshPhraseCard3();
        }
      });
    })();

    function buildPhraseCardDemandGenReport(rows) {
      if (!rows.length) {
        return { markdown: "디맨드젠 데이터가 없습니다." };
      }

      const activeRows = rows.filter((row) => {
        const impressions = parseNum(getDemandGenValue(row, "IMPRESSIONS"));
        const cost = parseNum(getDemandGenValue(row, "COST"));
        return impressions > 0 || cost > 0;
      });

      if (!activeRows.length) {
        return { markdown: "분석할 디맨드젠 성과 데이터가 없습니다." };
      }

      const totalImp = activeRows.reduce((sum, row) => sum + parseNum(getDemandGenValue(row, "IMPRESSIONS")), 0);
      const totalClicks = activeRows.reduce((sum, row) => sum + parseNum(getDemandGenValue(row, "CLICKS")), 0);
      const totalCost = activeRows.reduce((sum, row) => sum + parseNum(getDemandGenValue(row, "COST")), 0);
      const overallCtr = totalImp ? totalClicks / totalImp : 0;
      const overallCpc = totalClicks ? totalCost / totalClicks : 0;

      const adGroupMap = new Map();
      activeRows.forEach((row) => {
        const adGroup = String(getDemandGenValue(row, "AD_GROUP") || "").trim() || "(미지정)";
        if (!adGroupMap.has(adGroup)) {
          adGroupMap.set(adGroup, { adGroup, impressions: 0, clicks: 0, cost: 0 });
        }
        const item = adGroupMap.get(adGroup);
        item.impressions += parseNum(getDemandGenValue(row, "IMPRESSIONS"));
        item.clicks += parseNum(getDemandGenValue(row, "CLICKS"));
        item.cost += parseNum(getDemandGenValue(row, "COST"));
      });

      const adGroups = [...adGroupMap.values()].map((item) => ({
        ...item,
        ctr: item.impressions ? item.clicks / item.impressions : 0,
        cpc: item.clicks ? item.cost / item.clicks : 0
      }));

      const topByCtr = [...adGroups]
        .filter((item) => item.impressions >= 1000)
        .sort((a, b) => b.ctr - a.ctr || b.clicks - a.clicks)
        .slice(0, 3);
      const topByCost = [...adGroups].sort((a, b) => b.cost - a.cost || b.impressions - a.impressions).slice(0, 3);

      const rangeLabel = baseState.demandGen.reportRange || "전체 기간";
      const lines = [
        "## 개요",
        `${rangeLabel} 디맨드젠 RAW 기준 일별 **${activeRows.length.toLocaleString()}행** · 노출 **${formatInt(totalImp)}** · 클릭 **${formatInt(totalClicks)}**(CTR ${formatPct(overallCtr)}) · 지출 **${formatUsd(totalCost)}** · 평균 CPC **${formatUsd(overallCpc)}**`,
        ""
      ];

      if (topByCost.length) {
        const leader = topByCost[0];
        lines.push(
          `주요 광고그룹 **${leader.adGroup}**에 지출이 가장 많이 집중되어 있습니다(지출 ${formatUsd(leader.cost)} · CTR ${formatPct(leader.ctr)}). 디맨드젠은 크리에이티브·오디언스 조합과 예산 배분 최적화가 핵심입니다.`
        );
      }

      if (topByCtr.length) {
        lines.push("", "## 광고그룹별 CTR 상위");
        lines.push("| 광고그룹 | 노출 | 클릭 | CTR | CPC |", "| --- | --- | --- | --- | --- |");
        topByCtr.forEach((item) => {
          lines.push(`| ${item.adGroup} | ${formatInt(item.impressions)} | ${formatInt(item.clicks)} | ${formatPct(item.ctr)} | ${formatUsd(item.cpc)} |`);
        });
      }

      if (topByCost.length) {
        lines.push("", "## 광고그룹별 지출 상위");
        lines.push("| 광고그룹 | 지출 | 노출 | 클릭 | CTR |", "| --- | --- | --- | --- | --- |");
        topByCost.forEach((item) => {
          lines.push(`| ${item.adGroup} | ${formatUsd(item.cost)} | ${formatInt(item.impressions)} | ${formatInt(item.clicks)} | ${formatPct(item.ctr)} |`);
        });
      }

      return { markdown: lines.join("\n") };
    }

    function buildPhraseCard2And3Combined(rows) {
      const items = aggregateKeywordItems(rows);
      if (!items.length) {
        return { html: '<p class="phrase-empty">추천할 검색어를 생성할 데이터가 부족합니다.</p>' };
      }

      const TARGET_COUNT = 30;
      const existing = new Set(items.map((i) => i.keywordLower));
      const candidates = [];
      const seen = new Set();

      function add(keyword, reasonLines, effect, matchType, score) {
        const text = String(keyword ?? "").trim();
        const key = text.toLowerCase();
        if (!text || seen.has(key)) return;
        seen.add(key);
        candidates.push({
          keyword: text,
          reasonLines: (reasonLines || []).filter(Boolean),
          effect: effect || "",
          matchType: matchType || "",
          score
        });
      }
      // 신규 검색어(현재 RAW에 없는 키워드)만 추가
      function addNew(keyword, reasonLines, effect, matchType, score) {
        const key = String(keyword ?? "").trim().toLowerCase();
        if (!key || existing.has(key)) return;
        add(keyword, reasonLines, effect, matchType, score);
      }

      const topCtr = items
        .filter((i) => i.impressions >= 10)
        .sort((a, b) => b.ctr - a.ctr || b.clicks - a.clicks);
      const topClicks = items
        .filter((i) => i.clicks >= 2)
        .sort((a, b) => b.clicks - a.clicks || b.ctr - a.ctr);

        .filter((i) => isSkinfoodKeyword(i.keywordLower) && i.impressions >= 10)
        .sort((a, b) => b.clicks - a.clicks || b.ctr - a.ctr);

      // 1) 고반응 브랜드·SKU 키워드 기반 신규 확장 검색어
      for (const seed of topCtr.filter((i) => isSkinfoodKeyword(i.keywordLower) && i.ctr >= 0.08).slice(0, 8)) {

        if (product) {

          );
          addNew(
            `best skinfood ${product}`,
            [
              `검색 의도가 명확한 SKU 「${seed.keyword}」`,
              "Best/추천형 비교 검색어 미등록"
            ],
            "비교 단계 신규 유입 확보",
            "구문검색(Phrase) 권장",
            110 + seed.ctr * 80
          );
        }
        addNew(
          `${seed.keyword} review`,
          [
            `CTR ${formatPct(seed.ctr)}로 반응이 검증된 키워드`,
            "리뷰·검토 단계 변형 미등록"
          ],
          "검토 단계 사용자 유입 기대",
          "구문검색(Phrase) 권장",
          100 + seed.ctr * 60 + seed.clicks * 0.5
        );
      }

      // 2) 실적 있는 브랜드 키워드의 구매 직전 검색어
      for (const seed of topClicks.filter((i) => isSkinfoodKeyword(i.keywordLower)).slice(0, 6)) {
        addNew(
          `buy ${seed.keyword}`,
          [
            `클릭 ${formatInt(seed.clicks)}·지출 ${formatUsd(seed.cost)} 실적 보유`,
            "구매 직전(Transactional) 변형 미등록"
          ],
          "전환율 개선 기대",
          "일치검색(Exact) 권장",
          95 + seed.clicks * 2
        );
      }

      // 3) concealer 등 고CTR 라인 교차 확장
      const salmonSeed = brandTop.find((i) => i.keywordLower.includes("salmon") && i.keywordLower.includes("concealer"));
      if (salmonSeed) {
        addNew(
          "skinfood peach concealer",
          [
            `「${salmonSeed.keyword}」 (CTR ${formatPct(salmonSeed.ctr)})와 동일 concealer 유형`,
            "피치 라인 검색어 미등록"
          ],
          "라인 확장으로 신규 유입 기대",
          "일치검색(Exact) 권장",
          108
        );
        addNew(
          "skinfood dark spot concealer",
          [
            "concealer 고CTR 패턴 활용",
            "다크스팟 기능성 수요 결합, 미등록"
          ],
          "다크스팟·컨실러 교차 수요 확보",
          "구문검색(Phrase) 권장",
          106
        );
      }

      // 4) 대표 제품 라인 확장 검색어(브랜드+제품 조합)
      const extensionProducts = [
        ["skinfood black sugar mask", "black sugar", "대표 스크럽/마스크 라인"],
        ["skinfood royal honey mask", "royal honey", "로얄허니 보습 마스크"],
        ["skinfood peach toner pad", "peach", "피치 패드 라인"],
        ["skinfood rice toner pad", "rice", "쌀(rice) 패드 라인"],
        ["skinfood yuja vitamin c serum", "yuja", "유자C 브라이트닝 세럼"],
        ["skinfood sunscreen spf 50", "sunscreen", "선크림 SPF 라인"],
        ["skinfood dark spot serum", "dark spot", "다크스팟 기능성 세럼"],
        ["skinfood propolis ampoule", "propolis", "프로폴리스 앰플"],
        ["skinfood potato mask", "potato", "감자 마스크"],
        ["skinfood egg white pore strip", "egg white", "에그화이트 모공 케어"],
        ["skinfood black sugar scrub", "black sugar", "블랙슈가 스크럽"],
        ["skinfood carrot serum", "carrot", "당근 세럼"]
      ];
      for (const [keyword, token, label] of extensionProducts) {
        const related = items.filter((i) => token && i.keywordLower.includes(token));
        const relatedCtr = related.length ? related.reduce((s, i) => s + i.ctr, 0) / related.length : 0;
        const relatedClicks = related.reduce((s, i) => s + i.clicks, 0);
        const reasonLines = related.length
          ? [
              `${label}`,

      }

      // 5) 카테고리 수요 → 브랜드 전환 검색어
      for (const seed of topClicks.filter((i) => isCategoryKeyword(i.keywordLower) && !isSkinfoodKeyword(i.keywordLower)).slice(0, 4)) {
        const token = inferSkinfoodProduct(seed.keywordLower) || seed.keywordLower.split(" ").slice(0, 2).join(" ");
        addNew(

      // 6) 고성과 기존 검색어를 Phrase Match로 등록(유사 변형 흡수)
      for (const item of topCtr.filter((i) => isSkinfoodKeyword(i.keywordLower) || i.ctr >= 0.1).slice(0, 14)) {
        const similar = countSimilarKeywords(item.keywordLower, items);
        const intent = inferSearchIntentLabel(item.keywordLower);
        add(
          `"${item.keyword}"`,
          [
            `CTR ${formatPct(item.ctr)}·클릭 ${formatInt(item.clicks)}`,
            `검색 의도: ${intent}`,
            similar ? `유사 검색어 ${similar}건 존재` : null
          ],
          "유사 변형 검색까지 흡수 기대",
          "구문검색(Phrase) 권장",
          item.clicks * 3 + item.ctr * 120 + Math.min(item.impressions, 200) * 0.08 + similar * 6 + (isSkinfoodKeyword(item.keywordLower) ? 35 : 10)
        );
      }
      for (const item of topClicks.slice(0, 14)) {
        const similar = countSimilarKeywords(item.keywordLower, items);
        const intent = inferSearchIntentLabel(item.keywordLower);
        add(
          `"${item.keyword}"`,
          [
            `클릭 ${formatInt(item.clicks)}·CTR ${formatPct(item.ctr)}`,
            `검색 의도: ${intent}`,
            similar ? `유사군 ${similar}건` : null
          ],
          "클릭 실적 검색어 확장 대응 기대",
          "구문검색(Phrase) 권장",
          item.clicks * 3 + item.ctr * 120 + Math.min(item.impressions, 200) * 0.08 + similar * 6 + (isSkinfoodKeyword(item.keywordLower) ? 25 : 5)
        );
      }

      const baseRanked = candidates.sort((a, b) => b.score - a.score).slice(0, TARGET_COUNT);
      const ranked = baseRanked.filter((c) => !GoogleRecStore.has(c.keyword));

      const restoreBar = (GoogleRecStore.hasAny() && !recRestoreDismissed)
        ? '<div class="grec-restorebar"><span>직접 삭제한 추천 검색어가 있습니다.</span><div class="grec-restorebar-actions"><button type="button" class="grec-restore" data-grec-rec-restore="1">기본값 복원</button><button type="button" class="grec-restore-close" data-grec-rec-restore-close="1" aria-label="알림 닫기" title="알림 닫기">&times;</button></div></div>'
        : "";

      if (!ranked.length) {
        return { html: restoreBar + '<p class="phrase-empty">추천할 검색어를 생성할 데이터가 부족합니다.</p>' };
      }

      const html = [restoreBar, `<div class="grec-head">${ranked.length}건</div>`, '<ol class="grec-list">'];
      ranked.forEach((item) => {
        const reasonHtml = item.reasonLines.map((l) => `<div class="grec-reason-line">${escapeHtml(l)}</div>`).join("");
        const effectHtml = item.effect
          ? `<div class="grec-reason-line grec-effect">기대효과: ${escapeHtml(item.effect)}</div>`
          : "";
        html.push(
          '<li class="grec-item has-del">',
          `<button type="button" class="grec-del" data-grec-rec-dismiss="${escapeAttr(item.keyword)}" aria-label="삭제" title="삭제">&times;</button>`,
          `<div class="grec-keyword"><code>${escapeHtml(item.keyword)}</code></div>`,
          '<div class="grec-block"><span class="grec-key">이유</span>',
          `<div class="grec-reason">${reasonHtml}${effectHtml}</div>`,
          '</div>',
          `<div class="grec-block"><span class="grec-key">활용</span><span class="grec-use">${escapeHtml(item.matchType)}</span></div>`,
          '</li>'
        );
      });
      html.push('</ol>');

      return { html: html.join("") };
    }

    const GoogleRecStore = (function () {
      const KEY = "google:dismissedRecommendations";
      let memory = null;
      const load = () => {
        if (memory) return memory;
        try { memory = JSON.parse(localStorage.getItem(KEY)) || {}; }
        catch (e) { memory = {}; }
        return memory;
      };
      const persist = () => {
        try { localStorage.setItem(KEY, JSON.stringify(memory)); }
        catch (e) { /* file:// 등에서 저장이 막혀도 현재 세션에서는 유지 */ }
      };
      return {
        has(keyword) { return Boolean(load()[String(keyword ?? "").toLowerCase()]); },
        add(keyword) {
          const k = String(keyword ?? "").toLowerCase();
          if (!k) return;
          const all = load();
          all[k] = true;
          persist();
        },
        clear() { memory = {}; persist(); },
        hasAny() { return Object.keys(load()).length > 0; }
      };
    })();

    function sortIcon(sortState, key) {
      if (sortState.key !== key) return "↕";
      return sortState.dir === "asc" ? "▲" : "▼";
    }

    function compareSortValues(a, b, type) {
      if (type === "number") {
        return (Number(a) || 0) - (Number(b) || 0);
      }
      if (type === "date") {
        return String(a ?? "").localeCompare(String(b ?? ""));
      }
      return String(a ?? "").localeCompare(String(b ?? ""), "ko");
    }

    function sortByState(list, sortState, columns, getValue, defaultCompare) {
      if (!sortState.key) {
        return defaultCompare ? [...list].sort(defaultCompare) : [...list];
      }
      const col = columns.find((c) => c.key === sortState.key);
      const type = col ? col.type : "string";
      const factor = sortState.dir === "asc" ? 1 : -1;
      return [...list].sort((a, b) => {
        const av = getValue(a, sortState.key);
        const bv = getValue(b, sortState.key);
        return compareSortValues(av, bv, type) * factor;
      });
    }

    function sortableTh(label, sortKey, sortState) {
      return `<th data-sort-key="${escapeAttr(sortKey)}">${escapeHtml(label)} <span class="sort-icon">${sortIcon(sortState, sortKey)}</span></th>`;
    }

    function renderTheadRow(theadEl, columns, sortState) {
      theadEl.innerHTML = `<tr>${columns.map((col) => sortableTh(col.label, col.key, sortState)).join("")}</tr>`;
    }

    function bindSortableThead(theadEl, sortState, onSort) {
      if (!theadEl || theadEl.dataset.sortBound === "1") return;
      theadEl.dataset.sortBound = "1";
      theadEl.addEventListener("click", (e) => {
        const th = e.target.closest("th[data-sort-key]");
        if (!th) return;
        const key = th.dataset.sortKey;
        if (sortState.key === key) {
          sortState.dir = sortState.dir === "asc" ? "desc" : "asc";
        } else {
          sortState.key = key;
          sortState.dir = "asc";
        }
        onSort();
      });
    }

    function getMetricSortValue(item, key) {
      if (key === "ctr" || key === "cpc") {
        return getMetricAverages(item)[key];
      }
      return item[key];
    }

    function getRawSortValue(row, key) {
      if (key === RAW_TYPE_COLUMN) return getRawCellValue(row, key);
      const value = getRawCellValue(row, key);
      if (key === COL.DATE || key === DEMAND_GEN_COL.DATE) return normalizeDate(value);
      if (NUMERIC_KEYS.has(key) || DEMAND_GEN_NUMERIC_KEYS.has(key)) return parseNum(value);
      return value ?? "";
    }

    function buildGoogleTotalRowHtml(items) {
      const totals = items.reduce((acc, it) => {

      return `

    function buildDemandGenTotalRowHtml(rows, cols) {
      const totals = rows.reduce((acc, row) => {
        acc.clicks += parseNum(getDemandGenValue(row, "CLICKS"));
        acc.impressions += parseNum(getDemandGenValue(row, "IMPRESSIONS"));
