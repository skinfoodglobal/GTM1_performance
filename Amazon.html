    function getCampaignConversionRate(item) {
      return item.clicks ? item.orders / item.clicks : 0;
    }

    function getCampaignCpa(item) {
      return item.orders ? item.spend / item.orders : 0;
    }

    function getCampaignCpm(item) {
      return item.impressions ? (item.spend / item.impressions) * 1000 : 0;
    }

    function getSpStrategyBenchmarks(campaigns) {
      const active = campaigns.filter((item) => item.spend >= 5);
      const withOrders = active.filter((item) => item.orders > 0);
      const cpaValues = withOrders.map((item) => getCampaignCpa(item)).sort((a, b) => a - b);
      const medianCpa = cpaValues.length
        ? cpaValues[Math.floor(cpaValues.length / 2)]
        : 0;
      const avgCpa = withOrders.length
        ? withOrders.reduce((sum, item) => sum + getCampaignCpa(item), 0) / withOrders.length
        : 0;
      const totalSpend = active.reduce((sum, item) => sum + item.spend, 0);
      const totalImp = active.reduce((sum, item) => sum + item.impressions, 0);
      const totalClicks = active.reduce((sum, item) => sum + item.clicks, 0);
      const avgCtr = totalImp ? totalClicks / totalImp : 0;
      const avgSpend = active.length ? totalSpend / active.length : 0;
      return { avgCpa, medianCpa, totalSpend, avgSpend, avgCtr };
    }

    function getSbStrategyBenchmarks(campaigns) {
      const active = campaigns.filter((item) => item.spend >= 5 || item.impressions >= 500);
      const totalSpend = active.reduce((sum, item) => sum + item.spend, 0);
      const totalImp = active.reduce((sum, item) => sum + item.impressions, 0);
      const totalViewable = active.reduce((sum, item) => sum + (item.viewableImpressions || 0), 0);
      const totalClicks = active.reduce((sum, item) => sum + item.clicks, 0);
      const avgCtr = totalImp ? totalClicks / totalImp : 0;
      const overallCpm = totalImp ? (totalSpend / totalImp) * 1000 : 0;
      const withViewable = active.filter((item) => item.viewableImpressions > 0);
      const avgViewableImp = withViewable.length
        ? withViewable.reduce((sum, item) => sum + item.viewableImpressions, 0) / withViewable.length
        : 0;
      const cpmValues = active
        .filter((item) => item.impressions >= 200)
        .map((item) => getCampaignCpm(item))
        .sort((a, b) => a - b);
      const medianCpm = cpmValues.length
        ? cpmValues[Math.floor(cpmValues.length / 2)]
        : overallCpm;
      return { overallCpm, medianCpm, avgCtr, avgViewableImp, totalViewable, totalSpend, totalImp };
    }

    function enrichCampaignVideoMetrics(typeRows, campaigns) {
      const viewableCol = findMetricColumn(["viewable impressions"]);
      const vtrCol = findMetricColumn(["view-through rate", "vtr"]);
      if (!viewableCol) {
        return campaigns.map((item) => ({ ...item, viewableImpressions: 0, vtr: 0 }));
      }

      const map = new Map(
        campaigns.map((item) => [
          `${item.adType}|${item.campaign.toLowerCase()}`,
          { ...item, viewableImpressions: 0, vtrWeighted: 0, vtrWeight: 0 }
        ])
      );

      typeRows.forEach((row) => {
        const adType = getAdTypeLabel(row[COL.AD_TYPE]);
        const campaign = String(row[baseState.metric.CAMPAIGN] ?? "").trim();
        const key = `${adType}|${campaign.toLowerCase()}`;
        if (!map.has(key)) return;
        const item = map.get(key);
        const viewable = parseNum(row[viewableCol]);
        const vtr = vtrCol ? parsePct(row[vtrCol]) : 0;
        item.viewableImpressions += viewable;
        if (viewable > 0 && vtr > 0) {
          item.vtrWeighted += vtr * viewable;
          item.vtrWeight += viewable;
        }
      });

      return [...map.values()].map((item) => ({
        ...item,
        vtr: item.vtrWeight ? item.vtrWeighted / item.vtrWeight : 0
      }));
    }

    function strategyPriorityRank(priority) {
      return { High: 3, Medium: 2, Low: 1 }[priority] || 0;
    }

    function inferSeasonFromRows(rows) {
      const dates = rows
        .map((row) => normalizeDate(row[baseState.metric.DATE]))
        .filter(Boolean)
        .sort();
      if (!dates.length) return { key: "seasonal", label: "시즌" };
      const month = parseInt(dates[0].slice(5, 7), 10);
      if (month >= 3 && month <= 5) return { key: "spring", label: "봄 시즌" };
      if (month >= 6 && month <= 8) return { key: "summer", label: "여름 시즌" };
      if (month >= 9 && month <= 11) return { key: "fall", label: "가을 시즌" };
      return { key: "winter", label: "겨울·연말 시즌" };
    }

    function buildStrategyContext(rows, adType) {
      const typeRows = rows.filter((row) => getAdTypeLabel(row[COL.AD_TYPE]) === adType);
      let campaigns = aggregateCampaignItems(typeRows)
        .filter((item) => item.spend > 0 || item.impressions > 0);

      if (adType === "SB") {
        campaigns = enrichCampaignVideoMetrics(typeRows, campaigns);
        campaigns = campaigns.map((item) => ({ ...item, cpm: getCampaignCpm(item) }));
      } else {
        campaigns = campaigns.map((item) => ({ ...item, cpa: getCampaignCpa(item) }));
      }

      const metrics = summarizeCampaignMetrics(campaigns);
      if (adType === "SB") {
        metrics.totalViewableImp = campaigns.reduce((sum, item) => sum + (item.viewableImpressions || 0), 0);
        metrics.overallCpm = metrics.totalImp ? (metrics.totalSpend / metrics.totalImp) * 1000 : 0;
      }

      const benchmarks = adType === "SP"
        ? getSpStrategyBenchmarks(campaigns)
        : getSbStrategyBenchmarks(campaigns);
      const roasTrend = computeRoasTrend(typeRows);
      const rangeLabel = getDateRangeLabelFromRows(typeRows);
      const season = inferSeasonFromRows(typeRows);
      const eligible = campaigns.filter((item) => item.spend >= 5);
      const topRoas = [...eligible].sort((a, b) => b.roas - a.roas || b.orders - a.orders)[0];
      const topOrders = [...campaigns].sort((a, b) => b.orders - a.orders || a.cpa - b.cpa)[0];
      const topCvr = [...campaigns]
        .filter((item) => item.clicks >= 15)
        .sort((a, b) => getCampaignConversionRate(b) - getCampaignConversionRate(a))[0];
      const highRoasCampaigns = eligible.filter(
        (item) => item.roas >= Math.max(metrics.overallRoas * 1.2, 2.5)
      );
      const highCvrCampaigns = campaigns.filter(
        (item) => item.clicks >= 15 && getCampaignConversionRate(item) >= 0.03
      );
      const newLike = campaigns.filter((item) => /new|launch|신규|신제품/i.test(item.campaign));
      const competitorLike = campaigns.filter((item) => /competitor|경쟁|conquest/i.test(item.campaign));

      let topLowCpa = null;
      let growthOpportunities = [];
      let underperformers = [];
      let topViewable = null;
      let efficientReach = [];
      let creativeIssues = [];

      if (adType === "SP") {
        const { avgCpa, medianCpa } = benchmarks;
        const cpaRef = avgCpa || medianCpa;
        const withOrders = eligible.filter((item) => item.orders > 0);
        topLowCpa = [...withOrders]
          .filter((item) => item.orders >= 2)
          .sort((a, b) => a.cpa - b.cpa || b.orders - a.orders)[0] || null;
        growthOpportunities = withOrders
          .filter((item) => {
            const lowCpa = cpaRef > 0 ? item.cpa <= cpaRef * 0.9 : item.orders >= 3;
            return lowCpa && item.orders >= 2;
          })
          .sort((a, b) => b.orders - a.orders || a.cpa - b.cpa);
        underperformers = withOrders
          .filter((item) => {
            const highCpa = cpaRef > 0 ? item.cpa >= cpaRef * 1.25 : false;
            return highCpa && item.orders <= 2 && item.spend >= 10;
          })
          .concat(eligible.filter((item) => !item.orders && item.spend >= 10))
          .sort((a, b) => b.spend - a.spend);
      } else {
        const { overallCpm, medianCpm, avgCtr, avgViewableImp } = benchmarks;
        const cpmRef = medianCpm || overallCpm;
        topViewable = [...campaigns]
          .filter((item) => item.viewableImpressions > 0)
          .sort((a, b) => b.viewableImpressions - a.viewableImpressions)[0] || null;
        efficientReach = campaigns
          .filter((item) => {
            const lowCpm = cpmRef > 0 ? item.cpm <= cpmRef * 0.9 : false;
            const highViewable = avgViewableImp > 0
              ? item.viewableImpressions >= avgViewableImp * 0.7
              : item.viewableImpressions >= 300;
            return item.impressions >= 500 && lowCpm && (highViewable || item.viewableImpressions >= 300);
          })
          .sort((a, b) => b.viewableImpressions - a.viewableImpressions || a.cpm - b.cpm);
        creativeIssues = campaigns
          .filter((item) => {
            const highCpm = cpmRef > 0 ? item.cpm >= cpmRef * 1.2 : item.cpm > 0;
            const lowCtr = avgCtr > 0 ? item.ctr <= avgCtr * 0.75 : item.ctr < 0.002;
            return item.impressions >= 500 && highCpm && lowCtr;
          })
          .sort((a, b) => b.spend - a.spend);
      }

      return {
        typeRows,
        campaigns,
        metrics,
        benchmarks,
        roasTrend,
        rangeLabel,
        season,
        topRoas,
        topOrders,
        topCvr,
        highRoasCampaigns,
        highCvrCampaigns,
        newLike,
        competitorLike,
        topLowCpa,
        growthOpportunities,
        underperformers,
        topViewable,
        efficientReach,
        creativeIssues,
        adType
      };
    }

    function buildCrossStrategyContext(rows) {
      const spCtx = buildStrategyContext(rows, "SP");
      const sbCtx = buildStrategyContext(rows, "SB");
      const totalSpend = spCtx.metrics.totalSpend + sbCtx.metrics.totalSpend;
      const sbShare = totalSpend ? sbCtx.metrics.totalSpend / totalSpend : 0;
      return { spCtx, sbCtx, sbShare, totalSpend };
    }

    const STRATEGY_CACHE = { SP: [], SB: [] };

    const StrategyStore = (function () {
      const KEY = "amazon:strategyOverrides";
      let memory = null;
      const load = () => {
        if (memory) return memory;
        try { memory = JSON.parse(localStorage.getItem(KEY)) || {}; }
        catch (e) { memory = {}; }
        return memory;
      };
      const persist = () => {
        try { localStorage.setItem(KEY, JSON.stringify(memory)); }
        catch (e) { /* file:// 등에서 저장이 막혀도 현재 세션에서는 유지 */ }
      };
      return {
        get(adType) { return load()[adType] || {}; },
        set(adType, key, value) {
          const all = load();
          all[adType] = all[adType] || {};
          all[adType][key] = value;
          persist();
        },
        clear(adType) {
          const all = load();
          delete all[adType];
          persist();
        },
        hasAny(adType) { return Object.keys(this.get(adType)).length > 0; }
      };
    })();

    function assignStrategyKeys(proposals) {
      const seen = new Map();
      return proposals.map((item) => {
        let key = item.idea;
        if (seen.has(key)) {
          const next = seen.get(key) + 1;
          seen.set(key, next);
          key = `${item.idea}#${next}`;
        } else {
          seen.set(key, 0);
        }
        return { ...item, key };
      });
    }

    function normalizeBenefit(benefit) {
      return (Array.isArray(benefit) ? benefit : [benefit])
        .map((entry) => String(entry ?? "").trim())
        .filter(Boolean);
    }

    function getEffectiveProposals(adType) {
      const overrides = StrategyStore.get(adType);
      const list = STRATEGY_CACHE[adType] || [];
      const result = [];
      list.forEach((item) => {
        const ov = overrides[item.key];
        if (ov && ov.deleted) return;
        if (ov) {
          result.push({
            ...item,
            idea: ov.idea != null ? ov.idea : item.idea,
            why: ov.why != null ? ov.why : item.why,
            benefit: ov.benefit != null ? ov.benefit : item.benefit
          });
        } else {
          result.push(item);
        }
      });
      return result;
    }

    function buildBenefitHtml(benefit) {
      const list = normalizeBenefit(benefit);
      if (!list.length) return `<span class="ai-strategy-text">-</span>`;
      const chips = list
        .map((entry) => `<span class="ai-strategy-benefit-chip">${escapeHtml(entry)}</span>`)
        .join("");
      return `<div class="ai-strategy-benefits">${chips}</div>`;
    }

    function renderStrategyItemHtml(item, displayIndex) {
      return [
        `<div class="ai-strategy-item" data-key="${escapeHtml(item.key)}">`,
        `<div class="ai-strategy-head">`,
        `<span class="ai-strategy-num">전략${displayIndex + 1}</span>`,
        `<span class="ai-strategy-title">${escapeHtml(item.idea)}</span>`,
        `<span class="ai-strategy-actions">`,
        `<button type="button" class="ai-strategy-btn" data-strategy-action="edit">수정</button>`,
        `<button type="button" class="ai-strategy-btn danger" data-strategy-action="delete">삭제</button>`,
        `</span>`,
        `</div>`,
        `<div class="ai-strategy-row"><span class="ai-strategy-label">이유</span><span class="ai-strategy-text">${escapeHtml(item.why)}</span></div>`,
        `<div class="ai-strategy-row"><span class="ai-strategy-label">기대 효과</span>${buildBenefitHtml(item.benefit)}</div>`,
        `</div>`
      ].join("");
    }

    function buildStrategyEditFormHtml(item) {
      const benefitValue = normalizeBenefit(item.benefit).join(", ");
      return [
        `<div class="ai-strategy-edit">`,
        `<span class="ai-strategy-edit-label">전략 제목</span>`,
        `<input type="text" class="ai-strategy-input" data-field="idea" value="${escapeHtml(item.idea)}">`,
        `<span class="ai-strategy-edit-label">이유</span>`,
        `<textarea class="ai-strategy-textarea" data-field="why">${escapeHtml(item.why)}</textarea>`,
        `<span class="ai-strategy-edit-label">기대 효과 (쉼표로 구분)</span>`,
        `<input type="text" class="ai-strategy-input" data-field="benefit" value="${escapeHtml(benefitValue)}">`,
        `<div class="ai-strategy-edit-actions">`,
        `<button type="button" class="ai-strategy-btn primary" data-strategy-action="save">저장</button>`,
        `<button type="button" class="ai-strategy-btn" data-strategy-action="cancel">취소</button>`,
        `</div>`,
        `</div>`
      ].join("");
    }

    function buildStrategyListInnerHtml(adType) {
      const proposals = getEffectiveProposals(adType);
      const parts = [];
      if (StrategyStore.hasAny(adType)) {
        parts.push(
          `<div class="ai-strategy-restorebar"><span>이 목록에서 직접 수정·삭제한 항목이 있습니다.</span>` +
          `<span class="ai-strategy-restorebar-actions">` +
          `<button type="button" class="ai-strategy-btn" data-strategy-action="restore">기본 제안 복원</button>` +
          `<button type="button" class="ai-strategy-restore-close" data-strategy-action="dismiss-restore" aria-label="알림 닫기" title="알림 닫기">&times;</button>` +
          `</span></div>`
        );
      }
      if (!proposals.length) {
        parts.push(`<p class="ai-strategy-empty">표시할 전략이 없습니다. 모든 제안을 삭제했습니다.</p>`);
      } else {
        const items = proposals.map((item, index) => renderStrategyItemHtml(item, index)).join("");
        parts.push(`<div class="ai-strategy-list">${items}</div>`);
      }
      return parts.join("");
    }

    function renderStrategyListContainer(adType) {
      const slot = document.querySelector(`.ai-strategy-wrap[data-adtype="${adType}"] .ai-strategy-list-slot`);
      if (!slot) return;
      slot.innerHTML = buildStrategyListInnerHtml(adType);
      if (typeof scheduleAiAnalysisHeightSync === "function") scheduleAiAnalysisHeightSync();
    }

    (function initStrategyEditing() {
      const findItem = (btn) => {
        const wrap = btn.closest(".ai-strategy-wrap");
        const itemEl = btn.closest(".ai-strategy-item");
        return {
          adType: wrap ? wrap.getAttribute("data-adtype") : null,
          itemEl,
          key: itemEl ? itemEl.getAttribute("data-key") : null
        };
      };
      document.addEventListener("click", (e) => {
        const btn = e.target.closest ? e.target.closest("[data-strategy-action]") : null;
        if (!btn) return;
        const action = btn.getAttribute("data-strategy-action");
        const { adType, itemEl, key } = findItem(btn);
        if (!adType) return;

        if (action === "dismiss-restore") {
          const bar = btn.closest(".ai-strategy-restorebar");
          if (bar) bar.remove();
          if (typeof scheduleAiAnalysisHeightSync === "function") scheduleAiAnalysisHeightSync();
          return;
        }
        if (action === "restore") {
          StrategyStore.clear(adType);
          renderStrategyListContainer(adType);
          return;
        }
        if (!itemEl || !key) return;

        if (action === "delete") {
          StrategyStore.set(adType, key, { deleted: true });
          renderStrategyListContainer(adType);
        } else if (action === "edit") {
          const current = getEffectiveProposals(adType).find((p) => p.key === key);
          if (!current) return;
          itemEl.classList.add("editing");
          itemEl.innerHTML = buildStrategyEditFormHtml(current);
          const first = itemEl.querySelector('[data-field="idea"]');
          if (first) first.focus();
          if (typeof scheduleAiAnalysisHeightSync === "function") scheduleAiAnalysisHeightSync();
        } else if (action === "cancel") {
          renderStrategyListContainer(adType);
        } else if (action === "save") {
          const idea = (itemEl.querySelector('[data-field="idea"]')?.value || "").trim();
          const why = (itemEl.querySelector('[data-field="why"]')?.value || "").trim();
          const benefitRaw = itemEl.querySelector('[data-field="benefit"]')?.value || "";
          const benefit = benefitRaw.split(",").map((s) => s.trim()).filter(Boolean);
          StrategyStore.set(adType, key, {
            idea: idea || "(제목 없음)",
            why: why,
            benefit: benefit
          });
          renderStrategyListContainer(adType);
        }
      });
    })();

    function sortStrategyProposals(proposals) {
      return [...proposals].sort((a, b) => strategyPriorityRank(b.priority) - strategyPriorityRank(a.priority));
    }

    function ensureMinimumStrategies(proposals, fallbacks, minimum) {
      const seen = new Set(proposals.map((item) => item.idea));
      const merged = [...proposals];
      fallbacks.forEach((item) => {
        if (merged.length >= minimum) return;
        if (seen.has(item.idea)) return;
        merged.push(item);
        seen.add(item.idea);
      });
      return merged;
    }

    function buildStrategyIntroHtml(adType) {
      const type = adType === "SB" ? "SB" : "SP";
      return `<div class="ai-strategy-criteria-bar"><span class="strategy-criteria-badge" tabindex="0" data-criteria-type="${type}">제안 기준 &#9432;</span></div>`;
    }

    function getStrategyCriteriaTipHtml(adType) {
      if (adType === "SB") {
        return [
          '<div class="tip-title">SB 제안 기준</div>',
          '<div class="tip-desc">SB는 <strong>브랜드 인지·신규 고객 확보</strong>를 위한 상단 퍼널 캠페인입니다. 그래서 즉각적인 매출(ROAS)이 아니라 <strong>Viewable Impressions(실제로 보인 노출)</strong>와 <strong>CPM(1,000회 노출당 비용)</strong>을 핵심 기준으로 평가합니다.<br><br>노출 효율·CTR·영상 시청(VTR)을 함께 살펴 브랜드가 얼마나 넓고 효율적으로 노출됐는지를 판단하며, 이상치·특수 데이터는 계정 맥락에 맞게 해석합니다.</div>'
        ].join("");
      }
      return [
        '<div class="tip-title">SP 제안 기준</div>',
        '<div class="tip-desc">SP는 <strong>구매 전환·매출 확대</strong>를 위한 성과형 캠페인입니다. 따라서 <strong>CPA(주문 1건당 광고비)</strong>를 핵심 기준으로, 주문 수·전환율과 함께 평가합니다.<br><br>CPA가 낮고 주문이 꾸준한 캠페인은 확대, 지출 대비 주문이 부족한 캠페인은 개선 대상으로 분류하며, 이상치·특수 데이터는 계정 맥락에 맞게 해석합니다.</div>'
      ].join("");
    }

    (function initStrategyCriteriaTooltip() {
      let tip = null;
      const getTip = () => {
        if (!tip) {
          tip = document.createElement("div");
          tip.className = "strategy-criteria-tip";
          document.body.appendChild(tip);
        }
        return tip;
      };
      const show = (badge) => {
        const el = getTip();
        el.innerHTML = getStrategyCriteriaTipHtml(badge.getAttribute("data-criteria-type"));
        el.style.visibility = "hidden";
        el.classList.add("visible");
        const rect = badge.getBoundingClientRect();
        const tipRect = el.getBoundingClientRect();
        let left = rect.right - tipRect.width;
        if (left < 8) left = 8;
        if (left + tipRect.width > window.innerWidth - 8) left = window.innerWidth - tipRect.width - 8;
        let top = rect.bottom + 8;
        if (top + tipRect.height > window.innerHeight - 8) {
          top = rect.top - tipRect.height - 8;
        }
        if (top < 8) top = 8;
        el.style.left = `${left}px`;
        el.style.top = `${top}px`;
        el.style.visibility = "";
      };
      const hide = () => {
        if (tip) tip.classList.remove("visible");
      };
      const closest = (node) => (node && node.closest ? node.closest(".strategy-criteria-badge") : null);
      document.addEventListener("mouseover", (e) => {
        const badge = closest(e.target);
        if (badge) show(badge);
      });
      document.addEventListener("mouseout", (e) => {
        const badge = closest(e.target);
        if (badge && !badge.contains(e.relatedTarget)) hide();
      });
      document.addEventListener("focusin", (e) => {
        const badge = closest(e.target);
        if (badge) show(badge);
      });
      document.addEventListener("focusout", (e) => {
        if (closest(e.target)) hide();
      });
      window.addEventListener("scroll", hide, true);
      window.addEventListener("resize", hide);
    })();

    function buildSpStrategyProposals(rows, cross) {
      const ctx = cross.spCtx;
      if (!ctx.typeRows.length) return [];

      const proposals = [];
      const push = (item) => { if (item) proposals.push(item); };
      const { avgCpa, medianCpa } = ctx.benchmarks;
      const cpaRef = avgCpa || medianCpa;

      if (ctx.topLowCpa && ctx.topLowCpa.orders >= 2) {
        push({
          idea: "저CPA·고주문 캠페인 예산 확대",
          why: `${ctx.topLowCpa.campaign} 캠페인은 주문 1건을 만드는 데 $${formatSpend(ctx.topLowCpa.cpa)}만 쓰고 있어, ${ctx.adType} 전체 평균($${formatSpend(cpaRef)})보다 저렴하게 주문을 만들어냅니다. 이미 ${formatInt(ctx.topLowCpa.orders)}건의 주문이 나온 검증된 캠페인이므로, 예산을 늘려도 같은 효율로 주문이 더 늘어날 가능성이 높습니다. 즉 "돈을 더 써도 안전하게 남는" 구간입니다.`,
          benefit: ["주문 수 증가", "낮은 CPA 유지", "예산 대비 매출 효율 극대화"],
          priority: ctx.topLowCpa.orders >= 5 ? "High" : "Medium"
        });
      }

      if (ctx.growthOpportunities.length >= 1) {
        const leaders = ctx.growthOpportunities.slice(0, 3);
        const names = leaders.map((item) => item.campaign).join(", ");
        push({
          idea: "성장 기회 캠페인 전용 포트폴리오 구축",
          why: `평균 CPA($${formatSpend(cpaRef)}) 이하로 주문을 만들면서 주문도 2건 이상 꾸준히 나오는 캠페인이 ${ctx.growthOpportunities.length}개(${names}) 있습니다. 이런 캠페인들은 다른 캠페인과 예산을 섞어두면 성과가 묻히기 쉽습니다. 효율이 검증된 이 캠페인들만 따로 묶어 별도 예산으로 관리하면, 성과 좋은 곳에 돈이 확실히 흘러가고 신규 키워드·상품(ASIN)으로 확장하기도 쉬워집니다.`,
          benefit: ["전환 효율 집중 관리", "성과 캠페인 예산 보호", "키워드·ASIN 확장 기반 확보"],
          priority: ctx.growthOpportunities.length >= 2 ? "High" : "Medium"
        });
      }

      if (ctx.topOrders && ctx.topOrders.orders >= 3 && (!ctx.topLowCpa || ctx.topOrders.campaign !== ctx.topLowCpa.campaign)) {
        push({
          idea: "주문 상위 SKU 전용 SP 캠페인",
          why: `${ctx.topOrders.campaign}은(는) 주문 ${formatInt(ctx.topOrders.orders)}건(CPA $${formatSpend(ctx.topOrders.cpa)})으로 매출을 가장 많이 끌어오는 캠페인입니다. 이렇게 잘 팔리는 상품을 다른 상품과 한 캠페인에 묶어두면 예산·입찰이 분산돼 성과를 다 끌어내지 못합니다. 베스트셀러만 별도 캠페인으로 떼어내면 이 상품에 입찰·예산을 집중해 노출을 안정적으로 확보할 수 있습니다.`,
          benefit: ["베스트셀러 노출 집중", "주문 수 증가", "CPA 안정적 관리"],
          priority: ctx.topOrders.cpa <= cpaRef * 1.1 ? "High" : "Medium"
        });
      }

      if (ctx.underperformers.length >= 1) {
        const ref = ctx.underperformers[0];
        const detail = ref.orders
          ? `CPA $${formatSpend(ref.cpa)}·주문 ${formatInt(ref.orders)}건`
          : `지출 $${formatSpend(ref.spend)}·주문 0건`;
        push({
          idea: "고CPA·저주문 캠페인 구조 개편",
          why: `${ref.campaign} 등 ${ctx.underperformers.length}개 캠페인은 ${detail}로, 주문을 만드는 비용이 평균 CPA($${formatSpend(cpaRef)})보다 높거나 지출만 하고 주문이 거의 없습니다. 즉 돈은 나가는데 매출로 돌아오지 못하는 구간입니다. 이런 캠페인은 그대로 두면 예산만 새기 때문에, 타겟·키워드를 다시 짜거나 입찰을 낮추고 남는 예산은 효율 좋은 캠페인으로 옮기는 정리가 필요합니다.`,
          benefit: ["예산 낭비 축소", "타겟·키워드 재정비", "저CPA 캠페인으로 예산 재배분"],
          priority: ref.spend >= 20 ? "High" : "Medium"
        });
      }

      if (ctx.topCvr && getCampaignConversionRate(ctx.topCvr) > 0) {
        push({
          idea: "고전환 검색어·ASIN 확장 캠페인",
          why: `${ctx.topCvr.campaign}은(는) 클릭한 사람 중 ${formatPct(getCampaignConversionRate(ctx.topCvr))}가 실제 구매로 이어졌습니다(주문 ${formatInt(ctx.topCvr.orders)}건·CPA $${formatSpend(ctx.topCvr.cpa)}). 클릭 대비 구매 전환이 이렇게 높다는 건 이 캠페인의 검색어·상품 조합이 구매 의도가 강한 고객과 잘 맞는다는 뜻입니다. 여기서 잘 통한 키워드·ASIN 패턴을 비슷한 검색어로 넓히면 같은 효율로 주문을 더 확보할 수 있습니다.`,
          benefit: ["고전환 패턴 확장", "추가 주문 확보", "클릭 대비 구매 효율 활용"],
          priority: getCampaignConversionRate(ctx.topCvr) >= 0.05 ? "High" : "Medium"
        });
      }

      if (ctx.newLike.length) {
        const ref = ctx.newLike[0];
        push({
          idea: "신제품 런칭 SP 캠페인",
          why: `${ref.campaign} 등 신규·런칭 관련 캠페인이 이미 운영 중입니다(CPA $${formatSpend(ref.cpa)}·주문 ${formatInt(ref.orders)}건·지출 $${formatSpend(ref.spend)}). 신제품은 아직 검색 노출·리뷰가 부족해 기존 상품과 같은 캠페인에 두면 노출을 거의 못 받습니다. 런칭 상품만 전용 SP로 분리해 별도 예산·키워드를 주면, 초기 주문과 전환 데이터를 빠르게 쌓아 CPA를 일찍 안정시킬 수 있습니다.`,
          benefit: ["신제품 초기 노출 확보", "초기 전환 데이터 수집", "CPA 조기 안정화"],
          priority: ref.orders >= 2 ? "High" : "Medium"
        });
      } else if (ctx.metrics.totalOrders >= 5) {
        push({
          idea: "신제품 런칭 SP 캠페인",
          why: `${ctx.rangeLabel} 기간 ${ctx.adType} 주문이 ${formatInt(ctx.metrics.totalOrders)}건(평균 CPA $${formatSpend(ctx.metrics.overallCpa)})으로 기존 상품 전환이 안정적입니다. 이렇게 계정 전환 기반이 탄탄할 때가 신제품을 붙이기 좋은 시점입니다. 다만 신제품은 초기에 노출이 약하므로 기존 캠페인과 섞지 말고 런칭 전용 SP로 따로 운영해야 초기 주문을 효율적으로 만들 수 있습니다.`,
          benefit: ["신규 SKU 초기 주문 확보", "기존 성과와 분리 관리", "런칭 리스크 최소화"],
          priority: "Medium"
        });
      }

      push({
        idea: "시즌·프로모션 SP 캠페인",
        why: `현재는 ${ctx.season.label} 구간(${ctx.rangeLabel})으로, 이 기간 ${ctx.adType} 주문은 ${formatInt(ctx.metrics.totalOrders)}건(CPA $${formatSpend(ctx.metrics.overallCpa)}·CTR ${formatPct(ctx.metrics.overallCtr)})입니다. 시즌·행사 시기에는 관련 검색량이 평소보다 몰리기 때문에, 상시 캠페인만으로는 이 수요를 다 받아내기 어렵습니다. 시즌 키워드와 프로모션 문구를 담은 기간 한정 SP를 별도로 돌리면 몰리는 수요를 놓치지 않고 주문으로 연결할 수 있습니다.`,
        benefit: ["시즌 수요 선점", "기간 한정 주문 확대", "프로모션 메시지 노출 강화"],
        priority: ctx.metrics.totalOrders >= 10 ? "High" : "Medium"
      });

      if (ctx.competitorLike.length) {
        const ref = ctx.competitorLike.sort((a, b) => b.orders - a.orders || a.cpa - b.cpa)[0];
        push({
          idea: "경쟁사 타겟 SP 캠페인",
          why: `${ref.campaign}처럼 경쟁 브랜드·상품 키워드를 겨냥한 캠페인이 CPA $${formatSpend(ref.cpa)}·주문 ${formatInt(ref.orders)}건·지출 $${formatSpend(ref.spend)}로 운영되고 있습니다. 경쟁사 상품을 검색하는 고객은 이미 구매 의사가 뚜렷한 사람들이라, 그 앞에 우리 상품을 노출하면 브랜드를 바꿔 구매할 여지가 큽니다. 이 키워드들만 전용 SP로 모으면 경쟁사 수요를 우리 매출로 가져오는 구간을 집중 공략할 수 있습니다.`,
          benefit: ["경쟁사 수요 흡수", "신규 구매 전환 확보", "구매 의도 높은 고객 공략"],
          priority: ref.orders >= 2 && ref.cpa <= cpaRef * 1.2 ? "Medium" : "Low"
        });
      }

      const fallbacks = [
        {
          idea: "키워드 확장 SP 캠페인",
          why: `현재 ${ctx.adType} 캠페인은 ${ctx.campaigns.length}개(CTR ${formatPct(ctx.metrics.overallCtr)}·평균 CPA $${formatSpend(ctx.metrics.overallCpa)})로 운영되고 있습니다. 지금 잡고 있는 검색어 외에도 구매 의도가 높은 검색어(브랜드명·카테고리·구체적인 롱테일 검색어)가 더 있을 가능성이 큽니다. 이런 검색어를 성격별로 캠페인을 나눠 잡으면, 아직 광고가 닿지 않은 신규 주문 구간을 새로 발굴할 수 있습니다.`,
          benefit: ["신규 검색어 발굴", "주문 구간 확대", "키워드 성격별 관리"],
          priority: "Medium"
        },
        {
          idea: "자동→수동 SP 캠페인 승격",
          why: `자동 타겟팅과 수동 타겟팅 캠페인이 섞여 있고 ${ctx.adType} 평균 CPA는 $${formatSpend(ctx.metrics.overallCpa)}입니다. 자동 캠페인은 아마존이 알아서 검색어를 매칭해 주는 대신 낭비도 섞이는데, 그중 실제로 주문이 잘 나온 검색어를 골라 수동 캠페인으로 옮기면 입찰을 직접 조절할 수 있습니다. 이렇게 하면 좋은 검색어에만 정밀하게 예산을 쓰게 돼 CPA를 낮출 수 있습니다.`,
          benefit: ["입찰 정밀도 향상", "CPA 절감", "우수 검색어 집중 투자"],
          priority: "Low"
        }
      ];

      return ensureMinimumStrategies(
        sortStrategyProposals(proposals),
        fallbacks,
        3
      );
    }

    function buildSbStrategyProposals(rows, cross) {
      const ctx = cross.sbCtx;
      if (!ctx.typeRows.length) return [];

      const proposals = [];
      const push = (item) => { if (item) proposals.push(item); };
      const { overallCpm, medianCpm, avgCtr, avgViewableImp, totalViewable } = ctx.benchmarks;
      const cpmRef = medianCpm || overallCpm;
      const hasViewableData = totalViewable > 0 || ctx.campaigns.some((item) => item.viewableImpressions > 0);

      push({
        idea: "브랜드 도달 확대 SB 캠페인",
        why: hasViewableData
          ? `현재 SB는 실제로 화면에 보인 노출(Viewable) ${formatInt(ctx.metrics.totalViewableImp || totalViewable)}회·CPM $${formatSpend(ctx.metrics.overallCpm || overallCpm)}·CTR ${formatPct(ctx.metrics.overallCtr)} 수준이고, 전체 광고비 중 SB 비중은 ${formatPct(cross.sbShare)}에 불과합니다. SB는 검색 상단에서 브랜드를 각인시키는 역할인데 비중이 낮으면 그만큼 신규 고객에게 닿을 기회를 놓치고 있는 것입니다. 브랜드 스토리·헤드라인·스토어를 연동한 SB를 늘려 도달 범위를 넓힐 여지가 큽니다.`
          : `현재 SB는 노출 ${formatInt(ctx.metrics.totalImp)}회·CPM $${formatSpend(ctx.metrics.overallCpm || overallCpm)}·CTR ${formatPct(ctx.metrics.overallCtr)} 수준이고, 전체 광고비 중 SB 비중은 ${formatPct(cross.sbShare)}에 불과합니다. SB는 검색 상단에서 브랜드를 각인시키는 역할인데 비중이 낮으면 그만큼 신규 고객에게 닿을 기회를 놓치고 있는 것입니다. 브랜드 스토리·헤드라인·스토어를 연동한 SB를 늘려 도달 범위를 넓힐 여지가 큽니다.`,
        benefit: ["브랜드 도달률 확대", "신규 고객 인지 강화", "검색 상단 노출 확보"],
        priority: cross.sbShare < 0.25 ? "High" : "Medium"
      });

      if (ctx.efficientReach.length >= 1) {
        const ref = ctx.efficientReach[0];
        push({
          idea: "효율적 노출 SB 캠페인 확대",
          why: `${ref.campaign}은(는) CPM $${formatSpend(ref.cpm)}으로 유형 평균($${formatSpend(cpmRef)})보다 저렴하게 노출을 사면서, 실제로 보인 노출(Viewable)도 ${formatInt(ref.viewableImpressions)}회로 잘 나오고 있습니다. 쉽게 말해 "같은 돈으로 더 많은 사람에게 브랜드를 보여주는" 캠페인입니다. 이미 효율이 검증됐으므로 예산을 늘리면 같은 비용 효율로 도달 범위를 더 넓힐 수 있습니다.`,
          benefit: ["도달 범위 확대", "낮은 CPM 유지", "브랜드 인지도 강화"],
          priority: ctx.efficientReach.length >= 2 ? "High" : "Medium"
        });
      }

      if (ctx.creativeIssues.length >= 1) {
        const ref = ctx.creativeIssues[0];
        push({
          idea: "크리에이티브·브랜드 메시지 개선 SB",
          why: `${ref.campaign}은(는) 노출 단가(CPM $${formatSpend(ref.cpm)})는 높은데 클릭률(CTR ${formatPct(ref.ctr)})은 유형 평균(${formatPct(avgCtr)})보다 낮습니다. 노출은 비싸게 사면서 정작 사람들이 클릭을 안 한다는 뜻이라, 소재(광고 이미지·문구)가 매력적이지 않을 가능성이 큽니다. 헤드라인·브랜드 스토리·영상 소재를 여러 버전으로 테스트(A/B)하면 같은 예산으로 더 많은 클릭을 끌어낼 수 있습니다.`,
          benefit: ["CTR 개선", "소재 경쟁력 확보", "동일 예산 대비 노출 효율 향상"],
          priority: ref.spend >= 15 ? "High" : "Medium"
        });
      }

      if (ctx.topViewable && ctx.topViewable.viewableImpressions >= 300) {
        push({
          idea: "영상 브랜드 스토리 SB 캠페인",
          why: `${ctx.topViewable.campaign}은(는) 실제로 보인 노출 ${formatInt(ctx.topViewable.viewableImpressions)}회·CPM $${formatSpend(ctx.topViewable.cpm)}·영상 시청률(VTR) ${formatPct(ctx.topViewable.vtr || 0)}로, 이미 영상 SB를 돌릴 기반이 갖춰져 있습니다. 영상은 정지 이미지보다 브랜드 스토리와 제품 강점(USP)을 훨씬 설득력 있게 전달해 기억에 오래 남습니다. 이 기반 위에 브랜드 스토리 영상 SB를 얹으면 노출을 브랜드 각인·검색 유입으로 연결할 수 있습니다.`,
          benefit: ["브랜드 각인 강화", "영상 노출 활용", "브랜드 검색 유입 증가"],
          priority: (ctx.topViewable.vtr || 0) < 0.15 ? "High" : "Medium"
        });
      }

      if (cross.spCtx.topOrders && cross.sbShare < 0.35) {
        const ref = cross.spCtx.topOrders;
        push({
          idea: "SP 검증 상품 SB 브랜드 캠페인",
          why: `${ref.campaign}은(는) SP에서 이미 주문 ${formatInt(ref.orders)}건(CPA $${formatSpend(ref.cpa)})으로 "잘 팔린다"는 게 검증된 상품인데, 정작 브랜드 노출을 담당하는 SB의 지출 비중은 ${formatPct(cross.sbShare)}로 낮습니다. 판매가 확인된 상품을 SB로 검색 상단·브랜드 영역에 더 노출하면, 아직 우리 브랜드를 모르던 신규 고객까지 끌어와 인지에서 구매로 이어지는 흐름을 넓힐 수 있습니다.`,
          benefit: ["검증 상품 도달 확대", "신규 고객 유입", "인지→전환 퍼널 연결"],
          priority: cross.sbShare < 0.25 ? "High" : "Medium"
        });
      }

      push({
        idea: "시즌 프로모션 SB 캠페인",
        why: `현재는 ${ctx.season.label} 구간(${ctx.rangeLabel})으로, 이 기간 SB는 CPM $${formatSpend(ctx.metrics.overallCpm || overallCpm)}·실제 노출 ${formatInt(ctx.metrics.totalViewableImp || totalViewable)}회·CTR ${formatPct(ctx.metrics.overallCtr)} 수준입니다. 시즌·행사 시기에는 카테고리 검색과 경쟁이 함께 늘기 때문에, 평소 소재로는 눈에 띄기 어렵습니다. 시즌 테마 헤드라인·프로모션 문구를 담은 SB를 별도로 운영하면 이 시기 브랜드 노출을 선점할 수 있습니다.`,
        benefit: ["시즌 브랜드 노출 선점", "기간 한정 인지 강화", "경쟁 시기 가시성 확보"],
        priority: ctx.metrics.totalImp >= 5000 ? "High" : "Medium"
      });

      if (ctx.newLike.length) {
        const ref = ctx.newLike[0];
        push({
          idea: "신제품 런칭 SB 캠페인",
          why: `${ref.campaign} 등 신규·런칭 관련 캠페인이 CPM $${formatSpend(ref.cpm)}·노출 ${formatInt(ref.impressions)}회·실제 노출 ${formatInt(ref.viewableImpressions || 0)}회로 운영되고 있습니다. 신제품은 초기에 브랜드·상품을 아는 사람이 적어 무엇보다 "많은 사람에게 빠르게 보여주는" 것이 중요합니다. 검색 상단 브랜드 슬롯과 영상 소재를 쓸 수 있는 SB는 이 초기 인지 확보에 가장 적합해, 런칭 초반 도달을 빠르게 끌어올릴 수 있습니다.`,
          benefit: ["초기 브랜드 인지 확보", "런칭 도달 가속", "검색 상단·영상 노출 활용"],
          priority: ref.impressions >= 1000 ? "High" : "Medium"
        });
      }

      const fallbacks = [
        {
          idea: "스토어 트래픽 유입 SB 캠페인",
          why: `현재 SB는 CPM $${formatSpend(ctx.metrics.overallCpm || overallCpm)}·클릭 ${formatInt(ctx.metrics.totalClicks)}회·CTR ${formatPct(ctx.metrics.overallCtr)} 수준입니다. 광고를 단일 상품이 아니라 여러 상품이 모인 아마존 브랜드 스토어로 연결하면, 클릭한 고객이 한 번에 여러 제품을 둘러보게 돼 교차 구매로 이어질 가능성이 커집니다. 스토어·브랜드 헤드라인과 연동한 SB로 브랜드 전체 노출을 넓힐 여지가 있습니다.`,
          benefit: ["브랜드 스토어 유입", "교차 판매 기회 확대", "브랜드 전체 노출 강화"],
          priority: "Medium"
        },
        {
          idea: "브랜드 검색 방어 SB 캠페인",
          why: `현재 ${ctx.adType} 캠페인 ${ctx.campaigns.length}개가 운영 중입니다. 우리 브랜드명을 검색하는 고객은 이미 구매 직전 단계인데, 이 자리를 경쟁사 광고에 뺏기면 애써 만든 수요를 빼앗길 수 있습니다. 브랜드명·관련 검색어를 겨냥한 전용 SB로 검색 상단 슬롯을 우리가 먼저 점유하면 경쟁사 노출을 막고 브랜드 인지를 지킬 수 있습니다.`,
          benefit: ["브랜드 검색 상단 방어", "경쟁사 노출 차단", "브랜드 인지 유지"],
          priority: "Low"
        }
      ];

      return ensureMinimumStrategies(
        sortStrategyProposals(proposals),
        fallbacks,
        3
      );
    }

    function buildAdTypeStrategyHtml(rows, adType, cross) {
      const proposals = adType === "SP"
        ? buildSpStrategyProposals(rows, cross)
        : buildSbStrategyProposals(rows, cross);
      if (!proposals.length) {
        STRATEGY_CACHE[adType] = [];
        return `<p>${escapeHtml(`${adType} 캠페인 데이터가 없어 전략을 제안할 수 없습니다.`)}</p>`;
      }
      STRATEGY_CACHE[adType] = assignStrategyKeys(proposals);
      return `<div class="ai-strategy-wrap" data-adtype="${adType}">`
        + buildStrategyIntroHtml(adType)
        + `<div class="ai-strategy-list-slot">${buildStrategyListInnerHtml(adType)}</div>`
        + `</div>`;
    }

    function buildAiCard2Report(rows) {
      if (!rows.length) {
        return { htmlByType: { SP: "분석할 캠페인 데이터가 없습니다.", SB: "분석할 캠페인 데이터가 없습니다." } };
      }

      const cross = buildCrossStrategyContext(rows);
      return {
        htmlByType: {
          SP: buildAdTypeStrategyHtml(rows, "SP", cross),
          SB: buildAdTypeStrategyHtml(rows, "SB", cross)
        }
      };
    }

    function syncAiAnalysisRowHeights() {
      if (window.matchMedia("(max-width: 560px)").matches) {
        document.querySelectorAll(".ai-analysis-cell-scrollable").forEach((el) => {
          el.style.height = "";
          el.style.maxHeight = "";
          el.style.overflowY = "";
        });
        return;
      }

      const accordionAi = document.getElementById("accordion-ai");
      if (accordionAi && !accordionAi.classList.contains("open")) {
        return;
      }

      [
        ["ai-card-1-sp", "ai-card-2-sp"],
        ["ai-card-1-sb", "ai-card-2-sb"]
      ].forEach(([anchorId, scrollId]) => {
        const anchor = document.getElementById(anchorId);
        const scroll = document.getElementById(scrollId);
        if (!anchor || !scroll) return;

        const block = anchor.closest(".ai-analysis-row-block");
        if (block && !block.classList.contains("open")) {
          scroll.style.height = "";
          scroll.style.maxHeight = "";
          scroll.style.overflowY = "";
          const label = block.querySelector(".ai-analysis-label");
          if (label) label.style.minHeight = "";
          return;
        }

        scroll.style.height = "auto";
        scroll.style.maxHeight = "none";
        scroll.style.overflowY = "visible";

        const anchorHeight = Math.ceil(anchor.getBoundingClientRect().height);
        const scrollContentHeight = Math.ceil(scroll.scrollHeight);
        if (!anchorHeight) return;

        scroll.style.height = `${anchorHeight}px`;
        scroll.style.maxHeight = `${anchorHeight}px`;
        scroll.style.overflowY = scrollContentHeight > anchorHeight + 1 ? "auto" : "hidden";

        const label = anchor.closest(".ai-analysis-data-row")?.querySelector(".ai-analysis-label");
        if (label) {
          label.style.minHeight = `${anchorHeight}px`;
        }
      });
    }

    function scheduleAiAnalysisHeightSync() {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          syncAiAnalysisRowHeights();
        });
      });
    }

    function renderAiCards() {
      if (!baseState.rows.length) {
        setAiAnalysisEmptyMessage("데이터를 불러온 후 표시됩니다.");
        scheduleAiAnalysisHeightSync();
        return;
      }
      renderAiAnalysisCard(1, buildAiCard1Report);
      renderAiAnalysisCard(2, buildAiCard2Report);
      scheduleAiAnalysisHeightSync();
      setTimeout(scheduleAiAnalysisHeightSync, 50);
    }

    function formatRawCell(col, val) {
      if (val == null || val === "") return "";
      if (col === baseState.metric.SPEND) return formatSpend(parseNum(val));
      if (col === baseState.metric.ROAS) return formatRoas(parseNum(val));
      if (NUMERIC_KEYS.has(col)) return formatInt(parseNum(val));
      return String(val);
    }

    function getAdTypeLabel(adType) {
      const t = String(adType || "").toUpperCase();
      if (t === "SB" || t === "SD") return "SB";
      return "SP";
    }

    function renderAdTypeBadge(adType) {
      const t = getAdTypeLabel(adType);
      const cls = t === "SB" ? "sb" : "sp";
      return `<span class="adtype-badge ${cls}">${t}</span>`;
    }

    function buildSelectOptions(values, selectedValue, includeAll) {
      const selected = (selectedValue || "").toLowerCase();
      const allSelected = includeAll && !selectedValue ? " selected" : "";
      const all = includeAll ? `<option value=""${allSelected}>전체</option>` : "";
      const items = values.map((v) => {
        const s = String(v);
        const isSelected = s.toLowerCase() === selected ? " selected" : "";
        return `<option value="${escapeAttr(s)}"${isSelected}>${escapeHtml(s)}</option>`;
      }).join("");
      return all + items;
    }

    function getDateRangeLabel(filterState, calendarState) {
      const from = filterState[DATE_FILTER_FROM] || "";
      const to = filterState[DATE_FILTER_TO] || "";
      if (calendarState?.datePickStart && from && !to) return `${from} ~ (종료일 선택)`;
      if (!from && !to) return "전체 기간";
      if (from && to) return from === to ? from : `${from} ~ ${to}`;
      if (from) return `${from} ~`;
      return `~ ${to}`;
    }

    function ensureCalendarMonth(calendarState) {
      if (calendarState.dateCalendarMonth) return;
      const dates = baseState.rows
        .map((row) => normalizeDate(row[baseState.metric.DATE]))
        .filter(Boolean)
        .sort();
      if (dates.length) {
        calendarState.dateCalendarMonth = dates[0].slice(0, 7);
        return;
      }
      const now = new Date();
      calendarState.dateCalendarMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
    }

    function getDayRangeClass(dateStr, filterState, calendarState) {
      const from = filterState[DATE_FILTER_FROM];
      const to = filterState[DATE_FILTER_TO];
      let cls = "date-day available";
      if (from && to && dateStr >= from && dateStr <= to) {
        cls += " in-range";
        if (dateStr === from) cls += " range-start";
        if (dateStr === to) cls += " range-end";
      } else if (calendarState.datePickStart && from && !to && dateStr === from) {
        cls += " range-start range-end";
      }
      return cls;
    }

    function bindDateRangeWrap(prefix) {
      const trigger = document.getElementById(`${prefix}-trigger`);
      const wrap = trigger?.closest(".date-range-wrap");
      if (!trigger || !wrap || wrap.dataset.dateBound === "1") return;
      wrap.dataset.dateBound = "1";
      trigger.addEventListener("click", (e) => {
        e.stopPropagation();
        wrap.classList.add("open");
      });
    }

    function renderDateRangeCalendar(calendarState, filterState, prefix, onChange) {
      const wrap = document.getElementById(`${prefix}-calendar`);
      if (!wrap) return;

      const dateWrap = document.getElementById(`${prefix}-trigger`)?.closest(".date-range-wrap");
      if (calendarState.datePickStart && dateWrap) dateWrap.classList.add("open");

      const trigger = document.getElementById(`${prefix}-trigger`);
      if (trigger) trigger.textContent = getDateRangeLabel(filterState, calendarState);
      const hint = document.getElementById(`${prefix}-hint`);
      if (hint) {
        hint.textContent = calendarState.datePickStart ? "종료일을 선택하세요" : "시작일 → 종료일 순으로 선택";
      }

      ensureCalendarMonth(calendarState);
      if (!calendarState.dateCalendarMonth) return;

      const [year, month] = calendarState.dateCalendarMonth.split("-").map(Number);
      const firstDay = new Date(year, month - 1, 1).getDay();
      const daysInMonth = new Date(year, month, 0).getDate();
      const weekdays = ["일", "월", "화", "수", "목", "금", "토"];

      let daysHtml = "";
      for (let i = 0; i < firstDay; i++) daysHtml += '<span class="date-day empty"></span>';
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        const cls = getDayRangeClass(dateStr, filterState, calendarState);
        daysHtml += `<button type="button" class="${cls}" data-date="${dateStr}">${day}</button>`;
      }

      wrap.innerHTML = `
        <div class="date-range-nav">
          <button type="button" id="${prefix}-prev">◀</button>
          <span class="date-range-month">${year}년 ${month}월</span>
          <button type="button" id="${prefix}-next">▶</button>
        </div>
        <div class="date-range-weekdays">${weekdays.map((w) => `<span>${w}</span>`).join("")}</div>
        <div class="date-range-days">${daysHtml}</div>
        <div class="date-range-actions">
          <button type="button" class="btn btn-clear" id="${prefix}-clear">전체 기간</button>
        </div>`;

      document.getElementById(`${prefix}-prev`)?.addEventListener("click", (e) => {
        e.stopPropagation();
        const [y, m] = calendarState.dateCalendarMonth.split("-").map(Number);
        const d = new Date(y, m - 2, 1);
        calendarState.dateCalendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
        renderDateRangeCalendar(calendarState, filterState, prefix, onChange);
      });

      document.getElementById(`${prefix}-next`)?.addEventListener("click", (e) => {
        e.stopPropagation();
        const [y, m] = calendarState.dateCalendarMonth.split("-").map(Number);
        const d = new Date(y, m, 1);
        calendarState.dateCalendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
        renderDateRangeCalendar(calendarState, filterState, prefix, onChange);
      });

      document.getElementById(`${prefix}-clear`)?.addEventListener("click", (e) => {
        e.stopPropagation();
        filterState[DATE_FILTER_FROM] = "";
        filterState[DATE_FILTER_TO] = "";
        calendarState.datePickStart = null;
        if (dateWrap) dateWrap.classList.remove("open");
        renderDateRangeCalendar(calendarState, filterState, prefix, onChange);
        onChange();
      });

      wrap.querySelectorAll("button[data-date]").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const dateStr = btn.dataset.date;
          let completed = false;
          if (calendarState.datePickStart) {
            const start = calendarState.datePickStart;
            if (dateStr < start) {
              filterState[DATE_FILTER_FROM] = dateStr;
              filterState[DATE_FILTER_TO] = start;
            } else {
              filterState[DATE_FILTER_FROM] = start;
              filterState[DATE_FILTER_TO] = dateStr;
            }
            calendarState.datePickStart = null;
            completed = true;
            if (dateWrap) dateWrap.classList.remove("open");
          } else {
            calendarState.datePickStart = dateStr;
            filterState[DATE_FILTER_FROM] = dateStr;
            filterState[DATE_FILTER_TO] = "";
            if (dateWrap) dateWrap.classList.add("open");
          }
          renderDateRangeCalendar(calendarState, filterState, prefix, onChange);
          if (completed) onChange();
        });
      });
    }

    function filterByDateRange(rows, filterState, calendarState) {
      if (calendarState?.datePickStart) return rows;
      const from = filterState[DATE_FILTER_FROM] || "";
      const to = filterState[DATE_FILTER_TO] || "";
      if (!from && !to) return rows;
      return rows.filter((row) => {
        const d = normalizeDate(row[baseState.metric.DATE]);
        if (!d) return false;
        if (from && d < from) return false;
        if (to && d > to) return false;
        return true;
      });
    }

    function getAdTypeOptions() {
      const set = new Set(baseState.rows.map((row) => getAdTypeLabel(row[COL.AD_TYPE])));
      return [...set].sort((a, b) => a.localeCompare(b, "ko"));
    }

    function getCampaignOptions(adTypeFilter) {
      const rows = !adTypeFilter
        ? baseState.rows
        : baseState.rows.filter((row) => getAdTypeLabel(row[COL.AD_TYPE]).toLowerCase() === adTypeFilter.toLowerCase());
      return [...new Set(rows.map((row) => String(row[baseState.metric.CAMPAIGN] ?? "").trim()).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "ko"));
    }

    function ensureDailyCampaignSelected() {
      const options = getCampaignOptions(dailyState.filters[FILTER_AD_TYPE]);
      if (!options.length) {
        dailyState.filters[FILTER_CAMPAIGN] = "";
        return;
      }
      const current = dailyState.filters[FILTER_CAMPAIGN] || "";
      if (current && !options.some((o) => o.toLowerCase() === current.toLowerCase())) {
        dailyState.filters[FILTER_CAMPAIGN] = "";
      }
    }

    function getPeriodSourceRows() {
      return filterByDateRange(baseState.rows, periodState.filters, periodState);
    }

    function getDailySourceRows() {
      let rows = [...baseState.rows];
      const adType = dailyState.filters[FILTER_AD_TYPE] || "";
      const campaign = dailyState.filters[FILTER_CAMPAIGN] || "";
      if (adType) rows = rows.filter((row) => getAdTypeLabel(row[COL.AD_TYPE]).toLowerCase() === adType.toLowerCase());
      if (campaign) rows = rows.filter((row) => String(row[baseState.metric.CAMPAIGN] ?? "").toLowerCase() === campaign.toLowerCase());
      return filterByDateRange(rows, dailyState.filters, dailyState);
    }

    function getRawSourceRows() {
      let rows = [...baseState.rows];
      const adType = rawState.filters[FILTER_AD_TYPE] || "";
      const campaign = rawState.filters[FILTER_CAMPAIGN] || "";
      if (adType) rows = rows.filter((row) => getAdTypeLabel(row[COL.AD_TYPE]).toLowerCase() === adType.toLowerCase());
      if (campaign) rows = rows.filter((row) => String(row[baseState.metric.CAMPAIGN] ?? "").toLowerCase() === campaign.toLowerCase());
      return filterByDateRange(rows, rawState.filters, rawState);
    }

    async function loadAmazonData() {
      periodTbody.innerHTML = `<tr><td colspan="${PERIOD_COL_COUNT}" class="meta-status">로딩 중...</td></tr>`;
      dailyTbody.innerHTML = `<tr><td colspan="${DAILY_COL_COUNT}" class="meta-status">로딩 중...</td></tr>`;
      if (dailyTfoot) dailyTfoot.innerHTML = "";
      rawTbody.innerHTML = '<tr><td colspan="8" class="meta-status">로딩 중...</td></tr>';

      const result = window.PerformanceDataLoader
        ? await window.PerformanceDataLoader.loadPlatformData("amazon")
        : { ok: false, data: null, error: "데이터 로더를 찾을 수 없습니다." };
      const payload = result.ok ? result.data : null;

      if (!payload || !Array.isArray(payload.rows)) {
        const msg = result.error || "데이터를 불러올 수 없습니다.";
        periodTbody.innerHTML = `<tr><td colspan="${PERIOD_COL_COUNT}" class="meta-status error">${msg}</td></tr>`;
        dailyTbody.innerHTML = `<tr><td colspan="${DAILY_COL_COUNT}" class="meta-status error">${msg}</td></tr>`;
        if (dailyTfoot) dailyTfoot.innerHTML = "";
        rawTbody.innerHTML = `<tr><td colspan="8" class="meta-status error">${msg}</td></tr>`;
        rawInfo.textContent = msg;
        setAiAnalysisEmptyMessage("데이터를 불러올 수 없습니다.");
        scheduleAiAnalysisHeightSync();
        if (window.KpiSummary) window.KpiSummary.clearValues();
        return;
      }

      baseState.metric = resolveColumns(payload);
      baseState.sourceFiles = payload.sourceFiles || { SP: "", SB: "" };
      baseState.spColumns = Array.isArray(payload.spColumns) ? payload.spColumns : [];
      baseState.sbColumns = Array.isArray(payload.sbColumns) ? payload.sbColumns : [];
      baseState.rows = (payload.rows || []).filter((row) => {
        const campaign = String(row[baseState.metric.CAMPAIGN] ?? "").trim();
        const date = normalizeDate(row[baseState.metric.DATE]);
        return campaign && date;
      });
      buildAmazonKpiColumnMap(
        { spColumns: baseState.spColumns, sbColumns: baseState.sbColumns },
        baseState.rows
      );

      const payloadCols = Array.isArray(payload.columns) ? payload.columns : [];
      const fallbackCols = [...new Set(baseState.rows.flatMap((row) => Object.keys(row)))];
      baseState.columns = (payloadCols.length ? payloadCols : fallbackCols).slice();
      if (!baseState.columns.includes(COL.AD_TYPE)) baseState.columns.unshift(COL.AD_TYPE);
      baseState.columns = [...new Set(baseState.columns)];

      periodState.filters = {};
      periodState.dateCalendarMonth = "";
      periodState.datePickStart = null;
      periodState.sort = { key: null, dir: "asc" };
      dailyState.filters = {};
      dailyState.dateCalendarMonth = "";
      dailyState.datePickStart = null;
      dailyState.page = 1;
      dailyState.sort = { key: null, dir: "asc" };
      rawState.filters = {};
      rawState.dateCalendarMonth = "";
      rawState.datePickStart = null;
      rawState.sort = { key: null, dir: "asc" };
      rawState.global = "";
      document.getElementById("raw-global-search").value = "";

      ensureDailyCampaignSelected();
      renderPeriodFilters();
      renderDailyFilters();
      renderRawFilters();
      applyPeriodFiltersAndRender();
      applyDailyFiltersAndRender();
      applyRawFiltersAndRender();

      const spFile = baseState.sourceFiles.SP || "-";
      const sbFile = baseState.sourceFiles.SB || baseState.sourceFiles.SD || "-";
      rawInfo.innerHTML = `SP 파일: <strong>${escapeHtml(spFile)}</strong> · SB 파일: <strong>${escapeHtml(sbFile)}</strong> · 전체 <strong>${baseState.rows.length.toLocaleString()}</strong>행`;
      try {
        renderAiCards();
      } catch (err) {
        console.error("AI card render failed:", err);
      }
      refreshAmazonKpiSummary();
    }

    function applyDailyFiltersAndRender() {
      ensureDailyCampaignSelected();
      renderDailyTableHead();
      const rows = getDailySourceRows();
      const map = new Map();

      rows.forEach((row) => {
        const adType = getAdTypeLabel(row[COL.AD_TYPE]);
        const campaign = String(row[baseState.metric.CAMPAIGN] ?? "").trim();
        const date = normalizeDate(row[baseState.metric.DATE]);
        if (!date || !campaign) return;
        const key = `${adType}|${campaign.toLowerCase()}|${date}`;
        if (!map.has(key)) {
          map.set(key, {
            adType,
            campaign,
            date,
            impressions: 0,
            clicks: 0,
            spend: 0,
            orders: 0,
            sales: 0,
            roasWeighted: 0,
            roasWeight: 0,
            roasSum: 0,
            roasCount: 0
          });
        }
        const item = map.get(key);
        const spend = parseNum(row[baseState.metric.SPEND]);
        const roas = parseNum(row[baseState.metric.ROAS]);
        item.impressions += parseNum(row[baseState.metric.IMPRESSIONS]);
        item.clicks += parseNum(row[baseState.metric.CLICKS]);
        item.spend += spend;
        item.orders += parseNum(row[baseState.metric.ORDERS]);
        item.sales += getAmazonKpiNum(row, adType, "sales");
        if (spend > 0 && roas > 0) {
          item.roasWeighted += roas * spend;
          item.roasWeight += spend;
        } else if (roas > 0) {
          item.roasSum += roas;
          item.roasCount += 1;
        }
      });

      dailyState.filtered = [...map.values()];
      if (dailyState.sort.key) {
        dailyState.filtered = sortByState(dailyState.filtered, dailyState.sort, getDailySortValue);
      } else {
        dailyState.filtered.sort((a, b) => {
          const byDate = a.date.localeCompare(b.date);
          if (byDate !== 0) return byDate;
          const byCampaign = a.campaign.localeCompare(b.campaign, "ko");
          if (byCampaign !== 0) return byCampaign;
          return a.adType.localeCompare(b.adType, "ko");
        });
      }

      renderDailyTableBody();
      updateDailyPagination();
      renderDailyCharts();
    }

    const DAILY_CHART_METRICS = [
      { key: "impressions", label: "노출", color: "#0071e3", fmt: (v) => formatInt(v) },
      { key: "clicks", label: "클릭", color: "#34c759", fmt: (v) => formatInt(v) },
      { key: "spend", label: "지출", color: "#ff9500", fmt: (v) => `$${formatSpend(v)}` },
      { key: "orders", label: "주문", color: "#af52de", fmt: (v) => formatInt(v) },
      { key: "sales", label: "매출", color: "#ff2d55", fmt: (v) => `$${formatSpend(v)}` },
      { key: "roas", label: "ROAS", color: "#5856d6", fmt: (v) => formatRoas(v) }
    ];

    const SPARK = { W: 100, H: 60, padX: 3, padY: 6 };
    const dailyChartState = { series: [] };

    function aggregateDailyChartSeries(items) {
      const byDate = new Map();
      items.forEach((item) => {
        if (!item.date) return;
        if (!byDate.has(item.date)) {
          byDate.set(item.date, {
            date: item.date,
            impressions: 0,
            clicks: 0,
            spend: 0,
            orders: 0,
            sales: 0,
            roasWeighted: 0,
            roasWeight: 0
          });
        }
        const bucket = byDate.get(item.date);
        bucket.impressions += item.impressions || 0;
        bucket.clicks += item.clicks || 0;
        bucket.spend += item.spend || 0;
        bucket.orders += item.orders || 0;
        bucket.sales += item.sales || 0;
        bucket.roasWeighted += item.roasWeighted || 0;
        bucket.roasWeight += item.roasWeight || 0;
      });
      return [...byDate.values()]
        .sort((a, b) => a.date.localeCompare(b.date))
        .map((b) => ({
          date: b.date,
          impressions: b.impressions,
          clicks: b.clicks,
          spend: b.spend,
          orders: b.orders,
          sales: b.sales,
          roas: b.roasWeight > 0 ? b.roasWeighted / b.roasWeight : 0
        }));
    }

    function buildSparklineSvg(values, color) {
      const { W, H, padX, padY } = SPARK;
      const n = values.length;
      const max = Math.max(...values, 0);
      const min = Math.min(...values, 0);
      const range = max - min || 1;
      const innerW = W - padX * 2;
      const innerH = H - padY * 2;
      const xAt = (i) => (n <= 1 ? W / 2 : padX + (i / (n - 1)) * innerW);
      const yAt = (v) => padY + innerH - ((v - min) / range) * innerH;

      if (n === 1) {
        const cx = xAt(0).toFixed(1);
        const cy = yAt(values[0]).toFixed(1);
        return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">` +
          `<circle cx="${cx}" cy="${cy}" r="2.5" fill="${color}"></circle></svg>`;
      }

      const pts = values.map((v, i) => `${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`);
      const linePath = `M${pts.join(" L")}`;
      const areaPath =
        `M${xAt(0).toFixed(1)},${(H - padY).toFixed(1)} ` +
        `L${pts.join(" L")} ` +
        `L${xAt(n - 1).toFixed(1)},${(H - padY).toFixed(1)} Z`;
      const lastX = xAt(n - 1).toFixed(1);
      const lastY = yAt(values[n - 1]).toFixed(1);

      return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">` +
        `<path d="${areaPath}" fill="${color}" fill-opacity="0.10" stroke="none"></path>` +
        `<path d="${linePath}" fill="none" stroke="${color}" stroke-width="1.5" ` +
        `stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"></path>` +
        `<circle cx="${lastX}" cy="${lastY}" r="2" fill="${color}" vector-effect="non-scaling-stroke"></circle>` +
        `<line class="spark-marker spark-marker-line" x1="0" y1="${padY}" x2="0" y2="${H - padY}" ` +
        `stroke="${color}" stroke-width="1" stroke-dasharray="2 2" vector-effect="non-scaling-stroke" opacity="0"></line>` +
        `<circle class="spark-marker spark-marker-dot" cx="0" cy="0" r="2.6" fill="#fff" ` +
        `stroke="${color}" stroke-width="1.5" vector-effect="non-scaling-stroke" opacity="0"></circle>` +
        `</svg>`;
    }

    function renderDailyCharts() {
      const container = document.getElementById("daily-charts");
      if (!container) return;

      const series = aggregateDailyChartSeries(dailyState.filtered || []);
      dailyChartState.series = series;
      if (!series.length) {
        container.innerHTML = `<p class="daily-charts-empty">필터 조건에 해당하는 데이터가 없어 그래프를 표시할 수 없습니다.</p>`;
        return;
      }

      container.innerHTML = DAILY_CHART_METRICS.map((metric) => {
        const values = series.map((row) => Number(row[metric.key] || 0));
        const latest = values[values.length - 1];
        return [
          `<div class="daily-chart" data-metric-key="${metric.key}">`,
          `<div class="daily-chart-head">`,
          `<span class="daily-chart-title">${escapeHtml(metric.label)}</span>`,
          `<span class="daily-chart-value" style="color:${metric.color}">${escapeHtml(metric.fmt(latest))}</span>`,
          `</div>`,
          buildSparklineSvg(values, metric.color),
          window.PerformanceChartAxis.buildAxisDatesHtml(series, "daily-chart-dates", escapeHtml),
          `</div>`
        ].join("");
      }).join("");
    }

    (function initDailyChartHover() {
      let tip = null;
      const getTip = () => {
        if (!tip) {
          tip = document.createElement("div");
          tip.className = "daily-chart-tip";
          document.body.appendChild(tip);
        }
        return tip;
      };
      const clearMarkers = () => {
        const container = document.getElementById("daily-charts");
        if (!container) return;
        container.querySelectorAll(".spark-marker").forEach((el) => {
          el.setAttribute("opacity", "0");
        });
      };
      const hide = () => {
        if (tip) tip.classList.remove("visible");
        clearMarkers();
      };
      const metricByKey = (key) => DAILY_CHART_METRICS.find((m) => m.key === key);

      document.addEventListener("mousemove", (e) => {
        const chart = e.target.closest ? e.target.closest(".daily-chart") : null;
        if (!chart) { hide(); return; }
        const series = dailyChartState.series;
        if (!series || !series.length) { hide(); return; }
        const svg = chart.querySelector("svg");
        const metric = metricByKey(chart.getAttribute("data-metric-key"));
        if (!svg || !metric) { hide(); return; }

        const rect = svg.getBoundingClientRect();
        if (!rect.width) { hide(); return; }
        let ratio = (e.clientX - rect.left) / rect.width;
        ratio = Math.max(0, Math.min(1, ratio));
        const n = series.length;
        const index = n <= 1 ? 0 : Math.round(ratio * (n - 1));
        const row = series[index];
        if (!row) { hide(); return; }

        const values = series.map((r) => Number(r[metric.key] || 0));
        const max = Math.max(...values, 0);
        const min = Math.min(...values, 0);
        const range = max - min || 1;
        const innerW = SPARK.W - SPARK.padX * 2;
        const innerH = SPARK.H - SPARK.padY * 2;
        const mx = n <= 1 ? SPARK.W / 2 : SPARK.padX + (index / (n - 1)) * innerW;
        const my = SPARK.padY + innerH - ((values[index] - min) / range) * innerH;

        clearMarkers();
        const line = svg.querySelector(".spark-marker-line");
        const dot = svg.querySelector(".spark-marker-dot");
        if (line) {
          line.setAttribute("x1", mx.toFixed(1));
          line.setAttribute("x2", mx.toFixed(1));
          line.setAttribute("opacity", "0.6");
        }
        if (dot) {
          dot.setAttribute("cx", mx.toFixed(1));
          dot.setAttribute("cy", my.toFixed(1));
          dot.setAttribute("opacity", "1");
        }

        const el = getTip();
        el.innerHTML =
          `<div class="tip-date">${escapeHtml(row.date)}</div>` +
          `<div><span class="tip-dot" style="background:${metric.color}"></span>` +
          `${escapeHtml(metric.label)} <strong>${escapeHtml(metric.fmt(values[index]))}</strong></div>`;
        el.classList.add("visible");
        const tipRect = el.getBoundingClientRect();
        let left = e.clientX + 14;
        if (left + tipRect.width > window.innerWidth - 8) left = e.clientX - tipRect.width - 14;
        if (left < 8) left = 8;
        let top = e.clientY - tipRect.height - 12;
        if (top < 8) top = e.clientY + 16;
        el.style.left = `${left}px`;
        el.style.top = `${top}px`;
      });

      document.addEventListener("mouseleave", (e) => {
        if (e.target.closest && e.target.closest(".daily-charts")) hide();
      }, true);
      window.addEventListener("scroll", hide, true);
    })();

    function getDailyRowRoas(item) {
      return item.roasWeight > 0
        ? item.roasWeighted / item.roasWeight
        : (item.roasCount ? item.roasSum / item.roasCount : 0);
    }

    function buildDailySummaryRow(items) {
      if (!items.length) return "";
      const totals = {
        impressions: 0,
        clicks: 0,
        spend: 0,
        orders: 0,
        sales: 0,
        roasSum: 0,
        roasCount: 0
      };

      items.forEach((item) => {
        totals.impressions += item.impressions;
        totals.clicks += item.clicks;
        totals.spend += item.spend;
        totals.orders += item.orders;
        totals.sales += item.sales;
        const roas = getDailyRowRoas(item);
        if (roas > 0) {
          totals.roasSum += roas;
          totals.roasCount += 1;
        }
      });

      const avgRoas = totals.roasCount ? totals.roasSum / totals.roasCount : 0;
      return `
        <tr class="subtotal">
          <td colspan="3"><strong>TOTAL</strong></td>
          <td class="num">${formatInt(totals.impressions)}</td>
          <td class="num">${formatInt(totals.clicks)}</td>
          <td class="num">${formatSpend(totals.spend)}</td>
          <td class="num">${formatInt(totals.orders)}</td>
          <td class="num">${formatSpend(totals.sales)}</td>
          <td class="num">${formatRoas(avgRoas)}</td>
        </tr>`;
    }

    function renderDailyTableBody() {
      const allRows = dailyState.filtered;
      const start = (dailyState.page - 1) * dailyState.pageSize;
      const pageRows = allRows.slice(start, start + dailyState.pageSize);
      if (!allRows.length) {
        dailyTbody.innerHTML = `<tr><td colspan="${DAILY_COL_COUNT}" class="meta-status">표시할 데이터가 없습니다.</td></tr>`;
        if (dailyTfoot) dailyTfoot.innerHTML = "";
        return;
      }

      const bodyHtml = pageRows.map((item) => {
        const roas = getDailyRowRoas(item);
        return `
          <tr>
            <td>${renderAdTypeBadge(item.adType)}</td>
            <td title="${escapeAttr(item.campaign)}">${escapeHtml(item.campaign)}</td>
            <td>${escapeHtml(item.date)}</td>
            <td class="num">${formatInt(item.impressions)}</td>
            <td class="num">${formatInt(item.clicks)}</td>
            <td class="num">${formatSpend(item.spend)}</td>
            <td class="num">${formatInt(item.orders)}</td>
            <td class="num">${formatSpend(item.sales)}</td>
            <td class="num">${formatRoas(roas)}</td>
          </tr>`;
      }).join("");

      dailyTbody.innerHTML = bodyHtml;
      if (dailyTfoot) dailyTfoot.innerHTML = buildDailySummaryRow(allRows);
    }

    function updateDailyPagination() {
      const total = dailyState.filtered.length;
      const totalPages = Math.max(1, Math.ceil(total / dailyState.pageSize));
      if (dailyState.page > totalPages) dailyState.page = totalPages;
      dailyRowCount.textContent = `필터 결과 ${total.toLocaleString()}행`;
      dailyPageInfo.textContent = `${dailyState.page} / ${totalPages} 페이지`;
    }

    function renderRawFilters() {
      const adTypeOptions = buildSelectOptions(getAdTypeOptions(), rawState.filters[FILTER_AD_TYPE], true);
      const campaignOptions = buildSelectOptions(getCampaignOptions(rawState.filters[FILTER_AD_TYPE]), rawState.filters[FILTER_CAMPAIGN], true);

      rawFilters.innerHTML = `
        <div class="filter-item">
          <label>유형</label>
          <select data-col="${FILTER_AD_TYPE}">${adTypeOptions}</select>
        </div>
        <div class="filter-item">
          <label>캠페인</label>
          <select data-col="${FILTER_CAMPAIGN}">${campaignOptions}</select>
        </div>
        <div class="filter-item filter-item-date">
          <label>날짜</label>
          <div class="date-range-wrap">
            <div class="date-range-trigger" id="raw-date-trigger" tabindex="0">${escapeHtml(getDateRangeLabel(rawState.filters, rawState))}</div>
            <div class="date-range-popover">
              <div class="date-range-hint" id="raw-date-hint"></div>
              <div id="raw-date-calendar"></div>
            </div>
          </div>
        </div>`;

      renderDateRangeCalendar(rawState, rawState.filters, "raw-date", applyRawFiltersAndRender);
      bindDateRangeWrap("raw-date");

      rawFilters.querySelectorAll("select[data-col]").forEach((el) => {
        el.addEventListener("change", () => {
          const key = el.dataset.col;
          rawState.filters[key] = el.value.trim();
          if (key === FILTER_AD_TYPE) {
            rawState.filters[FILTER_CAMPAIGN] = "";
            renderRawFilters();
          }
          applyRawFiltersAndRender();
        });
      });
    }

    function resetRawFilters() {
      rawState.filters = {};
      rawState.sort = { key: null, dir: "asc" };
      rawState.global = "";
      rawState.dateCalendarMonth = "";
      rawState.datePickStart = null;
      document.getElementById("raw-global-search").value = "";
      renderRawFilters();
      applyRawFiltersAndRender();
    }

    function applyRawFiltersAndRender() {
      let rows = getRawSourceRows();
      if (rawState.global) {
        rows = rows.filter((row) =>
          baseState.columns.some((col) => String(row[col] ?? "").toLowerCase().includes(rawState.global))
        );
      }

      if (rawState.sort.key) {
        const { key, dir } = rawState.sort;
        const factor = dir === "asc" ? 1 : -1;
        rows.sort((a, b) => {
          const av = a[key] ?? "";
          const bv = b[key] ?? "";
          if (key === COL.AD_TYPE) {
            return getAdTypeLabel(av).localeCompare(getAdTypeLabel(bv), "ko") * factor;
          }
          if (key === baseState.metric.DATE) {
            return normalizeDate(av).localeCompare(normalizeDate(bv)) * factor;
          }
          if (NUMERIC_KEYS.has(key)) {
            return (parseNum(av) - parseNum(bv)) * factor;
          }
          return String(av).localeCompare(String(bv), "ko") * factor;
        });
      }

      rawState.filtered = rows;
      renderRawTableHead();
      renderRawTableBody();
    }

    function renderRawTableHead() {
      rawThead.innerHTML = `<tr>${baseState.columns.map((col) => {
        const active = rawState.sort.key === col;
        const icon = active ? (rawState.sort.dir === "asc" ? "▲" : "▼") : "↕";
        const label = col === COL.AD_TYPE ? "유형" : col;
        return `<th data-col="${escapeAttr(col)}">${escapeHtml(label)} <span class="sort-icon">${icon}</span></th>`;
      }).join("")}</tr>`;

      rawThead.querySelectorAll("th").forEach((th) => {
        th.addEventListener("click", () => {
          const col = th.dataset.col;
          if (rawState.sort.key === col) {
            rawState.sort.dir = rawState.sort.dir === "asc" ? "desc" : "asc";
          } else {
            rawState.sort.key = col;
            rawState.sort.dir = "asc";
          }
          applyRawFiltersAndRender();
        });
      });
    }

    function renderRawTableBody() {
      const cols = baseState.columns;
      const colCount = cols.length || 1;
      const rows = rawState.filtered;
      if (!rows.length) {
        rawTbody.innerHTML = `<tr><td colspan="${colCount}" class="meta-status">표시할 데이터가 없습니다.</td></tr>`;
        return;
      }

      rawTbody.innerHTML = rows.map((row) => {
        return `<tr>${cols.map((col) => {
          if (col === COL.AD_TYPE) {
            const adType = getAdTypeLabel(row[col]);
            return `<td>${renderAdTypeBadge(adType)}</td>`;
          }
          const value = row[col] ?? "";
          const cls = NUMERIC_KEYS.has(col) ? "num" : "";
          return `<td class="${cls}" title="${escapeAttr(String(value))}">${escapeHtml(formatRawCell(col, value))}</td>`;
        }).join("")}</tr>`;
      }).join("");
    }

    window.addEventListener("resize", scheduleAiAnalysisHeightSync);

    document.querySelectorAll(".ai-analysis-row-toggle").forEach((toggle) => {
      toggle.addEventListener("click", () => {
        const block = toggle.closest(".ai-analysis-row-block");
        if (!block) return;
        const isOpen = block.classList.toggle("open");
        toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
        if (isOpen) {
          scheduleAiAnalysisHeightSync();
          setTimeout(scheduleAiAnalysisHeightSync, 50);
        } else {
          block.querySelectorAll(".ai-analysis-cell-scrollable").forEach((el) => {
            el.style.height = "";
            el.style.maxHeight = "";
            el.style.overflowY = "";
          });
          block.querySelectorAll(".ai-analysis-label").forEach((el) => {
            el.style.minHeight = "";
          });
        }
      });
    });
  </script>
  <script src="shared/date-range-picker.js"></script>
  <script src="shared/kpi-calc-basis.js"></script>
  <script src="shared/kpi-summary.js"></script>
  <script>
    mountKpiSummary("kpi-summary-root", "amazon", { typeRows: ["SP", "SB", "TOTAL"] });
    if (window.KpiSummary) {
      window.KpiSummary.clearValues();
      window.KpiSummary.onDateChange = () => refreshAmazonKpiSummary();
    }
    window.loadAmazonData = loadAmazonData;
    if (window.PerformanceDataLoader) {
      window.PerformanceDataLoader.onDataUpdated(loadAmazonData);
    }
    loadAmazonData();
  </script>
</body>
