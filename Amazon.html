<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon · GTM1_퍼포먼스</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      padding: 48px 24px;
    }

    .container {
      max-width: 1800px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 40px;
      text-align: center;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
    }

    .page-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 1.65rem;
      font-weight: 900;
      line-height: 1;
      color: #1d1d1f;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid #e0e0e0;
      transition: background 0.2s;
    }

    .back-link:hover {
      background: #f5f5f7;
    }

    .page-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0;
      text-align: left;
    }

    .meta-page-content {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .meta-accordion {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
    }

    .meta-accordion-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      background: #fff;
      border: none;
      font-size: 1.125rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      color: #1d1d1f;
      transition: background 0.2s;
    }

    .meta-accordion-header:hover {
      background: #fafafa;
    }

    .meta-accordion.open .meta-accordion-header {
      border-bottom: 1px solid #e8e8ed;
    }

    .meta-accordion-header .chevron {
      font-size: 0.85rem;
      color: #86868b;
      transition: transform 0.2s;
    }

    .meta-accordion.open .meta-accordion-header .chevron {
      transform: rotate(180deg);
    }

    .meta-accordion.open {
      overflow: visible;
    }

    .meta-accordion-body {
      display: none;
      padding: 20px;
      overflow: visible;
    }

    .meta-accordion.open .meta-accordion-body {
      display: block;
      overflow: visible;
    }

    .meta-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .meta-info {
      font-size: 0.875rem;
      color: #6e6e73;
    }

    .meta-info strong {
      color: #1d1d1f;
    }

    .meta-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .meta-search {
      padding: 8px 12px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 0.875rem;
      min-width: 220px;
    }

    .meta-search:focus {
      outline: none;
      border-color: #1877f2;
      box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.15);
    }

    .btn {
      padding: 8px 14px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      background: #fff;
      font-size: 0.875rem;
      cursor: pointer;
    }

    .btn:hover {
      background: #f5f5f7;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
      padding: 16px;
      background: #f9f9fb;
      border-radius: 10px;
      position: relative;
      z-index: 20;
      overflow: visible;
    }

    .filter-item label {
      display: block;
      font-size: 0.75rem;
      color: #6e6e73;
      margin-bottom: 4px;
    }

    .filter-item input,
    .filter-item select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      font-size: 0.8125rem;
    }

    .filter-item-date {
      position: relative;
      z-index: 1;
    }

    .filter-item-date:hover,
    .filter-item-date:focus-within {
      z-index: 200;
    }

    .date-range-wrap {
      position: relative;
    }

    .date-range-trigger {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      background: #fff;
      font-size: 0.8125rem;
      color: #1d1d1f;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .date-range-wrap:hover .date-range-popover,
    .date-range-wrap:focus-within .date-range-popover,
    .date-range-wrap.open .date-range-popover {
      display: block;
    }

    .date-range-wrap.open .date-range-trigger,
    .date-range-wrap:hover .date-range-trigger,
    .date-range-wrap:focus-within .date-range-trigger {
      border-color: #1877f2;
    }

    .date-range-popover {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 200;
      width: 220px;
      padding: 8px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
    }

    .date-range-wrap::before {
      content: '';
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      height: 6px;
    }

    .date-range-wrap.open::before,
    .date-range-wrap:hover::before,
    .date-range-wrap:focus-within::before {
      display: block;
    }

    .date-range-hint {
      font-size: 0.6875rem;
      color: #86868b;
      margin-bottom: 6px;
      text-align: center;
    }

    .date-range-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .date-range-nav button {
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      color: #1d1d1f;
      font-size: 0.75rem;
    }

    .date-range-nav button:hover {
      background: #f0f0f0;
    }

    .date-range-nav button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .date-range-month {
      font-size: 0.75rem;
      font-weight: 600;
    }

    .date-range-weekdays,
    .date-range-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
    }

    .date-range-weekdays span {
      text-align: center;
      font-size: 0.625rem;
      color: #86868b;
      padding: 2px 0;
    }

    .date-day {
      height: 22px;
      border: none;
      background: transparent;
      border-radius: 4px;
      font-size: 0.6875rem;
      color: #c7c7cc;
      cursor: default;
      padding: 0;
      line-height: 22px;
    }

    .date-day.available {
      color: #1d1d1f;
      cursor: pointer;
    }

    .date-day.available:hover {
      background: #eef4ff;
    }

    .date-day.in-range {
      background: #e7f3ff;
      color: #1d1d1f;
      border-radius: 0;
    }

    .date-day.range-start,
    .date-day.range-end {
      background: #1877f2;
      color: #fff;
    }

    .date-day.range-start {
      border-radius: 4px 0 0 4px;
    }

    .date-day.range-end {
      border-radius: 0 4px 4px 0;
    }

    .date-day.range-start.range-end {
      border-radius: 4px;
    }

    .date-day.empty {
      visibility: hidden;
    }

    .date-range-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
    }

    .date-range-actions .btn-clear {
      font-size: 0.6875rem;
      padding: 3px 8px;
      color: #1877f2;
      border-color: transparent;
      background: transparent;
    }

    .date-range-actions .btn-clear:hover {
      background: #eef4ff;
    }

    .table-wrap {
      overflow: auto;
      max-height: 560px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      position: relative;
      z-index: 1;
    }

    .daily-charts {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .daily-charts:empty {
      display: none;
    }

    .daily-chart {
      min-width: 0;
      border: 1px solid #e8e8ed;
      border-radius: 8px;
      padding: 8px 9px 6px;
      background: #fff;
    }

    .daily-chart-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 4px;
    }

    .daily-chart-title {
      font-size: 0.6875rem;
      font-weight: 700;
      color: #6e6e73;
      white-space: nowrap;
    }

    .daily-chart-value {
      font-size: 0.6875rem;
      font-weight: 600;
      color: #1d1d1f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .daily-chart svg {
      display: block;
      width: 100%;
      height: 60px;
      margin-top: 5px;
      overflow: visible;
      cursor: crosshair;
    }

    .daily-chart-tip {
      position: fixed;
      z-index: 1000;
      padding: 5px 8px;
      background: #1d1d1f;
      color: #fff;
      border-radius: 6px;
      font-size: 0.6875rem;
      line-height: 1.55;
      white-space: nowrap;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.1s ease;
      pointer-events: none;
    }

    .daily-chart-tip.visible {
      opacity: 1;
      visibility: visible;
    }

    .daily-chart-tip .tip-date {
      color: #c7c7cc;
      margin-bottom: 1px;
    }

    .daily-chart-tip .tip-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 3px;
      vertical-align: baseline;
    }

    .daily-chart-dates {
      display: flex;
      justify-content: space-between;
      gap: 4px;
      font-size: 0.5625rem;
      color: #a1a1a6;
      margin-top: 3px;
    }

    .daily-charts-empty {
      grid-column: 1 / -1;
      font-size: 0.8125rem;
      color: #86868b;
      padding: 8px 0;
    }

    @media (max-width: 1100px) {
      .daily-charts {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 640px) {
      .daily-charts {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f5f5f7;
      z-index: 1;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 2px solid #e0e0e0;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    thead th:hover {
      background: #ebebef;
    }

    thead th .sort-icon {
      margin-left: 4px;
      color: #86868b;
      font-size: 0.7rem;
    }

    tbody td {
      padding: 8px 12px;
      border-bottom: 1px solid #f0f0f0;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: #fafafa;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .meta-status {
      padding: 24px;
      text-align: center;
      color: #6e6e73;
    }

    .meta-status.error {
      color: #d70015;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 0.875rem;
      color: #6e6e73;
    }

    .pagination-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .pagination-controls select {
      padding: 6px 8px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
    }

    .stats-table thead th {
      position: sticky;
      background: #f5f5f7;
      z-index: 2;
      cursor: default;
      text-align: center;
    }

    thead th[data-sort-key] {
      cursor: pointer;
    }

    thead th[data-sort-key]:hover {
      background: #ebebef;
    }

    .stats-table thead th[data-sort-key] {
      cursor: pointer;
    }

    .stats-table thead th[data-sort-key]:hover {
      background: #ebebef;
    }

    .stats-table thead tr:first-child th {
      top: 0;
      z-index: 3;
    }

    .stats-table tbody tr.subtotal td {
      background: #f5f5f7;
      font-weight: 600;
    }

    #daily-tfoot td {
      position: sticky;
      bottom: 0;
      z-index: 2;
      padding: 8px 12px;
      background: #f5f5f7;
      color: #1d1d1f;
      font-weight: 700;
      white-space: nowrap;
      border-top: 1px solid #d2d2d7;
    }

    .adtype-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #fff;
    }

    .adtype-badge.sp {
      background: #ff9900;
    }

    .adtype-badge.sb {
      background: #232f3e;
    }

    .ai-analysis-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: transparent;
    }

    .ai-analysis-block {
      border: 1px solid #e8e8ed;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    .ai-analysis-row-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 20px;
      background: #f5f5f7;
      border: none;
      cursor: pointer;
      font: inherit;
      box-sizing: border-box;
    }

    .ai-analysis-row-toggle:hover {
      background: #efeff2;
    }

    .ai-analysis-row-toggle .chevron {
      font-size: 0.75rem;
      color: #86868b;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .ai-analysis-row-block.open .ai-analysis-row-toggle .chevron {
      transform: rotate(180deg);
    }

    .ai-analysis-collapsible-body {
      display: none;
    }

    .ai-analysis-row-block.open .ai-analysis-collapsible-body {
      display: block;
    }

    .ai-analysis-collapsible-body .ai-analysis-data-row {
      grid-template-columns: 88px minmax(0, 1fr) minmax(0, 1fr);
    }

    .ai-analysis-header-row {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr) minmax(0, 1fr);
      align-items: stretch;
    }

    .ai-analysis-data-row {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr) minmax(0, 1fr);
      align-items: start;
    }

    .ai-analysis-corner {
      background: #f5f5f7;
      border-right: 1px solid #e8e8ed;
      min-height: 88px;
      box-sizing: border-box;
    }

    .ai-analysis-head {
      background: #f5f5f7;
      border-right: 1px solid #e8e8ed;
      padding: 16px 20px;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      box-sizing: border-box;
    }

    .ai-analysis-head-action2 {
      border-right: none;
    }

    .ai-analysis-label {
      background: #f5f5f7;
      border-right: 1px solid #e8e8ed;
      padding: 16px 12px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      align-self: stretch;
      font-size: 0.8125rem;
      font-weight: 700;
      color: #424245;
      box-sizing: border-box;
    }

    .ai-analysis-cell {
      border-right: 1px solid #e8e8ed;
      padding: 16px 20px;
      font-size: 0.875rem;
      color: #424245;
      line-height: 1.65;
      vertical-align: top;
      background: #f9f9fb;
      box-sizing: border-box;
    }

    .ai-analysis-cell-anchor {
      overflow: visible;
    }

    .ai-analysis-cell-scrollable {
      border-right: none;
      overflow-x: hidden;
      overflow-y: auto;
      box-sizing: border-box;
    }

    .ai-analysis-cell-scrollable::-webkit-scrollbar {
      width: 6px;
    }

    .ai-analysis-cell-scrollable::-webkit-scrollbar-thumb {
      background: #c7c7cc;
      border-radius: 3px;
    }

    .phrase-card-num {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #86868b;
      text-transform: uppercase;
    }

    .phrase-card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #1d1d1f;
      line-height: 1.35;
      margin: 0;
    }

    .phrase-md h2 {
      font-size: 0.9375rem;
      font-weight: 600;
      color: #1d1d1f;
      margin: 0 0 0.65em;
      line-height: 1.4;
    }

    .phrase-md ol {
      margin: 0;
      padding-left: 1.25em;
    }

    .phrase-md li {
      margin-bottom: 0.55em;
    }

    .phrase-md li:last-child {
      margin-bottom: 0;
    }

    .phrase-md strong {
      color: #1d1d1f;
      font-weight: 600;
    }

    .phrase-md p {
      margin: 0 0 0.75em;
    }

    .ai-summary-block {
      background: #fff;
      border: 1px solid #e8e8ed;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .ai-summary-block:last-child {
      margin-bottom: 0;
    }

    .ai-summary-block-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #86868b;
      margin-bottom: 10px;
    }

    .ai-summary-campaign {
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f2;
    }

    .ai-summary-campaign:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .ai-summary-campaign:first-of-type {
      padding-top: 0;
    }

    .ai-summary-campaign-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .ai-summary-campaign-head strong {
      color: #1d1d1f;
      font-size: 0.8125rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .ai-summary-campaign-name {
      font-weight: 600;
      color: #0066cc;
      font-size: 0.875rem;
      word-break: break-word;
    }

    .ai-summary-campaign-detail {
      font-size: 0.8125rem;
      color: #6e6e73;
      margin-bottom: 4px;
    }

    .ai-summary-campaign-note {
      font-size: 0.8125rem;
      color: #424245;
      line-height: 1.55;
    }

    .ai-summary-metrics {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .ai-summary-metric {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 10px;
      align-items: start;
      padding: 8px 0;
      border-bottom: 1px solid #f5f5f7;
    }

    .ai-summary-metric:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .ai-summary-metric-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: #1d1d1f;
      line-height: 1.45;
    }

    .ai-summary-metric-value {
      font-size: 0.8125rem;
      color: #424245;
      line-height: 1.55;
    }

    .ai-summary-tag {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      background: #f5f5f7;
      color: #424245;
      margin-left: 4px;
      vertical-align: middle;
    }

    .ai-summary-tag.good {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .ai-summary-tag.warn {
      background: #fff8e1;
      color: #f57f17;
    }

    .ai-summary-tag.bad {
      background: #ffebee;
      color: #c62828;
    }

    .ai-summary-block-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .ai-summary-block-title-row .ai-summary-block-title {
      margin-bottom: 0;
    }

    .criteria-info {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.6875rem;
      font-weight: 600;
      color: #6e6e73;
      background: #f0f0f2;
      border-radius: 999px;
      padding: 2px 9px;
      cursor: help;
      white-space: nowrap;
      outline: none;
    }

    .criteria-info:hover,
    .criteria-info:focus-visible {
      background: #e3e3e6;

      const target = String(label || "").trim().toLowerCase();
      if (!target) return label;
      const match = (columns || []).find((col) => String(col).trim().toLowerCase() === target);
      return match || label;
    }

    function buildAmazonKpiColumnMap(payload, rows = baseState.rows) {
      const spCols = payload?.spColumns || [];
      const sbCols = payload?.sbColumns || [];
      const map = { SP: {}, SB: {} };
      Object.entries(AMAZON_KPI_COLUMN_LABELS.SP).forEach(([key, label]) => {
        const index = AMAZON_SP_KPI_COLUMN_INDEX[key];
        const fromIndex = Number.isInteger(index) && spCols[index] ? spCols[index] : "";
        const fallbacks = AMAZON_KPI_SP_KEY_FALLBACKS[key] || [];
        map.SP[key] = resolveAmazonKpiRowKey(rows, "SP", [
          fromIndex,
          pickColumnNameFromList(spCols, label),
          ...fallbacks
        ]);
      });
      Object.entries(AMAZON_KPI_COLUMN_LABELS.SB).forEach(([key, label]) => {
        const primary = pickColumnNameFromList(sbCols, label);
        const fallbacks = AMAZON_KPI_SB_KEY_FALLBACKS[key] || [];
        map.SB[key] = resolveAmazonKpiRowKey(rows, "SB", [primary, ...fallbacks]);
      });
      amazonKpiColumnMap = map;
      return map;
    }

    function resolveAmazonKpiRowKey(rows, adType, labels) {
      const typeRows = (rows || []).filter(
        (row) => String(row[COL.AD_TYPE] || "").toUpperCase() === adType
      );
      const candidates = (labels || []).filter(Boolean);
      if (!typeRows.length || !candidates.length) return candidates[0] || "";

      const rowKeys = [...new Set(typeRows.flatMap((row) => Object.keys(row)))];
      for (const label of candidates) {
        for (const key of rowKeys) {
          if (String(key).trim().toLowerCase() === String(label).trim().toLowerCase()) {
            return key;
          }
        }
      }
      return candidates[0];
    }

    function getAmazonKpiRawValue(row, adType, fieldKey) {
      if (!row) return "";
      const primary = amazonKpiColumnMap[adType]?.[fieldKey];
      const candidates = [primary];
      if (adType === "SP" && AMAZON_KPI_SP_KEY_FALLBACKS[fieldKey]) {
        candidates.push(...AMAZON_KPI_SP_KEY_FALLBACKS[fieldKey]);
      }
      if (adType === "SB" && AMAZON_KPI_SB_KEY_FALLBACKS[fieldKey]) {
        candidates.push(...AMAZON_KPI_SB_KEY_FALLBACKS[fieldKey]);
      }
      for (const cand of candidates) {
        if (!cand) continue;
        if (Object.prototype.hasOwnProperty.call(row, cand)) {
          return row[cand];
        }
      }
      for (const key of Object.keys(row)) {
        const normalized = String(key).trim().toLowerCase();
        for (const cand of candidates) {
          if (!cand) continue;
          if (normalized === String(cand).trim().toLowerCase()) {
            return row[key];
          }
        }
      }
      return "";
    }

    function getAmazonKpiNum(row, adType, fieldKey) {
      return parseNum(getAmazonKpiRawValue(row, adType, fieldKey));
    }

    function getAmazonRowDate(row) {
      return normalizeDate(row[baseState.metric.DATE] || row["날짜"] || row["Date"]);
    }

    function filterAmazonRowsForKpi(rows, dateFrom, dateTo) {
      if (!dateFrom && !dateTo) return rows;
      return rows.filter((row) => {
        const date = getAmazonRowDate(row);
        if (!date) return false;
        if (dateFrom && date < dateFrom) return false;
        if (dateTo && date > dateTo) return false;
        return true;
      });
    }

    function createAmazonKpiTotals() {
      return {
        spend: 0,
        impressions: 0,
        clicks: 0,
        orders: 0,
        sales: 0,
        acosSum: 0,
        rowCount: 0
      };
    }

    function accumulateAmazonKpiRow(totals, row, adType) {
      totals.spend += getAmazonKpiNum(row, adType, "spend");
      totals.impressions += getAmazonKpiNum(row, adType, "impressions");
      totals.clicks += getAmazonKpiNum(row, adType, "clicks");
      totals.orders += getAmazonKpiNum(row, adType, "orders");
      totals.sales += getAmazonKpiNum(row, adType, "sales");
      totals.acosSum += parsePct(getAmazonKpiRawValue(row, adType, "acos"));
      totals.rowCount += 1;
    }

    function buildAmazonKpiMetricsFromTotals(totals) {
      const { spend, impressions, clicks, orders, sales, acosSum, rowCount } = totals;
      return {
        cpm: impressions ? (spend / impressions) * 1000 : 0,
        impr: impressions,
        clicks,
        ctr: impressions ? clicks / impressions : 0,
        cpc: clicks ? spend / clicks : 0,
        cost: spend,
        cvs: orders,
        cvr: clicks ? orders / clicks : 0,
        cvsValues: sales,
        roas: spend ? sales / spend : 0,
        acos: rowCount ? acosSum / rowCount : 0,
        tacos: sales ? spend / sales : 0,
        cpa: orders ? spend / orders : 0,
        aov: orders ? sales / orders : 0
      };
    }

    function aggregateAmazonKpi(rows, adType) {
      const totals = createAmazonKpiTotals();
      rows.forEach((row) => accumulateAmazonKpiRow(totals, row, adType));
      return buildAmazonKpiMetricsFromTotals(totals);
    }

    function aggregateAmazonKpiTotal(rows) {
      const totals = createAmazonKpiTotals();
      rows.forEach((row) => {
        const adType = String(row[COL.AD_TYPE] || "").toUpperCase();
        if (adType !== "SP" && adType !== "SB") return;
        accumulateAmazonKpiRow(totals, row, adType);
      });
      return buildAmazonKpiMetricsFromTotals(totals);
    }

    function formatAmazonKpiDisplay(raw) {
      return {
        cpm: `$${formatSpend(raw.cpm)}`,
        impr: formatInt(raw.impr),
        clicks: formatInt(raw.clicks),
        ctr: formatPct(raw.ctr),
        cpc: `$${formatSpend(raw.cpc)}`,
        cost: `$${formatSpend(raw.cost)}`,
        cvs: formatInt(raw.cvs),
        cvr: formatPct(raw.cvr),
        cvsValues: `$${formatSpend(raw.cvsValues)}`,
        roas: Number(raw.roas || 0).toFixed(2),
        acos: formatPct(raw.acos),
        tacos: formatPct(raw.tacos),
        cpa: `$${formatSpend(raw.cpa)}`,
        aov: `$${formatSpend(raw.aov)}`
      };
    }

    function refreshAmazonKpiSummary() {
      if (!window.KpiSummary) return;
      if (!baseState.rows?.length) {
        window.KpiSummary.clearValues();
        return;
      }

      window.KpiSummary.syncSourceFiles({
        sourceFiles: baseState.sourceFiles
      });

      buildAmazonKpiColumnMap(
        { spColumns: baseState.spColumns, sbColumns: baseState.sbColumns },
        baseState.rows
      );

      const { start, end } = window.KpiSummary.getDateRange();
      const filtered = filterAmazonRowsForKpi(baseState.rows, start, end);

      ["SP", "SB"].forEach((adType) => {
        const typeRows = filtered.filter((row) => String(row[COL.AD_TYPE] || "").toUpperCase() === adType);
        const metrics = aggregateAmazonKpi(typeRows, adType);
        window.KpiSummary.setTypeRowValues(adType, formatAmazonKpiDisplay(metrics));
      });

      const totalMetrics = aggregateAmazonKpiTotal(filtered);
      window.KpiSummary.setTypeRowValues("TOTAL", formatAmazonKpiDisplay(totalMetrics));
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function escapeAttr(str) {
      return escapeHtml(str).replace(/'/g, "&#39;");
    }

    function resolveColumns(payload) {
      const sp = Array.isArray(payload?.spColumns) ? payload.spColumns : [];
      return {
        AD_TYPE: COL.AD_TYPE,
        DATE: sp[0] || COL.DATE,
        CAMPAIGN: sp[3] || COL.CAMPAIGN,
        IMPRESSIONS: sp[11] || COL.IMPRESSIONS,
        CLICKS: sp[13] || COL.CLICKS,
        SPEND: sp[16] || COL.SPEND,
        ORDERS: sp[20] || COL.ORDERS,
        ROAS: sp[22] || COL.ROAS
      };
    }

    function parseNum(val) {
      const cleaned = String(val ?? "")
        .replace(/[$,%]/g, "")
        .replace(/,/g, "")
        .trim();
      if (!cleaned) return 0;
      const n = Number(cleaned);
      return Number.isNaN(n) ? 0 : n;
    }

    function normalizeDate(val) {
      const s = String(val ?? "").trim();
      if (!s) return "";
      const ymd = s.match(/^(\d{4})[-/.](\d{2})[-/.](\d{2})$/);
      if (ymd) return `${ymd[1]}-${ymd[2]}-${ymd[3]}`;
      const mdy = s.match(/^(\d{2})[-/.](\d{2})[-/.](\d{4})$/);
      if (mdy) return `${mdy[3]}-${mdy[1]}-${mdy[2]}`;
      return "";
    }

    function sortIcon(sortState, key) {
      const active = sortState.key === key;
      return active ? (sortState.dir === "asc" ? "▲" : "▼") : "↕";
    }

    function compareSortValues(av, bv, key, factor) {
      if (key === "adType") {
        return getAdTypeLabel(av).localeCompare(getAdTypeLabel(bv), "ko") * factor;
      }
      if (key === "date") {
        return normalizeDate(av).localeCompare(normalizeDate(bv)) * factor;
      }
      if (key === "impressions" || key === "clicks" || key === "spend" || key === "orders" || key === "roas") {
        return (parseNum(av) - parseNum(bv)) * factor;
      }
      return String(av).localeCompare(String(bv), "ko") * factor;
    }

    function sortByState(items, sortState, valueGetter) {
      if (!sortState?.key) return items;
      const factor = sortState.dir === "asc" ? 1 : -1;
      const key = sortState.key;
      return [...items].sort((a, b) => compareSortValues(valueGetter(a, key), valueGetter(b, key), key, factor));
    }

    function sortableTh(label, sortKey, sortState) {
      return `<th data-sort-key="${escapeAttr(sortKey)}">${escapeHtml(label)} <span class="sort-icon">${sortIcon(sortState, sortKey)}</span></th>`;
    }

    function bindSortableThead(theadEl, sortState, onSortChange) {
      if (!theadEl || theadEl.dataset.sortBound === "1") return;
      theadEl.dataset.sortBound = "1";
      theadEl.addEventListener("click", (e) => {
        const th = e.target.closest("th[data-sort-key]");
        if (!th) return;
        const key = th.dataset.sortKey;
        if (sortState.key === key) {
          sortState.dir = sortState.dir === "asc" ? "desc" : "asc";
        } else {
          sortState.key = key;
          sortState.dir = "asc";
        }
        onSortChange();
      });
    }

    function renderTheadRow(theadEl, columns, sortState) {
      theadEl.innerHTML = `<tr>${columns.map((col) => sortableTh(col.label, col.key, sortState)).join("")}</tr>`;
    }

    function getPeriodSortValue(item, key) {
      if (key === "adType") return item.adType;
      if (key === "roas") return item.roasCount ? item.roasSum / item.roasCount : 0;
      return item[key] ?? 0;
    }

    function getDailySortValue(item, key) {
      if (key === "adType") return item.adType;
      if (key === "campaign") return item.campaign;
      if (key === "date") return item.date;
      if (key === "roas") return getDailyRowRoas(item);
      return item[key] ?? 0;
    }

    function formatInt(n) {
      return Math.round(Number(n || 0)).toLocaleString();
    }

    function formatSpend(n) {
      return Number(n || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatRoas(n) {
      const v = Number(n || 0);
      if (!v) return "-";
      return v.toFixed(2);
    }

    function parsePct(val) {
      const s = String(val ?? "").trim();
      const n = parseNum(s);
      if (!s && !n) return 0;
      if (s.includes("%") || n > 1) return n / 100;
      return n;
    }

    function formatPct(rate) {
      return `${(rate * 100).toFixed(2)}%`;
    }

    function findMetricColumn(patterns) {
      for (const col of baseState.columns) {
        const lower = String(col).toLowerCase();
        for (const pattern of patterns) {
          if (lower.includes(String(pattern).toLowerCase())) return col;
        }
      }
      return "";
    }

    function mdInline(text) {
      return escapeHtml(String(text ?? ""))
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    }

    function renderMarkdown(source) {
      const lines = String(source ?? "").replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let listType = "";

      function closeList() {
        if (listType) {
          html.push(listType === "ul" ? "</ul>" : "</ol>");
          listType = "";
        }
      }

      for (const rawLine of lines) {
        const trimmed = rawLine.trim();
        if (!trimmed) {
          closeList();
          continue;
        }
        if (trimmed.startsWith("## ")) {
          closeList();
          html.push(`<h2>${mdInline(trimmed.slice(3))}</h2>`);
          continue;
        }
        if (/^[-*]\s+/.test(trimmed)) {
          if (listType !== "ul") {
            closeList();
            html.push("<ul>");
            listType = "ul";
          }
          html.push(`<li>${mdInline(trimmed.replace(/^[-*]\s+/, ""))}</li>`);
          continue;
        }
        if (/^\d+\.\s+/.test(trimmed)) {
          if (listType !== "ol") {
            closeList();
            html.push("<ol>");
            listType = "ol";
          }
          html.push(`<li>${mdInline(trimmed.replace(/^\d+\.\s+/, ""))}</li>`);
          continue;
        }
        closeList();
        html.push(`<p>${mdInline(trimmed)}</p>`);
      }
      closeList();
      return html.join("");
    }

    function setAiCardContent(el, result) {
      if (!el) return;
      const markdown = result?.markdown ?? "";
      el.innerHTML = markdown ? renderMarkdown(markdown) : (result?.html ?? "");
    }

    function splitSpSbMarkdown(markdown) {
      const text = String(markdown ?? "").replace(/\r\n/g, "\n");
      const spMatch = text.match(/## SP\s*\n([\s\S]*?)(?=\n## SB|$)/);
      const sbMatch = text.match(/## SB\s*\n([\s\S]*)$/);
      const sp = spMatch ? spMatch[1].trim() : text.trim();
      const sb = sbMatch ? sbMatch[1].trim() : "";
      return { sp, sb };
    }

    function setAiAnalysisEmptyMessage(message) {
      const targets = [
        "ai-card-1-sp",
        "ai-card-1-sb",
        "ai-card-2-sp",
        "ai-card-2-sb"
      ];
      targets.forEach((id) => {
        setAiCardContent(document.getElementById(id), { markdown: message });
      });
    }

    function renderAiAnalysisCard(cardNum, reportBuilder) {
      const spEl = document.getElementById(`ai-card-${cardNum}-sp`);
      const sbEl = document.getElementById(`ai-card-${cardNum}-sb`);

      try {
        const report = reportBuilder(baseState.rows);
        if (report.htmlByType) {
          setAiCardContent(spEl, { html: report.htmlByType.SP || "SP 데이터가 없습니다." });
          setAiCardContent(sbEl, { html: report.htmlByType.SB || "SB 데이터가 없습니다." });

      } catch (err) {
        const errMsg = cardNum === 1 ? "요약 생성 중 오류가 발생했습니다." : "전략 제안 생성 중 오류가 발생했습니다.";
        setAiCardContent(spEl, { markdown: errMsg });
        setAiCardContent(sbEl, { markdown: errMsg });
        console.error(err);
      }
    }

    function getCampaignRoas(item) {
      return item.roasWeight > 0 ? item.roasWeighted / item.roasWeight : 0;
    }

    function aggregateCampaignItems(rows) {
      const ctrCol = findMetricColumn(["ctr", "클릭률"]);
      const cpcCol = findMetricColumn(["cpc", "클릭당"]);
      const acosCol = findMetricColumn(["acos"]);
      const salesCol = findMetricColumn(["7일 총 판매", "total sales", "14 day total sales"]);
      const map = new Map();

      rows.forEach((row) => {
        const adType = getAdTypeLabel(row[COL.AD_TYPE]);
        const campaign = String(row[baseState.metric.CAMPAIGN] ?? "").trim();
        if (!campaign) return;
        const key = `${adType}|${campaign.toLowerCase()}`;
        if (!map.has(key)) {
          map.set(key, {
            adType,
            campaign,
            impressions: 0,
            clicks: 0,
            spend: 0,
            orders: 0,
            sales: 0,
            roasWeighted: 0,
            roasWeight: 0,
            ctrSum: 0,
            ctrCount: 0,
            cpcSum: 0,
            cpcCount: 0,
            acosSum: 0,
            acosCount: 0
          });
        }
        const item = map.get(key);
        const spend = parseNum(row[baseState.metric.SPEND]);
        const roas = parseNum(row[baseState.metric.ROAS]);
        const imp = parseNum(row[baseState.metric.IMPRESSIONS]);
        const clicks = parseNum(row[baseState.metric.CLICKS]);
        item.impressions += imp;
        item.clicks += clicks;
        item.spend += spend;
        item.orders += parseNum(row[baseState.metric.ORDERS]);
        if (salesCol) item.sales += parseNum(row[salesCol]);
        if (spend > 0 && roas > 0) {
          item.roasWeighted += roas * spend;
          item.roasWeight += spend;
        }
        if (ctrCol && row[ctrCol]) {
          item.ctrSum += parsePct(row[ctrCol]);
          item.ctrCount += 1;
        }
        if (cpcCol && row[cpcCol]) {
          item.cpcSum += parseNum(row[cpcCol]);
          item.cpcCount += 1;
        }
        if (acosCol && row[acosCol]) {
          const acos = parsePct(row[acosCol]);
          if (acos > 0) {
            item.acosSum += acos;
            item.acosCount += 1;
          }
        }
      });

      return [...map.values()].map((item) => {
        const roas = getCampaignRoas(item);
        const ctr = item.ctrCount
          ? item.ctrSum / item.ctrCount
          : (item.impressions ? item.clicks / item.impressions : 0);
        const cpc = item.cpcCount
          ? item.cpcSum / item.cpcCount
          : (item.clicks ? item.spend / item.clicks : 0);
        const acos = item.acosCount
          ? item.acosSum / item.acosCount
          : (item.sales > 0 ? item.spend / item.sales : 0);
        return { ...item, roas, ctr, cpc, acos };
      });
    }

    function computeRoasTrend(rows) {
      const byDate = new Map();
      rows.forEach((row) => {
        const date = normalizeDate(row[baseState.metric.DATE]);
        if (!date) return;
        if (!byDate.has(date)) {
          byDate.set(date, { roasWeighted: 0, roasWeight: 0 });
        }
        const bucket = byDate.get(date);
        const spend = parseNum(row[baseState.metric.SPEND]);
        const roas = parseNum(row[baseState.metric.ROAS]);
        if (spend > 0 && roas > 0) {
          bucket.roasWeighted += roas * spend;
          bucket.roasWeight += spend;
        }
      });
      const dates = [...byDate.keys()].sort();
      if (dates.length < 2) {
        return { label: "데이터 부족", first: 0, last: 0 };
      }
      const mid = Math.floor(dates.length / 2);
      const avgForDates = (list) => {
        let weighted = 0;
        let weight = 0;
        list.forEach((date) => {
          const bucket = byDate.get(date);
          weighted += bucket.roasWeighted;
          weight += bucket.roasWeight;
        });
        return weight ? weighted / weight : 0;
      };
      const first = avgForDates(dates.slice(0, mid));
      const last = avgForDates(dates.slice(mid));
      let label = "유지";
      if (last > first * 1.05) label = "상승";
      else if (last < first * 0.95) label = "하락";
      return { label, first, last };
    }

    function getDateRangeLabelFromRows(rows) {
      const dates = rows
        .map((row) => normalizeDate(row[baseState.metric.DATE]))
        .filter(Boolean)
        .sort();
      if (!dates.length) return "전체 기간";
      const first = dates[0];
      const last = dates[dates.length - 1];
      return first === last ? first : `${first} ~ ${last}`;
    }

    function summarizeCampaignMetrics(campaigns) {
      const totalImp = campaigns.reduce((sum, item) => sum + item.impressions, 0);
      const totalClicks = campaigns.reduce((sum, item) => sum + item.clicks, 0);
      const totalSpend = campaigns.reduce((sum, item) => sum + item.spend, 0);
      const totalOrders = campaigns.reduce((sum, item) => sum + item.orders, 0);
      const totalRoasWeighted = campaigns.reduce((sum, item) => sum + item.roasWeighted, 0);
      const totalRoasWeight = campaigns.reduce((sum, item) => sum + item.roasWeight, 0);
      const overallRoas = totalRoasWeight ? totalRoasWeighted / totalRoasWeight : 0;
      const overallCtr = totalImp ? totalClicks / totalImp : 0;
      const overallCpc = totalClicks ? totalSpend / totalClicks : 0;
      const overallCpa = totalOrders ? totalSpend / totalOrders : 0;
      return {
        totalImp,
        totalClicks,
        totalSpend,
        totalOrders,
        overallRoas,
        overallCtr,
        overallCpc,
        overallCpa
      };
    }

    function summaryTagClass(level) {
      const good = ["양호", "우수", "효율적", "효율 양호", "상승"];
      const warn = ["보통", "보통 수준", "유지", "저조"];
      if (good.includes(level)) return "good";
      if (warn.includes(level)) return "warn";
      return "bad";
    }

    function summaryTagHtml(level) {

    }

    function buildCampaignHighlightHtml(label, campaign, detail, note) {
      return [
        `<div class="ai-summary-campaign">`,
        `<div class="ai-summary-campaign-head"><strong>${escapeHtml(label)}</strong><span class="ai-summary-campaign-name">${escapeHtml(campaign)}</span></div>`,
        `<div class="ai-summary-campaign-detail">${detail}</div>`,
        `<div class="ai-summary-campaign-note">${escapeHtml(note)}</div>`,

      ].join("");
    }

    function buildMetricRowHtml(label, valueHtml) {
      return [
        `<div class="ai-summary-metric">`,
        `<div class="ai-summary-metric-label">${escapeHtml(label)}</div>`,
        `<div class="ai-summary-metric-value">${valueHtml}</div>`,
        `</div>`
      ].join("");
    }

    function computeRoasWeekTrend(rows) {
      const byDate = new Map();
      rows.forEach((row) => {
        const date = normalizeDate(row[baseState.metric.DATE]);
        if (!date) return;
        if (!byDate.has(date)) {
          byDate.set(date, { roasWeighted: 0, roasWeight: 0 });
        }
        const bucket = byDate.get(date);
        const spend = parseNum(row[baseState.metric.SPEND]);
        const roas = parseNum(row[baseState.metric.ROAS]);
        if (spend > 0 && roas > 0) {
          bucket.roasWeighted += roas * spend;
          bucket.roasWeight += spend;
        }
      });

      const dates = [...byDate.keys()].sort();
      if (!dates.length) return { label: "데이터 부족", recent: 0, previous: 0 };

      const dayMs = 86400000;
      const latest = new Date(`${dates[dates.length - 1]}T00:00:00`);
      const recentStart = new Date(latest.getTime() - 6 * dayMs);
      const prevEnd = new Date(latest.getTime() - 7 * dayMs);
      const prevStart = new Date(latest.getTime() - 13 * dayMs);

      const avgForRange = (start, end) => {
        let weighted = 0;
        let weight = 0;
        byDate.forEach((bucket, date) => {
          const d = new Date(`${date}T00:00:00`);
          if (d >= start && d <= end) {
            weighted += bucket.roasWeighted;
            weight += bucket.roasWeight;
          }
        });
        return weight ? weighted / weight : 0;
      };

      const recent = avgForRange(recentStart, latest);
      const previous = avgForRange(prevStart, prevEnd);

      if (previous <= 0) return { label: "전주 데이터 부족", recent, previous };

      let label = "유지";
      if (recent > previous * 1.05) label = "상승";
      else if (recent < previous * 0.95) label = "하락";
      return { label, recent, previous };
    }

    function getCtrLevel(ctr) {
      if (ctr >= 0.015) return "우수";
      if (ctr >= 0.01) return "양호";
      if (ctr >= 0.005) return "보통";
      return "나쁨";
    }

    function getCpcLevel(cpc) {
      if (cpc <= 0.5) return "우수";
      if (cpc <= 1.0) return "양호";
      if (cpc <= 1.5) return "보통";
      return "나쁨";
    }

    (function initCriteriaTooltipPosition() {
      const OFFSET = 8;
      const getTip = (info) => info.querySelector(":scope > .criteria-tooltip");

      function place(info) {
        const tip = getTip(info);
        if (!tip) return;
        tip.classList.add("criteria-tooltip-fixed");
        tip.style.left = "0px";
        tip.style.top = "0px";
        const infoRect = info.getBoundingClientRect();
        const tipRect = tip.getBoundingClientRect();
        let left = infoRect.right - tipRect.width;
        if (left + tipRect.width > window.innerWidth - 8) left = window.innerWidth - 8 - tipRect.width;
        if (left < 8) left = 8;
        tip.style.left = `${left}px`;
        tip.style.top = `${infoRect.bottom + OFFSET}px`;
      }

      function clear(info) {
        const tip = getTip(info);
        if (!tip) return;
        tip.classList.remove("criteria-tooltip-fixed");
        tip.style.left = "";
        tip.style.top = "";
      }

      document.addEventListener("mouseover", (e) => {
        const info = e.target.closest ? e.target.closest(".criteria-info") : null;
        if (info) place(info);
      });
      document.addEventListener("mouseout", (e) => {
        const info = e.target.closest ? e.target.closest(".criteria-info") : null;
        if (!info) return;
        if (e.relatedTarget && info.contains(e.relatedTarget)) return;
        clear(info);
      });
      document.addEventListener("focusin", (e) => {
        const info = e.target.closest ? e.target.closest(".criteria-info") : null;
        if (info) place(info);
      });
      document.addEventListener("focusout", (e) => {
        const info = e.target.closest ? e.target.closest(".criteria-info") : null;
        if (!info) return;
        if (e.relatedTarget && info.contains(e.relatedTarget)) return;
        clear(info);
      });
      window.addEventListener("scroll", () => {
        document.querySelectorAll(".criteria-tooltip-fixed").forEach((tip) => {
          const info = tip.closest(".criteria-info");
          if (info) place(info);
        });
      }, true);
    })();

          : `지출 $5 이상 캠페인 중 지출 대비 ROAS가 낮아 낭비 지표(지출÷ROAS)가 가장 큽니다. 재배분·입찰 조정 우선 검토 대상입니다.`;
        highlightParts.push(buildCampaignHighlightHtml(

      const metricParts = [

      ));
      metricParts.push(buildMetricRowHtml(

          ? `CTR <strong>${formatPct(overallCtr)}</strong>${summaryTagHtml(ctrLevel)} · 노출 ${formatInt(totalImp)} · 클릭 ${formatInt(totalClicks)}`

      metricParts.push(buildMetricRowHtml(

    function buildAiCard1Report(rows) {
      if (!rows.length) {
        return { htmlByType: { SP: "분석할 캠페인 데이터가 없습니다.", SB: "분석할 캠페인 데이터가 없습니다." } };

          SB: buildAdTypeSectionHtml(rows, "SB")
        }
      };
