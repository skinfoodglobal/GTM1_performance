<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok · GTM1_퍼포먼스</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      padding: 48px 24px;
    }

    .container {
      max-width: 1800px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 40px;
      text-align: center;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
    }

    .page-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 1.65rem;
      font-weight: 900;
      line-height: 1;
      color: #1d1d1f;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid #e0e0e0;
      transition: background 0.2s;
    }

    .back-link:hover {
      background: #f5f5f7;
    }

    .page-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0;
      text-align: left;
    }

    .meta-page-content {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .meta-accordion {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
    }

    .meta-accordion-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      background: #fff;
      border: none;
      font-size: 1.125rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      color: #1d1d1f;
      transition: background 0.2s;
    }

    .meta-accordion-header:hover {
      background: #fafafa;
    }

    .meta-accordion.open .meta-accordion-header {
      border-bottom: 1px solid #e8e8ed;
    }

    .meta-accordion-header .chevron {
      font-size: 0.85rem;
      color: #86868b;
      transition: transform 0.2s;
    }

    .meta-accordion.open .meta-accordion-header .chevron {
      transform: rotate(180deg);
    }

    .meta-accordion.open {
      overflow: visible;
    }

    .meta-accordion-body {
      display: none;
      padding: 20px;
      overflow: visible;
    }

    .meta-accordion.open .meta-accordion-body {
      display: block;
      overflow: visible;
    }

    .meta-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .meta-info {
      font-size: 0.875rem;
      color: #6e6e73;
    }

    .meta-info strong {
      color: #1d1d1f;
    }

    .meta-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .meta-search {
      padding: 8px 12px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 0.875rem;
      min-width: 220px;
    }

    .meta-search:focus {
      outline: none;
      border-color: #1877f2;
      box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.15);
    }

    .btn {
      padding: 8px 14px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      background: #fff;
      font-size: 0.875rem;
      cursor: pointer;
    }

    .btn:hover {
      background: #f5f5f7;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
      padding: 16px;
      background: #f9f9fb;
      border-radius: 10px;
      position: relative;
      z-index: 20;
      overflow: visible;
    }

    .filter-item label {
      display: block;
      font-size: 0.75rem;
      color: #6e6e73;
      margin-bottom: 4px;
    }

    .filter-item input,
    .filter-item select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      font-size: 0.8125rem;
    }

    .filter-item-date {
      position: relative;
      z-index: 1;
    }

    .filter-item-date:hover,
    .filter-item-date:focus-within {
      z-index: 200;
    }

    .date-range-wrap {
      position: relative;
    }

    .date-range-trigger {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      background: #fff;
      font-size: 0.8125rem;
      color: #1d1d1f;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .date-range-wrap:hover .date-range-popover,
    .date-range-wrap:focus-within .date-range-popover,
    .date-range-wrap.open .date-range-popover {
      display: block;
    }

    .date-range-wrap.open .date-range-trigger,
    .date-range-wrap:hover .date-range-trigger,
    .date-range-wrap:focus-within .date-range-trigger {
      border-color: #1877f2;
    }

    .date-range-popover {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 200;
      width: 220px;
      padding: 8px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
    }

    .date-range-wrap::before {
      content: '';
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      height: 6px;
    }

    .date-range-wrap.open::before,
    .date-range-wrap:hover::before,
    .date-range-wrap:focus-within::before {
      display: block;
    }

    .date-range-hint {
      font-size: 0.6875rem;
      color: #86868b;
      margin-bottom: 6px;
      text-align: center;
    }

    .date-range-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .date-range-nav button {
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      color: #1d1d1f;
      font-size: 0.75rem;
    }

    .date-range-nav button:hover {
      background: #f0f0f0;
    }

    .date-range-nav button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .date-range-month {
      font-size: 0.75rem;
      font-weight: 600;
    }

    .date-range-weekdays,
    .date-range-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
    }

    .date-range-weekdays span {
      text-align: center;
      font-size: 0.625rem;
      color: #86868b;
      padding: 2px 0;
    }

    .date-day {
      height: 22px;
      border: none;
      background: transparent;
      border-radius: 4px;
      font-size: 0.6875rem;
      color: #c7c7cc;
      cursor: default;
      padding: 0;
      line-height: 22px;
    }

    .date-day.available {
      color: #1d1d1f;
      cursor: pointer;
    }

    .date-day.available:hover {
      background: #eef4ff;
    }

    .date-day.in-range {
      background: #e7f3ff;
      color: #1d1d1f;
      border-radius: 0;
    }

    .date-day.range-start,
    .date-day.range-end {
      background: #1877f2;
      color: #fff;
    }

    .date-day.range-start {
      border-radius: 4px 0 0 4px;
    }

    .date-day.range-end {
      border-radius: 0 4px 4px 0;
    }

    .date-day.range-start.range-end {
      border-radius: 4px;
    }

    .date-day.empty {
      visibility: hidden;
    }

    .date-range-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
    }

    .date-range-actions .btn-clear {
      font-size: 0.6875rem;
      padding: 3px 8px;
      color: #1877f2;
      border-color: transparent;
      background: transparent;
    }

    .date-range-actions .btn-clear:hover {
      background: #eef4ff;
    }

    .table-wrap {
      overflow: auto;
      max-height: 560px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      position: relative;
      z-index: 1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f5f5f7;
      z-index: 1;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 2px solid #e0e0e0;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    thead th:hover {
      background: #ebebef;
    }

    thead th .sort-icon {
      margin-left: 4px;
      color: #86868b;
      font-size: 0.7rem;
    }

    tbody td {
      padding: 8px 12px;
      border-bottom: 1px solid #f0f0f0;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: #fafafa;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .meta-status {
      padding: 24px;
      text-align: center;
      color: #6e6e73;
    }

    .meta-status.error {
      color: #d70015;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 0.875rem;
      color: #6e6e73;
    }

    .pagination-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .pagination-controls select {
      padding: 6px 8px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
    }

    .stats-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 2px solid #e0e0e0;
    }

    .stats-title {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #1d1d1f;
    }

    .stats-title span {
      color: #1877f2;
    }

    .stats-title .stats-sub {
      color: #6e6e73;
      font-weight: 500;
      font-size: 0.9375rem;
    }

    .stats-table thead th {
      position: sticky;
      background: #f5f5f7;
      z-index: 2;
      cursor: default;
      text-align: center;
    }

    .stats-table thead th[data-sort-key] {
      cursor: pointer;
      user-select: none;
    }

    .stats-table thead th[data-sort-key]:hover {
      background: #ebebef;
    }

    .stats-table thead tr:first-child th {
      top: 0;
      z-index: 3;
    }

    .stats-table thead tr:nth-child(2) th {
      top: 41px;
      z-index: 2;
    }

    .stats-table thead th[rowspan] {
      z-index: 4;
    }

    #creative-tfoot td {
      position: sticky;
      bottom: 0;
      z-index: 2;
      background: #f5f5f7;
      color: #1d1d1f;
      font-weight: 700;
      padding: 10px 12px;
      white-space: nowrap;
      border-top: 1px solid #e0e0e0;
    }

    .creative-charts {
      margin-top: 16px;
    }

    .creative-charts:empty {
      display: none;
    }

    .creative-charts-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .creative-chart {
      min-width: 0;
      border: 1px solid #e8e8ed;
      border-radius: 8px;
      padding: 8px 9px 6px;
      background: #fff;
    }

    .creative-chart-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 4px;
    }

    .creative-chart-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #6e6e73;
      white-space: nowrap;
    }

    .creative-chart-value {
      font-size: 0.6875rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .creative-chart svg {
      display: block;
      width: 100%;
      height: 60px;
      margin-top: 5px;
      overflow: visible;
      cursor: crosshair;
    }

    .creative-chart-dates {
      display: flex;
      justify-content: space-between;
      gap: 4px;
      font-size: 0.5625rem;
      color: #a1a1a6;
      margin-top: 3px;
    }

    .creative-charts-empty {
      font-size: 0.8125rem;
      color: #86868b;
      padding: 8px 0;
    }

    .creative-chart-tip {
      position: fixed;
      z-index: 1000;
      padding: 5px 8px;
      background: #1d1d1f;
      color: #fff;
      border-radius: 6px;
      font-size: 0.6875rem;
      line-height: 1.55;
      white-space: nowrap;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.1s ease;
      pointer-events: none;
    }

    .creative-chart-tip.visible {
      opacity: 1;
      visibility: visible;
    }

    .creative-chart-tip .tip-date {
      color: #c7c7cc;
      margin-bottom: 1px;
    }

    .creative-chart-tip .tip-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 3px;
      vertical-align: baseline;
    }

    @media (max-width: 1100px) {
      .creative-charts-row {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 640px) {
      .creative-charts-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .phrase-card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .phrase-card {
      background: #f9f9fb;
      border: 1px solid #e8e8ed;
      border-radius: 10px;
      padding: 0;
      height: 468px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .phrase-card-header {
      min-height: 88px;
      height: 88px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      padding: 16px 20px;
      border-bottom: 1px solid #e8e8ed;
    }

    .phrase-card-scroll {
      flex: 1;
      min-height: 0;
      max-height: 380px;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 20px 20px;
    }

    .phrase-card-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .phrase-card-scroll::-webkit-scrollbar-thumb {
      background: #c7c7cc;
      border-radius: 3px;
    }

    .phrase-card-num {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #86868b;
      text-transform: uppercase;
    }

    .phrase-card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #1d1d1f;
      line-height: 1.35;
      margin: 0;
    }

    .phrase-card-body {
      font-size: 0.875rem;
      color: #424245;
      line-height: 1.65;
    }

    @media (max-width: 960px) {
      .phrase-card-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .phrase-card-grid {
        grid-template-columns: 1fr;
      }

      .phrase-card {
        height: auto;
        max-height: 420px;
      }

      .ai-summary-metric {
        grid-template-columns: 1fr;
        gap: 4px;
      }
    }

    .ai-summary-block {
      background: #fff;
      border: 1px solid #e8e8ed;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .ai-summary-block:last-child {
      margin-bottom: 0;
    }

    .ai-summary-block-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #86868b;
      margin-bottom: 10px;
    }

    .ai-summary-block-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .ai-summary-block-title-row .ai-summary-block-title {
      margin-bottom: 0;
    }

    .tiktok-hl-section {
      margin-bottom: 12px;
    }

    .tiktok-hl-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 700;
      color: #1d1d1f;
      padding: 8px 12px;
      margin: 0;
      background: #eef4ff;
      border: 0;
      border-left: 3px solid #1877f2;
      border-radius: 0 6px 6px 0;
      cursor: pointer;
      text-align: left;
    }

    .tiktok-hl-title:hover {
      background: #e3edff;
    }

    .tiktok-hl-chevron {
      flex-shrink: 0;
      font-size: 0.7rem;
      color: #1877f2;
      transition: transform 0.2s ease;
    }

    .tiktok-hl-section.open .tiktok-hl-chevron {
      transform: rotate(180deg);
    }

    .tiktok-hl-body {
      display: none;
      margin-top: 10px;
      background: #fff;
      border: 1px solid #e8e8ed;
      border-radius: 8px;
      padding: 12px 14px;
    }

    .tiktok-hl-section.open .tiktok-hl-body {
      display: block;
    }

    .meta-ai-merge-divider {
      height: 1px;
      background: #e2e2e6;
      margin: 18px 0 16px;
    }

    .meta-ai-merge-subtitle {
      font-size: 0.9375rem;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 12px;
    }

    .meta-ai-merge-subtitle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .meta-ai-merge-subtitle-row .meta-ai-merge-subtitle {
      margin-bottom: 0;
    }

    .meta-score-info {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.6875rem;
      font-weight: 600;
      color: #6e6e73;
      background: #f0f0f2;
      border-radius: 999px;
      padding: 3px 10px;
      cursor: help;
      white-space: nowrap;
      outline: none;
    }

    .meta-score-info:hover,
    .meta-score-info:focus-visible {
      background: #e3e3e6;
      color: #1d1d1f;
    }

    .meta-score-tip {
      position: fixed;
      z-index: 1000;
      width: 264px;
      padding: 12px 14px;
      background: #1d1d1f;
      color: #fff;
      border-radius: 10px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.15s ease;
      font-size: 0.75rem;
      line-height: 1.6;
      pointer-events: none;
    }

    .meta-score-tip.visible {
      opacity: 1;
      visibility: visible;
    }

    .meta-score-tip .tip-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .meta-score-tip .tip-grade {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #d1d1d6;
    }

    .meta-score-tip .tip-grade .lvl {
      font-weight: 600;
      color: #fff;
    }

    .meta-score-tip .tip-sub {
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      margin: 10px 0 4px;
    }

    .meta-score-tip .tip-factor {
      color: #c7c7cc;
      padding-left: 10px;
      position: relative;
    }

    .meta-score-tip .tip-factor::before {
      content: "·";
      position: absolute;
      left: 2px;
      color: #8e8e93;
    }

    .meta-score-bar {
      display: flex;
      justify-content: flex-end;
      margin: 0 0 10px;
    }

    .ai-summary-campaign {
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f2;
    }

    .ai-summary-campaign:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .ai-summary-campaign:first-of-type {
      padding-top: 0;
    }

    .ai-summary-campaign-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .ai-summary-campaign-head strong {
      color: #1d1d1f;
      font-size: 0.8125rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .ai-summary-campaign-name {
      font-weight: 600;
      color: #1877f2;
      font-size: 0.875rem;
      word-break: break-word;
    }

    .ai-summary-campaign-detail {
      font-size: 0.8125rem;
      color: #6e6e73;
      margin-bottom: 4px;
    }

    .ai-summary-campaign-note {
      font-size: 0.8125rem;
      color: #424245;
      line-height: 1.55;
    }

    .ai-summary-metrics {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .ai-summary-metric {
      display: grid;

  <script>
    const COL = {
      CAMPAIGN: 'Campaign name',
      OBJECTIVE: 'Advertising objective',
      AD_GROUP: 'Ad group name',
      AD_NAME: 'Ad name',
      DATE: 'By Day',
      IMPRESSIONS: 'Impressions',
      CLICKS: 'Clicks (destination)',
      COST: 'Cost',
      CTR: 'CTR(목적지)',
      CPC: 'CPC(목적지)',
      CURRENCY: 'Currency'
    };

    const LABEL = {};

    const NUMERIC_COLUMNS = new Set();

    const FILTER_CAMPAIGN = 'campaign';
    const CREATIVE_FILTER_KEY = 'creativeName';
    const STATS_TABLE_COLS = 7;
    const CREATIVE_TABLE_COLS = 6;

    function refreshColumnLabels() {
      LABEL[COL.CAMPAIGN] = '캠페인 이름';
      LABEL[COL.OBJECTIVE] = '광고 목표';
      LABEL[COL.AD_GROUP] = '광고 세트';
      LABEL[COL.AD_NAME] = '광고 이름';
      LABEL[COL.DATE] = '날짜';
      LABEL[COL.IMPRESSIONS] = '노출';
      LABEL[COL.CLICKS] = '링크 클릭';
      LABEL[COL.COST] = '지출 (KRW)';
      LABEL[COL.CTR] = 'CTR';
      LABEL[COL.CPC] = 'CPC';
      LABEL[COL.CURRENCY] = '통화';
    }

    function pickColumn(columns, english, patternOrPatterns) {
      const resolver = window.PerformanceColumnResolver;
      if (resolver) {
        const patterns = Array.isArray(patternOrPatterns) ? patternOrPatterns : [patternOrPatterns];
        return resolver.pickColumn(columns, english, patterns.filter(Boolean));
      }
      if (columns.includes(english)) return english;
      const patterns = Array.isArray(patternOrPatterns) ? patternOrPatterns : [patternOrPatterns];
      const found = columns.find((c) => patterns.some((pattern) => pattern && pattern.test(c)));
      return found || english;
    }

    function bindColumnsFromPayload(columns) {
      const resolver = window.PerformanceColumnResolver;
      const resolved = resolver?.resolveTikTokColumns(columns) || {};
      COL.CAMPAIGN = resolved.CAMPAIGN || pickColumn(columns, 'Campaign name', /^캠페인\s*이름/);
      COL.OBJECTIVE = resolved.OBJECTIVE || pickColumn(columns, 'Advertising objective', /^광고\s*목표/);
      COL.AD_GROUP = resolved.AD_GROUP || pickColumn(columns, 'Ad group name', /^광고\s*그룹/);
      COL.AD_NAME = resolved.AD_NAME || pickColumn(columns, 'Ad name', /^광고\s*이름/);
      COL.DATE = resolved.DATE || pickColumn(columns, 'By Day', /^일별/);
      COL.IMPRESSIONS = resolved.IMPRESSIONS || pickColumn(columns, 'Impressions', /^노출/);
      COL.CLICKS = resolved.CLICKS || pickColumn(columns, 'Clicks (destination)', /클릭/);
      COL.COST = resolved.COST || pickColumn(columns, 'Cost', /^비용/);
      COL.CTR = resolved.CTR || pickColumn(columns, 'CTR(목적지)', /^CTR/i);
      COL.CPC = resolved.CPC || pickColumn(columns, 'CPC(목적지)', /^CPC/i);
      COL.CURRENCY = resolved.CURRENCY || pickColumn(columns, 'Currency', /^통화/);
      refreshColumnLabels();
      NUMERIC_COLUMNS.clear();
      [COL.IMPRESSIONS, COL.CLICKS, COL.COST, COL.CTR, COL.CPC].forEach(c => NUMERIC_COLUMNS.add(c));
    }

    refreshColumnLabels();
    [COL.IMPRESSIONS, COL.CLICKS, COL.COST, COL.CTR, COL.CPC].forEach(c => NUMERIC_COLUMNS.add(c));
    const CAMPAIGN_PREFIXES = [
      '[US]Amazon_TikTok_',
      '[US]_Amazon_Tiktok_',
      '[US]_TTS_Tiktok_'
    ];

    const state = {
      columns: [],
      rows: [],
      filters: {},
      sourceFile: '',
      dateCalendarMonth: '',
      datePickStart: null,
      statsSort: { key: null, dir: 'asc' }
    };

    const creativeState = {
      filters: {},
      filtered: [],
      page: 1,
      pageSize: 100,
      dateCalendarMonth: '',
      datePickStart: null,
      sort: { key: null, dir: 'asc' },
      statsSort: { key: null, dir: 'asc' }
    };

    const rawState = {
      filters: {},
      filtered: [],
      page: 1,
      pageSize: 100,
      sort: { key: null, dir: 'asc' },
      global: '',
      dateCalendarMonth: '',
      datePickStart: null
    };

    const tiktokAiState = {
      campaign: ''
    };

    const periodFilters = document.getElementById('period-filters');
    const periodStatsTbody = document.getElementById('period-stats-tbody');
    const periodStatsThead = document.getElementById('period-stats-thead');
    const creativeFilters = document.getElementById('creative-filters');
    const creativeThead = document.getElementById('creative-thead');
    const creativeTbody = document.getElementById('creative-tbody');
    const creativeTfoot = document.getElementById('creative-tfoot');
    const creativeRowCount = document.getElementById('creative-row-count');
    const creativePageInfo = document.getElementById('creative-page-info');
    const creativeStatsTbody = document.getElementById('creative-stats-tbody');
    const creativeStatsThead = document.getElementById('creative-stats-thead');
    const creativeStatsCampaignLabel = document.getElementById('creative-stats-campaign-label');
    const creativeStatsDateLabel = document.getElementById('creative-stats-date-label');
    const rawInfo = document.getElementById('raw-info');
    const rawFilters = document.getElementById('raw-filters');
    const rawThead = document.getElementById('raw-thead');
    const rawTbody = document.getElementById('raw-tbody');
    const rawRowCount = document.getElementById('raw-row-count');
    const rawPageInfo = document.getElementById('raw-page-info');

    document.querySelectorAll('.meta-accordion-header').forEach(header => {
      header.addEventListener('click', () => {
        const accordion = header.closest('.meta-accordion');
        const isOpen = accordion.classList.toggle('open');
        header.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });
    });

    document.getElementById('raw-global-search').addEventListener('input', (e) => {
      rawState.global = e.target.value.trim().toLowerCase();
      rawState.page = 1;
      applyRawFiltersAndRender();
    });

    document.getElementById('raw-reset-filters').addEventListener('click', () => {
      resetRawFilters();
    });

    document.getElementById('creative-page-size').addEventListener('change', (e) => {
      creativeState.pageSize = Number(e.target.value);
      creativeState.page = 1;
      renderCreativeTableBody();
      updateCreativePagination();
    });
    document.getElementById('creative-prev').addEventListener('click', () => {
      if (creativeState.page > 1) {
        creativeState.page -= 1;
        renderCreativeTableBody();
        updateCreativePagination();
      }
    });
    document.getElementById('creative-next').addEventListener('click', () => {
      const totalPages = Math.max(1, Math.ceil(creativeState.filtered.length / creativeState.pageSize));
      if (creativeState.page < totalPages) {
        creativeState.page += 1;
        renderCreativeTableBody();
        updateCreativePagination();
      }
    });

    document.getElementById('raw-prev').addEventListener('click', () => {
      if (rawState.page > 1) {
        rawState.page -= 1;
        renderRawTableBody();
        updateRawPagination();
      }
    });
    document.getElementById('raw-next').addEventListener('click', () => {
      const totalPages = Math.max(1, Math.ceil(rawState.filtered.length / rawState.pageSize));
      if (rawState.page < totalPages) {
        rawState.page += 1;
        renderRawTableBody();
        updateRawPagination();
      }
    });
    document.getElementById('raw-page-size').addEventListener('change', (e) => {
      rawState.pageSize = Number(e.target.value);
      rawState.page = 1;
      renderRawTableBody();
      updateRawPagination();
    });

    document.addEventListener('click', (e) => {
      if (e.target.closest('.date-range-wrap')) return;
      document.querySelectorAll('.date-range-wrap.open').forEach(w => w.classList.remove('open'));
    });

    function isValidRow(row) {
      const campaign = String(row[COL.CAMPAIGN] ?? '');
      if (/Total of|총\s*\d+개\s*결과/i.test(campaign)) return false;
      const date = String(row[COL.DATE] ?? '').trim();
      if (date === '-') return false;
      return true;
    }

    function createMetricBucket() {
      return { impressions: 0, clicks: 0, cost: 0, ctrSum: 0, ctrCount: 0, cpcSum: 0, cpcCount: 0 };
    }

    function trackAverage(item, sumKey, countKey, val) {
      const n = parseNum(val);
      item[sumKey] += n;
      item[countKey] += 1;
    }

    function getAvgCtr(item) {
      return item.ctrCount ? item.ctrSum / item.ctrCount : 0;
    }

    function getAvgCpc(item) {
      return item.cpcCount ? item.cpcSum / item.cpcCount : 0;
    }

    function accumulateRowMetrics(item, row) {
      item.impressions += parseNum(row[COL.IMPRESSIONS]);
      item.clicks += parseNum(row[COL.CLICKS]);
      item.cost += parseNum(row[COL.COST]);
      trackAverage(item, 'ctrSum', 'ctrCount', row[COL.CTR]);
      trackAverage(item, 'cpcSum', 'cpcCount', row[COL.CPC]);
    }

    function formatCtr(val) {
      if (!val) return '-';
      const n = parseNum(val);
      if (!n) return '-';
      return (n * 100).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%';
    }

    function formatCpc(val) {
      return val ? formatStatNum(val, true) : '-';
    }

    function getCampaignShortName(fullName) {
      const name = String(fullName ?? '');
      for (const prefix of CAMPAIGN_PREFIXES) {
        if (name.startsWith(prefix)) return name.slice(prefix.length);
      }
      return name;
    }

    function getAdCreativeShortName(adName) {
      const name = String(adName ?? '').trim();
      if (!name) return '';

      const kolMatch = name.match(/^KOL_\d{4}_\d+월_(.+)$/i);
      if (kolMatch && kolMatch[1]) return kolMatch[1].trim();

      const carrotMatch = name.match(/^Carrot_\d{4}년_\d+월_(.+)$/i);
      if (carrotMatch && carrotMatch[1]) return carrotMatch[1].trim();

      const productMatch = name.match(/^[A-Za-z]+_\d{4}_\d+월_(.+)$/i);
      if (productMatch && productMatch[1]) return productMatch[1].trim();

      return name;
    }

    function normalizeDate(val) {
      const s = String(val ?? '').trim();

      return m ? `${m[1]}-${m[2]}-${m[3]}` : '';
    }

    function filterByDateRange(rows, filterState, calendarState) {
      if (calendarState?.datePickStart) return rows;
      const from = filterState.dateFrom || '';
      const to = filterState.dateTo || '';
      if (!from && !to) return rows;
      return rows.filter(row => {
        const d = normalizeDate(row[COL.DATE]);
        if (!d) return false;
        if (from && d < from) return false;
        if (to && d > to) return false;
        return true;
      });
    }

      const from = filterState.dateFrom || '';
      const to = filterState.dateTo || '';
      if (calendarState?.datePickStart && from && !to) return `${from} ~ (종료일 선택)`;
      if (!from && !to) return '전체 기간';
      if (from && to) return from === to ? from : `${from} ~ ${to}`;
      if (from) return `${from} ~`;
      return `~ ${to}`;

    function getSortIcon(sort, key) {
      if (sort.key !== key) return '↕';
      return sort.dir === 'asc' ? '▲' : '▼';

    function toggleSortState(sort, key) {
      if (sort.key === key) {
        sort.dir = sort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        sort.key = key;
        sort.dir = 'asc';
      }
    }

    function compareSortValues(a, b, type, dir) {
      const factor = dir === 'asc' ? 1 : -1;
      if (type === 'num') return (a - b) * factor;
      if (type === 'date') return String(a).localeCompare(String(b)) * factor;
      return String(a).localeCompare(String(b), 'ko') * factor;
    }

    function sortRows(rows, sort, getValue, getType, defaultCompare) {
      const copy = [...rows];
      if (!sort.key) {
        if (defaultCompare) copy.sort(defaultCompare);
        return copy;
      }
      const { key, dir } = sort;
      const type = getType(key);
      return copy.sort((a, b) => compareSortValues(getValue(a, key), getValue(b, key), type, dir));
    }

      if (!val) return '-';

    function formatCell(col, val) {
      if (val === '' || val == null) return '';
      if (NUMERIC_COLUMNS.has(col)) {
        const num = parseNum(val);
        if (!Number.isNaN(num)) {
          if (col === COL.COST || col === COL.CPC) return Math.round(num).toLocaleString();
          if (col === COL.CTR) {
            if (!num) return String(val).trim() ? '0.00%' : '';
            return (num * 100).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%';
          }
          return Number.isInteger(num) ? num.toLocaleString() : Math.round(num).toLocaleString();
        }
      }
      return String(val);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escapeAttr(str) {
      return escapeHtml(str).replace(/'/g, '&#39;');
    }

    function buildSelectOptions(values, selectedValue, includeAll) {
      const selected = (selectedValue || '').toLowerCase();
      const allOption = includeAll ? '<option value="">전체</option>' : '';
      const items = values.map(v => {
        const str = String(v);
        const isSelected = str.toLowerCase() === selected ? ' selected' : '';
        return `<option value="${escapeAttr(str)}"${isSelected}>${escapeHtml(str)}</option>`;
      }).join('');
      return allOption + items;
    }

    function buildCreativeSelectOptions(items, selectedKey) {
      const selected = (selectedKey || '').toLowerCase();
      const allOption = `<option value=""${selected === '' ? ' selected' : ''}>전체</option>`;
      const list = items.map(item => {
        const isSelected = item.key === selected ? ' selected' : '';
        return `<option value="${escapeAttr(item.key)}"${isSelected}>${escapeHtml(item.label)}</option>`;
      }).join('');
      return allOption + list;
    }

    const TIKTOK_KPI_COL = {
      IMPRESSIONS: "노출수",
      CLICKS: "클릭수(목적지)",
      COST: "비용"
    };

    function getTikTokKpiValue(row, fieldKey) {
      const col = COL[fieldKey] || TIKTOK_KPI_COL[fieldKey];
      if (!col) return "";
      if (Object.prototype.hasOwnProperty.call(row, col)) return row[col];
      const target = String(col).trim().toLowerCase();
      for (const key of Object.keys(row)) {
        if (String(key).trim().toLowerCase() === target) return row[key];
      }
      return "";
    }

    function filterTikTokRowsForKpi(rows, dateFrom, dateTo) {
      if (!dateFrom && !dateTo) return rows;
      return rows.filter((row) => {
        const d = normalizeDate(row[COL.DATE]);
        if (!d) return false;
        if (dateFrom && d < dateFrom) return false;
        if (dateTo && d > dateTo) return false;
        return true;
      });
    }

    function aggregateTikTokKpi(rows) {
      let impressions = 0;
      let clicks = 0;
      let cost = 0;

      rows.forEach((row) => {
        impressions += parseNum(getTikTokKpiValue(row, "IMPRESSIONS"));
        clicks += parseNum(getTikTokKpiValue(row, "CLICKS"));
        cost += parseNum(getTikTokKpiValue(row, "COST"));
      });

      return {
        cpm: impressions ? (cost / impressions) * 1000 : 0,
        impr: impressions,
        clicks,
        ctr: impressions ? (clicks / impressions) * 100 : 0,
        cpc: clicks ? cost / clicks : 0,
        cost
      };
    }

    function formatTikTokKpiMoney(val) {
      return `${Math.round(val || 0).toLocaleString()}원`;
    }

    function formatTikTokKpiDisplay(raw) {
      const blank = "";
      return {

        impr: formatAiInt(raw.impr),
        clicks: formatAiInt(raw.clicks),
        ctr: formatAiPct(raw.ctr),
        cpc: formatTikTokKpiMoney(raw.cpc),
        cost: formatAiCost(raw.cost),
        cvs: blank,

    function refreshTikTokKpiSummary() {

      const metrics = aggregateTikTokKpi(filtered);
      window.KpiSummary.setValues(formatTikTokKpiDisplay(metrics));

    function getTikTokDateRangeLabel(rows) {
      const dates = rows
        .map((row) => normalizeDate(row[COL.DATE]))
        .filter(Boolean)
        .sort();
      if (!dates.length) return '전체 기간';
      const first = dates[0];
      const last = dates[dates.length - 1];
      return first === last ? first : `${first} ~ ${last}`;
    }

    function aggregateTikTokByColumn(rows, column) {
      const map = new Map();
      rows.forEach((row) => {
        const name = String(row[column] ?? '').trim();
        if (!name) return;
        if (!map.has(name)) {
          map.set(name, { name, impressions: 0, clicks: 0, cost: 0 });
        }
        const item = map.get(name);
        item.impressions += parseNum(row[COL.IMPRESSIONS]);
        item.clicks += parseNum(row[COL.CLICKS]);
        item.cost += parseNum(row[COL.COST]);
      });
      return [...map.values()].map((item) => ({
        ...item,
        ctr: item.impressions ? (item.clicks / item.impressions) * 100 : 0,
        cpc: item.clicks ? item.cost / item.clicks : 0
      }));
    }

    function aggregateTikTokAds(rows) {
      const map = new Map();
      rows.forEach((row) => {
        const key = getAdCreativeFilterKey(row[COL.AD_NAME]);
        if (!key) return;
        if (!map.has(key)) {
          map.set(key, {
            key,
            displayName: getAdCreativeShortName(row[COL.AD_NAME]),
            impressions: 0,
            clicks: 0,
            cost: 0
          });
        }
        const item = map.get(key);
        item.impressions += parseNum(row[COL.IMPRESSIONS]);
        item.clicks += parseNum(row[COL.CLICKS]);
        item.cost += parseNum(row[COL.COST]);
      });
      return [...map.values()].map((item) => ({
        ...item,
        ctr: item.impressions ? (item.clicks / item.impressions) * 100 : 0,
        cpc: item.clicks ? item.cost / item.clicks : 0
      }));
    }

    function isTikTokEntityEligible(item) {
      return item.cost >= 10000 || item.impressions >= 300;
    }

    function scoreTikTokEntityPerformance(item) {
      if (!isTikTokEntityEligible(item)) return null;
      if (item.clicks < 1 && item.cost < 30000) return null;
      const ctrNorm = Math.min(item.ctr / 0.35, 1.5);
      const cpcNorm = item.cpc > 0 ? Math.min(1800 / item.cpc, 2) : 0;
      const volumeNorm = Math.min(item.clicks / 50, 1);
      return ctrNorm * 0.45 + cpcNorm * 0.35 + volumeNorm * 0.2;
    }

    function scoreTikTokAdUnderperformance(item) {
      if (!isTikTokEntityEligible(item)) return null;
      let score = 0;
      if (!item.clicks && item.cost >= 30000) score += 5;
      if (item.ctr < 0.12) score += 2;
      else if (item.ctr < 0.16) score += 1;
      if (item.cpc > 3500) score += 2;
      else if (item.cpc > 2500) score += 1;
      score += Math.min(item.cost / 200000, 3);
      if (!item.clicks) score += item.cost / 100000;
      return score;
    }

    function computeTikTokCtrTrend(rows) {
      const byDate = new Map();
      rows.forEach((row) => {
        const date = normalizeDate(row[COL.DATE]);
        if (!date) return;
        if (!byDate.has(date)) {
          byDate.set(date, { impressions: 0, clicks: 0 });
        }
        const bucket = byDate.get(date);
        bucket.impressions += parseNum(row[COL.IMPRESSIONS]);
        bucket.clicks += parseNum(row[COL.CLICKS]);
      });
      const dates = [...byDate.keys()].sort();
      if (dates.length < 4) {
        return { label: '데이터 부족', first: 0, last: 0, dayCount: dates.length };
      }
      const ctrForDates = (list) => {
        let imp = 0;
        let clicks = 0;
        list.forEach((date) => {
          imp += byDate.get(date).impressions;
          clicks += byDate.get(date).clicks;
        });
        return imp ? (clicks / imp) * 100 : 0;
      };
      const mid = Math.floor(dates.length / 2);
      const first = ctrForDates(dates.slice(0, mid));
      const last = ctrForDates(dates.slice(mid));
      let label = '유지';
      if (last > first * 1.08) label = '상승';
      else if (last < first * 0.92) label = '하락';
      return { label, first, last, dayCount: dates.length };
    }

    function buildTikTokAiCard1Html(rows) {
      if (!rows.length) {
        return '<p>분석할 TikTok 데이터가 없습니다.</p>';
      }

      const activeRows = rows.filter((row) =>
        parseNum(row[COL.IMPRESSIONS]) > 0 || parseNum(row[COL.COST]) > 0
      );
      if (!activeRows.length) {
        return '<p>노출·지출 데이터가 없어 요약을 생성할 수 없습니다.</p>';
      }

      const rangeLabel = getTikTokDateRangeLabel(activeRows);
      const totalImp = activeRows.reduce((sum, row) => sum + parseNum(row[COL.IMPRESSIONS]), 0);
      const totalClicks = activeRows.reduce((sum, row) => sum + parseNum(row[COL.CLICKS]), 0);
      const totalCost = activeRows.reduce((sum, row) => sum + parseNum(row[COL.COST]), 0);
      const overallCtr = totalImp ? (totalClicks / totalImp) * 100 : 0;
      const overallCpc = totalClicks ? totalCost / totalClicks : 0;

      const campaigns = aggregateTikTokByColumn(activeRows, COL.CAMPAIGN);
      const adGroups = aggregateTikTokByColumn(activeRows, COL.AD_GROUP);
      const ads = aggregateTikTokAds(activeRows);

      const bestCampaign = [...campaigns]
        .map((item) => ({ item, score: scoreTikTokEntityPerformance(item) }))
        .filter((entry) => entry.score != null)
        .sort((a, b) => b.score - a.score || b.item.clicks - a.item.clicks)[0]?.item
        || [...campaigns].filter((item) => item.clicks > 0).sort((a, b) => b.ctr - a.ctr || a.cpc - b.cpc)[0]
        || null;

      const bestAdGroup = [...adGroups]
        .map((item) => ({ item, score: scoreTikTokEntityPerformance(item) }))
        .filter((entry) => entry.score != null)
        .sort((a, b) => b.score - a.score || b.item.clicks - a.item.clicks)[0]?.item
        || [...adGroups].filter((item) => item.clicks > 0).sort((a, b) => b.ctr - a.ctr || a.cpc - b.cpc)[0]
        || null;

      const bestAd = [...ads]
        .map((item) => ({ item, score: scoreTikTokEntityPerformance(item) }))
        .filter((entry) => entry.score != null)
        .sort((a, b) => b.score - a.score || b.item.clicks - a.item.clicks)[0]?.item
        || [...ads].filter((item) => item.clicks > 0).sort((a, b) => b.ctr - a.ctr || a.cpc - b.cpc)[0]
        || null;

      const worstAd = [...ads]
        .map((item) => ({ item, score: scoreTikTokAdUnderperformance(item) }))
        .filter((entry) => entry.score != null)
        .sort((a, b) => b.score - a.score || b.item.cost - a.item.cost)[0]?.item
        || null;

      const ctrTrend = computeTikTokCtrTrend(activeRows);

      const zeroClickShare = totalCost ? zeroClickCost / totalCost : 0;

        : clicksPer100k >= 4 && zeroClickShare < 0.3

      const operationStatus = getTikTokOverallStatusText(overallCtr, overallCpc, ctrTrend.label);

      const highlightParts = [

    (function initTikTokCriteriaTooltip() {
      let tip = null;
      const getTip = () => {
        if (!tip) {
          tip = document.createElement('div');
          tip.className = 'meta-score-tip';
          document.body.appendChild(tip);
        }
        return tip;
      };
      const show = (badge) => {
        const el = getTip();
        el.innerHTML = getTikTokTipContent(badge.getAttribute('data-tiktok-tip'));
        el.style.visibility = 'hidden';
        el.classList.add('visible');
        const rect = badge.getBoundingClientRect();
        const tipRect = el.getBoundingClientRect();
        let left = rect.right - tipRect.width;
        if (left < 8) left = 8;
        if (left + tipRect.width > window.innerWidth - 8) left = window.innerWidth - tipRect.width - 8;
        let top = rect.bottom + 8;
        if (top + tipRect.height > window.innerHeight - 8) {
          top = rect.top - tipRect.height - 8;
        }
        if (top < 8) top = 8;
        el.style.left = `${left}px`;
        el.style.top = `${top}px`;
        el.style.visibility = '';
      };
      const hide = () => {
        if (tip) tip.classList.remove('visible');
      };
      const closest = (node) => (node && node.closest ? node.closest('[data-tiktok-tip]') : null);
      document.addEventListener('mouseover', (e) => {
        const badge = closest(e.target);
        if (badge) show(badge);
      });
      document.addEventListener('mouseout', (e) => {
        const badge = closest(e.target);
        if (badge && !badge.contains(e.relatedTarget)) hide();
      });
      document.addEventListener('focusin', (e) => {
        const badge = closest(e.target);
        if (badge) show(badge);
      });
      document.addEventListener('focusout', (e) => {
        if (closest(e.target)) hide();
      });
      window.addEventListener('scroll', hide, true);
      window.addEventListener('resize', hide);
    })();

    const TIKTOK_RECOMMENDED_ACTIONS = {
      increaseBudget: '예산 확대',
      duplicateCreative: '소재 복제',
      pauseCreative: '소재 일시중지',
      refreshHook: '후킹(Hook) 리프레시',
      testNewVersion: '신규 버전 테스트',
      monitor: '모니터링'
    };

    function ensureTikTokAiCampaignSelected() {
      const options = getCampaignOptions();
      if (!options.length) {
        tiktokAiState.campaign = '';
        return;
      }
      const current = tiktokAiState.campaign || '';
      if (!current || !options.some((o) => o.toLowerCase() === current)) {
        tiktokAiState.campaign = options[0].toLowerCase();
      }
    }

    function aggregateTikTokAdsByName(rows) {
      return aggregateTikTokByColumn(rows, COL.AD_NAME).map((item) => ({
        ...item,
        displayName: getAdCreativeShortName(item.name)
      }));
    }

    function getTikTokAdBenchmarks(ads) {
      const active = ads.filter((item) => item.cost >= 10000 || item.impressions >= 300);
      const pool = active.length ? active : ads;
      const totalImp = pool.reduce((sum, item) => sum + item.impressions, 0);
      const totalClicks = pool.reduce((sum, item) => sum + item.clicks, 0);
      const totalCost = pool.reduce((sum, item) => sum + item.cost, 0);
      const avgCtr = totalImp ? (totalClicks / totalImp) * 100 : 0;
      const avgCpc = totalClicks ? totalCost / totalClicks : 0;
      const avgCost = pool.length ? totalCost / pool.length : 0;
      return { avgCtr, avgCpc, avgCost, totalCost };
    }

    function clampTikTokScore(value) {
      return Math.max(0, Math.min(100, Math.round(value)));
    }

    function isTikTokWinningCreative(ad, benchmarks) {
      const { avgCtr, avgCpc } = benchmarks;
      const highCtr = avgCtr > 0 ? ad.ctr >= avgCtr * 1.08 : ad.ctr >= 0.2;
      const lowCpc = ad.clicks > 0 && (avgCpc <= 0 || ad.cpc <= avgCpc * 0.92);
      return highCtr && lowCpc && ad.clicks >= 2;
    }

    function isTikTokCreativeFatigueOrHook(ad, benchmarks) {
      const { avgCtr } = benchmarks;
      const lowCtr = avgCtr > 0 ? ad.ctr < avgCtr * 0.75 : ad.ctr < 0.12;
      const highImp = ad.impressions >= 2000;
      return lowCtr && highImp;
    }

    function computeTikTokAdPerformanceScore(ad, benchmarks) {
      const { avgCtr, avgCpc } = benchmarks;
      let score = 50;

      if (ad.impressions < 50 && ad.cost < 5000) {
        return clampTikTokScore(35);
      }

      if (avgCtr > 0) {
        const ctrRatio = ad.ctr / avgCtr;
        score += Math.min(Math.max((ctrRatio - 1) * 30, -25), 30);
      } else if (ad.ctr >= 0.22) {
        score += 12;
      }

      if (ad.clicks > 0 && avgCpc > 0) {
        const cpcRatio = avgCpc / ad.cpc;
        score += Math.min(Math.max((cpcRatio - 1) * 24, -20), 24);
      } else if (!ad.clicks && ad.cost >= 50000) {
        score -= 28;
      }

      score += Math.min(ad.clicks / 20, 10);
      if (isTikTokWinningCreative(ad, benchmarks)) score += 8;
      if (isTikTokCreativeFatigueOrHook(ad, benchmarks)) score -= 12;
      if (ad.cost >= benchmarks.avgCost * 1.5 && ad.ctr < benchmarks.avgCtr * 0.7) score -= 8;

      return clampTikTokScore(score);
    }

    function getTikTokAdScoreClass(score) {
      if (score >= 70) return 'high';
      if (score >= 45) return 'mid';
      return 'low';
    }

    function buildTikTokAdStrengths(ad, benchmarks) {
      const strengths = [];
      const { avgCtr, avgCpc } = benchmarks;

      if (isTikTokWinningCreative(ad, benchmarks)) {
        strengths.push('Winning Creative — CTR·CPC 기준 우수 소재');
      }
      if (ad.clicks >= 5) {
        strengths.push(`클릭 ${formatAiInt(ad.clicks)}건으로 반응 볼륨 확보`);
      }
      if (avgCtr > 0 && ad.ctr >= avgCtr * 1.1) {
        strengths.push(`CTR ${formatAiPct(ad.ctr)}로 캠페인 평균(${formatAiPct(avgCtr)}) 대비 우수`);
      } else if (ad.ctr >= 0.22) {
        strengths.push(`CTR ${formatAiPct(ad.ctr)}로 클릭 반응 양호`);
      }
      if (ad.clicks > 0 && avgCpc > 0 && ad.cpc <= avgCpc * 0.9) {
        strengths.push(`CPC ${formatAiCost(ad.cpc)}로 평균(${formatAiCost(avgCpc)}) 대비 효율적`);
      }
      if (ad.impressions >= 1000 && ad.ctr >= avgCtr) {
        strengths.push(`노출 ${formatAiInt(ad.impressions)} 대비 안정적 클릭 반응`);
      }
      if (!strengths.length) {
        strengths.push('충분한 판단 데이터가 쌓이면 강점을 구체화할 수 있습니다');
      }
      return strengths;
    }

    function buildTikTokAdWeaknesses(ad, benchmarks) {
      const weaknesses = [];
      const { avgCtr, avgCpc } = benchmarks;

      if (isTikTokCreativeFatigueOrHook(ad, benchmarks)) {
        weaknesses.push(`노출 ${formatAiInt(ad.impressions)} 대비 CTR ${formatAiPct(ad.ctr)}로 낮아 Creative Fatigue 또는 Hook(후킹) 문제 가능성`);
      }
      if (!ad.clicks && ad.cost >= 30000) {
        weaknesses.push(`지출 ${formatAiCost(ad.cost)} 대비 클릭 0건`);
      }
      if (avgCtr > 0 && ad.ctr < avgCtr * 0.75) {
        weaknesses.push(`CTR ${formatAiPct(ad.ctr)}로 캠페인 평균(${formatAiPct(avgCtr)}) 대비 낮음`);
      } else if (ad.impressions >= 200 && ad.ctr < 0.12) {
        weaknesses.push(`CTR ${formatAiPct(ad.ctr)}로 클릭 유도력 부족`);
      }
      if (ad.clicks > 0 && avgCpc > 0 && ad.cpc >= avgCpc * 1.2) {
        weaknesses.push(`CPC ${formatAiCost(ad.cpc)}로 평균(${formatAiCost(avgCpc)}) 대비 높음`);
      }
      if (ad.impressions < 100 && ad.cost < 10000) {
        weaknesses.push('노출·지출 데이터가 적어 성과 판단 신뢰도가 낮음');
      }
      if (!weaknesses.length) {
        weaknesses.push('뚜렷한 약점 신호는 없으나 지속 모니터링이 필요합니다');
      }
      return weaknesses;
    }

    function resolveTikTokAdRecommendedAction(ad, score, benchmarks) {
      const isWinning = isTikTokWinningCreative(ad, benchmarks);
      const isFatigue = isTikTokCreativeFatigueOrHook(ad, benchmarks);

      if (!ad.clicks && ad.cost >= 50000) {
        return TIKTOK_RECOMMENDED_ACTIONS.pauseCreative;
      }
      if (isWinning && score >= 75 && ad.clicks >= 8) {
        return TIKTOK_RECOMMENDED_ACTIONS.increaseBudget;
      }
      if (isWinning && score >= 68) {
        return TIKTOK_RECOMMENDED_ACTIONS.duplicateCreative;
      }
      if (isFatigue) {
        return TIKTOK_RECOMMENDED_ACTIONS.refreshHook;
      }
      if (score >= 55 && score < 70 && ad.impressions >= 500 && ad.ctr < benchmarks.avgCtr * 0.85) {
        return TIKTOK_RECOMMENDED_ACTIONS.testNewVersion;
      }
      if (score < 40 && ad.cost >= benchmarks.avgCost * 0.8 && ad.clicks <= 2) {
        return TIKTOK_RECOMMENDED_ACTIONS.pauseCreative;
      }
      if (score < 48 && ad.clicks > 0 && ad.cpc > benchmarks.avgCpc * 1.2) {
        return TIKTOK_RECOMMENDED_ACTIONS.testNewVersion;
      }
      if (score >= 58) {
        return TIKTOK_RECOMMENDED_ACTIONS.monitor;
      }
      return TIKTOK_RECOMMENDED_ACTIONS.monitor;
    }

    function evaluateTikTokAd(ad, benchmarks) {
      const score = computeTikTokAdPerformanceScore(ad, benchmarks);
      const isWinning = isTikTokWinningCreative(ad, benchmarks);
      return {
        ...ad,
        score,
        isWinning,
        strengths: buildTikTokAdStrengths(ad, benchmarks),
        weaknesses: buildTikTokAdWeaknesses(ad, benchmarks),
        action: resolveTikTokAdRecommendedAction(ad, score, benchmarks)
      };
    }

    function bindTikTokAiCampaignSelect(selectId, onChange) {

    const TIKTOK_ADSET_ACTIONS = {
      scale: '예산 확대',
      reduceBudget: '예산 축소',
      addCreatives: '소재 추가',
      refreshCreatives: '소재 리프레시',
      monitor: '모니터링'
    };

    function buildTikTokAdSetStats(rows) {
      const map = new Map();
      rows.forEach((row) => {
        const adGroup = String(row[COL.AD_GROUP] ?? '').trim();
        if (!adGroup) return;
        const adName = String(row[COL.AD_NAME] ?? '').trim();
        if (!map.has(adGroup)) {
          map.set(adGroup, {
            name: adGroup,
            impressions: 0,
            clicks: 0,
            cost: 0,
            adNames: new Set()
          });
        }
        const item = map.get(adGroup);
        item.impressions += parseNum(row[COL.IMPRESSIONS]);
        item.clicks += parseNum(row[COL.CLICKS]);
        item.cost += parseNum(row[COL.COST]);
        if (adName) item.adNames.add(adName);
      });

      return [...map.values()].map((item) => ({
        name: item.name,
        impressions: item.impressions,
        clicks: item.clicks,
        cost: item.cost,
        adCount: item.adNames.size,
        ctr: item.impressions ? (item.clicks / item.impressions) * 100 : 0,
        cpc: item.clicks ? item.cost / item.clicks : 0
      }));
    }

    function getTikTokAdSetBenchmarks(adSets) {
      const active = adSets.filter((item) => item.cost >= 10000 || item.impressions >= 300);
      const pool = active.length ? active : adSets;
      const totalImp = pool.reduce((sum, item) => sum + item.impressions, 0);
      const totalClicks = pool.reduce((sum, item) => sum + item.clicks, 0);
      const totalCost = pool.reduce((sum, item) => sum + item.cost, 0);
      const avgCtr = totalImp ? (totalClicks / totalImp) * 100 : 0;
      const avgCpc = totalClicks ? totalCost / totalClicks : 0;
      const avgCost = pool.length ? totalCost / pool.length : 0;
      return { avgCtr, avgCpc, avgCost, totalCost };
    }

    function isTikTokAdSetFatigue(adSet, benchmarks) {
      return adSet.impressions >= 2000 && adSet.ctr < benchmarks.avgCtr * 0.75;
    }

    function computeTikTokAdSetPerformanceScore(adSet, benchmarks) {
      const { avgCtr, avgCpc } = benchmarks;
      let score = 50;

      if (adSet.impressions < 100 && adSet.cost < 10000) {
        return clampTikTokScore(38);
      }

      if (avgCtr > 0) {
        const ctrRatio = adSet.ctr / avgCtr;
        score += Math.min(Math.max((ctrRatio - 1) * 28, -22), 28);
      } else if (adSet.ctr >= 0.2) {
        score += 10;
      }

      if (adSet.clicks > 0 && avgCpc > 0) {
        const cpcRatio = avgCpc / adSet.cpc;
        score += Math.min(Math.max((cpcRatio - 1) * 20, -18), 20);
      } else if (!adSet.clicks && adSet.cost >= 50000) {
        score -= 25;
      }

      score += Math.min(adSet.clicks / 25, 12);
      if (isTikTokAdSetFatigue(adSet, benchmarks)) score -= 12;
      if (adSet.cost >= benchmarks.avgCost * 1.4 && adSet.ctr < benchmarks.avgCtr * 0.7) score -= 10;

      return clampTikTokScore(score);
    }

    function getTikTokAdSetActionClass(actionKey) {
      if (actionKey === 'scale') return 'scale';
      if (actionKey === 'reduceBudget') return 'reduce';
      if (actionKey === 'refreshCreatives' || actionKey === 'addCreatives') return 'refresh';
      return '';
    }

    function resolveTikTokAdSetRecommendedAction(adSet, score, benchmarks) {
      if (isTikTokAdSetFatigue(adSet, benchmarks)) {
        return { key: 'refreshCreatives', label: TIKTOK_ADSET_ACTIONS.refreshCreatives };
      }
      if (score >= 72 && adSet.clicks >= 5 && adSet.ctr >= benchmarks.avgCtr * 0.95) {
        return { key: 'scale', label: TIKTOK_ADSET_ACTIONS.scale };
      }
      if (score < 42 && adSet.cost >= Math.max(benchmarks.avgCost * 0.7, 30000)) {
        return { key: 'reduceBudget', label: TIKTOK_ADSET_ACTIONS.reduceBudget };
      }
      if (score >= 55 && score < 70 && adSet.adCount <= 2 && adSet.impressions >= 500) {
        return { key: 'addCreatives', label: TIKTOK_ADSET_ACTIONS.addCreatives };
      }
      if (score < 50 && adSet.impressions >= 1000 && adSet.ctr < benchmarks.avgCtr * 0.8) {
        return { key: 'refreshCreatives', label: TIKTOK_ADSET_ACTIONS.refreshCreatives };
      }
      if (score >= 65) {
        return { key: 'monitor', label: TIKTOK_ADSET_ACTIONS.monitor };
      }
      return { key: 'monitor', label: TIKTOK_ADSET_ACTIONS.monitor };
    }

    function buildTikTokAdSetVerdictNote(adSet, score, action, benchmarks) {
      const { avgCtr, avgCpc } = benchmarks;
      if (action.key === 'scale') {
        return `CTR ${formatAiPct(adSet.ctr)} · CPC ${formatAiCost(adSet.cpc)} · Performance Score ${score}로 캠페인 평균 대비 우수합니다. 예산을 점진 확대(Scale)해 클릭 볼륨을 키우세요.`;
      }
      if (action.key === 'reduceBudget') {
        return `지출 ${formatAiCost(adSet.cost)} 대비 CTR ${formatAiPct(adSet.ctr)}·CPC ${formatAiCost(adSet.cpc)}로 효율이 낮습니다. 예산 축소(Reduce Budget) 또는 입찰·타겟 재점검을 권장합니다.`;
      }
      if (action.key === 'refreshCreatives') {
        return `노출 ${formatAiInt(adSet.impressions)} 대비 CTR ${formatAiPct(adSet.ctr)}(평균 ${formatAiPct(avgCtr)})로 크리에이티브 교체·Hook 리프레시(Refresh Creatives)가 필요합니다.`;
      }
      if (action.key === 'addCreatives') {
        return `광고 ${adSet.adCount}개로 소재 다양성이 부족합니다. 반응 검증을 위해 추가 소재(Add More Creatives) 테스트를 권장합니다.`;
      }
      if (score >= 65 && adSet.ctr >= avgCtr * 0.9) {
        return `CTR·CPC가 안정적이며 Performance Score ${score}입니다. 현 구조 유지(Monitor)하며 소재 피로 신호를 관찰하세요.`;
      }
      return `Performance Score ${score} · CTR ${formatAiPct(adSet.ctr)} · CPC ${formatAiCost(adSet.cpc)}. 추가 데이터 축적 후 재평가하며 Monitor 상태를 유지하세요.`;
    }

    function evaluateTikTokAdSet(adSet, benchmarks) {
      const score = computeTikTokAdSetPerformanceScore(adSet, benchmarks);
      const action = resolveTikTokAdSetRecommendedAction(adSet, score, benchmarks);
      return {
        ...adSet,
        score,
        action,
        verdictNote: buildTikTokAdSetVerdictNote(adSet, score, action, benchmarks)
      };
    }

    function buildTikTokAdSetAiRecommendations(evaluated) {
      const lines = [];
      const scaleSets = evaluated.filter((item) => item.action.key === 'scale');
      const reduceSets = evaluated.filter((item) => item.action.key === 'reduceBudget');
      const refreshSets = evaluated.filter((item) => item.action.key === 'refreshCreatives');
      const addSets = evaluated.filter((item) => item.action.key === 'addCreatives');
      const maintainSets = evaluated.filter((item) =>
        item.action.key === 'monitor' && item.score >= 65
      );

      if (scaleSets.length) {
        lines.push(
          `예산 배분: ${scaleSets.map((item) => `「${item.name}」`).join(', ')} 광고 세트에 예산을 더 배분(Scale)하세요. CTR·CPC·Performance Score가 우수합니다.`
        );
      }
      if (refreshSets.length) {
        lines.push(
          `크리에이티브 교체: ${refreshSets.map((item) => `「${item.name}」`).join(', ')}는 노출 대비 CTR이 낮아 소재 리프레시(Refresh Creatives)를 우선 검토하세요.`
        );
      }
      if (reduceSets.length) {
        lines.push(
          `예산 축소: ${reduceSets.map((item) => `「${item.name}」`).join(', ')}는 비용 대비 효율이 낮아 Reduce Budget을 권장합니다.`
        );
      }
      if (addSets.length) {
        lines.push(
          `소재 추가: ${addSets.map((item) => `「${item.name}」`).join(', ')}는 광고 수가 적어 Add More Creatives로 A/B 테스트를 확대하세요.`
        );
      }
      if (maintainSets.length) {
        lines.push(
          `유지: ${maintainSets.map((item) => `「${item.name}」`).join(', ')}는 현재 성과가 안정적이므로 Monitor하며 유지·소폭 최적화하세요.`
        );
      }
      if (!lines.length) {
        lines.push('광고 세트별 데이터를 지속 수집하며 Monitor 상태로 성과 추세를 관찰하세요.');
      }
      return lines;
    }

        const adGroup = String(row[COL.AD_GROUP] ?? '').trim();
        const objective = String(row[COL.OBJECTIVE] ?? '').trim();
        if (!adGroup) continue;
        const key = `${adGroup}|${objective}`;
        if (!bucket.has(key)) {
          bucket.set(key, { adGroup, objective, ...createMetricBucket() });
        }
        accumulateRowMetrics(bucket.get(key), row);
      }

      return [...bucket.values()];
    }

    function ensureCalendarMonth(calendarState, filterState) {
      if (calendarState.dateCalendarMonth) return;
      const bounds = getDateBoundsForCampaign(filterState[FILTER_CAMPAIGN]);
      if (bounds.min) {
        calendarState.dateCalendarMonth = bounds.min.slice(0, 7);
        return;
      }
      const now = new Date();
      calendarState.dateCalendarMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    }

    function getDayRangeClass(dateStr, filterState, calendarState) {
      const from = filterState.dateFrom;
      const to = filterState.dateTo;
      let cls = 'date-day available';
      if (from && to && dateStr >= from && dateStr <= to) {
        cls += ' in-range';
        if (dateStr === from) cls += ' range-start';
        if (dateStr === to) cls += ' range-end';
      } else if (calendarState.datePickStart && from && !to && dateStr === from) {
        cls += ' range-start range-end';
      }
      return cls;
    }

    function bindDateRangeWrap(prefix) {
      const trigger = document.getElementById(`${prefix}-trigger`);
      const wrap = trigger?.closest('.date-range-wrap');
      if (!trigger || !wrap || wrap.dataset.dateBound === '1') return;
      wrap.dataset.dateBound = '1';
      trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        wrap.classList.add('open');
      });
    }

    function renderDateRangeCalendar(calendarState, filterState, prefix, onChange) {
      const wrap = document.getElementById(`${prefix}-calendar`);
      if (!wrap) return;

      const dateWrap = document.getElementById(`${prefix}-trigger`)?.closest('.date-range-wrap');
      if (calendarState.datePickStart && dateWrap) {
        dateWrap.classList.add('open');
      }

      const trigger = document.getElementById(`${prefix}-trigger`);
      if (trigger) trigger.textContent = getDateRangeLabel(filterState, calendarState);
      const hint = document.getElementById(`${prefix}-hint`);
      if (hint) {
        hint.textContent = calendarState.datePickStart ? '종료일을 선택하세요' : '시작일 → 종료일 순으로 선택';
      }

      ensureCalendarMonth(calendarState, filterState);

      if (!calendarState.dateCalendarMonth) {
        wrap.innerHTML = '<div class="meta-status" style="padding:8px;font-size:0.75rem;">캠페인을 선택해 주세요</div>';
        return;
      }

      const [year, month] = calendarState.dateCalendarMonth.split('-').map(Number);
      const monthLabel = `${year}년 ${month}월`;
      const firstDay = new Date(year, month - 1, 1).getDay();
      const daysInMonth = new Date(year, month, 0).getDate();
      const weekdays = ['일', '월', '화', '수', '목', '금', '토'];

      let daysHtml = '';
      for (let i = 0; i < firstDay; i++) {
        daysHtml += '<span class="date-day empty"></span>';
      }
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const cls = getDayRangeClass(dateStr, filterState, calendarState);
        daysHtml += `<button type="button" class="${cls}" data-date="${dateStr}">${day}</button>`;
      }

      wrap.innerHTML = `
        <div class="date-range-nav">
          <button type="button" id="${prefix}-prev">◀</button>
          <span class="date-range-month">${monthLabel}</span>
          <button type="button" id="${prefix}-next">▶</button>
        </div>
        <div class="date-range-weekdays">${weekdays.map(w => `<span>${w}</span>`).join('')}</div>
        <div class="date-range-days">${daysHtml}</div>
        <div class="date-range-actions">
          <button type="button" class="btn btn-clear" id="${prefix}-clear">전체 기간</button>
        </div>`;

      document.getElementById(`${prefix}-prev`)?.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!calendarState.dateCalendarMonth) return;
        const [y, m] = calendarState.dateCalendarMonth.split('-').map(Number);
        const d = new Date(y, m - 1 - 1, 1);
        calendarState.dateCalendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        renderDateRangeCalendar(calendarState, filterState, prefix, onChange);
      });

      document.getElementById(`${prefix}-next`)?.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!calendarState.dateCalendarMonth) return;
        const [y, m] = calendarState.dateCalendarMonth.split('-').map(Number);
        const d = new Date(y, m - 1 + 1, 1);
        calendarState.dateCalendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        renderDateRangeCalendar(calendarState, filterState, prefix, onChange);
      });

      document.getElementById(`${prefix}-clear`)?.addEventListener('click', (e) => {
        e.stopPropagation();
        filterState.dateFrom = '';
        filterState.dateTo = '';
        calendarState.datePickStart = null;
        if (dateWrap) dateWrap.classList.remove('open');
        renderDateRangeCalendar(calendarState, filterState, prefix, onChange);
        onChange();
      });

      wrap.querySelectorAll('button[data-date]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const dateStr = btn.dataset.date;
          let rangeCompleted = false;
          if (calendarState.datePickStart) {
            const start = calendarState.datePickStart;
            if (dateStr < start) {
              filterState.dateFrom = dateStr;
              filterState.dateTo = start;
            } else {
              filterState.dateFrom = start;
              filterState.dateTo = dateStr;
            }
            calendarState.datePickStart = null;
            rangeCompleted = true;
            if (dateWrap) dateWrap.classList.remove('open');
          } else {
            calendarState.datePickStart = dateStr;
            filterState.dateFrom = dateStr;
            filterState.dateTo = '';
            if (dateWrap) dateWrap.classList.add('open');
          }
          renderDateRangeCalendar(calendarState, filterState, prefix, onChange);
          if (rangeCompleted) onChange();
        });
      });
    }

    function getCreativeSourceRows() {
      const campaignShort = creativeState.filters[FILTER_CAMPAIGN];
      const rows = campaignShort ? getRowsByCampaign(campaignShort) : state.rows;
      return filterByDateRange(rows, creativeState.filters, creativeState);
    }

    function getCreativeNameOptions() {
      const map = new Map();
      for (const row of getCreativeSourceRows()) {
        const key = getAdCreativeFilterKey(row[COL.AD_NAME]);
        if (!key) continue;
        if (!map.has(key)) map.set(key, getAdCreativeShortName(row[COL.AD_NAME]));
      }
      return [...map.entries()]
        .map(([key, label]) => ({ key, label }))
        .sort((a, b) => a.label.localeCompare(b.label, 'ko'));
    }

    function ensureCreativeNameSelected() {
      const options = getCreativeNameOptions();
      if (!options.length) {
        creativeState.filters[CREATIVE_FILTER_KEY] = '';
        return;
      }
      const current = creativeState.filters[CREATIVE_FILTER_KEY];
      if (current === '') return;
      if (current === undefined || current === null || !options.some(o => o.key === current)) {
        creativeState.filters[CREATIVE_FILTER_KEY] = options[0].key;
      }
    }

    function buildCreativeTableData() {
      ensureCreativeNameSelected();
      const creativeFilter = creativeState.filters[CREATIVE_FILTER_KEY];
      const source = getCreativeSourceRows();
      const rows = creativeFilter
        ? source.filter(row => getAdCreativeFilterKey(row[COL.AD_NAME]) === creativeFilter)
        : source;

      const dateMap = new Map();
      for (const row of rows) {
        const date = normalizeDate(row[COL.DATE]);
        if (!date) continue;
        if (!dateMap.has(date)) {
          dateMap.set(date, { date, ...createMetricBucket() });
        }
        accumulateRowMetrics(dateMap.get(date), row);
      }

      return [...dateMap.values()];
    }

    function buildCreativeStatsData() {
      const rows = getCreativeSourceRows();
      const bucket = new Map();

      for (const row of rows) {
        const key = getAdCreativeFilterKey(row[COL.AD_NAME]);
        if (!key) continue;
        const displayName = getAdCreativeShortName(row[COL.AD_NAME]);
        const objective = String(row[COL.OBJECTIVE] ?? '').trim();
        const mapKey = `${key}|${objective}`;
        if (!bucket.has(mapKey)) {
          bucket.set(mapKey, { displayName, objective, ...createMetricBucket() });
        }
        accumulateRowMetrics(bucket.get(mapKey), row);
      }

      return [...bucket.values()];
    }

    const CREATIVE_CHART_METRICS = [
      { key: 'impressions', label: '노출', color: '#0071e3', fmt: (v) => formatAiInt(v) },
      { key: 'clicks', label: '링크 클릭', color: '#34c759', fmt: (v) => formatAiInt(v) },
      { key: 'cost', label: '지출', color: '#ff9500', fmt: (v) => Math.round(v || 0).toLocaleString() },
      { key: 'ctr', label: 'CTR', color: '#af52de', fmt: (v) => (v ? `${v.toFixed(2)}%` : '0%') },
      { key: 'cpc', label: 'CPC', color: '#5856d6', fmt: (v) => Math.round(v || 0).toLocaleString() }
    ];

    const CREATIVE_SPARK = { W: 100, H: 60, padX: 3, padY: 6 };
    const creativeChartState = { series: [] };

    function aggregateCreativeChartSeries(items) {
      return [...(items || [])]
        .filter((item) => item.date)
        .sort((a, b) => String(a.date).localeCompare(String(b.date)))
        .map((item) => ({
          date: item.date,
          impressions: item.impressions || 0,
          clicks: item.clicks || 0,
          cost: item.cost || 0,
          ctr: getAvgCtr(item),
          cpc: getAvgCpc(item)
        }));
    }

    function buildCreativeChartSvg(values, color) {
      const { W, H, padX, padY } = CREATIVE_SPARK;
      const n = values.length;
      const max = Math.max(...values, 0);
      const min = Math.min(...values, 0);
      const range = max - min || 1;
      const innerW = W - padX * 2;
      const innerH = H - padY * 2;
      const xAt = (i) => (n <= 1 ? W / 2 : padX + (i / (n - 1)) * innerW);
      const yAt = (v) => padY + innerH - ((v - min) / range) * innerH;

      if (n === 1) {
        return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">` +
          `<circle cx="${xAt(0).toFixed(1)}" cy="${yAt(values[0]).toFixed(1)}" r="2.5" fill="${color}"></circle>` +
          `<line class="cc-marker-line" x1="0" y1="${padY}" x2="0" y2="${H - padY}" stroke="${color}" stroke-width="1" stroke-dasharray="2 2" vector-effect="non-scaling-stroke" opacity="0"></line>` +
          `<circle class="cc-marker-dot" cx="0" cy="0" r="2.6" fill="#fff" stroke="${color}" stroke-width="1.5" vector-effect="non-scaling-stroke" opacity="0"></circle>` +
          `</svg>`;
      }

      const pts = values.map((v, i) => `${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`);
      const linePath = `M${pts.join(' L')}`;
      const areaPath =
        `M${xAt(0).toFixed(1)},${(H - padY).toFixed(1)} ` +
        `L${pts.join(' L')} ` +
        `L${xAt(n - 1).toFixed(1)},${(H - padY).toFixed(1)} Z`;
      const lastX = xAt(n - 1).toFixed(1);
      const lastY = yAt(values[n - 1]).toFixed(1);

      return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">` +
        `<path d="${areaPath}" fill="${color}" fill-opacity="0.10" stroke="none"></path>` +
        `<path d="${linePath}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"></path>` +
        `<circle cx="${lastX}" cy="${lastY}" r="2" fill="${color}" vector-effect="non-scaling-stroke"></circle>` +
        `<line class="cc-marker-line" x1="0" y1="${padY}" x2="0" y2="${H - padY}" stroke="${color}" stroke-width="1" stroke-dasharray="2 2" vector-effect="non-scaling-stroke" opacity="0"></line>` +
        `<circle class="cc-marker-dot" cx="0" cy="0" r="2.6" fill="#fff" stroke="${color}" stroke-width="1.5" vector-effect="non-scaling-stroke" opacity="0"></circle>` +
        `</svg>`;
    }

    function renderCreativeCharts() {
      const container = document.getElementById('creative-charts');
      if (!container) return;

      const series = aggregateCreativeChartSeries(creativeState.filtered || []);
      creativeChartState.series = series;
      if (!series.length) {
        container.innerHTML = `<p class="creative-charts-empty">필터 조건에 해당하는 데이터가 없어 그래프를 표시할 수 없습니다.</p>`;
        return;
      }

      const cards = CREATIVE_CHART_METRICS.map((metric) => {
        const values = series.map((r) => Number(r[metric.key] || 0));
        const latest = values[values.length - 1];
        return [
          `<div class="creative-chart" data-metric-key="${metric.key}">`,
          `<div class="creative-chart-head"><span class="creative-chart-title">${escapeHtml(metric.label)}</span>`,
          `<span class="creative-chart-value" style="color:${metric.color}">${escapeHtml(metric.fmt(latest))}</span></div>`,
          buildCreativeChartSvg(values, metric.color),
          window.PerformanceChartAxis.buildAxisDatesHtml(series, "creative-chart-dates", escapeHtml),
          `</div>`
        ].join('');
      }).join('');

      container.innerHTML = `<div class="creative-charts-row">${cards}</div>`;
    }

    (function initCreativeChartHover() {
      let tip = null;
      const getTip = () => {
        if (!tip) {
          tip = document.createElement('div');
          tip.className = 'creative-chart-tip';
          document.body.appendChild(tip);
        }
        return tip;
      };
      const clearMarkers = () => {
        const container = document.getElementById('creative-charts');
        if (!container) return;
        container.querySelectorAll('.cc-marker-line, .cc-marker-dot').forEach((el) => el.setAttribute('opacity', '0'));
      };
      const hide = () => {
        if (tip) tip.classList.remove('visible');
        clearMarkers();
      };
      const metricByKey = (key) => CREATIVE_CHART_METRICS.find((m) => m.key === key);

      document.addEventListener('mousemove', (e) => {
        const chart = e.target.closest ? e.target.closest('.creative-chart') : null;
        if (!chart) { hide(); return; }
        const series = creativeChartState.series;
        if (!series || !series.length) { hide(); return; }
        const svg = chart.querySelector('svg');
        const metric = metricByKey(chart.getAttribute('data-metric-key'));
        if (!svg || !metric) { hide(); return; }

        const rect = svg.getBoundingClientRect();
        if (!rect.width) { hide(); return; }
        let ratio = (e.clientX - rect.left) / rect.width;
        ratio = Math.max(0, Math.min(1, ratio));
        const n = series.length;
        const index = n <= 1 ? 0 : Math.round(ratio * (n - 1));
        const row = series[index];
        if (!row) { hide(); return; }

        const values = series.map((r) => Number(r[metric.key] || 0));
        const max = Math.max(...values, 0);
        const min = Math.min(...values, 0);
        const range = max - min || 1;
        const innerW = CREATIVE_SPARK.W - CREATIVE_SPARK.padX * 2;
        const innerH = CREATIVE_SPARK.H - CREATIVE_SPARK.padY * 2;
        const mx = n <= 1 ? CREATIVE_SPARK.W / 2 : CREATIVE_SPARK.padX + (index / (n - 1)) * innerW;
        const my = CREATIVE_SPARK.padY + innerH - ((values[index] - min) / range) * innerH;

        clearMarkers();
        const line = svg.querySelector('.cc-marker-line');
        const dot = svg.querySelector('.cc-marker-dot');
        if (line) {
          line.setAttribute('x1', mx.toFixed(1));
          line.setAttribute('x2', mx.toFixed(1));
          line.setAttribute('opacity', '0.6');
        }
        if (dot) {
          dot.setAttribute('cx', mx.toFixed(1));
          dot.setAttribute('cy', my.toFixed(1));
          dot.setAttribute('opacity', '1');
        }

        const el = getTip();
        el.innerHTML =
          `<div class="tip-date">${escapeHtml(row.date)}</div>` +
          `<div><span class="tip-dot" style="background:${metric.color}"></span>` +
          `${escapeHtml(metric.label)} <strong>${escapeHtml(metric.fmt(values[index]))}</strong></div>`;
        el.classList.add('visible');
        const tipRect = el.getBoundingClientRect();
        let left = e.clientX + 14;
        if (left + tipRect.width > window.innerWidth - 8) left = e.clientX - tipRect.width - 14;
        if (left < 8) left = 8;
        let top = e.clientY - tipRect.height - 12;
        if (top < 8) top = e.clientY + 16;
        el.style.left = `${left}px`;
        el.style.top = `${top}px`;
      });

      window.addEventListener('scroll', hide, true);
    })();

    function buildCreativeTableSummaryRow(items) {
      if (!items.length) return '';
      const totals = createMetricBucket();
      items.forEach(item => {
        totals.impressions += item.impressions;
        totals.clicks += item.clicks;

        totals.ctrCount += item.ctrCount;
        totals.cpcSum += item.cpcSum;
        totals.cpcCount += item.cpcCount;
      });
      return `
        <tr class="creative-total-row">
          <td>TOTAL</td>

          <td class="num">${formatStatNum(totals.clicks, false)}</td>

          <td class="num">${formatCtr(getAvgCtr(totals))}</td>
          <td class="num">${formatCpc(getAvgCpc(totals))}</td>
