    }

    function renderCreativeTableBody() {
      const allRows = creativeState.filtered;
      const start = (creativeState.page - 1) * creativeState.pageSize;
      const pageRows = allRows.slice(start, start + creativeState.pageSize);

      if (pageRows.length === 0) {
        creativeTbody.innerHTML = `<tr><td colspan="${CREATIVE_TABLE_COLS}" class="meta-status">표시할 데이터가 없습니다.</td></tr>`;
        if (creativeTfoot) creativeTfoot.innerHTML = '';
        return;
      }

      const bodyHtml = pageRows.map(row => `
        <tr>
          <td>${escapeHtml(row.date)}</td>
          <td class="num">${formatStatNum(row.impressions, false)}</td>
          <td class="num">${formatStatNum(row.clicks, false)}</td>
          <td class="num">${formatStatNum(row.cost, true)}</td>
          <td class="num">${formatCtr(getAvgCtr(row))}</td>
          <td class="num">${formatCpc(getAvgCpc(row))}</td>
        </tr>`).join('');

      creativeTbody.innerHTML = bodyHtml;
      if (creativeTfoot) creativeTfoot.innerHTML = buildCreativeTableSummaryRow(allRows);
    }

    function updateCreativePagination() {
      const total = creativeState.filtered.length;
      const totalPages = Math.max(1, Math.ceil(total / creativeState.pageSize));
      if (creativeState.page > totalPages) creativeState.page = totalPages;
      creativeRowCount.textContent = `필터 결과 ${total.toLocaleString()}행`;
      creativePageInfo.textContent = `${creativeState.page} / ${totalPages} 페이지`;
    }

    function onCreativeDateRangeComplete() {
      ensureCreativeNameSelected();
      const select = creativeFilters.querySelector(`select[data-col="${CREATIVE_FILTER_KEY}"]`);
      if (select) {
        select.innerHTML = buildCreativeSelectOptions(getCreativeNameOptions(), creativeState.filters[CREATIVE_FILTER_KEY]);
      }
      creativeState.page = 1;
      applyCreativeFiltersAndRender();
    }

    function getRawSourceRows() {
      const campaignShort = rawState.filters[FILTER_CAMPAIGN];
      const rows = campaignShort ? getRowsByCampaign(campaignShort) : state.rows;
      return filterByDateRange(rows, rawState.filters, rawState);
    }

    function ensureRawCampaignSelected() {
      const options = getCampaignOptions();
      const current = rawState.filters[FILTER_CAMPAIGN] || '';
      if (!current) return;
      if (!options.some(o => o.toLowerCase() === current)) {
        rawState.filters[FILTER_CAMPAIGN] = '';
      }
    }

    function updateRawFilterSelects() {
      ensureRawDependentFilters();
      const adSetSelect = rawFilters.querySelector(`select[data-col="${escapeAttr(COL.AD_GROUP)}"]`);
      const adNameSelect = rawFilters.querySelector(`select[data-col="${escapeAttr(COL.AD_NAME)}"]`);
      if (adSetSelect) {
        adSetSelect.innerHTML = buildSelectOptions(getRawAdSetOptions(), rawState.filters[COL.AD_GROUP], true);
      }
      if (adNameSelect) {
        adNameSelect.innerHTML = buildSelectOptions(getRawAdNameOptions(), rawState.filters[COL.AD_NAME], true);
      }
    }

    function onRawDateRangeComplete() {
      rawState.filters[COL.AD_GROUP] = '';
      rawState.filters[COL.AD_NAME] = '';
      updateRawFilterSelects();
      rawState.page = 1;
      applyRawFiltersAndRender();
    }

    function getRawAdSetOptions() {
      return [...new Set(getRawSourceRows().map(r => r[COL.AD_GROUP]).filter(v => v !== '' && v != null))]
        .sort((a, b) => String(a).localeCompare(String(b), 'ko'));
    }

    function getRawAdNameOptions() {
      let rows = getRawSourceRows();
      const adSetFilter = rawState.filters[COL.AD_GROUP];
      if (adSetFilter) {
        rows = rows.filter(row => String(row[COL.AD_GROUP] ?? '').toLowerCase() === adSetFilter);
      }
      return [...new Set(rows.map(r => r[COL.AD_NAME]).filter(v => v !== '' && v != null))]
        .sort((a, b) => String(a).localeCompare(String(b), 'ko'));
    }

    function ensureRawDependentFilters() {
      const adSets = getRawAdSetOptions();
      const currentAdSet = rawState.filters[COL.AD_GROUP] || '';
      if (currentAdSet && !adSets.some(v => v.toLowerCase() === currentAdSet)) {
        rawState.filters[COL.AD_GROUP] = '';
      }
      const adNames = getRawAdNameOptions();
      const currentAdName = rawState.filters[COL.AD_NAME];
      if (currentAdName && !adNames.some(v => v.toLowerCase() === currentAdName)) {
        rawState.filters[COL.AD_NAME] = '';
      }
    }

    function renderRawFilters() {
      ensureRawCampaignSelected();
      ensureRawDependentFilters();

      const campaignOptions = buildSelectOptions(getCampaignOptions(), rawState.filters[FILTER_CAMPAIGN], true);
      const adSetOptions = buildSelectOptions(getRawAdSetOptions(), rawState.filters[COL.AD_GROUP], true);
      const adNameOptions = buildSelectOptions(getRawAdNameOptions(), rawState.filters[COL.AD_NAME], true);

      rawFilters.innerHTML = `
        <div class="filter-item">
          <label>${escapeHtml(LABEL[COL.CAMPAIGN])}</label>
          <select data-col="${escapeAttr(FILTER_CAMPAIGN)}">${campaignOptions}</select>
        </div>
        <div class="filter-item filter-item-date">
          <label>${escapeHtml(LABEL[COL.DATE])}</label>
          <div class="date-range-wrap">
            <div class="date-range-trigger" id="raw-date-trigger" tabindex="0">${escapeHtml(getDateRangeLabel(rawState.filters, rawState))}</div>
            <div class="date-range-popover">
              <div class="date-range-hint" id="raw-date-hint"></div>
              <div id="raw-date-calendar"></div>
            </div>
          </div>
        </div>
        <div class="filter-item">
          <label>${escapeHtml(LABEL[COL.AD_GROUP])}</label>
          <select data-col="${escapeAttr(COL.AD_GROUP)}">${adSetOptions}</select>
        </div>
        <div class="filter-item">
          <label>${escapeHtml(LABEL[COL.AD_NAME])}</label>
          <select data-col="${escapeAttr(COL.AD_NAME)}">${adNameOptions}</select>
        </div>`;

      renderDateRangeCalendar(rawState, rawState.filters, 'raw-date', onRawDateRangeComplete);
      bindDateRangeWrap('raw-date');

      rawFilters.querySelectorAll('select[data-col]').forEach(el => {
        el.addEventListener('change', () => {
          const col = el.dataset.col;
          rawState.filters[col] = el.value.trim().toLowerCase();
          if (col === FILTER_CAMPAIGN) {
            rawState.filters.dateFrom = '';
            rawState.filters.dateTo = '';
            rawState.filters[COL.AD_GROUP] = '';
            rawState.filters[COL.AD_NAME] = '';
            rawState.datePickStart = null;
            rawState.dateCalendarMonth = '';
            renderRawFilters();
            rawState.page = 1;
            applyRawFiltersAndRender();
            return;
          }
          if (col === COL.AD_GROUP) {
            rawState.filters[COL.AD_NAME] = '';
            renderRawFilters();
          }
          rawState.page = 1;
          applyRawFiltersAndRender();
        });
      });
    }

    function resetRawFilters() {
      rawState.filters = {};
      rawState.global = '';
      rawState.sort = { key: null, dir: 'asc' };
      rawState.page = 1;
      rawState.dateCalendarMonth = '';
      rawState.datePickStart = null;
      document.getElementById('raw-global-search').value = '';
      ensureRawCampaignSelected();
      renderRawFilters();
      applyRawFiltersAndRender();
    }

    function applyRawFiltersAndRender() {
      let rows = getRawSourceRows();

      const adSetFilter = rawState.filters[COL.AD_GROUP];
      if (adSetFilter) {
        rows = rows.filter(row => String(row[COL.AD_GROUP] ?? '').toLowerCase() === adSetFilter);
      }

      const adNameFilter = rawState.filters[COL.AD_NAME];
      if (adNameFilter) {
        rows = rows.filter(row => String(row[COL.AD_NAME] ?? '').toLowerCase() === adNameFilter);
      }

      if (rawState.global) {
        rows = rows.filter(row =>
          state.columns.some(col => String(row[col] ?? '').toLowerCase().includes(rawState.global))
        );
      }

      if (rawState.sort.key) {
        const { key, dir } = rawState.sort;
        const factor = dir === 'asc' ? 1 : -1;
        rows.sort((a, b) => {
          const av = a[key] ?? '';
          const bv = b[key] ?? '';
          if (NUMERIC_COLUMNS.has(key)) {
            return (parseNum(av) - parseNum(bv)) * factor;
          }
          if (key === COL.DATE) {
            return normalizeDate(av).localeCompare(normalizeDate(bv)) * factor;
          }
          return String(av).localeCompare(String(bv), 'ko') * factor;
        });
      }

      rawState.filtered = rows;
      renderRawTableHead();
      renderRawTableBody();
      updateRawPagination();
    }

    function renderRawTableHead() {
      const columns = state.columns;
      rawThead.innerHTML = `<tr>${columns.map(col => {
        const active = rawState.sort.key === col;
        const icon = active ? (rawState.sort.dir === 'asc' ? '▲' : '▼') : '↕';
        const label = LABEL[col] || col;
        return `<th data-col="${escapeAttr(col)}">${escapeHtml(label)} <span class="sort-icon">${icon}</span></th>`;
      }).join('')}</tr>`;

      rawThead.querySelectorAll('th').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.dataset.col;
          if (rawState.sort.key === col) {
            rawState.sort.dir = rawState.sort.dir === 'asc' ? 'desc' : 'asc';
          } else {
            rawState.sort.key = col;
            rawState.sort.dir = 'asc';
          }
          applyRawFiltersAndRender();
        });
      });
    }

    function renderRawTableBody() {
      const columns = state.columns;
      const colCount = columns.length || 1;
      const start = (rawState.page - 1) * rawState.pageSize;
      const pageRows = rawState.filtered.slice(start, start + rawState.pageSize);

      if (pageRows.length === 0) {
        rawTbody.innerHTML = `<tr><td colspan="${colCount}" class="meta-status">표시할 데이터가 없습니다.</td></tr>`;
        return;
      }

      rawTbody.innerHTML = pageRows.map(row => {
        return `<tr>${columns.map(col => {
          const val = row[col] ?? '';
          const cls = NUMERIC_COLUMNS.has(col) ? 'num' : '';
          return `<td class="${cls}" title="${escapeAttr(String(val))}">${escapeHtml(formatCell(col, val))}</td>`;
        }).join('')}</tr>`;
      }).join('');
    }

    function updateRawPagination() {
      const total = rawState.filtered.length;
      const totalPages = Math.max(1, Math.ceil(total / rawState.pageSize));
      if (rawState.page > totalPages) rawState.page = totalPages;
      rawRowCount.textContent = `필터 결과 ${total.toLocaleString()}행`;
      rawPageInfo.textContent = `${rawState.page} / ${totalPages} 페이지`;
    }
  </script>
  <script src="shared/date-range-picker.js"></script>
  <script src="shared/kpi-calc-basis.js"></script>
  <script src="shared/kpi-summary.js"></script>
  <script>
    mountKpiSummary("kpi-summary-root", "tiktok", { hideTypeColumn: true });
    if (window.KpiSummary) {
      window.KpiSummary.onDateChange = () => refreshTikTokKpiSummary();
    }
    window.loadTikTokData = loadTikTokData;
    if (window.PerformanceDataLoader) {
      window.PerformanceDataLoader.onDataUpdated(loadTikTokData);
    }
    loadTikTokData();
  </script>
</body>
</html>
